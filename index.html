  <script>
    const KEY = "956cbd05f9e9bf934df78d9b72d9a3a0";
    const API = "https://v3.football.api-sports.io";

    const LEAGUES_DATA = [
      {id: 39, name: "🇬🇧 Premier League"},
      {id: 40, name: "🇬🇧 Championship"},
      {id: 41, name: "🇬🇧 League One"},
      {id: 140, name: "🇪🇸 La Liga"},
      {id: 141, name: "🇪🇸 La Liga 2"},
      {id: 135, name: "🇮🇹 Serie A"},
      {id: 136, name: "🇮🇹 Serie B"},
      {id: 78, name: "🇩🇪 Bundesliga"},
      {id: 79, name: "🇩🇪 2. Bundesliga"},
      {id: 61, name: "🇫🇷 Ligue 1"},
      {id: 62, name: "🇫🇷 Ligue 2"},
      {id: 88, name: "🇳🇱 Eredivisie"},
      {id: 144, name: "🇧🇪 Belgium Jupiler"},
      {id: 203, name: "🇹🇷 Turkey Süper Lig"},
      {id: 262, name: "🇲🇽 Liga MX"},
      {id: 197, name: "🇬🇷 Greece Super League"}
    ];
    const LEAGUES = LEAGUES_DATA.map(l => l.id);

    const REQUEST_DELAY_MS = 260;
    const REQUEST_TIMEOUT_MS = 12000;
    const LAST_GENERAL = 6;
    const LAST_SPLIT = 6;
    const MAX_MATCHES = 100;
    const LS_WALLBET_BANK = "omega_wallbet_bank_v470600";
    const LS_WALLBET_LAST = "omega_wallbet_last_v470600";

    let statsCache = new Map();
    let teamStatsCache = new Map();
    let lastFixturesCache = new Map();
    let isRunning = false;
    let latestTopLists = { over25: [], btts: [], cards4: [] };
    let latestWallBet = null;

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function showError(msg) {
      document.getElementById("errorBox").innerHTML = `<div class="error-box">${escapeHtml(msg)}</div>`;
    }

    function clearError() {
      document.getElementById("errorBox").innerHTML = "";
    }

    function setLoader(show, text = "") {
      document.getElementById("loader").style.display = show ? "block" : "none";
      document.getElementById("status").innerText = text;
      if (!show) document.getElementById("bar").style.width = "0%";
    }

    function setProgress(percent, text = "") {
      document.getElementById("bar").style.width = `${percent}%`;
      document.getElementById("status").innerText = text;
    }

    function setButtonsDisabled(disabled) {
      ["btnPre", "btnPdf", "btnSaveWallbet", "leagueFilter"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.disabled = disabled;
      });
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getTodayISO() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function safeNum(x, d = 0) {
      const n = Number(x);
      return Number.isFinite(n) ? n : d;
    }

    function getWallBetBank() {
      try {
        return JSON.parse(localStorage.getItem(LS_WALLBET_BANK) || '{"totalBets":0,"stakeSum":0,"profit":0,"wins":0,"losses":0}');
      } catch {
        return { totalBets: 0, stakeSum: 0, profit: 0, wins: 0, losses: 0 };
      }
    }

    function saveWallBetBank(v) {
      localStorage.setItem(LS_WALLBET_BANK, JSON.stringify(v));
    }

    function renderBankSection() {
      const bank = getWallBetBank();
      const roi = bank.stakeSum > 0 ? ((bank.profit / bank.stakeSum) * 100).toFixed(1) : "0.0";

      document.getElementById("bankSection").innerHTML = `
        <div class="section-panel">
          <div class="section-title">🏦 WALLBET ΤΑΜΕΙΟ</div>
          <div class="bank-grid">
            <div class="bank-box">
              <div class="bank-label">Σύνολο Δελτίων</div>
              <div class="bank-value">${bank.totalBets}</div>
            </div>
            <div class="bank-box">
              <div class="bank-label">Συνολικό Ποντάρισμα</div>
              <div class="bank-value">${bank.stakeSum.toFixed(2)}</div>
            </div>
            <div class="bank-box">
              <div class="bank-label">Καθαρό Κέρδος</div>
              <div class="bank-value">${bank.profit.toFixed(2)}</div>
            </div>
            <div class="bank-box">
              <div class="bank-label">ROI %</div>
              <div class="bank-value">${roi}%</div>
            </div>
          </div>
        </div>
      `;
    }

    async function throttledFetch(url, timeout = REQUEST_TIMEOUT_MS) {
      await sleep(REQUEST_DELAY_MS);
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeout);
      try {
        return await fetch(url, {
          headers: { "x-apisports-key": KEY },
          signal: controller.signal
        });
      } finally {
        clearTimeout(timer);
      }
    }

    async function apiReq(path) {
      try {
        const response = await throttledFetch(`${API}/${path}`);
        if (!response.ok) return { response: [], errors: { status: response.status } };
        return await response.json() || { response: [] };
      } catch (err) {
        return { response: [], errors: { message: err?.name === "AbortError" ? "timeout" : (err?.message || "unknown") } };
      }
    }

    async function getTeamSeasonStats(teamId, leagueId, season) {
      const key = `${teamId}_${leagueId}_${season}`;
      if (teamStatsCache.has(key)) return teamStatsCache.get(key);

      const data = await apiReq(`teams/statistics?team=${teamId}&league=${leagueId}&season=${season}`);
      const response = data?.response || {};
      teamStatsCache.set(key, response);
      return response;
    }

    async function getLastFixtures(teamId, leagueId, season) {
      const key = `team_last_${teamId}_${leagueId}_${season}`;
      if (lastFixturesCache.has(key)) return lastFixturesCache.get(key);

      const data = await apiReq(`fixtures?team=${teamId}&league=${leagueId}&season=${season}&last=20&status=FT`);
      const response = data?.response || [];
      lastFixturesCache.set(key, response);
      return response;
    }

    async function getFixtureStats(fixtureId) {
      if (statsCache.has(fixtureId)) return statsCache.get(fixtureId);
      const data = await apiReq(`fixtures/statistics?fixture=${fixtureId}`);
      statsCache.set(fixtureId, data);
      return data;
    }

    function statVal(statsArr, type) {
      if (!Array.isArray(statsArr)) return 0;
      const item = statsArr.find(x => x.type === type);
      if (!item || item.value == null) return 0;
      return parseFloat(String(item.value).replace("%", "").trim()) || 0;
    }

    function getTeamGoals(fixture, teamId) {
      return fixture?.teams?.home?.id === teamId
        ? (fixture?.goals?.home ?? 0)
        : (fixture?.goals?.away ?? 0);
    }

    function getOpponentGoals(fixture, teamId) {
      return fixture?.teams?.home?.id === teamId
        ? (fixture?.goals?.away ?? 0)
        : (fixture?.goals?.home ?? 0);
    }

    function estimateXG(statsArr, goals = 0) {
      const shotsOnGoal = statVal(statsArr, "Shots on Goal");
      const shotsOffGoal = statVal(statsArr, "Shots off Goal");
      const totalShots = statVal(statsArr, "Total Shots");
      const dangerous = statVal(statsArr, "Dangerous Attacks");
      const corners = statVal(statsArr, "Corner Kicks");

      let xg =
        (shotsOnGoal * 0.18) +
        (shotsOffGoal * 0.07) +
        (Math.max(totalShots - shotsOnGoal - shotsOffGoal, 0) * 0.03) +
        (dangerous * 0.008) +
        (corners * 0.025) +
        (goals * 0.35);

      if (!Number.isFinite(xg) || xg <= 0) xg = goals > 0 ? (0.70 + goals * 0.30) : 0.70;
      return xg;
    }

    function getFormHistory(fixtures, teamId) {
      return fixtures.map(f => {
        const myG = getTeamGoals(f, teamId);
        const opG = getOpponentGoals(f, teamId);
        return myG > opG
          ? { res: "Ν", cls: "W" }
          : (myG < opG ? { res: "Η", cls: "L" } : { res: "Ι", cls: "D" });
      }).reverse();
    }

    function getDev(curr, base) {
      if (!base || base <= 0) return `<span class="dev-badge dev-pos">N/A</span>`;
      const d = (((parseFloat(curr) - base) / base) * 100).toFixed(1);
      return `<span class="dev-badge ${d >= 0 ? "dev-pos" : "dev-neg"}">${d > 0 ? "+" : ""}${d}%</span>`;
    }

    async function batchCalculate(list, teamId) {
      if (!list.length) return { xg: "0.00", xga: "0.00", cor: "0.0", crd: "0.0" };

      let xgSum = 0, xgaSum = 0, corSum = 0, crdSum = 0, count = 0;

      for (const f of list) {
        const st = await getFixtureStats(f.fixture.id);
        if (!st?.response || st.response.length < 2) continue;

        const myObj = st.response.find(x => x.team.id === teamId);
        const opObj = st.response.find(x => x.team.id !== teamId);
        if (!myObj || !opObj) continue;

        const my = myObj.statistics || [];
        const op = opObj.statistics || [];

        let myXG = statVal(my, "Expected Goals");
        if (myXG <= 0) myXG = estimateXG(my, getTeamGoals(f, teamId));

        let oppXG = statVal(op, "Expected Goals");
        if (oppXG <= 0) oppXG = estimateXG(op, getOpponentGoals(f, teamId));

        xgSum += myXG;
        xgaSum += oppXG;
        corSum += statVal(my, "Corner Kicks");
        crdSum += statVal(my, "Yellow Cards") + statVal(my, "Red Cards");
        count++;
      }

      return {
        xg: count > 0 ? (xgSum / count).toFixed(2) : "0.00",
        xga: count > 0 ? (xgaSum / count).toFixed(2) : "0.00",
        cor: count > 0 ? (corSum / count).toFixed(1) : "0.0",
        crd: count > 0 ? (crdSum / count).toFixed(1) : "0.0"
      };
    }

    async function getTeamData(teamId, leagueId, season, venueType) {
      const [seasonStats, allFixs] = await Promise.all([
        getTeamSeasonStats(teamId, leagueId, season),
        getLastFixtures(teamId, leagueId, season)
      ]);

      const genLast = allFixs.slice(0, LAST_GENERAL);
      const splitLast = allFixs
        .filter(f => venueType === "home" ? f.teams.home.id === teamId : f.teams.away.id === teamId)
        .slice(0, LAST_SPLIT);

      const [form, split] = await Promise.all([
        batchCalculate(genLast, teamId),
        batchCalculate(splitLast, teamId)
      ]);

      const baseXG = parseFloat(seasonStats?.goals?.for?.average?.total) || 1.10;
      const baseXGA = parseFloat(seasonStats?.goals?.against?.average?.total) || 1.10;

      return {
        seasonXG: baseXG.toFixed(2),
        seasonXGA: baseXGA.toFixed(2),
        formXG: form.xg,
        formXGA: form.xga,
        devXG: getDev(form.xg, baseXG),
        devXGA: getDev(form.xga, baseXGA),
        splitXG: split.xg,
        splitXGA: split.xga,
        corners: form.cor,
        cards: form.crd,
        splitCards: split.crd,
        history: getFormHistory(genLast, teamId)
      };
    }

    function computeMarketScores(hStats, aStats, leagueId) {
      let hXG = safeNum(hStats.formXG);
      let aXG = safeNum(aStats.formXG);
      let totalXG = hXG + aXG;

      const hSplitXG = safeNum(hStats.splitXG);
      const aSplitXG = safeNum(aStats.splitXG);
      const hXGA = safeNum(hStats.formXGA);
      const aXGA = safeNum(aStats.formXGA);
      const hCards = safeNum(hStats.cards);
      const aCards = safeNum(aStats.cards);
      const hSplitCards = safeNum(hStats.splitCards);
      const aSplitCards = safeNum(aStats.splitCards);

      const trapLeagues = [40, 41, 136, 141, 79, 62];
      const goldLeagues = [78, 262, 88];
      const tightLeagues = [61, 94, 197, 135];

      if (trapLeagues.includes(leagueId)) {
        totalXG *= 0.80; hXG *= 0.80; aXG *= 0.80;
      } else if (tightLeagues.includes(leagueId)) {
        totalXG *= 0.85; hXG *= 0.85; aXG *= 0.85;
      } else if (goldLeagues.includes(leagueId)) {
        totalXG *= 1.05;
      }

      const over25Score =
        (totalXG * 26) +
        ((hSplitXG + aSplitXG) * 10) +
        ((aXGA + hXGA) * 7);

      const bttsScore =
        (Math.min(hXG, aXG) * 40) +
        ((hXGA + aXGA) * 12) +
        (Math.min(hSplitXG, aSplitXG) * 12);

      const cards4Score =
        ((hCards + aCards) * 18) +
        ((hSplitCards + aSplitCards) * 14);

      return {
        over25Score: Number(over25Score.toFixed(2)),
        bttsScore: Number(bttsScore.toFixed(2)),
        cards4Score: Number(cards4Score.toFixed(2)),
        adjTotalXG: Number(totalXG.toFixed(2))
      };
    }

    function generateOmegaPick(hStats, aStats, leagueId) {
      const scores = computeMarketScores(hStats, aStats, leagueId);

      const hXG = safeNum(hStats.formXG);
      const aXG = safeNum(aStats.formXG);
      const totalXG = scores.adjTotalXG;

      if (!Number.isFinite(totalXG) || totalXG < 0.90) {
        return {
          pick: "⚠️ NO DATA (ΑΓΝΟΗΣΕ ΤΟ ΜΑΤΣ)",
          reason: "Το σύστημα της API δεν έχει προσκομίσει επαρκή στατιστικά xG για αυτές τις ομάδες.",
          noBet: true
        };
      }

      let pick = "";
      let reason = "";
      let noBet = false;

      if (scores.over25Score >= 100) {
        pick = "🔥 OVER 2.5 GOALS";
        reason = `Ισχυρό προφίλ παραγωγικότητας. Adjusted xG: ${totalXG.toFixed(2)} | Score: ${scores.over25Score}`;
      } else if (scores.bttsScore >= 88) {
        pick = "🎯 GOAL/GOAL (BTTS)";
        reason = `Και οι δύο ομάδες έχουν αρκετή επιθετική βάση και δίνουν φάσεις. Score: ${scores.bttsScore}`;
      } else if (hXG > (aXG + 1.20) && safeNum(hStats.splitXG) > 1.80) {
        pick = "🏠 ΑΣΟΣ (1)";
        reason = `Ξεκάθαρη εντός έδρας υπεροχή (Split xG Εντός: ${hStats.splitXG}).`;
      } else if (aXG > (hXG + 1.10) && safeNum(aStats.splitXG) > 1.65) {
        pick = "✈️ ΔΙΠΛΟ (2)";
        reason = `Η φιλοξενούμενη εμφανίζει καθαρή επιθετική υπεροχή και σταθερό εκτός έδρας split.`;
      } else if (scores.cards4Score >= 95) {
        pick = "🟨 OVER 4 ΚΑΡΤΕΣ";
        reason = `Υψηλή ένταση και πειθαρχικό ρίσκο. Cards Score: ${scores.cards4Score}`;
      } else if (totalXG < 2.15) {
        pick = "🛡️ UNDER 2.5 GOALS";
        reason = `Πολύ κλειστό ματς, τακτική προσέγγιση (Adjusted xG: ${totalXG.toFixed(2)}).`;
      } else {
        pick = "⚖️ NO BET (ΑΠΟΧΗ)";
        reason = `Ισορροπημένα στατιστικά. Καμία μαθηματική αξία για στοιχηματισμό.`;
        noBet = true;
      }

      return { pick, reason, noBet };
    }

    function buildMatchCard(m, s, scores) {
      const omega = generateOmegaPick(s.h, s.a, m.league.id);

      return `
        <div class="cyber-card">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
              <span style="background:#222; padding:4px 8px; border-radius:4px;">${escapeHtml(m.fixture.status.short)}</span>
              <div style="color:var(--gold); font-size:0.7rem; font-weight:800; margin-top:5px;">${escapeHtml(m.league.name)}</div>
              <h2 class="orbitron" style="margin:5px 0;">${escapeHtml(m.teams.home.name)}</h2>
              <h2 class="orbitron" style="margin:2px 0;">${escapeHtml(m.teams.away.name)}</h2>
            </div>
            <div style="text-align:right;">
              <div class="score-chip">O2.5 ${scores.over25Score}</div>
              <div class="score-chip" style="margin-top:6px;">BTTS ${scores.bttsScore}</div>
              <div class="score-chip" style="margin-top:6px;">C4+ ${scores.cards4Score}</div>
            </div>
          </div>

          <div class="omega-pick ${omega.noBet ? 'no-bet' : ''}">
             <div class="pick-title">💡 ΠΡΟΤΕΙΝΟΜΕΝΟ ΣΤΟΙΧΗΜΑ (VALUE)</div>
             <div class="pick-value">${omega.pick}</div>
             <div class="pick-reason">${omega.reason}</div>
          </div>

          <div class="stats-grid">
            <div class="team-box">
              <div style="color:var(--p); font-size:0.75rem; font-weight:900; margin-bottom:10px;">🏠 ${escapeHtml(m.teams.home.name)}</div>
              ${(s?.h?.history || []).map(f => `<span class="form-dot form-${f.cls}">${f.res}</span>`).join("")}
              <div class="stat-row" style="margin-top:12px;">
                <span>Μέσος Όρος Σεζόν:</span>
                <div><span class="season-xg-red">${s?.h?.seasonXG}</span><span class="season-xga-plain">/ ${s?.h?.seasonXGA}</span></div>
              </div>
              <div class="stat-row">
                <span>xG Υπέρ (Φόρμα):</span>
                <div><span class="val-xg">${s?.h?.formXG}</span> ${s?.h?.devXG}</div>
              </div>
              <div class="stat-row">
                <span>xGA Κατά:</span>
                <div><span class="val-xg">${s?.h?.formXGA}</span> ${s?.h?.devXGA}</div>
              </div>
              <div class="stat-row">
                <span>ΜΟΝΟ ΕΝΤΟΣ:</span>
                <span class="val-split">${s?.h?.splitXG} / ${s?.h?.splitXGA}</span>
              </div>
              <div class="stat-row">
                <span>Κόρνερ:</span>
                <span style="font-weight:800;">🚩 ${s?.h?.corners}</span>
              </div>
              <div class="stat-row">
                <span>Κάρτες:</span>
                <span style="font-weight:800;">🟨 ${s?.h?.cards}</span>
              </div>
              <div class="minor-row">ΜΟ κάρτες μόνο εντός: ${s?.h?.splitCards}</div>
            </div>

            <div class="team-box">
              <div style="color:var(--magenta); font-size:0.75rem; font-weight:900; margin-bottom:10px;">✈️ ${escapeHtml(m.teams.away.name)}</div>
              ${(s?.a?.history || []).map(f => `<span class="form-dot form-${f.cls}">${f.res}</span>`).join("")}
              <div class="stat-row" style="margin-top:12px;">
                <span>Μέσος Όρος Σεζόν:</span>
                <div><span class="season-xg-red">${s?.a?.seasonXG}</span><span class="season-xga-plain">/ ${s?.a?.seasonXGA}</span></div>
              </div>
              <div class="stat-row">
                <span>xG Υπέρ (Φόρμα):</span>
                <div><span class="val-xg">${s?.a?.formXG}</span> ${s?.a?.devXG}</div>
              </div>
              <div class="stat-row">
                <span>xGA Κατά:</span>
                <div><span class="val-xg">${s?.a?.formXGA}</span> ${s?.a?.devXGA}</div>
              </div>
              <div class="stat-row">
                <span>ΜΟΝΟ ΕΚΤΟΣ:</span>
                <span class="val-split">${s?.a?.splitXG} / ${s?.a?.splitXGA}</span>
              </div>
              <div class="stat-row">
                <span>Κόρνερ:</span>
                <span style="font-weight:800;">🚩 ${s?.a?.corners}</span>
              </div>
              <div class="stat-row">
                <span>Κάρτες:</span>
                <span style="font-weight:800;">🟨 ${s?.a?.cards}</span>
              </div>
              <div class="minor-row">ΜΟ κάρτες μόνο εκτός: ${s?.a?.splitCards}</div>
            </div>
          </div>
        </div>
      `;
    }

    function rankItemHTML(item, idx, label, scoreKey) {
      return `
        <div class="rank-card">
          <div class="rank-head">
            <div>
              <span class="rank-badge">#${idx + 1} ${label}</span>
            </div>
            <div class="score-chip">${item[scoreKey]}</div>
          </div>
          <div style="font-weight:800;">${escapeHtml(item.homeTeam)} vs ${escapeHtml(item.awayTeam)}</div>
          <div style="color:var(--txt-muted); font-size:0.8rem; margin-top:4px;">${escapeHtml(item.league)}</div>
        </div>
      `;
    }

    function renderTopSections() {
      document.getElementById("topSection").innerHTML = `
        <div class="section-panel">
          <div class="section-title">🏆 TOP 5 OVER 2.5</div>
          <div class="top-list">
            ${latestTopLists.over25.map((x, i) => rankItemHTML(x, i, "OVER 2.5", "over25Score")).join("") || '<div style="color:var(--txt-muted);">Δεν υπάρχουν δεδομένα.</div>'}
          </div>
        </div>

        <div class="section-panel">
          <div class="section-title">🎯 TOP 5 BTTS</div>
          <div class="top-list">
            ${latestTopLists.btts.map((x, i) => rankItemHTML(x, i, "BTTS", "bttsScore")).join("") || '<div style="color:var(--txt-muted);">Δεν υπάρχουν δεδομένα.</div>'}
          </div>
        </div>

        <div class="section-panel">
          <div class="section-title">🟨 TOP 5 OVER 4 ΚΑΡΤΕΣ</div>
          <div class="top-list">
            ${latestTopLists.cards4.map((x, i) => rankItemHTML(x, i, "OVER 4 ΚΑΡΤΕΣ", "cards4Score")).join("") || '<div style="color:var(--txt-muted);">Δεν υπάρχουν δεδομένα.</div>'}
          </div>
        </div>
      `;
    }

    function buildWallBet() {
      const candidates = [
        ...latestTopLists.over25.map(x => ({ ...x, market: "OVER 2.5", mainScore: x.over25Score })),
        ...latestTopLists.btts.map(x => ({ ...x, market: "BTTS", mainScore: x.bttsScore })),
        ...latestTopLists.cards4.map(x => ({ ...x, market: "OVER 4 ΚΑΡΤΕΣ", mainScore: x.cards4Score }))
      ];

      const unique = [];
      const used = new Set();

      for (const c of candidates.sort((a, b) => b.mainScore - a.mainScore)) {
        const key = `${c.fixtureId}_${c.market}`;
        if (used.has(key)) continue;
        used.add(key);
        unique.push(c);
      }

      if (unique.length < 2) return null;

      const leg1 = unique[0];
      const leg2 = unique.find(x => x.fixtureId !== leg1.fixtureId) || unique[1];
      if (!leg2) return null;

      const estimatedScore = Number((leg1.mainScore + leg2.mainScore).toFixed(2));
      return {
        date: getTodayISO(),
        stake: safeNum(document.getElementById("wallbetStake")?.value, 10),
        legs: [leg1, leg2],
        estimatedScore
      };
    }

    function renderWallBet() {
      latestWallBet = buildWallBet();

      if (!latestWallBet) {
        document.getElementById("wallbetSection").innerHTML = `
          <div class="section-panel">
            <div class="wallbet-title">🧱 WALLBET ΤΗΣ ΗΜΕΡΑΣ</div>
            <div style="color:var(--txt-muted);">Δεν βρέθηκαν αρκετά ισχυρές επιλογές.</div>
          </div>
        `;
        return;
      }

      document.getElementById("wallbetSection").innerHTML = `
        <div class="section-panel wallbet-box">
          <div class="wallbet-title">🧱 WALLBET ΤΗΣ ΗΜΕΡΑΣ</div>
          ${latestWallBet.legs.map((leg, i) => `
            <div class="wallbet-leg">
              <div style="font-weight:900; color:var(--gold); margin-bottom:6px;">Leg ${i + 1}: ${escapeHtml(leg.market)}</div>
              <div style="font-weight:800;">${escapeHtml(leg.homeTeam)} vs ${escapeHtml(leg.awayTeam)}</div>
              <div style="color:var(--txt-muted); font-size:0.82rem; margin-top:4px;">${escapeHtml(leg.league)}</div>
              <div style="margin-top:6px;" class="score-chip">Score ${leg.mainScore}</div>
            </div>
          `).join("")}
          <div style="margin-top:10px; font-weight:800;">
            Stake: <span style="color:var(--p);">${latestWallBet.stake.toFixed(2)}</span>
            &nbsp; | &nbsp;
            Combined Strength: <span style="color:var(--gold);">${latestWallBet.estimatedScore}</span>
          </div>
        </div>
      `;
    }

    function saveWallBet() {
      if (!latestWallBet) {
        showError("Δεν υπάρχει διαθέσιμο WallBet για αποθήκευση.");
        return;
      }

      localStorage.setItem(LS_WALLBET_LAST, JSON.stringify(latestWallBet));

      const bank = getWallBetBank();
      bank.totalBets += 1;
      bank.stakeSum += safeNum(latestWallBet.stake, 10);
      saveWallBetBank(bank);
      renderBankSection();
      clearError();
    }

    async function runScan() {
      if (isRunning) return;

      isRunning = true;
      clearError();
      setButtonsDisabled(true);
      setLoader(true, "ΑΝΑΖΗΤΗΣΗ ΣΗΜΕΙΩΝ ΜΕ ΑΞΙΑ...");

      const display = document.getElementById("display");
      display.innerHTML = "";
      document.getElementById("topSection").innerHTML = "";
      document.getElementById("wallbetSection").innerHTML = "";

      try {
        const selectedDate = document.getElementById("scanDate").value || getTodayISO();
        const selectedLeague = document.getElementById("leagueFilter").value;

        const fixturesResp = await apiReq(`fixtures?date=${selectedDate}`);
        let matches = (fixturesResp.response || []).filter(m => {
          if (selectedLeague === "ALL") return LEAGUES.includes(m.league.id);
          return m.league.id === parseInt(selectedLeague, 10);
        }).slice(0, MAX_MATCHES);

        if (!matches.length) {
          display.innerHTML = `<div class="cyber-card"><h3 class="orbitron" style="text-align:center; color:var(--gold); margin:0;">Δεν βρέθηκαν αγώνες.</h3></div>`;
          return;
        }

        let htmlBuffer = "";
        const scoredMatches = [];

        for (let i = 0; i < matches.length; i++) {
          const m = matches[i];
          setProgress(Math.round(((i + 1) / matches.length) * 100), `ΑΝΑΛΥΣΗ: ${m.teams.home.name} vs ${m.teams.away.name}`);

          const [intelHome, intelAway] = await Promise.all([
            getTeamData(m.teams.home.id, m.league.id, m.league.season, "home"),
            getTeamData(m.teams.away.id, m.league.id, m.league.season, "away")
          ]);

          const scores = computeMarketScores(intelHome, intelAway, m.league.id);

          scoredMatches.push({
            fixtureId: m.fixture.id,
            homeTeam: m.teams.home.name,
            awayTeam: m.teams.away.name,
            league: m.league.name,
            leagueId: m.league.id,
            over25Score: scores.over25Score,
            bttsScore: scores.bttsScore,
            cards4Score: scores.cards4Score
          });

          htmlBuffer += buildMatchCard(m, { h: intelHome, a: intelAway }, scores);
        }

        latestTopLists.over25 = [...scoredMatches].sort((a, b) => b.over25Score - a.over25Score).slice(0, 5);
        latestTopLists.btts = [...scoredMatches].sort((a, b) => b.bttsScore - a.bttsScore).slice(0, 5);
        latestTopLists.cards4 = [...scoredMatches].sort((a, b) => b.cards4Score - a.cards4Score).slice(0, 5);

        renderTopSections();
        renderWallBet();
        display.innerHTML = htmlBuffer;
      } catch (err) {
        showError(`Σφάλμα: ${err?.message || "Άγνωστο σφάλμα"}`);
      } finally {
        setLoader(false);
        setButtonsDisabled(false);
        isRunning = false;
      }
    }

    function exportPDF() {
      html2pdf().set({
        margin: 8,
        filename: `WallBet_${getTodayISO()}.pdf`,
        image: { type: "jpeg", quality: 0.96 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
      }).from(document.getElementById("app")).save();
    }

    window.addEventListener("DOMContentLoaded", () => {
      document.getElementById("scanDate").value = getTodayISO();
      const select = document.getElementById("leagueFilter");
      LEAGUES_DATA.forEach(l => {
        const opt = document.createElement("option");
        opt.value = l.id;
        opt.textContent = l.name;
        select.appendChild(opt);
      });
      renderBankSection();
    });
  </script>
