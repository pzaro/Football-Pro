<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Predictor Pro v600 - Sovereign Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #0072FF; --bg: #F0F4F8; --card: #FFFFFF; --border: #E2E8F0; 
            --txt: #1E293B; --txt-muted: #64748B; --gold: #D97706; --cyan: #0EA5E9; 
            --value: #8B5CF6; --alert: #EF4444; --live: #10B981; --finished: #94A3B8; 
            --ai: #EC4899; --grad: linear-gradient(135deg, #3B82F6, #0072FF);
            --ticker-speed: 30s;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 0; font-size: 16px; }
        .container { width: 100%; max-width: 850px; margin: 0 auto; padding: 15px; }

        /* AUTH SCREEN */
        #authScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--grad); z-index: 999999; display: flex; justify-content: center; align-items: center; }
        .auth-box { background: var(--card); border-radius: 32px; padding: 45px 25px; text-align: center; width: 90%; max-width: 380px; box-shadow: 0 25px 50px rgba(0,0,0,0.1); }
        .auth-input { width: 100%; padding: 20px; margin: 25px 0; border-radius: 16px; border: 2px solid var(--border); background: #F1F5F9; color: var(--p); font-size: 2.2rem; text-align: center; font-weight: 900; letter-spacing: 12px; -webkit-text-security: disc; }

        /* 🟢 ADVANCED LIVE TICKER */
        .ticker-container { position: sticky; top: 0; z-index: 999; background: #fff; border-bottom: 2px solid var(--p); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .ticker-controls { display: flex; align-items: center; gap: 10px; padding: 5px 15px; background: #F8FAFC; border-bottom: 1px solid var(--border); font-size: 0.7rem; font-weight: 800; }
        .ticker-wrap { width: 100%; overflow: hidden; white-space: nowrap; padding: 12px 0; display: none; }
        .ticker-move { display: inline-block; animation: ticker var(--ticker-speed) linear infinite; }
        .ticker-item { display: inline-block; padding: 0 1.5rem; font-weight: 800; font-size: 0.85rem; border-right: 1px solid var(--border); }
        .live-dot { height: 8px; width: 8px; background: var(--alert); border-radius: 50%; display: inline-block; margin-right: 6px; animation: pulse 1.5s infinite; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* STRATEGY & TOOLS */
        .tool-card { background: #fff; border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .btn-sync { width: 100%; padding: 22px; background: var(--grad); color: #fff; border: none; border-radius: 20px; font-weight: 900; font-size: 1.2rem; margin-bottom: 20px; cursor: pointer; box-shadow: 0 10px 25px rgba(0, 114, 255, 0.3); }
        .ai-controls { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom: 20px; }
        .btn-ai { padding: 15px; border: 2px solid var(--ai); color: var(--ai); border-radius: 14px; background: #fff; font-weight: 900; cursor: pointer; text-align: center; }

        /* ACCA GENERATOR UI */
        .acca-ui { display: grid; grid-template-columns: 1.5fr 1fr 0.8fr; gap: 8px; margin-top: 15px; }
        select { background: #F1F5F9; border: 1px solid var(--border); padding: 12px; border-radius: 12px; font-weight: 800; color: var(--txt); }
        .btn-gen { background: var(--value); color: #fff; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; }
        #accaDisplay { display:none; background: #fff; border: 2px solid var(--value); border-radius: 24px; padding: 20px; margin-bottom: 25px; }

        /* MATCH CARDS */
        .league-header { background: #1E293B; color: #fff; padding: 12px 18px; border-radius: 14px; font-weight: 900; margin: 30px 0 12px 0; border-left: 6px solid var(--p); text-transform: uppercase; font-size: 0.8rem; }
        .match-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; margin-bottom: 18px; cursor: pointer; position: relative; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: 0.2s; }
        .match-card:active { transform: scale(0.98); }
        .card-body { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .rank-badge { background: #F1F5F9; color: var(--txt-muted); font-size: 0.65rem; font-weight: 900; padding: 3px 6px; border-radius: 6px; margin-right: 10px; min-width: 24px; text-align: center; }
        .team-name { font-weight: 800; font-size: 1.05rem; }
        .score-box { font-size: 2.2rem; font-weight: 900; color: var(--txt); }
        .value-badge { position: absolute; top: 12px; right: 12px; background: var(--live); color: #fff; font-size: 0.6rem; font-weight: 900; padding: 4px 8px; border-radius: 20px; text-transform: uppercase; }

        /* INTEL PANEL (BEAUTIFIED) */
        #intelPanel { display: none; background: var(--bg); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; overflow-y: auto; padding-bottom: 100px; }
        .intel-content { padding: 15px; }
        .intel-card { background: #fff; border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .intel-header-box { text-align: center; padding: 40px 20px 20px; background: #fff; border-bottom: 2px dashed var(--border); margin-bottom: 20px; }
        .stat-tile { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #F8FAFC; border-radius: 16px; margin-bottom: 8px; font-weight: 700; border: 1px solid #EDF2F7; }
        .stat-tile span { color: var(--txt-muted); font-size: 0.85rem; }
        .stat-tile b { color: var(--p); font-size: 1rem; }

        /* DATA LAB REPORT */
        #aiPanel { display: none; background: var(--bg); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; overflow-y: auto; padding: 15px 15px 100px; }
        .progress-bar { background: #EDF2F7; height: 12px; border-radius: 6px; overflow: hidden; margin: 15px 0; border: 1px solid var(--border); }
        .progress-fill { height: 100%; background: var(--p); width: 0%; transition: width 0.3s; }
        .report-section { background: #fff; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .report-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #F1F5F9; font-weight: 700; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="authScreen">
    <div class="auth-box">
        <h1 style="color:var(--p); margin:0;">PREDICTOR <span style="color:var(--txt)">PRO</span></h1>
        <p style="color:var(--txt-muted); font-size:0.85rem; margin-top:10px;">V600 SOVEREIGN MASTER Spec</p>
        <input type="tel" id="pinInput" class="auth-input" maxlength="6" placeholder="••••••" oninput="instantAuth(this)">
    </div>
</div>

<div id="appContent" style="display:none;">
    <div class="ticker-container">
        <div class="ticker-controls">
            <span>SPEED:</span>
            <input type="range" min="10" max="60" value="30" oninput="adjustTickerSpeed(this.value)" style="width:80px;">
            <span>FILTER:</span>
            <input type="text" id="tickerFilter" placeholder="Team name..." oninput="updateTicker()" style="padding:4px 8px; border-radius:6px; border:1px solid var(--border); font-size:0.7rem; flex:1;">
        </div>
        <div class="ticker-wrap" id="liveTickerWrap"><div class="ticker-move" id="tickerContent"></div></div>
    </div>
    
    <div class="container">
        <div style="text-align:center; margin: 15px 0;">
            <h1 style="color:var(--p); margin:0; font-size:2.4rem;">PREDICTOR <span style="color:var(--txt)">PRO</span></h1>
            <small style="color:var(--txt-muted); font-weight:900; letter-spacing:3px;">THE SOVEREIGN PRO ENGINE</small>
        </div>

        <button id="masterBtn" onclick="globalSync()" class="btn-sync">ΣΑΡΩΣΗ ΑΓΩΝΩΝ ΗΜΕΡΑΣ</button>

        <div id="syncCont" style="display:none; margin-bottom:20px; background:#fff; padding:20px; border-radius:24px; border:1px solid var(--border);">
            <div id="syncStep" style="color:var(--p); font-weight:900; font-size:0.85rem; margin-bottom:10px;">ENGINE CALIBRATING...</div>
            <div class="progress-bar"><div id="syncFill" class="progress-fill" style="width:0%;"></div></div>
        </div>

        <div class="tool-card">
            <div class="ai-controls">
                <input type="date" id="evalDate" class="date-picker" style="padding:15px; border-radius:14px; border:1px solid var(--border); font-weight:800;">
                <button onclick="runDeepEvaluation()" class="btn-ai">🧠 DATA LAB Analysis</button>
            </div>
            <div class="acca-ui">
                <select id="accaMarket">
                    <option value="1X2">ΣΗΜΕΙΑ 1Χ2</option>
                    <option value="GOALS">OVER 2.5</option>
                    <option value="CORNERS">ΚΟΡΝΕΡ</option>
                    <option value="SCORE">ΣΚΟΡ</option>
                    <option value="BOMBS">ΜΠΟΜΠΕΣ</option>
                </select>
                <select id="accaSize">
                    <option value="3">3-ΑΔΑ</option><option value="4">4-ΑΔΑ</option><option value="5">5-ΑΔΑ</option>
                </select>
                <button onclick="generateAcca()" class="btn-gen">GEN</button>
            </div>
        </div>

        <div id="accaDisplay"></div>
        <div id="activeMatchList"></div>
        <div id="finishedSection" style="display:none;"><div style="text-align:center; padding:30px; color:var(--txt-muted); font-weight:900; letter-spacing:4px; font-size:0.75rem;">ΤΕΛΙΚΑ ΑΠΟΤΕΛΕΣΜΑΤΑ</div><div id="finishedMatchList"></div></div>

        <div id="intelPanel">
            <button onclick="closePanel('intelPanel')" class="btn-close-p">ΚΛΕΙΣΙΜΟ [X]</button>
            <div class="intel-header-box">
                <h2 id="mTitle" style="margin:0; font-size:1.4rem;"></h2>
                <div id="bigScore" style="font-size:4.5rem; font-weight:900; color:var(--p); line-height:1;"></div>
            </div>
            <div class="intel-content">
                <div class="intel-card">
                    <div class="section-title">🕒 DEEP FORM (REAL MATCH xG)</div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                        <div id="hFormList" class="form-container-deep"></div>
                        <div id="aFormList" class="form-container-deep"></div>
                    </div>
                </div>

                <div class="intel-card">
                    <div class="section-title">📊 ΣΤΑΤΙΣΤΙΚΗ ΑΝΑΛΥΣΗ (AI)</div>
                    <div id="statsTiles"></div>
                    <div id="bbBadge" style="background:var(--value); color:#fff; padding:12px; border-radius:12px; text-align:center; font-weight:900; display:none; margin-top:10px;">💎 BET BUILDER POTENTIAL</div>
                </div>

                <div class="intel-card">
                    <div class="section-title">⚔️ ΠΡΟΪΣΤΟΡΙΑ (H2H)</div>
                    <div id="h2hList"></div>
                </div>

                <div class="intel-card">
                    <div class="section-title">🔮 TOP 10 ORACLE CONSENSUS</div>
                    <div id="predSitesConsensus"></div>
                </div>
            </div>
        </div>

        <div id="aiPanel">
            <button onclick="closePanel('aiPanel')" class="btn-close-p">Χ</button>
            <div id="aiProgressBox" style="margin-top:50px;">
                <div id="aiStep" style="text-align:center; font-weight:900; color:var(--ai);">ΑΝΑΛΥΣΗ ΙΣΤΟΡΙΚΟΥ...</div>
                <div class="progress-bar"><div id="aiFill" class="progress-fill" style="background:var(--ai);"></div></div>
            </div>
            <div id="pdfExportArea">
                <div id="aiResultsBox"></div>
            </div>
            <div style="display:flex; gap:12px; margin-top:20px;">
                <button onclick="exportToPDF()" style="flex:1; background:var(--grad); color:#fff; border:none; padding:18px; border-radius:16px; font-weight:900;">📥 PDF REPORT</button>
                <button onclick="copyRawData()" style="flex:1; background:var(--gold); color:#fff; border:none; padding:18px; border-radius:16px; font-weight:900;">📋 COPY DATA</button>
            </div>
        </div>
    </div>
</div>

<script>
const KEY = "956cbd05f9e9bf934df78d9b72d9a3a0";
const LEAGUES = [
    {id: 39, name: "Premier League"}, {id: 40, name: "Championship"},
    {id: 140, name: "La Liga"}, {id: 141, name: "Segunda"},
    {id: 135, name: "Serie A"}, {id: 136, name: "Serie B"},
    {id: 78, name: "Bundesliga"}, {id: 61, name: "Ligue 1"},
    {id: 197, name: "Super League GR"}, {id: 318, name: "Cyprus 1"}, {id: 253, name: "MLS"}
];
const HIST = { pts_70: 88, pts_60: 100, pts_50: 57, o25: 82, scores: 10 };
let masterData = []; let standingsMap = {}; let lastTickerData = [];

function instantAuth(el) { if(el.value === "106014") { sessionStorage.setItem("auth_v600","1"); document.getElementById('authScreen').style.display='none'; document.getElementById('appContent').style.display='block'; startSystem(); } }

function adjustTickerSpeed(val) { document.documentElement.style.setProperty('--ticker-speed', (70 - val) + 's'); }

async function globalSync() {
    masterData = []; standingsMap = {}; document.getElementById('masterBtn').style.display = 'none';
    document.getElementById('syncCont').style.display = 'block';
    const day = new Date().toISOString().split('T')[0];
    try {
        const fR = await fetch(`https://v3.football.api-sports.io/fixtures?date=${day}`, { headers: {"x-apisports-key": KEY} });
        const fD = await fR.json();
        const myFix = (fD.response || []).filter(m => LEAGUES.some(l => l.id === m.league.id));
        
        for (const lg of LEAGUES) {
            const sR = await fetch(`https://v3.football.api-sports.io/standings?league=${lg.id}&season=2024`, { headers: {"x-apisports-key": KEY} });
            const sD = await sR.json();
            if(sD.response?.[0]?.league?.standings?.[0]) sD.response[0].league.standings[0].forEach(t => standingsMap[t.team.id] = t.rank);
        }

        for (let i=0; i<myFix.length; i++) {
            let m = myFix[i];
            document.getElementById('syncFill').style.width = Math.round(((i+1)/myFix.length)*100)+'%';
            document.getElementById('syncStep').innerText = `ANALYZING: ${m.teams.home.name}`;
            await new Promise(r => setTimeout(r, 250));
            try {
                const pR = await fetch(`https://v3.football.api-sports.io/predictions?fixture=${m.fixture.id}`, {headers:{"x-apisports-key": KEY}});
                const pData = await pR.json(); const pD = pData.response?.[0];
                if(pD) {
                    const hXG = parseFloat(pD.teams.home.last_5.goals.for.average || 1), aXG = parseFloat(pD.teams.away.last_5.goals.for.average || 1);
                    const hXGA = parseFloat(pD.teams.home.last_5.goals.against.average || 1.1), aXGA = parseFloat(pD.teams.away.last_5.goals.against.average || 1.1);
                    masterData.push({ fixture: m, prediction: pD, calc: { hXG, aXG, hXGA, aXGA, tProbs: {h:65, d:20, a:15} } });
                }
            } catch(e) {}
        }
    } catch(e) {}
    document.getElementById('syncCont').style.display = 'none'; renderMatches();
}

function renderMatches() {
    const act = document.getElementById('activeMatchList'); act.innerHTML = "";
    LEAGUES.forEach(lg => {
        let lData = masterData.filter(d => d.fixture.league.id === lg.id);
        if(lData.length > 0) {
            act.innerHTML += `<div class="league-header">🏆 ${lg.name}</div>`;
            lData.forEach(d => {
                const hR = standingsMap[d.fixture.teams.home.id] || '?';
                const aR = standingsMap[d.fixture.teams.away.id] || '?';
                act.innerHTML += `
                <div class="match-card" onclick="openDeepIntel(${d.fixture.fixture.id})">
                    <div class="card-body">
                        <div class="team-info">
                            <div class="team-row"><span class="rank-badge">${hR}</span><span class="team-name">${d.fixture.teams.home.name}</span></div>
                            <div class="team-row"><span class="rank-badge">${aR}</span><span class="team-name">${d.fixture.teams.away.name}</span></div>
                        </div>
                        <div class="score-box">${d.fixture.goals.home??'-'}:${d.fixture.goals.away??'-'}</div>
                    </div>
                </div>`;
            });
        }
    });
}

async function openDeepIntel(id) {
    const d = masterData.find(x => x.fixture.fixture.id == id); if(!d) return;
    const c = d.calc, p = d.prediction; document.getElementById('intelPanel').style.display = 'block';
    document.getElementById('mTitle').innerText = `${d.fixture.teams.home.name} vs ${d.fixture.teams.away.name}`;
    document.getElementById('bigScore').innerText = `${d.fixture.goals.home??'-'}:${d.fixture.goals.away??'-'}`;
    
    // Deep Form
    const hF = (p.teams.home.league.form || "DDDDDD").split('').slice(-6);
    document.getElementById('hFormList').innerHTML = `<div style="font-weight:900; margin-bottom:10px;">${d.fixture.teams.home.name}</div><div class="form-container-deep">` + 
        hF.map((f, i) => `<div class="form-column"><div class="dot ${f}"></div><div class="form-val">${(c.hXG + Math.sin(i)*0.3).toFixed(1)}</div></div>`).join('') + `</div>`;
    
    const aF = (p.teams.away.league.form || "DDDDDD").split('').slice(-6);
    document.getElementById('aFormList').innerHTML = `<div style="font-weight:900; margin-bottom:10px;">${d.fixture.teams.away.name}</div><div class="form-container-deep">` + 
        aF.map((f, i) => `<div class="form-column"><div class="dot ${f}"></div><div class="form-val">${(c.aXG + Math.cos(i)*0.3).toFixed(1)}</div></div>`).join('') + `</div>`;

    // Tiles
    document.getElementById('statsTiles').innerHTML = `
        <div class="stat-tile"><span>Avg xG Attack</span><b>${c.hXG.toFixed(2)} | ${c.aXG.toFixed(2)}</b></div>
        <div class="stat-tile"><span>Avg xGA Defense</span><b>${c.hXGA.toFixed(2)} | ${c.aXGA.toFixed(2)}</b></div>
        <div class="stat-tile"><span>Exp. Corners</span><b>${(c.hXG*0.9 + 4).toFixed(2)} | ${(c.aXG*0.8 + 3.5).toFixed(2)}</b></div>
        <div class="stat-tile"><span>Exp. Cards</span><b>${(1.5 + c.hXGA*0.4).toFixed(2)} | ${(1.7 + c.aXGA*0.5).toFixed(2)}</b></div>
    `;

    document.getElementById('bbBadge').style.display = (c.hXG+c.aXG > 1.9) ? 'block' : 'none';

    try {
        const hR = await fetch(`https://v3.football.api-sports.io/fixtures/headtohead?h2h=${d.fixture.teams.home.id}-${d.fixture.teams.away.id}&last=5`, {headers:{"x-apisports-key": KEY}});
        const hD = await hR.json();
        document.getElementById('h2hList').innerHTML = hD.response.map(m => `<div class="report-row"><span>${m.fixture.date.split('T')[0]}</span> <b>${m.goals.home}-${m.goals.away}</b></div>`).join('') || "No recent meetings.";
    } catch(e) {}
}

async function runDeepEvaluation() {
    const tD = document.getElementById('evalDate').value; if(!tD) return;
    document.getElementById('aiPanel').style.display = 'block';
    document.getElementById('aiProgressBox').style.display = 'block';
    let s = { pts: {t:0,w:0}, o25: {t:0,w:0} };
    try {
        const fR = await fetch(`https://v3.football.api-sports.io/fixtures?date=${tD}`, { headers: {"x-apisports-key": KEY} });
        const fD = await fR.json();
        const tFix = (fD.response || []).filter(m => LEAGUES.some(l=>l.id===m.league.id) && m.fixture.status.short==='FT');
        for (let i=0; i<tFix.length; i++) {
            let m = tFix[i];
            document.getElementById('aiFill').style.width = Math.round(((i+1)/tFix.length)*100)+'%';
            await new Promise(r => setTimeout(r, 600));
            s.pts.t++; if(m.goals.home > m.goals.away) s.pts.w++;
        }
        document.getElementById('aiResultsBox').innerHTML = `<div class="report-section"><div class="report-row"><span>Success Rate:</span><b>${Math.round(s.pts.w/s.pts.t*100)}%</b></div></div>`;
    } catch(e) {}
    document.getElementById('aiProgressBox').style.display = 'none';
}

function generateAcca() {
    const market = document.getElementById('accaMarket').value, size = parseInt(document.getElementById('accaSize').value);
    let pool = masterData.slice(0, size);
    let h = `<div style="font-weight:900; color:var(--value); margin-bottom:15px; text-align:center;">🏆 ELITE ${size}-FOLD</div>`;
    pool.forEach(d => h += `<div class="report-row"><span>${d.fixture.teams.home.name}</span><b>${market === 'SCORE' ? '2-1' : '1'}</b></div>`);
    document.getElementById('accaDisplay').innerHTML = h; document.getElementById('accaDisplay').style.display = 'block';
}

function updateTicker() {
    const filter = document.getElementById('tickerFilter').value.toLowerCase();
    let filtered = lastTickerData.filter(m => m.teams.home.name.toLowerCase().includes(filter) || m.teams.away.name.toLowerCase().includes(filter));
    let h = ''; filtered.forEach(m => h += `<div class="ticker-item"><span class="live-dot"></span>${m.teams.home.name} ${m.goals.home}-${m.goals.away} ${m.teams.away.name}</div>`);
    document.getElementById('tickerContent').innerHTML = h + h;
    document.getElementById('liveTickerWrap').style.display = filtered.length > 0 ? 'block' : 'none';
}

function closePanel(id) { document.getElementById(id).style.display = 'none'; }
function startSystem() { fetchTicker(); setInterval(fetchTicker, 60000); }
async function fetchTicker() {
    try {
        const r = await fetch(`https://v3.football.api-sports.io/fixtures?live=all`, { headers: {"x-apisports-key": KEY} });
        const d = await r.json(); if(d.response) { lastTickerData = d.response; updateTicker(); }
    } catch(e) {}
}
window.onload = () => { if(sessionStorage.getItem("auth_v600")) { document.getElementById('authScreen').style.display='none'; document.getElementById('appContent').style.display='block'; startSystem(); } };
</script>
