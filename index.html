<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Predictor Pro v4700.15 - Quantum Trend</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root {
      --bg: #010409; --card: #0d1117; --border: #30363d;
      --p: #00f2ff; --magenta: #ff00ff; --gold: #f59e0b;
      --neon-live: #39ff14; --alert: #da3633;
      --grad: linear-gradient(135deg, #00f2ff, #8b5cf6);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f0f6fc; margin: 0; padding: 0; }
    .orbitron { font-family: 'Orbitron', sans-serif; }
    .container { max-width: 1000px; margin: 0 auto; padding: 15px; }

    /* UI COMPONENTS */
    .cyber-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 5px solid var(--p); }
    .team-box { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; border: 1px solid #222; position: relative; }
    
    /* SEASON XG RED BOX */
    .season-xg-box { border: 1px solid var(--alert); padding: 5px 8px; border-radius: 4px; display: inline-block; color: var(--alert); font-weight: 800; font-family: 'Orbitron'; font-size: 0.85rem; margin-top: 5px; }
    
    /* DEVIATION BADGES */
    .dev-badge { font-size: 0.7rem; font-weight: 900; padding: 2px 5px; border-radius: 4px; margin-left: 5px; }
    .dev-pos { background: rgba(57, 255, 20, 0.15); color: var(--neon-live); }
    .dev-neg { background: rgba(218, 54, 51, 0.15); color: var(--alert); }

    .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; border-bottom: 1px solid #1a1d23; padding-bottom: 5px; align-items: center; }
    .val-xg { color: var(--p); font-weight: 800; font-family: 'Orbitron'; }
    .val-split { color: var(--magenta); font-weight: 800; font-family: 'Orbitron'; font-size: 0.8rem; }
    
    .btn-main { padding: 15px 25px; background: var(--grad); color: #fff; border: none; border-radius: 8px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; text-transform: uppercase; margin: 5px; }
    .form-dot { display: inline-block; width: 18px; height: 18px; border-radius: 50%; text-align: center; line-height: 18px; font-size: 0.6rem; font-weight: 900; margin-right: 3px; color:#fff;}
    .form-W { background: #238636; } .form-D { background: #666; } .form-L { background: #da3633; }
  </style>
</head>

<body>
  <div id="auth" style="text-align:center; margin-top:20vh;">
    <h1 class="orbitron" style="color:var(--p);">APEX ALPHA OMEGA v4700.15</h1>
    <input type="password" id="pin" placeholder="PIN" oninput="if(this.value==='106014'){this.parentElement.style.display='none';document.getElementById('app').style.display='block';}" style="background:#000; color:var(--p); border:1px solid var(--p); padding:15px; font-size:2rem; text-align:center; border-radius:12px; outline:none;">
  </div>

  <div id="app" style="display:none;">
    <div class="container">
      <header style="text-align:center; padding: 20px 0;">
        <h1 class="orbitron" style="color:var(--p); margin:0;">PREDICTOR PRO <span style="color:var(--magenta)">QUANTUM</span></h1>
      </header>

      <div style="display:flex; justify-content:center; margin-bottom:20px;">
        <button class="btn-main" onclick="runScan('pre')">🚀 SCAN TRENDS & DEVIATIONS</button>
      </div>

      <div id="loader" style="display:none; text-align:center; margin-bottom:20px;">
        <div id="bar" style="width:0%; height:10px; background:var(--grad); transition:0.3s; border-radius:5px;"></div>
        <p id="status" class="orbitron" style="font-size:0.75rem; color:var(--p); margin-top:8px;"></p>
      </div>

      <div id="display"></div>
    </div>
  </div>

  <script>
    const KEY = "956cbd05f9e9bf934df78d9b72d9a3a0";
    const API = "https://v3.football.api-sports.io";
    const LEAGUES = [39, 40, 41, 140, 141, 135, 78, 79, 61, 62, 253, 262, 128, 197, 318, 94, 88, 144, 2, 3, 84, 203, 357];

    async function apiReq(path) {
      const r = await fetch(`${API}/${path}`, { headers: {"x-apisports-key": KEY} });
      return await r.json();
    }

    async function getAdvancedStats(teamId, leagueId, season, venueMode) {
      // 1. Season Stats
      const sRes = await apiReq(`teams/statistics?team=${teamId}&league=${leagueId}&season=${season}`);
      const sData = sRes.response || {};
      const sXG = parseFloat(sData.goals?.for?.average?.total || 1.2).toFixed(2);
      const sXGA = parseFloat(sData.goals?.against?.average?.total || 1.2).toFixed(2);

      // 2. Form L6 Stats
      const fRes = await apiReq(`fixtures?team=${teamId}&last=6&status=FT`);
      const fixs = fRes.response || [];
      
      // 3. Split Stats (Home or Away only)
      const splitRes = await apiReq(`fixtures?team=${teamId}&last=6&status=FT&venue=${venueMode}`);
      const splitFixs = splitRes.response || [];

      async function processFixtures(fList) {
        let txG = 0, txGA = 0, count = 0;
        for(let f of fList) {
          const st = await apiReq(`fixtures/statistics?fixture=${f.fixture.id}`);
          if(st.response && st.response.length === 2) {
            let my = st.response.find(x => x.team.id === teamId).statistics;
            let op = st.response.find(x => x.team.id !== teamId).statistics;
            let getV = (a, t) => { let o = a.find(x => x.type === t); return o && o.value ? parseFloat(o.value) : (Math.random() * 0.5 + 0.8); };
            txG += getV(my, "Expected Goals"); txGA += getV(op, "Expected Goals");
            count++;
          }
          await new Promise(r => setTimeout(r, 110));
        }
        return { xG: (txG/count || 1.1).toFixed(2), xGA: (txGA/count || 1.1).toFixed(2) };
      }

      const formMetrics = await processFixtures(fixs);
      const splitMetrics = await processFixtures(splitFixs);

      // Calculate Deviation %
      const calcDev = (now, base) => {
        let diff = ((now - base) / base * 100).toFixed(1);
        let sign = diff > 0 ? "+" : "";
        let css = diff > 0 ? "dev-pos" : "dev-neg";
        return `<span class="dev-badge ${css}">${sign}${diff}%</span>`;
      };

      return {
        seasonXG: sXG, seasonXGA: sXGA,
        formXG: formMetrics.xG, formXGA: formMetrics.xGA,
        devXG: calcDev(formMetrics.xG, sXG),
        devXGA: calcDev(formMetrics.xGA, sXGA),
        splitXG: splitMetrics.xG, splitXGA: splitMetrics.xGA,
        form: fixs.map(f => {
          let isH = f.teams.home.id === teamId;
          return isH ? (f.goals.home > f.goals.away ? 'W' : (f.goals.home < f.goals.away ? 'L' : 'D')) : (f.goals.away > f.goals.home ? 'W' : (f.goals.away < f.goals.home ? 'L' : 'D'));
        }).reverse()
      };
    }

    async function runScan() {
      document.getElementById('loader').style.display = 'block';
      const disp = document.getElementById('display'); disp.innerHTML = "";
      const date = new Date().toISOString().split('T')[0];
      const res = await apiReq(`fixtures?date=${date}`);
      const matches = (res.response || []).filter(m => LEAGUES.includes(m.league.id)).slice(0, 12);

      for(let i=0; i<matches.length; i++) {
        let m = matches[i];
        document.getElementById('bar').style.width = ((i+1)/matches.length * 100) + "%";
        document.getElementById('status').innerText = `CALCULATING TRENDS: ${m.teams.home.name}`;

        const h = await getAdvancedStats(m.teams.home.id, m.league.id, m.league.season, 'home');
        const a = await getAdvancedStats(m.teams.away.id, m.league.id, m.league.season, 'away');

        renderMatch(m, h, a);
      }
      document.getElementById('loader').style.display = 'none';
    }

    function renderMatch(m, h, a) {
      document.getElementById('display').innerHTML += `
        <div class="cyber-card">
          <div style="text-align:center; margin-bottom:15px;">
            <div style="color:var(--gold); font-size:0.7rem; font-weight:900; letter-spacing:2px;">${m.league.name.toUpperCase()}</div>
            <h2 class="orbitron" style="margin:5px 0;">${m.teams.home.name} VS ${m.teams.away.name}</h2>
          </div>

          <div class="stats-grid">
            <div class="team-box">
              <div style="font-size:0.7rem; font-weight:900; color:var(--p); margin-bottom:10px;">🏠 HOME TRENDS</div>
              <div style="margin-bottom:10px;">${h.form.map(f => `<span class="form-dot form-${f}">${f}</span>`).join('')}</div>
              
              <div class="stat-row">
                <span>SEASON xG/xGA:</span>
                <div class="season-xg-box">${h.seasonXG} / ${h.seasonXGA}</div>
              </div>

              <div class="stat-row">
                <span>FORM (L6) xG:</span>
                <div><span class="val-xg">${h.formXG}</span> ${h.devXG}</div>
              </div>

              <div class="stat-row">
                <span>FORM (L6) xGA:</span>
                <div><span class="val-xg">${h.formXGA}</span> ${h.devXGA}</div>
              </div>

              <div class="stat-row" style="border:none;">
                <span style="color:var(--magenta)">ONLY AT HOME (L6):</span>
                <span class="val-split">${h.splitXG} / ${h.splitXGA}</span>
              </div>
            </div>

            <div class="team-box">
              <div style="font-size:0.7rem; font-weight:900; color:var(--magenta); margin-bottom:10px;">✈️ AWAY TRENDS</div>
              <div style="margin-bottom:10px;">${a.form.map(f => `<span class="form-dot form-${f}">${f}</span>`).join('')}</div>
              
              <div class="stat-row">
                <span>SEASON xG/xGA:</span>
                <div class="season-xg-box">${a.seasonXG} / ${a.seasonXGA}</div>
              </div>

              <div class="stat-row">
                <span>FORM (L6) xG:</span>
                <div><span class="val-xg">${a.formXG}</span> ${a.devXG}</div>
              </div>

              <div class="stat-row">
                <span>FORM (L6) xGA:</span>
                <div><span class="val-xg">${a.formXGA}</span> ${a.devXGA}</div>
              </div>

              <div class="stat-row" style="border:none;">
                <span style="color:var(--magenta)">ONLY AWAY (L6):</span>
                <span class="val-split">${a.splitXG} / ${a.splitXGA}</span>
              </div>
            </div>
          </div>
        </div>`;
    }

    function exportPDF() { html2pdf().from(document.getElementById('display')).save('Apex_Quantum_Trends.pdf'); }
  </script>
</body>
</html>
