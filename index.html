<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Predictor Pro v390 - Deep Analytics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --p:#00ff88; --bg:#0b0e14; --card:rgba(23, 28, 36, 0.98); --border:#30363d; --txt:#ffffff; --gold:#f1c40f; --cyan:#00d4ff; --value:#bf40bf; --alert:#ff4d4d; --live:#00ff41; --finished:#8b949e; --ai:#ff00ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 0; font-size: 16px; }
        .container { width: 100%; max-width: 800px; margin: 0 auto; padding: 20px 12px; }

        /* AUTH */
        #authScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 999999; display: flex; justify-content: center; align-items: center; }
        .auth-box { background: var(--card); border: 1px solid var(--border); border-radius: 32px; padding: 45px 25px; text-align: center; width: 90%; max-width: 380px; }
        .auth-input { width: 100%; padding: 22px; margin: 25px 0; border-radius: 16px; border: 2px solid var(--border); background: #000; color: var(--p); font-size: 2.2rem; text-align: center; font-weight: 900; letter-spacing: 12px; -webkit-text-security: disc; }

        /* TICKER */
        .ticker-wrap { width: 100%; background: rgba(0, 255, 65, 0.08); border-bottom: 1px solid rgba(0, 255, 65, 0.2); overflow: hidden; white-space: nowrap; padding: 12px 0; display: none; position: sticky; top: 0; z-index: 999; backdrop-filter: blur(10px); }
        .ticker-move { display: inline-block; animation: ticker 45s linear infinite; }
        .ticker-item { display: inline-block; padding: 0 2rem; font-weight: 800; font-size: 0.85rem; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* MATCH CARDS (MAIN UI) */
        .match-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; margin-bottom: 20px; cursor: pointer; overflow: hidden; transition: 0.1s; }
        .card-body { padding: 20px; }
        .team-row { display: flex; align-items: center; margin-bottom: 8px; }
        .rank-badge { background: var(--cyan); color: #000; font-size: 0.65rem; font-weight: 900; padding: 2px 6px; border-radius: 5px; margin-right: 10px; }
        .card-predictions { display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(0,0,0,0.4); padding: 15px; text-align: center; border-top: 1px solid var(--border); }
        .pred-val { font-size: 0.85rem; font-weight: 900; color: var(--gold); }

        /* INTEL PANEL (DEEP ANALYTICS) */
        #intelPanel { display: none; background: var(--bg); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
        .intel-header { padding: 20px 0; text-align: center; border-bottom: 1px solid var(--border); }
        .btn-close { background: var(--alert); color: #fff; padding: 12px 20px; border-radius: 12px; font-weight: 900; border: none; float: right; cursor: pointer; }
        
        .section-title { color: var(--p); font-size: 0.9rem; font-weight: 900; margin: 25px 0 12px 0; text-transform: uppercase; letter-spacing: 1px; border-left: 4px solid var(--p); padding-left: 10px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: #161b22; padding: 15px; border-radius: 15px; border: 1px solid var(--border); }
        .stat-box h4 { margin: 0 0 10px 0; font-size: 0.7rem; color: var(--gold); text-transform: uppercase; }
        
        .form-history { display: flex; flex-direction: column; gap: 8px; }
        .history-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 700; }
        .hist-xg { color: var(--p); font-size: 0.65rem; }

        .bookie-list { background: rgba(0,212,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid var(--cyan); }
        .bookie-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.8rem; font-weight: 800; }
        .bookie-item b { color: var(--p); }

        .clean-table { width: 100%; border-collapse: collapse; margin: 15px 0; background: #161b22; border-radius: 15px; overflow: hidden; }
        .clean-table th { background: #000; color: var(--gold); padding: 12px; font-size: 0.7rem; }
        .clean-table td { padding: 12px; border-bottom: 1px solid var(--border); font-weight: 800; text-align: center; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="authScreen">
    <div class="auth-box">
        <h1 style="color:var(--p); margin:0;">PREDICTOR <span style="color:#fff">PRO</span></h1>
        <p style="color:#8b949e; font-weight:bold; font-size:0.75rem; margin-top:10px;">V390 DEEP ANALYTICS SPEC</p>
        <input type="tel" id="pinInput" class="auth-input" maxlength="6" placeholder="••••••" oninput="instantAuth(this)">
    </div>
</div>

<div id="appContent" style="display:none;">
    <div class="ticker-wrap" id="liveTickerWrap"><div class="ticker-move" id="tickerContent"></div></div>
    
    <div class="container">
        <div style="text-align:center; padding-bottom: 20px;">
            <h1 style="color:var(--p); margin:0; font-size:2.4rem; letter-spacing:-2px;">PREDICTOR <span style="color:#fff">PRO</span></h1>
            <small style="color:var(--gold); font-weight:900; letter-spacing:2px;">SOVEREIGN DEEP ENGINE</small>
        </div>

        <button id="masterBtn" onclick="globalSync()" style="width:100%; padding:22px; background:var(--p); color:#000; border:none; border-radius:18px; font-weight:900; font-size:1.1rem; margin-bottom:20px;">ΣΑΡΩΣΗ ΑΓΩΝΩΝ</button>

        <div id="activeMatchList"></div>

        <div id="intelPanel">
            <button onclick="closePanel('intelPanel')" class="btn-close">ΚΛΕΙΣΙΜΟ</button>
            <div class="intel-header">
                <h2 id="mTitle" style="color:var(--gold); margin:0;"></h2>
                <div id="bigScore" style="font-size:3.5rem; font-weight:900;"></div>
            </div>

            <div class="section-title">📊 ΣΤΑΤΙΣΤΙΚΑ AI (ΣΤΡΟΓΓΥΛΟΠΟΙΗΣΗ 2.00)</div>
            <table class="clean-table" id="deepStatsTable"></table>

            <div class="section-title">🕒 ΦΟΡΜΑ ΤΕΛΕΥΤΑΙΩΝ 6 (xG/xGA)</div>
            <div class="stats-grid">
                <div class="stat-box">
                    <h4 id="homeTeamFormName"></h4>
                    <div id="homeFormList" class="form-history"></div>
                </div>
                <div class="stat-box">
                    <h4 id="awayTeamFormName"></h4>
                    <div id="awayFormList" class="form-history"></div>
                </div>
            </div>

            <div class="section-title">⚔️ ΠΡΟΪΣΤΟΡΙΑ (H2H - LAST 5)</div>
            <div id="h2hList" class="form-history" style="background:#161b22; padding:15px; border-radius:15px;"></div>

            <div class="section-title">🏦 TOP 10 BOOKIES CONSENSUS</div>
            <div class="bookie-list" id="bookieConsensus"></div>
        </div>
    </div>
</div>

<script>
const KEY = "956cbd05f9e9bf934df78d9b72d9a3a0";
const LEAGUES = [
    {id: 39, name: "Premier League"}, {id: 140, name: "La Liga"}, 
    {id: 135, name: "Serie A"}, {id: 78, name: "Bundesliga"}, 
    {id: 197, name: "Super League GR"}, {id: 318, name: "Cyprus 1"}, {id: 253, name: "MLS"}
];

let masterData = []; let standingsMap = {};

function instantAuth(el) { if(el.value === "106014") { sessionStorage.setItem("auth_v390","1"); document.getElementById('authScreen').style.display='none'; document.getElementById('appContent').style.display='block'; startSystem(); } }

async function globalSync() {
    masterData = []; document.getElementById('masterBtn').style.display = 'none';
    const day = new Date().toISOString().split('T')[0];
    try {
        const fR = await fetch(`https://v3.football.api-sports.io/fixtures?date=${day}`, { headers: {"x-apisports-key": KEY} });
        const myFix = (await fR.json()).response.filter(m => LEAGUES.some(l => l.id === m.league.id));
        
        for (let i=0; i<myFix.length; i++) {
            let m = myFix[i];
            const pR = await fetch(`https://v3.football.api-sports.io/predictions?fixture=${m.fixture.id}`, {headers:{"x-apisports-key": KEY}});
            const pD = (await pR.json()).response?.[0];
            const h2hR = await fetch(`https://v3.football.api-sports.io/fixtures/headtohead?h2h=${m.teams.home.id}-${m.teams.away.id}&last=5`, {headers:{"x-apisports-key": KEY}});
            const h2hD = (await h2hR.json()).response;

            if(pD) {
                masterData.push({ fixture: m, prediction: pD, h2h: h2hD });
            }
        }
    } catch(e) {}
    renderMatches();
}

function renderMatches() {
    const list = document.getElementById('activeMatchList');
    list.innerHTML = masterData.map(d => `
        <div class="match-card" onclick="openDeepIntel(${d.fixture.fixture.id})">
            <div class="card-body">
                <div class="team-row"><span class="team-name">${d.fixture.teams.home.name}</span></div>
                <div class="team-row"><span class="team-name">${d.fixture.teams.away.name}</span></div>
                <div style="text-align:right; font-weight:900; color:var(--gold)">DETAILS ></div>
            </div>
        </div>
    `).join('');
}

function openDeepIntel(id) {
    const d = masterData.find(x => x.fixture.fixture.id == id); if(!d) return;
    const p = d.prediction;
    
    document.getElementById('mTitle').innerText = `${d.fixture.teams.home.name} vs ${d.fixture.teams.away.name}`;
    document.getElementById('bigScore').innerText = `${d.fixture.goals.home??'-'}:${d.fixture.goals.away??'-'}`;
    
    // Stats Table with 2 decimal rounding
    const hXG = parseFloat(p.teams.home.last_5.goals.for.average || 0).toFixed(2);
    const aXG = parseFloat(p.teams.away.last_5.goals.for.average || 0).toFixed(2);
    const hXGA = parseFloat(p.teams.home.last_5.goals.against.average || 0).toFixed(2);
    const aXGA = parseFloat(p.teams.away.last_5.goals.against.average || 0).toFixed(2);
    
    document.getElementById('deepStatsTable').innerHTML = `
        <tr><th>Metric</th><th>HOME</th><th>AWAY</th></tr>
        <tr><td>xG Attack</td><td>${hXG}</td><td>${aXG}</td></tr>
        <tr><td>xGA Defense</td><td>${hXGA}</td><td>${aXGA}</td></tr>
        <tr><td>xCorners</td><td>${(parseFloat(hXG)*0.85 + 4.1).toFixed(2)}</td><td>${(parseFloat(aXG)*0.75 + 3.6).toFixed(2)}</td></tr>
        <tr><td>xCards</td><td>${(1.5 + parseFloat(hXGA)*0.5).toFixed(2)}</td><td>${(1.5 + parseFloat(aXGA)*0.5).toFixed(2)}</td></tr>
    `;

    // Form History Last 6
    document.getElementById('homeTeamFormName').innerText = d.fixture.teams.home.name;
    document.getElementById('homeFormList').innerHTML = (p.teams.home.league.form || "DDDDDD").split('').slice(-6).map(f => `
        <div class="history-item"><span>Result: ${f}</span> <span class="hist-xg">xG: ${hXG} | xGA: ${hXGA}</span></div>
    `).join('');

    document.getElementById('awayTeamFormName').innerText = d.fixture.teams.away.name;
    document.getElementById('awayFormList').innerHTML = (p.teams.away.league.form || "DDDDDD").split('').slice(-6).map(f => `
        <div class="history-item"><span>Result: ${f}</span> <span class="hist-xg">xG: ${aXG} | xGA: ${aXGA}</span></div>
    `).join('');

    // H2H Last 5
    document.getElementById('h2hList').innerHTML = d.h2h.map(m => `
        <div class="history-item"><span>${m.fixture.date.split('T')[0]}</span> <span>${m.teams.home.name} <b>${m.goals.home}-${m.goals.away}</b> ${m.teams.away.name}</span></div>
    `).join('') || "No Recent Meetings";

    // Bookie Consensus Simulation
    const bookies = ["Bet365", "Stoiximan", "Pamestoixima", "Bwin", "Novibet", "William Hill", "Betfair", "888Sport", "Unibet", "Pinnacle"];
    const prob = p.predictions.winner.name === d.fixture.teams.home.name ? '1' : (p.predictions.winner.name === 'Draw' ? 'X' : '2');
    document.getElementById('bookieConsensus').innerHTML = bookies.map(b => `
        <div class="bookie-item"><span>${b}</span> <b>Prediction: ${prob}</b></div>
    `).join('');

    document.getElementById('intelPanel').style.display = 'block';
}

function closePanel(id) { document.getElementById(id).style.display='none'; }
function startSystem() { fetchLiveTicker(); setInterval(fetchLiveTicker, 60000); }
async function fetchLiveTicker() {
    try {
        const r = await fetch(`https://v3.football.api-sports.io/fixtures?live=all`, { headers: {"x-apisports-key": KEY} });
        const d = await r.json();
        if(d.response) {
            let h = ''; d.response.slice(0,10).forEach(m => { h += `<div class="ticker-item">● ${m.fixture.status.elapsed}' ${m.teams.home.name} ${m.goals.home}-${m.goals.away} ${m.teams.away.name}</div>`; });
            document.getElementById('tickerContent').innerHTML = h + h;
            document.getElementById('liveTickerWrap').style.display = 'block';
        }
    } catch(e) {}
}
window.onload = () => { if(sessionStorage.getItem("auth_v390")) { document.getElementById('authScreen').style.display='none'; document.getElementById('appContent').style.display='block'; startSystem(); } };
</script>
</body>
</html>
