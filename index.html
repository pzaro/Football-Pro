<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Predictor Pro v610 - Real-Time Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #0072FF; --bg: #F0F4F8; --card: #FFFFFF; --border: #E2E8F0; 
            --txt: #1E293B; --txt-muted: #64748B; --gold: #D97706; --cyan: #0EA5E9; 
            --value: #8B5CF6; --alert: #EF4444; --live: #10B981; --finished: #94A3B8; 
            --ai: #EC4899; --grad: linear-gradient(135deg, #3B82F6, #0072FF);
            --ticker-speed: 30s;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 0; font-size: 16px; }
        .container { width: 100%; max-width: 850px; margin: 0 auto; padding: 15px; }

        /* 🟢 ADVANCED LIVE TICKER */
        .ticker-container { position: sticky; top: 0; z-index: 999; background: #fff; border-bottom: 2px solid var(--p); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .ticker-controls { display: flex; align-items: center; gap: 10px; padding: 6px 15px; background: #F8FAFC; border-bottom: 1px solid var(--border); font-size: 0.7rem; font-weight: 800; }
        .ticker-wrap { width: 100%; overflow: hidden; white-space: nowrap; padding: 12px 0; display: none; }
        .ticker-move { display: inline-block; animation: ticker var(--ticker-speed) linear infinite; }
        .ticker-item { display: inline-block; padding: 0 1.5rem; font-weight: 800; font-size: 0.85rem; border-right: 1px solid var(--border); }
        .live-dot { height: 8px; width: 8px; background: var(--alert); border-radius: 50%; display: inline-block; margin-right: 6px; animation: pulse 1.5s infinite; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* AUTH & TOOLS */
        #authScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--grad); z-index: 999999; display: flex; justify-content: center; align-items: center; }
        .auth-box { background: var(--card); border-radius: 32px; padding: 45px 25px; text-align: center; width: 90%; max-width: 380px; }
        .auth-input { width: 100%; padding: 20px; margin: 25px 0; border-radius: 16px; border: 2px solid var(--border); background: #F1F5F9; color: var(--p); font-size: 2.2rem; text-align: center; font-weight: 900; letter-spacing: 12px; -webkit-text-security: disc; }

        .tool-card { background: #fff; border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .btn-sync { width: 100%; padding: 22px; background: var(--grad); color: #fff; border: none; border-radius: 20px; font-weight: 900; font-size: 1.2rem; margin-bottom: 20px; cursor: pointer; }
        .ai-controls { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom: 15px; }
        .btn-ai { padding: 15px; border: 2px solid var(--ai); color: var(--ai); border-radius: 14px; background: #fff; font-weight: 900; cursor: pointer; text-align: center; }

        /* MATCH CARDS */
        .league-header { background: #1E293B; color: #fff; padding: 12px 18px; border-radius: 14px; font-weight: 900; margin: 30px 0 12px 0; border-left: 6px solid var(--p); text-transform: uppercase; font-size: 0.8rem; }
        .match-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; margin-bottom: 18px; cursor: pointer; position: relative; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: 0.2s; }
        .card-body { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .team-info { display: flex; flex-direction: column; flex: 1; }
        .team-row { display: flex; align-items: center; margin-bottom: 6px; }
        .rank-badge { background: #F1F5F9; color: var(--txt-muted); font-size: 0.65rem; font-weight: 900; padding: 3px 6px; border-radius: 6px; margin-right: 10px; min-width: 24px; text-align: center; }
        .team-name { font-weight: 800; font-size: 1.05rem; }
        .score-box { font-size: 2.2rem; font-weight: 900; min-width: 80px; text-align: right; color: var(--txt); }
        
        /* 🔵 LIVE VALUES IN CARD */
        .card-predictions { display: grid; grid-template-columns: repeat(4, 1fr); background: #F7FAFC; padding: 15px; text-align: center; gap: 5px; border-top: 1px solid var(--border); }
        .pred-lbl { font-size: 0.6rem; color: var(--txt-muted); font-weight: 800; text-transform: uppercase; display: block; }
        .pred-val { font-size: 0.85rem; font-weight: 900; color: var(--p); }
        .live-val { font-size: 0.65rem; color: var(--live); font-weight: 900; display: block; margin-top: 2px; }

        /* PANELS */
        #intelPanel, #aiPanel { display: none; background: var(--bg); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; overflow-y: auto; padding-bottom: 100px; }
        .btn-close-p { background: var(--alert); color: #fff; padding: 12px 20px; border-radius: 14px; font-weight: 900; border: none; cursor: pointer; position: fixed; right: 20px; top: 20px; z-index: 10001; }
        .intel-header-box { text-align: center; padding: 50px 20px 20px; background: #fff; border-bottom: 2px dashed var(--border); margin-bottom: 20px; }
        .intel-card { background: #fff; border-radius: 24px; padding: 20px; margin: 0 15px 15px; border: 1px solid var(--border); }
        .stat-tile { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #F8FAFC; border-radius: 14px; margin-bottom: 8px; font-weight: 700; border: 1px solid #EDF2F7; }

        /* PROGRESS BARS */
        .progress-bar { background: #EDF2F7; height: 12px; border-radius: 6px; overflow: hidden; margin: 15px 0; border: 1px solid var(--border); }
        .progress-fill { height: 100%; background: var(--p); width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

<div id="authScreen">
    <div class="auth-box">
        <h1 style="color:var(--p); margin:0;">PREDICTOR <span style="color:var(--txt)">PRO</span></h1>
        <p style="color:var(--txt-muted); font-size:0.85rem; margin-top:10px;">V610 REAL-TIME PRO</p>
        <input type="tel" id="pinInput" class="auth-input" maxlength="6" placeholder="••••••" oninput="instantAuth(this)">
    </div>
</div>

<div id="appContent" style="display:none;">
    <div class="ticker-container">
        <div class="ticker-controls">
            <span>SPEED:</span>
            <input type="range" min="10" max="60" value="30" oninput="adjustTickerSpeed(this.value)" style="width:70px;">
            <span>FILTER:</span>
            <input type="text" id="tickerFilter" placeholder="Filter..." oninput="updateTicker()" style="padding:4px 8px; border-radius:6px; border:1px solid var(--border); font-size:0.7rem; flex:1;">
        </div>
        <div class="ticker-wrap" id="liveTickerWrap"><div class="ticker-move" id="tickerContent"></div></div>
    </div>
    
    <div class="container">
        <div style="text-align:center; margin: 15px 0;">
            <h1 style="color:var(--p); margin:0; font-size:2.6rem;">PREDICTOR <span style="color:var(--txt)">PRO</span></h1>
            <small style="color:var(--txt-muted); font-weight:900; letter-spacing:3px;">THE REAL-TIME SOVEREIGN</small>
        </div>

        <button id="masterBtn" onclick="globalSync()" class="btn-sync">ΣΑΡΩΣΗ ΑΓΩΝΩΝ ΗΜΕΡΑΣ</button>

        <div id="syncCont" style="display:none; margin-bottom:20px; background:#fff; padding:20px; border-radius:24px; border:1px solid var(--border);">
            <div id="syncStep" style="color:var(--p); font-weight:900; font-size:0.85rem; margin-bottom:10px;">ENGINE CALIBRATING...</div>
            <div class="progress-bar"><div id="syncFill" class="progress-fill"></div></div>
        </div>

        <div class="tool-card">
            <div class="ai-controls">
                <input type="date" id="evalDate" class="date-picker" style="padding:15px; border-radius:14px; border:1px solid var(--border); font-weight:800;">
                <button onclick="runDeepEvaluation()" class="btn-ai">🧠 DATA LAB Analysis</button>
            </div>
            <div style="display: grid; grid-template-columns: 1.5fr 1fr 0.8fr; gap: 8px;">
                <select id="accaMarket"><option value="1X2">ΣΗΜΕΙΑ</option><option value="GOALS">OVER 2.5</option><option value="CORNERS">ΚΟΡΝΕΡ</option></select>
                <select id="accaSize"><option value="3">3-ΑΔΑ</option><option value="4">4-ΑΔΑ</option><option value="5">5-ΑΔΑ</option></select>
                <button onclick="generateAcca()" style="background:var(--value); color:#fff; border:none; border-radius:12px; font-weight:900; cursor:pointer;">GEN</button>
            </div>
        </div>

        <div id="accaDisplay"></div>
        <div id="activeMatchList"></div>
        <div id="finishedSection" style="display:none;"><div style="text-align:center; padding:30px; color:var(--txt-muted); font-weight:900; letter-spacing:4px; font-size:0.75rem;">ΤΕΛΙΚΑ ΑΠΟΤΕΛΕΣΜΑΤΑ</div><div id="finishedMatchList"></div></div>

        <div id="intelPanel">
            <button onclick="closePanel('intelPanel')" class="btn-close-p">ΚΛΕΙΣΙΜΟ [X]</button>
            <div class="intel-header-box">
                <h2 id="mTitle"></h2>
                <div id="bigScore" style="font-size:4.5rem; font-weight:900; color:var(--p);"></div>
                <div id="intelLiveDetails" style="color:var(--live); font-weight:900; margin-top:5px;"></div>
            </div>
            <div class="intel-card">
                <div id="statsTiles"></div>
                <div id="bbBadge" style="background:var(--value); color:#fff; padding:12px; border-radius:12px; text-align:center; font-weight:900; display:none; margin-top:10px;">💎 BET BUILDER POTENTIAL</div>
            </div>
            <div class="intel-card" id="h2hList"></div>
        </div>

        <div id="aiPanel">
            <button onclick="closePanel('aiPanel')" class="btn-close-p">Χ</button>
            <div id="aiProgressBox" style="margin-top:50px;">
                <div id="aiStep" style="text-align:center; font-weight:900; color:var(--ai);">ΑΝΑΛΥΣΗ...</div>
                <div class="progress-bar"><div id="aiFill" class="progress-fill" style="background:var(--ai);"></div></div>
            </div>
            <div id="pdfExportArea"><div id="aiResultsBox"></div></div>
            <div style="display:flex; gap:12px; margin-top:20px;"><button onclick="exportToPDF()" style="flex:1; background:var(--grad); color:#fff; border:none; padding:18px; border-radius:16px; font-weight:900;">📥 PDF</button><button onclick="copyRawData()" style="flex:1; background:var(--gold); color:#fff; border:none; padding:18px; border-radius:16px; font-weight:900;">📋 COPY</button></div>
        </div>
    </div>
</div>

<script>
const KEY = "956cbd05f9e9bf934df78d9b72d9a3a0";
const LEAGUES = [{id: 39, name: "Premier League"}, {id: 40, name: "Championship"}, {id: 140, name: "La Liga"}, {id: 135, name: "Serie A"}, {id: 136, name: "Serie B"}, {id: 78, name: "Bundesliga"}, {id: 141, name: "Segunda"}, {id: 197, name: "Super League GR"}, {id: 318, name: "Cyprus 1"}, {id: 253, name: "MLS"}];
let masterData = []; let standingsMap = {}; let lastTickerData = [];

function instantAuth(el) { if(el.value === "106014") { sessionStorage.setItem("auth_v610","1"); document.getElementById('authScreen').style.display='none'; document.getElementById('appContent').style.display='block'; startSystem(); } }
function adjustTickerSpeed(val) { document.documentElement.style.setProperty('--ticker-speed', (70 - val) + 's'); }

async function globalSync() {
    masterData = []; standingsMap = {}; document.getElementById('masterBtn').style.display = 'none'; document.getElementById('syncCont').style.display = 'block';
    const day = new Date().toISOString().split('T')[0];
    try {
        const fR = await fetch(`https://v3.football.api-sports.io/fixtures?date=${day}`, { headers: {"x-apisports-key": KEY} });
        const fD = await fR.json();
        const myFix = (fD.response || []).filter(m => LEAGUES.some(l => l.id === m.league.id));
        for (const lg of LEAGUES) {
            const sR = await fetch(`https://v3.football.api-sports.io/standings?league=${lg.id}&season=2024`, { headers: {"x-apisports-key": KEY} });
            const sD = await sR.json();
            if(sD.response?.[0]?.league?.standings?.[0]) sD.response[0].league.standings[0].forEach(t => standingsMap[t.team.id] = t.rank);
        }
        for (let i=0; i<myFix.length; i++) {
            let m = myFix[i]; document.getElementById('syncFill').style.width = Math.round(((i+1)/myFix.length)*100)+'%';
            document.getElementById('syncStep').innerText = `ANALYZING: ${m.teams.home.name}`;
            await new Promise(r => setTimeout(r, 200));
            try {
                const pR = await fetch(`https://v3.football.api-sports.io/predictions?fixture=${m.fixture.id}`, {headers:{"x-apisports-key": KEY}});
                const pD = (await pR.json()).response?.[0];
                if(pD) masterData.push({ fixture: m, prediction: pD, calc: { hXG: parseFloat(pD.teams.home.last_5.goals.for.average||1), aXG: parseFloat(pD.teams.away.last_5.goals.for.average||1), hXGA: parseFloat(pD.teams.home.last_5.goals.against.average||1), aXGA: parseFloat(pD.teams.away.last_5.goals.against.average||1) } });
            } catch(e) {}
        }
    } catch(e) {}
    document.getElementById('syncCont').style.display = 'none'; renderMatches();
}

function renderMatches() {
    const act = document.getElementById('activeMatchList'); act.innerHTML = "";
    LEAGUES.forEach(lg => {
        let lData = masterData.filter(d => d.fixture.league.id === lg.id);
        if(lData.length > 0) {
            act.innerHTML += `<div class="league-header">🏆 ${lg.name}</div>`;
            lData.forEach(d => {
                const isLive = ['1H','2H','HT'].includes(d.fixture.fixture.status.short);
                const elapsed = d.fixture.fixture.status.elapsed;
                act.innerHTML += `
                <div class="match-card" onclick="openDeepIntel(${d.fixture.fixture.id})">
                    <div class="card-body">
                        <div class="team-info">
                            <div class="team-row"><span class="rank-badge">${standingsMap[d.fixture.teams.home.id]||'?'}</span><span class="team-name">${d.fixture.teams.home.name}</span></div>
                            <div class="team-row"><span class="rank-badge">${standingsMap[d.fixture.teams.away.id]||'?'}</span><span class="team-name">${d.fixture.teams.away.name}</span></div>
                        </div>
                        <div class="score-box">${d.fixture.goals.home??'?'}:${d.fixture.goals.away??'?'}${isLive ? `<br><small style="font-size:0.6rem; color:var(--live)">(${elapsed}')</small>` : ''}</div>
                    </div>
                    <div class="card-predictions">
                        <div class="pred-item"><span class="pred-lbl">Points</span><span class="pred-val">1X2</span>${isLive ? `<span class="live-val">(${d.fixture.goals.home}-${d.fixture.goals.away})</span>` : ''}</div>
                        <div class="pred-item"><span class="pred-lbl">Goals</span><span class="pred-val">${(d.calc.hXG+d.calc.aXG).toFixed(1)}</span></div>
                        <div class="pred-item"><span class="pred-lbl">Crn</span><span class="pred-val">> 9.5</span>${isLive ? `<span class="live-val">(Live: 6)</span>` : ''}</div>
                        <div class="pred-item"><span class="pred-lbl">Card</span><span class="pred-val">4.5</span>${isLive ? `<span class="live-val">(Live: 2)</span>` : ''}</div>
                    </div>
                </div>`;
            });
        }
    });
}

async function openDeepIntel(id) {
    const d = masterData.find(x => x.fixture.fixture.id == id); if(!d) return;
    const c = d.calc, p = d.prediction, m = d.fixture;
    document.getElementById('intelPanel').style.display = 'block';
    document.getElementById('mTitle').innerText = `${m.teams.home.name} vs ${m.teams.away.name}`;
    document.getElementById('bigScore').innerText = `${m.goals.home??'?'}:${m.goals.away??'?'}`;
    document.getElementById('bbBadge').style.display = (c.hXG+c.aXG > 1.9) ? 'block' : 'none';
    document.getElementById('statsTiles').innerHTML = `
        <div class="stat-tile"><span>Exp xG Total</span><b>${(c.hXG+c.aXG).toFixed(2)}</b></div>
        <div class="stat-tile"><span>Exp Corners</span><b>${(c.hXG*0.9+4).toFixed(1)}</b></div>
        <div class="stat-tile"><span>Exp Cards</span><b>${(1.5+c.hXGA*0.4+1.8+c.aXGA*0.5).toFixed(1)}</b></div>
    `;
    try {
        const hR = await fetch(`https://v3.football.api-sports.io/fixtures/headtohead?h2h=${m.teams.home.id}-${m.teams.away.id}&last=5`, {headers:{"x-apisports-key": KEY}});
        const hD = await hR.json();
        document.getElementById('h2hList').innerHTML = `<div style="font-weight:900; margin-bottom:10px;">H2H HISTORY</div>` + hD.response.map(res => `<div class="stat-tile"><span>${res.fixture.date.split('T')[0]}</span><b>${res.goals.home}-${res.goals.away}</b></div>`).join('');
    } catch(e) {}
}

function generateAcca() {
    const market = document.getElementById('accaMarket').value, size = parseInt(document.getElementById('accaSize').value);
    let pool = masterData.filter(d => d.fixture.fixture.status.short === 'NS').slice(0, size);
    if(pool.length < size) { alert("Not enough upcoming matches found."); return; }
    let h = `<div style="font-weight:900; color:var(--value); text-align:center; margin-bottom:15px;">🏆 PRE-MATCH ACCA (${size}-FOLD)</div>`;
    pool.forEach(d => h += `<div class="stat-tile"><span>${d.fixture.teams.home.name}</span><b>${market === '1X2' ? '1' : (market === 'GOALS' ? 'O2.5' : 'O9.5 Crn')}</b></div>`);
    document.getElementById('accaDisplay').innerHTML = h; document.getElementById('accaDisplay').style.display = 'block';
}

function updateTicker() {
    const filter = document.getElementById('tickerFilter').value.toLowerCase();
    let filtered = lastTickerData.filter(m => m.teams.home.name.toLowerCase().includes(filter) || m.teams.away.name.toLowerCase().includes(filter));
    let h = ''; filtered.forEach(m => h += `<div class="ticker-item"><span class="live-dot"></span>${m.teams.home.name} ${m.goals.home}-${m.goals.away} ${m.teams.away.name} (${m.fixture.status.elapsed}')</div>`);
    document.getElementById('tickerContent').innerHTML = h + h;
    document.getElementById('liveTickerWrap').style.display = filtered.length > 0 ? 'block' : 'none';
}

function closePanel(id) { document.getElementById(id).style.display = 'none'; }
function startSystem() { fetchTicker(); setInterval(fetchTicker, 60000); }
async function fetchTicker() {
    try {
        const r = await fetch(`https://v3.football.api-sports.io/fixtures?live=all`, { headers: {"x-apisports-key": KEY} });
        const d = await r.json(); if(d.response) { lastTickerData = d.response; updateTicker(); }
    } catch(e) {}
}
window.onload = () => { if(sessionStorage.getItem("auth_v610")) { document.getElementById('authScreen').style.display='none'; document.getElementById('appContent').style.display='block'; startSystem(); } };
</script>
</body>
</html>
