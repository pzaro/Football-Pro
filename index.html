    function getTodayISO() {
      const d = new Date(); const y = d.getFullYear(); const m = String(d.getMonth() + 1).padStart(2, "0"); const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }
    function isLiveStatus(short) { return ["1H", "2H", "HT", "LIVE", "ET", "BT", "P"].includes(short); }
    function isFinishedStatus(short) { return ["FT", "AET", "PEN"].includes(short); }

    function buildFixtureScoreHTML(m) {
      const hg = m?.goals?.home; const ag = m?.goals?.away; const short = m?.fixture?.status?.short || "";
      if (hg == null || ag == null) return "";
      if (isLiveStatus(short)) return `<div class="live-score-big">${hg} - ${ag}</div>`;

    // --- DATA VAULT (IMPORT/EXPORT/STORAGE) ---
    function getPredictionStore() { try { return JSON.parse(localStorage.getItem(LS_PREDICTIONS) || "[]"); } catch { return []; } }
    function savePredictionStore(data) { localStorage.setItem(LS_PREDICTIONS, JSON.stringify(data)); }
    function upsertPrediction(record) {
      const store = getPredictionStore();
      const idx = store.findIndex(x => String(x.fixtureId) === String(record.fixtureId));
      if (idx >= 0) store[idx] = record; else store.push(record);
      savePredictionStore(store);
    }

    function exportData() {
        const data = getPredictionStore();
        if(data.length === 0) { showError("Δεν υπάρχουν δεδομένα για εξαγωγή."); return; }
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `omega_vault_${getTodayISO()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showSuccess("Τα δεδομένα εξήχθησαν επιτυχώς!");
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    const store = getPredictionStore();
                    const storeMap = new Map(store.map(x => [String(x.fixtureId), x]));
                    imported.forEach(item => { if (item.fixtureId) storeMap.set(String(item.fixtureId), item); });
                    savePredictionStore(Array.from(storeMap.values()));
                    showSuccess(`Εισήχθησαν ${imported.length} προβλέψεις. Σύνολο στη βάση: ${storeMap.size}`);
                }
            } catch(err) { showError("Λάθος μορφή αρχείου."); }
        };
        reader.readAsText(file);

    async function throttledFetch(url, timeout = REQUEST_TIMEOUT_MS) {
      await sleep(REQUEST_DELAY_MS);
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeout);
      try { return await fetch(url, { headers: { "x-apisports-key": KEY }, signal: controller.signal }); } finally { clearTimeout(timer); }
    }

    async function apiReq(path) {
      try {
        const response = await throttledFetch(`${API}/${path}`);
        if (!response.ok) return { response: [], errors: { status: response.status } };
        return await response.json() || { response: [] };
      } catch (err) { return { response: [], errors: { message: err?.name === "AbortError" ? "timeout" : (err?.message || "unknown") } }; }
    }

    async function getTeamSeasonStats(teamId, leagueId, season) { const key = `${teamId}_${leagueId}_${season}`; if (teamStatsCache.has(key)) return teamStatsCache.get(key); const data = await apiReq(`teams/statistics?team=${teamId}&league=${leagueId}&season=${season}`); const response = data?.response || {}; teamStatsCache.set(key, response); return response; }
    async function getLastFixtures(teamId, leagueId, season) { const key = `team_last_${teamId}_${leagueId}_${season}`; if (lastFixturesCache.has(key)) return lastFixturesCache.get(key); const data = await apiReq(`fixtures?team=${teamId}&league=${leagueId}&season=${season}&last=20&status=FT`); const response = data?.response || []; lastFixturesCache.set(key, response); return response; }
    async function getFixtureStats(fixtureId) { if (statsCache.has(fixtureId)) return statsCache.get(fixtureId); const data = await apiReq(`fixtures/statistics?fixture=${fixtureId}`); statsCache.set(fixtureId, data); return data; }
    async function getLeagueStandings(leagueId, season) { const key = `${leagueId}_${season}`; if (standingsCache.has(key)) return standingsCache.get(key); const data = await apiReq(`standings?league=${leagueId}&season=${season}`); const rawStandings = data?.response?.[0]?.league?.standings || []; const flattened = Array.isArray(rawStandings) ? rawStandings.flat().filter(Boolean) : []; standingsCache.set(key, flattened); return flattened; }
    async function getHeadToHead(team1Id, team2Id, leagueId = null, season = null) { const key = `${team1Id}_${team2Id}_${leagueId || "all"}_${season || "all"}`; if (h2hCache.has(key)) return h2hCache.get(key); let path = `fixtures/headtohead?h2h=${team1Id}-${team2Id}`; if (leagueId && season) path += `&league=${leagueId}&season=${season}`; const data = await apiReq(path); const response = data?.response || []; h2hCache.set(key, response); return response; }

    function getTeamRankFromStandings(standings, teamId) { if (!Array.isArray(standings) || !standings.length) return null; const row = standings.find(x => String(x?.team?.id) === String(teamId)); return row?.rank ?? null; }
    function statVal(statsArr, type) { if (!Array.isArray(statsArr)) return 0; const item = statsArr.find(x => x.type === type); if (!item || item.value == null) return 0; return parseFloat(String(item.value).replace("%", "").trim()) || 0; }
    function getTeamGoals(fixture, teamId) { return fixture?.teams?.home?.id === teamId ? (fixture?.goals?.home ?? 0) : (fixture?.goals?.away ?? 0); }
    function getOpponentGoals(fixture, teamId) { return fixture?.teams?.home?.id === teamId ? (fixture?.goals?.away ?? 0) : (fixture?.goals?.home ?? 0); }

    function estimateXG(statsArr, goals = 0) {
      const shotsOnGoal = statVal(statsArr, "Shots on Goal"); const shotsOffGoal = statVal(statsArr, "Shots off Goal"); const totalShots = statVal(statsArr, "Total Shots"); const dangerous = statVal(statsArr, "Dangerous Attacks"); const corners = statVal(statsArr, "Corner Kicks");
      let xg = (shotsOnGoal * 0.18) + (shotsOffGoal * 0.07) + (Math.max(totalShots - shotsOnGoal - shotsOffGoal, 0) * 0.03) + (dangerous * 0.008) + (corners * 0.025) + (goals * 0.35);
      if (!Number.isFinite(xg) || xg <= 0) xg = goals > 0 ? (0.70 + goals * 0.30) : 0.70;
      return xg;
    }

    function getWinnerTeamIdFromFixture(f) { const hg = f?.goals?.home ?? 0; const ag = f?.goals?.away ?? 0; if (hg > ag) return f?.teams?.home?.id; if (ag > hg) return f?.teams?.away?.id; return null; }
    function summarizeH2H(h2hFixtures, homeTeamId, awayTeamId) { if (!Array.isArray(h2hFixtures) || !h2hFixtures.length) return { matches: 0, homeWins: 0, awayWins: 0, draws: 0, goalsHome: 0, goalsAway: 0, lastResults: [] }; let homeWins = 0, awayWins = 0, draws = 0, goalsHome = 0, goalsAway = 0; const lastResults = []; for (const f of h2hFixtures.slice(0, 8)) { const winnerId = getWinnerTeamIdFromFixture(f); const hg = f?.goals?.home ?? 0; const ag = f?.goals?.away ?? 0; const homeGoalsThisH2H = f?.teams?.home?.id === homeTeamId ? hg : ag; const awayGoalsThisH2H = f?.teams?.home?.id === awayTeamId ? hg : ag; goalsHome += homeGoalsThisH2H; goalsAway += awayGoalsThisH2H; if (winnerId === homeTeamId) homeWins++; else if (winnerId === awayTeamId) awayWins++; else draws++; lastResults.push(`${homeGoalsThisH2H}-${awayGoalsThisH2H}`); } return { matches: h2hFixtures.slice(0, 8).length, homeWins, awayWins, draws, goalsHome, goalsAway, lastResults }; }
    function getFormHistory(fixtures, teamId) { return fixtures.map(f => { const myG = getTeamGoals(f, teamId); const opG = getOpponentGoals(f, teamId); return myG > opG ? { res: "Ν", cls: "W" } : (myG < opG ? { res: "Η", cls: "L" } : { res: "Ι", cls: "D" }); }).reverse(); }
    function getDev(curr, base) { if (!base || base <= 0) return `<span class="dev-badge dev-pos">N/A</span>`; const d = (((parseFloat(curr) - base) / base) * 100).toFixed(1); return `<span class="dev-badge ${d >= 0 ? "dev-pos" : "dev-neg"}">${d > 0 ? "+" : ""}${d}%</span>`; }

    async function batchCalculate(list, teamId) {
      if (!list.length) return { xg: "0.00", xga: "0.00", cor: "0.0", crd: "0.0" }; let xgSum = 0, xgaSum = 0, corSum = 0, crdSum = 0, count = 0;
      for (const f of list) { const st = await getFixtureStats(f.fixture.id); if (!st?.response || st.response.length < 2) continue; const myObj = st.response.find(x => x.team.id === teamId); const opObj = st.response.find(x => x.team.id !== teamId); if (!myObj || !opObj) continue; const my = myObj.statistics || []; const op = opObj.statistics || []; let myXG = statVal(my, "Expected Goals"); if (myXG <= 0) myXG = estimateXG(my, getTeamGoals(f, teamId)); let oppXG = statVal(op, "Expected Goals"); if (oppXG <= 0) oppXG = estimateXG(op, getOpponentGoals(f, teamId)); xgSum += myXG; xgaSum += oppXG; corSum += statVal(my, "Corner Kicks"); crdSum += statVal(my, "Yellow Cards") + statVal(my, "Red Cards"); count++; }
      return { xg: count > 0 ? (xgSum / count).toFixed(2) : "0.00", xga: count > 0 ? (xgaSum / count).toFixed(2) : "0.00", cor: count > 0 ? (corSum / count).toFixed(1) : "0.0", crd: count > 0 ? (crdSum / count).toFixed(1) : "0.0" };
    }

    async function getTeamData(teamId, leagueId, season, venueType) {
      const [seasonStats, allFixs] = await Promise.all([getTeamSeasonStats(teamId, leagueId, season), getLastFixtures(teamId, leagueId, season)]);
      const genLast = allFixs.slice(0, LAST_GENERAL); const splitLast = allFixs.filter(f => venueType === "home" ? f.teams.home.id === teamId : f.teams.away.id === teamId).slice(0, LAST_SPLIT);
      const [form, split] = await Promise.all([batchCalculate(genLast, teamId), batchCalculate(splitLast, teamId)]);
      const baseXG = parseFloat(seasonStats?.goals?.for?.average?.total) || 1.10; const baseXGA = parseFloat(seasonStats?.goals?.against?.average?.total) || 1.10;
      return { seasonXG: baseXG.toFixed(2), seasonXGA: baseXGA.toFixed(2), formXG: form.xg, formXGA: form.xga, devXG: getDev(form.xg, baseXG), devXGA: getDev(form.xga, baseXGA), splitXG: split.xg, splitXGA: split.xga, corners: form.cor, cards: form.crd, splitCards: split.crd, history: getFormHistory(genLast, teamId) };
    }

    function computeMarketScores(hStats, aStats, leagueId) {
      let hXG = safeNum(hStats.formXG); let aXG = safeNum(aStats.formXG); let totalXG = hXG + aXG;
      const hSplitXG = safeNum(hStats.splitXG); const aSplitXG = safeNum(aStats.splitXG);
      const hXGA = safeNum(hStats.formXGA); const aXGA = safeNum(aStats.formXGA);
      const hCards = safeNum(hStats.cards); const aCards = safeNum(aStats.cards);
      const hSplitCards = safeNum(hStats.splitCards); const aSplitCards = safeNum(aStats.splitCards);

      const trapLeagues = [40, 41, 136, 141, 79, 62, 5, 6, 10, 66]; 
      const goldLeagues = [78, 262, 88, 253]; const tightLeagues = [61, 94, 197, 135, 2, 3, 848];

      if (trapLeagues.includes(leagueId)) { totalXG *= 0.80; hXG *= 0.80; aXG *= 0.80; } 
      else if (tightLeagues.includes(leagueId)) { totalXG *= 0.85; hXG *= 0.85; aXG *= 0.85; } 
      else if (goldLeagues.includes(leagueId)) { totalXG *= 1.05; }

      const xgGap = Math.abs(hXG - aXG); const weakerSideXG = Math.min(hXG, aXG); const weakerSideSplitXG = Math.min(hSplitXG, aSplitXG);

      let over25Score = (totalXG * 24) + ((hSplitXG + aSplitXG) * 9) + ((aXGA + hXGA) * 6);
      if (xgGap > 1.35 && weakerSideXG < 0.85) over25Score -= 14; if (weakerSideSplitXG < 0.70) over25Score -= 8;
      let over35Score = (totalXG * 22) + ((hSplitXG + aSplitXG) * 12) + ((aXGA + hXGA) * 10);
      if (xgGap > 1.25) over35Score -= 18; if (weakerSideXG < 1.00) over35Score -= 16; if (weakerSideSplitXG < 0.85) over35Score -= 10;
      let bttsScore = (Math.min(hXG, aXG) * 40) + ((hXGA + aXGA) * 12) + (Math.min(hSplitXG, aSplitXG) * 12);
      if (xgGap > 1.15) bttsScore -= 14; if (Math.min(hXG, aXG) < 0.75) bttsScore -= 10; if (Math.min(hSplitXG, aSplitXG) < 0.65) bttsScore -= 8;

      const cards4Score = ((hCards + aCards) * 18) + ((hSplitCards + aSplitCards) * 14);

      return { over25Score: Number(over25Score.toFixed(2)), over35Score: Number(over35Score.toFixed(2)), bttsScore: Number(bttsScore.toFixed(2)), cards4Score: Number(cards4Score.toFixed(2)), adjTotalXG: Number(totalXG.toFixed(2)), xgGap: Number(xgGap.toFixed(2)), weakerSideXG: Number(weakerSideXG.toFixed(2)) };
    }

    function getMarketSignals(scores, hStats, aStats) {
      const hXG = safeNum(hStats.formXG); const aXG = safeNum(aStats.formXG);
      const strongOver25 = scores.over25Score >= OVER25_SCORE_THRESHOLD && scores.adjTotalXG >= OVER25_TOTALXG_THRESHOLD && !(Math.abs(hXG - aXG) > 1.35 && Math.min(hXG, aXG) < 0.85);
      const strongOver35 = scores.over35Score >= OVER35_SCORE_THRESHOLD && scores.adjTotalXG >= OVER35_TOTALXG_THRESHOLD && hXG >= 1.35 && aXG >= 1.15;
      const strongBTTS = scores.bttsScore >= BTTS_SCORE_THRESHOLD && Math.min(hXG, aXG) >= 0.75;
      return { over25: strongOver25, over35: strongOver35, btts: strongBTTS };
    }

    function generateOmegaPick(hStats, aStats, leagueId) {
      const scores = computeMarketScores(hStats, aStats, leagueId);
      const hXG = safeNum(hStats.formXG); const aXG = safeNum(aStats.formXG);
      const signals = getMarketSignals(scores, hStats, aStats);

      if (!Number.isFinite(scores.adjTotalXG) || scores.adjTotalXG < 0.90) return { pick: "⚠️ NO DATA (ΑΓΝΟΗΣΕ ΤΟ ΜΑΤΣ)", reason: "Το σύστημα της API δεν έχει προσκομίσει επαρκή στατιστικά xG για αυτές τις ομάδες.", noBet: true };

    function bucketGoals(exp) { if (exp >= 3.15) return 3; if (exp >= 2.05) return 2; if (exp >= 0.95) return 1; return 0; }
    function predictExactScoreAndCorners(hStats, aStats) {
      const hFormXG = safeNum(hStats.formXG); const aFormXG = safeNum(aStats.formXG);
      const hSplitXG = safeNum(hStats.splitXG); const aSplitXG = safeNum(aStats.splitXG);
      const hFormXGA = safeNum(hStats.formXGA); const aFormXGA = safeNum(aStats.formXGA);
      const hCorners = safeNum(hStats.corners); const aCorners = safeNum(aStats.corners);

      const homeGoalExp = clamp((hFormXG * 0.44) + (hSplitXG * 0.34) + (aFormXGA * 0.22), 0.2, 4.0);
      const awayGoalExp = clamp((aFormXG * 0.44) + (aSplitXG * 0.34) + (hFormXGA * 0.22), 0.2, 4.0);

      let homeGoals = bucketGoals(homeGoalExp); let awayGoals = bucketGoals(awayGoalExp);

      const unique = []; const used = new Set();
      for (const c of candidates.sort((a, b) => b.mainScore - a.mainScore)) { const key = `${c.fixtureId}_${c.market}`; if (used.has(key)) continue; used.add(key); unique.push(c); }

      return { date: getTodayISO(), stake: safeNum(document.getElementById("wallbetStake")?.value, 10), legs: [leg1, leg2], estimatedScore: Number((leg1.mainScore + leg2.mainScore).toFixed(2)) };

    function computeClassificationMetrics(rows, predKey, actualKey) {
      let tp = 0, tn = 0, fp = 0, fn = 0;
      for (const r of rows) { const p = !!r[predKey]; const a = !!r[actualKey]; if (p && a) tp++; else if (!p && !a) tn++; else if (p && !a) fp++; else fn++; }
      const total = tp + tn + fp + fn;
      return { tp, tn, fp, fn, accuracy: (total > 0 ? ((tp + tn) / total) * 100 : 0).toFixed(1), precision: ((tp + fp) > 0 ? (tp / (tp + fp)) * 100 : 0).toFixed(1), recall: ((tp + fn) > 0 ? (tp / (tp + fn)) * 100 : 0).toFixed(1) };
    }

    async function runCustomAudit() {
      if (isRunning) return;
      
      const startDateStr = document.getElementById("auditStart").value;
      const endDateStr = document.getElementById("auditEnd").value;
      
      if (!startDateStr || !endDateStr) {
          showError("Παρακαλώ επέλεξε και τις δύο ημερομηνίες (Από / Έως).");
          return;
      }
      
      const startDate = new Date(startDateStr);
      const endDate = new Date(endDateStr);
      // Αντιστροφή αν βάλει λάθος ημερομηνίες
      if (startDate > endDate) {
          showError("Η ημερομηνία 'Από' πρέπει να είναι πριν από την ημερομηνία 'Έως'.");
          return;
      }
      
      // Προσθήκη μιας ημέρας στο End Date για να συμπεριλάβει τα ματς της τελευταίας μέρας μέχρι τις 23:59
      const endBoundary = new Date(endDate);
      endBoundary.setDate(endBoundary.getDate() + 1);

      isRunning = true; clearError(); clearSuccess(); setButtonsDisabled(true); setLoader(true, "CUSTOM DATE AUDIT...");
      document.getElementById("display").innerHTML = ""; document.getElementById("topSection").innerHTML = ""; document.getElementById("wallbetSection").innerHTML = "";
      
      try {
        const store = getPredictionStore();
        // Φιλτράρισμα βάσει της επιλεγμένης ημερομηνίας
        const candidates = store.filter(x => {
            const matchDate = new Date(x.date);
            return matchDate >= startDate && matchDate < endBoundary;
        });

        if (!candidates.length) { document.getElementById("auditSection").innerHTML = `<div class="section-panel"><div class="section-title">📊 CUSTOM DATE AUDIT</div><div style="color:var(--txt-muted);">Δεν υπάρχουν αποθηκευμένες προβλέψεις σε αυτό το χρονικό διάστημα.</div></div>`; return; }
        let rows = []; let totals = { games: 0, exactHits: 0, cornersAbsErrorSum: 0, cornersCount: 0 };
        for (let i = 0; i < candidates.length; i++) {
          const p = candidates[i]; setProgress(Math.round(((i + 1) / candidates.length) * 100), `AUDIT: ${p.homeTeam} vs ${p.awayTeam}`);
          const fixtureResp = await apiReq(`fixtures?id=${p.fixtureId}`); const fixture = fixtureResp?.response?.[0];
          if (!fixture || !isFinishedStatus(fixture?.fixture?.status?.short)) continue;
          const actualHome = safeNum(fixture?.goals?.home); const actualAway = safeNum(fixture?.goals?.away);
          const actualTotal = actualHome + actualAway; const actualBTTS = actualHome > 0 && actualAway > 0; const actualExact = `${actualHome}-${actualAway}`;
          const statsResp = await getFixtureStats(p.fixtureId); let actualCorners = null;
          if (statsResp?.response && statsResp.response.length >= 2) {
            const hObj = statsResp.response.find(x => x.team?.id === fixture?.teams?.home?.id); const aObj = statsResp.response.find(x => x.team?.id === fixture?.teams?.away?.id);
            actualCorners = statVal(hObj?.statistics || [], "Corner Kicks") + statVal(aObj?.statistics || [], "Corner Kicks");
          }
          const hitExact = String(p.exactScorePred) === actualExact; let cornersError = null;
          if (actualCorners != null && Number.isFinite(actualCorners)) { cornersError = Math.abs(safeNum(p.cornersPred) - actualCorners); totals.cornersAbsErrorSum += cornersError; totals.cornersCount += 1; }
          totals.games += 1; if (hitExact) totals.exactHits += 1;
          rows.push({ date: p.date?.slice(0, 10) || "", league: p.league, match: `${p.homeTeam} vs ${p.awayTeam}`, predOver25: !!p.predOver25, actualOver25: actualTotal > 2.5, predOver35: !!p.predOver35, actualOver35: actualTotal > 3.5, predBTTS: !!p.predBTTS, actualBTTS: actualBTTS, predExact: p.exactScorePred, actualExact, hitExact, predCorners: p.cornersPred, actualCorners: actualCorners == null ? "-" : actualCorners, cornersError: cornersError == null ? "-" : cornersError.toFixed(1) });
        }
        if (!totals.games) { document.getElementById("auditSection").innerHTML = `<div class="section-panel"><div class="section-title">📊 CUSTOM DATE AUDIT</div><div style="color:var(--txt-muted);">Δεν βρέθηκαν ολοκληρωμένοι αγώνες για αξιολόγηση στο επιλεγμένο διάστημα.</div></div>`; return; }
        const over25Metrics = computeClassificationMetrics(rows, "predOver25", "actualOver25");
        const over35Metrics = computeClassificationMetrics(rows, "predOver35", "actualOver35");
        const bttsMetrics = computeClassificationMetrics(rows, "predBTTS", "actualBTTS");
        const exactAcc = ((totals.exactHits / totals.games) * 100).toFixed(1);
        const cornersMae = totals.cornersCount > 0 ? (totals.cornersAbsErrorSum / totals.cornersCount).toFixed(2) : "-";

        document.getElementById("auditSection").innerHTML = `

              <div class="bank-box"><div class="bank-label">Total DB Records</div><div class="bank-value">${getPredictionStore().length}</div></div>
            </div>
            <div class="bank-grid" style="margin-bottom:16px;">
              <div class="bank-box"><div class="bank-label">O2.5 Accuracy</div><div class="bank-value">${over25Metrics.accuracy}%</div></div>
              <div class="bank-box"><div class="bank-label">O2.5 Precision</div><div class="bank-value">${over25Metrics.precision}%</div></div>
              <div class="bank-box"><div class="bank-label">O2.5 Recall</div><div class="bank-value">${over25Metrics.recall}%</div></div>
              <div class="bank-box"><div class="bank-label">O2.5 FP / FN</div><div class="bank-value">${over25Metrics.fp}/${over25Metrics.fn}</div></div>
            </div>
            <div class="audit-table-wrap">
              <table class="audit-table">
                <thead><tr><th>Ημ/νία</th><th>Λίγκα</th><th>Ματς</th><th>O2.5 Pred</th><th>O2.5 Act</th><th>Hit</th><th>O3.5 Pred</th><th>O3.5 Act</th><th>Hit</th><th>BTTS Pred</th><th>BTTS Act</th><th>Hit</th><th>Exact Pred</th><th>Exact Act</th><th>Hit</th><th>Corners Pred</th><th>Corners Act</th><th>Error</th></tr></thead>
                <tbody>${rows.map(r => `<tr><td>${escapeHtml(r.date)}</td><td>${escapeHtml(r.league)}</td><td>${escapeHtml(r.match)}</td><td>${r.predOver25 ? "YES" : "NO"}</td><td>${r.actualOver25 ? "YES" : "NO"}</td><td class="${r.predOver25 === r.actualOver25 ? 'audit-hit' : 'audit-miss'}">${r.predOver25 === r.actualOver25 ? 'YES' : 'NO'}</td><td>${r.predOver35 ? "YES" : "NO"}</td><td>${r.actualOver35 ? "YES" : "NO"}</td><td class="${r.predOver35 === r.actualOver35 ? 'audit-hit' : 'audit-miss'}">${r.predOver35 === r.actualOver35 ? 'YES' : 'NO'}</td><td>${r.predBTTS ? "YES" : "NO"}</td><td>${r.actualBTTS ? "YES" : "NO"}</td><td class="${r.predBTTS === r.actualBTTS ? 'audit-hit' : 'audit-miss'}">${r.predBTTS === r.actualBTTS ? 'YES' : 'NO'}</td><td>${escapeHtml(r.predExact)}</td><td>${escapeHtml(r.actualExact)}</td><td class="${r.hitExact ? 'audit-hit' : 'audit-miss'}">${r.hitExact ? 'YES' : 'NO'}</td><td>${escapeHtml(String(r.predCorners))}</td><td>${escapeHtml(String(r.actualCorners))}</td><td>${escapeHtml(String(r.cornersError))}</td></tr>`).join("")}</tbody>
              </table>

        showSuccess(`Ο έλεγχος για το διάστημα ${startDateStr} - ${endDateStr} ολοκληρώθηκε.`);

    async function runScan() {
      if (isRunning) return;
      isRunning = true; clearError(); clearSuccess(); setButtonsDisabled(true); setLoader(true, "ΑΝΑΖΗΤΗΣΗ ΣΗΜΕΙΩΝ ΜΕ ΑΞΙΑ...");
      const display = document.getElementById("display"); display.innerHTML = ""; document.getElementById("topSection").innerHTML = ""; document.getElementById("wallbetSection").innerHTML = ""; document.getElementById("auditSection").innerHTML = "";
      try {
        const selectedDate = document.getElementById("scanDate").value || getTodayISO();
        const selectedLeague = document.getElementById("leagueFilter").value;
        const fixturesResp = await apiReq(`fixtures?date=${selectedDate}`);
        let matches = (fixturesResp.response || []).filter(m => selectedLeague === "ALL" ? LEAGUES.includes(m.league.id) : m.league.id === parseInt(selectedLeague, 10));
        matches.sort((a, b) => { const aLive = isLiveStatus(a.fixture.status.short) ? 1 : 0; const bLive = isLiveStatus(b.fixture.status.short) ? 1 : 0; const aFinished = isFinishedStatus(a.fixture.status.short) ? 1 : 0; const bFinished = isFinishedStatus(b.fixture.status.short) ? 1 : 0; if (aLive !== bLive) return bLive - aLive; if (aFinished !== bFinished) return bFinished - aFinished; return (a.fixture.timestamp || 0) - (b.fixture.timestamp || 0); });
        matches = matches.slice(0, MAX_MATCHES);
        if (!matches.length) { display.innerHTML = `<div class="cyber-card"><h3 class="orbitron" style="text-align:center; color:var(--gold); margin:0;">Δεν βρέθηκαν αγώνες.</h3></div>`; return; }
        let htmlBuffer = ""; const scoredMatches = [];
        for (let i = 0; i < matches.length; i++) {
          const m = matches[i]; setProgress(Math.round(((i + 1) / matches.length) * 100), `ΑΝΑΛΥΣΗ: ${m.teams.home.name} vs ${m.teams.away.name}`);
          const [intelHome, intelAway, standings, h2hFixtures] = await Promise.all([getTeamData(m.teams.home.id, m.league.id, m.league.season, "home"), getTeamData(m.teams.away.id, m.league.id, m.league.season, "away"), getLeagueStandings(m.league.id, m.league.season), getHeadToHead(m.teams.home.id, m.teams.away.id, m.league.id, m.league.season)]);
          const scores = computeMarketScores(intelHome, intelAway, m.league.id);
          const h2hSummary = summarizeH2H(h2hFixtures, m.teams.home.id, m.teams.away.id);
          scoredMatches.push({ fixtureId: m.fixture.id, homeTeam: m.teams.home.name, awayTeam: m.teams.away.name, league: m.league.name, leagueId: m.league.id, homeRank: getTeamRankFromStandings(standings, m.teams.home.id), awayRank: getTeamRankFromStandings(standings, m.teams.away.id), over25Score: scores.over25Score, over35Score: scores.over35Score, bttsScore: scores.bttsScore, cards4Score: scores.cards4Score });
          htmlBuffer += buildMatchCard(m, { h: intelHome, a: intelAway }, scores, standings, h2hSummary);
        }
        latestTopLists.over25 = [...scoredMatches].sort((a, b) => b.over25Score - a.over25Score).slice(0, 5);
        latestTopLists.over35 = [...scoredMatches].sort((a, b) => b.over35Score - a.over35Score).slice(0, 5);
        latestTopLists.btts = [...scoredMatches].sort((a, b) => b.bttsScore - a.bttsScore).slice(0, 5);
        latestTopLists.cards4 = [...scoredMatches].sort((a, b) => b.cards4Score - a.cards4Score).slice(0, 5);
        renderTopSections(); renderWallBet(); display.innerHTML = htmlBuffer; showSuccess("Το recalibrated scan ολοκληρώθηκε και οι προβλέψεις αποθηκεύτηκαν για audit.");
      } catch (err) { showError(`Σφάλμα: ${err?.message || "Άγνωστο σφάλμα"}`); } finally { setLoader(false); setButtonsDisabled(false); isRunning = false; }
    }

    async function runLiveScan() {
      if (isRunning) return;
      isRunning = true; clearError(); clearSuccess(); setButtonsDisabled(true); setLoader(true, "ΑΝΑΖΗΤΗΣΗ LIVE ΑΓΩΝΩΝ...");
      const display = document.getElementById("display"); display.innerHTML = ""; document.getElementById("topSection").innerHTML = ""; document.getElementById("wallbetSection").innerHTML = ""; document.getElementById("auditSection").innerHTML = "";
      try {
        const selectedDate = document.getElementById("scanDate").value || getTodayISO();
        const selectedLeague = document.getElementById("leagueFilter").value;
        const fixturesResp = await apiReq(`fixtures?date=${selectedDate}`);
        let matches = (fixturesResp.response || []).filter(m => { const leagueOk = selectedLeague === "ALL" ? LEAGUES.includes(m.league.id) : m.league.id === parseInt(selectedLeague, 10); return leagueOk && isLiveStatus(m.fixture.status.short); });
        if (!matches.length) { display.innerHTML = `<div class="cyber-card"><h3 class="orbitron" style="text-align:center; color:var(--gold); margin:0;">Δεν υπάρχουν live αγώνες.</h3></div>`; return; }
        let htmlBuffer = "";
        for (let i = 0; i < matches.length; i++) {
          const m = matches[i]; setProgress(Math.round(((i + 1) / matches.length) * 100), `LIVE: ${m.teams.home.name} vs ${m.teams.away.name}`);
          const [statResp, standings, h2hFixtures] = await Promise.all([getFixtureStats(m.fixture.id), getLeagueStandings(m.league.id, m.league.season), getHeadToHead(m.teams.home.id, m.teams.away.id, m.league.id, m.league.season)]);
          let liveStats = null;
          if (statResp?.response && statResp.response.length >= 2) {
            const homeObj = statResp.response.find(x => x.team?.id === m.teams.home.id); const awayObj = statResp.response.find(x => x.team?.id === m.teams.away.id);
            const homeStats = homeObj?.statistics || []; const awayStats = awayObj?.statistics || [];
            liveStats = { h: { corners: statVal(homeStats, "Corner Kicks"), yellow: statVal(homeStats, "Yellow Cards"), red: statVal(homeStats, "Red Cards"), shots: statVal(homeStats, "Shots on Goal"), danger: statVal(homeStats, "Dangerous Attacks"), poss: statVal(homeStats, "Ball Possession") }, a: { corners: statVal(awayStats, "Corner Kicks"), yellow: statVal(awayStats, "Yellow Cards"), red: statVal(awayStats, "Red Cards"), shots: statVal(awayStats, "Shots on Goal"), danger: statVal(awayStats, "Dangerous Attacks"), poss: statVal(awayStats, "Ball Possession") } };
          }
          const h2hSummary = summarizeH2H(h2hFixtures, m.teams.home.id, m.teams.away.id);
          htmlBuffer += buildLiveCard(m, liveStats, standings, h2hSummary);
        }
        display.innerHTML = htmlBuffer;
      } catch (err) { showError(`Σφάλμα live: ${err?.message || "Άγνωστο σφάλμα"}`); } finally { setLoader(false); setButtonsDisabled(false); isRunning = false; }
    }

    function exportPDF() { html2pdf().set({ margin: 8, filename: `Omega_${getTodayISO()}.pdf`, image: { type: "jpeg", quality: 0.96 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: "mm", format: "a4", orientation: "portrait" } }).from(document.getElementById("app")).save(); }

    window.addEventListener("DOMContentLoaded", () => {
      document.getElementById("scanDate").value = getTodayISO();
      
      // Βάλε 1 μήνα πίσω στο auditStart και το σημερινό στο auditEnd
      const dStart = new Date(); dStart.setDate(dStart.getDate() - 30);
      document.getElementById("auditStart").value = dStart.toISOString().split('T')[0];
      document.getElementById("auditEnd").value = getTodayISO();

      const select = document.getElementById("leagueFilter");
      LEAGUES_DATA.forEach(l => { const opt = document.createElement("option"); opt.value = l.id; opt.textContent = l.name; select.appendChild(opt); });
      renderBankSection();
    });
  </script>
