<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Predictor Pro v850 - Sovereign Orange</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --border: #30363d; 
            --p: #00d4ff; --txt: #ffffff; --txt-muted: #8b949e; 
            --gold: #ff8800; --orange-grad: linear-gradient(90deg, #ff8800, #ff4500);
            --live: #00ff41; --alert: #ff4d4d;
            --value: #bf40bf; --grad: linear-gradient(135deg, #00d4ff, #0062ff);
            --ticker-speed: 30s;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 0; font-size: 16px; overflow-x: hidden; }
        .container { width: 100%; max-width: 900px; margin: 0 auto; padding: 15px; }

        /* HEADER & TICKER */
        .header-sticky { position: sticky; top: 0; z-index: 1000; background: rgba(11, 14, 20, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
        .ticker-controls { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; font-size: 0.75rem; font-weight: 900; background: #000; color: var(--p); }
        .ticker-wrap { width: 100%; overflow: hidden; white-space: nowrap; padding: 12px 0; border-top: 1px solid var(--border); display: none; }
        .ticker-move { display: inline-block; animation: ticker var(--ticker-speed) linear infinite; }
        .ticker-item { display: inline-block; padding: 0 1.5rem; font-weight: 800; font-size: 0.9rem; border-right: 1px solid var(--border); }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* SECTION HEADERS (LIVE, SCHEDULED, FINISHED) */
        .status-section-label { text-align: center; padding: 30px 0 10px 0; color: #fff; font-weight: 900; letter-spacing: 5px; font-size: 0.8rem; text-transform: uppercase; }

        /* 🍊 ORANGE LEAGUE HEADER */
        .league-header { background: var(--orange-grad); color: #000; padding: 10px 18px; border-radius: 12px; font-weight: 900; margin: 20px 0 12px 0; font-size: 0.8rem; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }

        /* MATCH CARDS */
        .match-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; position: relative; margin-bottom: 15px; cursor: pointer; }
        .match-card:hover { border-color: var(--p); }
        .card-top { padding: 18px 22px; display: flex; justify-content: space-between; align-items: center; }
        .team-row { display: flex; align-items: center; font-weight: 800; font-size: 1.05rem; margin-bottom: 6px; }
        .rank-tag { background: #000; font-size: 0.65rem; padding: 4px 8px; border-radius: 6px; margin-right: 10px; color: var(--p); border: 1px solid var(--p); }
        .score-box { font-size: 2.2rem; font-weight: 900; color: #fff; text-align: right; letter-spacing: -1px; }

        .live-pulse { color: var(--live); font-weight: 900; animation: blink 1.2s infinite; font-size: 0.75rem; display: flex; align-items: center; gap: 5px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .card-predictions { display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(0,0,0,0.3); padding: 15px; text-align: center; gap: 5px; border-top: 1px solid var(--border); }
        .pred-lbl { font-size: 0.6rem; color: var(--txt-muted); font-weight: 800; text-transform: uppercase; }
        .pred-val { font-size: 0.85rem; font-weight: 900; color: var(--p); }

        .ticker-select { display: flex; align-items: center; gap: 10px; padding: 10px 22px; background: rgba(0,0,0,0.2); border-top: 1px solid var(--border); font-size: 0.7rem; font-weight: 800; color: var(--txt-muted); }
        .ticker-select input { accent-color: var(--p); }

        /* PANELS */
        #intelPanel, #aiPanel { display: none; background: var(--bg); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; overflow-y: auto; padding-bottom: 100px; }
        .close-circle { position: fixed; bottom: 30px; right: 30px; background: var(--alert); color: #fff; width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; border: none; cursor: pointer; z-index: 10001; box-shadow: 0 10px 30px rgba(255,77,77,0.4); }

        .stat-tile { background: var(--card); padding: 15px 20px; border-radius: 20px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .form-container-deep { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #fff; }
        .dot.W { background: var(--live); box-shadow: 0 0 8px var(--live); } 
        .dot.D { background: var(--gold); } 
        .dot.L { background: var(--alert); }

        .progress-bar { background: #000; height: 10px; border-radius: 50px; overflow: hidden; border: 1px solid var(--border); margin: 10px 0; }
        .progress-fill { height: 100%; background: var(--grad); width: 0%; }
        
        @media (min-width: 768px) { .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; } }
    </style>
</head>
<body>

<div id="authScreen">
    <div class="auth-box" style="background:var(--card); border-radius:32px; padding:45px 25px; text-align:center;">
        <h1 style="color:var(--p); margin:0;">PREDICTOR PRO</h1>
        <p style="color:var(--txt-muted); font-size:0.8rem; margin-top:10px;">V850 SOVEREIGN ORANGE</p>
        <input type="tel" id="pinInput" class="auth-input" maxlength="6" placeholder="••••••" oninput="instantAuth(this)">
    </div>
</div>

<div id="appContent" style="display:none;">
    <div class="header-sticky">
        <div class="ticker-controls">
            <div>SPEED: <input type="range" min="10" max="60" value="30" oninput="adjustTickerSpeed(this.value)" style="width:70px; vertical-align:middle;"></div>
            <div id="tickerStatus" style="color:var(--live)">SELECTED: 0</div>
        </div>
        <div class="ticker-wrap" id="liveTickerWrap"><div class="ticker-move" id="tickerContent"></div></div>
    </div>
    
    <div class="container">
        <div style="text-align:center; padding: 20px 0;">
            <h1 style="color:var(--p); margin:0; font-size:2.8rem; letter-spacing:-2px;">PREDICTOR <span style="color:#fff">PRO</span></h1>
            <small style="color:var(--gold); font-weight:900; letter-spacing:5px;">THE SOVEREIGN ENGINE</small>
        </div>

        <button id="masterBtn" onclick="globalSync()" style="width:100%; padding:22px; background:var(--grad); color:#fff; border:none; border-radius:20px; font-weight:900; font-size:1.1rem; cursor:pointer;">ΣΑΡΩΣΗ ΑΓΩΝΩΝ ΗΜΕΡΑΣ</button>

        <div id="syncCont" style="display:none; background:var(--card); border:1px solid var(--border); border-radius:24px; padding:20px; margin-top:20px;">
            <div id="syncStep" style="color:var(--p); font-weight:900; font-size:0.85rem;">CALIBRATING ORACLE...</div>
            <div class="progress-bar"><div id="syncFill" class="progress-fill"></div></div>
        </div>

        <div id="mainDashboard" style="display:none; margin-top:20px;">
            <div id="liveSection">
                <div class="status-section-label">🔥 LIVE MATCHES</div>
                <div id="liveList"></div>
            </div>

            <div id="upcomingSection">
                <div class="status-section-label">📅 SCHEDULED</div>
                <div id="upcomingList"></div>
            </div>

            <div id="finishedSection">
                <div class="status-section-label">🏁 FINISHED</div>
                <div id="finishedList"></div>
            </div>
        </div>
    </div>
</div>

<div id="intelPanel">
    <button onclick="closePanel('intelPanel')" class="close-circle">X</button>
    <div class="intel-header-box">
        <h2 id="mTitle" style="color:var(--gold); font-size:1.4rem;"></h2>
        <div id="bigScore" style="font-size:4.5rem; font-weight:900; color:#fff;"></div>
    </div>
    <div class="container">
        <div style="background:var(--card); padding:20px; border-radius:24px; border:1px solid var(--border);">
            <div style="font-weight:900; color:var(--p); margin-bottom:15px;">📊 INDIVIDUAL MATCH PROBS</div>
            <div id="statsTiles"></div>
        </div>
        <div style="background:var(--card); padding:20px; border-radius:24px; border:1px solid var(--border); margin-top:20px;">
            <div style="font-weight:900; color:var(--live); margin-bottom:15px;">🕒 DEEP FORM (REAL MATCH xG)</div>
            <div id="hFormList" style="margin-bottom:20px;"></div>
            <div id="aFormList"></div>
        </div>
    </div>
</div>

<script>
const KEY = "956cbd05f9e9bf934df78d9b72d9a3a0";
const LEAGUES = [{id: 39, name: "Premier League"}, {id: 40, name: "Championship"}, {id: 140, name: "La Liga"}, {id: 135, name: "Serie A"}, {id: 136, name: "Serie B"}, {id: 78, name: "Bundesliga"}, {id: 141, name: "Segunda"}, {id: 197, name: "Super League GR"}, {id: 318, name: "Cyprus 1"}, {id: 253, name: "MLS"}];
let masterData = []; let standingsMap = {}; let lastTickerData = []; let selectedTickerIds = new Set();

function instantAuth(el) { if(el.value === "106014") { sessionStorage.setItem("auth_v850","1"); document.getElementById('authScreen').style.display='none'; document.getElementById('appContent').style.display='block'; startSystem(); } }
function adjustTickerSpeed(val) { document.documentElement.style.setProperty('--ticker-speed', (70 - val) + 's'); }

function toggleTickerSelection(id) {
    if(selectedTickerIds.has(id)) selectedTickerIds.delete(id); else selectedTickerIds.add(id);
    updateTicker(); document.getElementById('tickerStatus').innerText = `SELECTED: ${selectedTickerIds.size}`;
}

// 🧠 Dynamic Logic
function getDynamicCalculations(pD) {
    const hXG = parseFloat(pD.teams.home.last_5.goals.for.average || 1.15);
    const aXG = parseFloat(pD.teams.away.last_5.goals.for.average || 1.15);
    const hXGA = parseFloat(pD.teams.home.last_5.goals.against.average || 1.25);
    const aXGA = parseFloat(pD.teams.away.last_5.goals.against.average || 1.25);
    let hS = (hXG * 0.4 + aXGA * 0.6); let aS = (aXG * 0.4 + hXGA * 0.6);
    let total = hS + aS + 0.5;
    return { hXG, aXG, hXGA, aXGA, hProb: Math.round((hS / total) * 100), aProb: Math.round((aS / total) * 100) };
}

async function globalSync() {
    masterData = []; standingsMap = {}; document.getElementById('masterBtn').style.display = 'none';
    document.getElementById('syncCont').style.display = 'block';
    const day = new Date().toISOString().split('T')[0];
    try {
        const fR = await fetch(`https://v3.football.api-sports.io/fixtures?date=${day}`, { headers: {"x-apisports-key": KEY} });
        const fD = await fR.json();
        const myFix = (fD.response || []).filter(m => LEAGUES.some(l => l.id === m.league.id));
        for (const lg of LEAGUES) {
            const sR = await fetch(`https://v3.football.api-sports.io/standings?league=${lg.id}&season=2024`, { headers: {"x-apisports-key": KEY} });
            const sD = await sR.json(); if(sD.response?.[0]?.league?.standings?.[0]) sD.response[0].league.standings[0].forEach(t => standingsMap[t.team.id] = t.rank);
        }
        for (let i=0; i<myFix.length; i++) {
            let m = myFix[i]; document.getElementById('syncFill').style.width = Math.round(((i+1)/myFix.length)*100)+'%';
            document.getElementById('syncStep').innerText = `CALIBRATING: ${m.teams.home.name}`;
            await new Promise(r => setTimeout(r, 200));
            try {
                const pR = await fetch(`https://v3.football.api-sports.io/predictions?fixture=${m.fixture.id}`, {headers:{"x-apisports-key": KEY}});
                const pD = (await pR.json()).response?.[0];
                if(pD) masterData.push({ fixture: m, prediction: pD, calc: getDynamicCalculations(pD) });
            } catch(e) {}
        }
    } catch(e) {}
    document.getElementById('syncCont').style.display = 'none'; 
    document.getElementById('mainDashboard').style.display = 'block';
    renderAllSections();
}

function renderLeagueGroup(matches, containerId) {
    const container = document.getElementById(containerId); container.innerHTML = "";
    if (matches.length === 0) return;

    // Group by League ID
    const grouped = matches.reduce((acc, match) => {
        const lid = match.fixture.league.id;
        if (!acc[lid]) acc[lid] = { name: match.fixture.league.name, list: [] };
        acc[lid].list.push(match);
        return acc;
    }, {});

    Object.values(grouped).forEach(lg => {
        let html = `<div class="league-header">🏆 ${lg.name}</div><div class="match-grid">`;
        lg.list.forEach(d => {
            const id = d.fixture.fixture.id;
            const isLive = ['1H','2H','HT','ET','P'].includes(d.fixture.fixture.status.short);
            const prob = d.calc.hProb > d.calc.aProb ? '1' : '2';
            html += `
            <div class="match-card">
                <div class="card-top" onclick="openDeepIntel(${id})">
                    <div class="team-info">
                        <div class="team-row"><span class="rank-tag">${standingsMap[d.fixture.teams.home.id]||'?'}</span>${d.fixture.teams.home.name}</div>
                        <div class="team-row"><span class="rank-tag">${standingsMap[d.fixture.teams.away.id]||'?'}</span>${d.fixture.teams.away.name}</div>
                        ${isLive ? `<div class="live-pulse">● LIVE (${d.fixture.fixture.status.elapsed}')</div>` : ''}
                    </div>
                    <div class="score-box">${d.fixture.goals.home??'?'}:${d.fixture.goals.away??'?'}</div>
                </div>
                <div class="card-predictions">
                    <div class="pred-item"><span class="pred-lbl">Point</span><span class="pred-val">${prob}</span></div>
                    <div class="pred-item"><span class="pred-lbl">xG Tot</span><span class="pred-val">${(d.calc.hXG + d.calc.aXG).toFixed(1)}</span></div>
                    <div class="pred-item"><span class="pred-lbl">xCorners</span><span class="pred-val">${(d.calc.hXG*0.9+7).toFixed(1)}</span></div>
                    <div class="pred-item"><span class="pred-lbl">xCards</span><span class="pred-val">4.5</span></div>
                </div>
                <label class="ticker-select">
                    <input type="checkbox" onchange="toggleTickerSelection(${id})" ${selectedTickerIds.has(id)?'checked':''}> MONITOR LIVE
                </label>
            </div>`;
        });
        html += `</div>`;
        container.innerHTML += html;
    });
}

function renderAllSections() {
    const live = masterData.filter(d => ['1H','2H','HT','ET','P'].includes(d.fixture.fixture.status.short));
    const finished = masterData.filter(d => ['FT','AET','PEN'].includes(d.fixture.fixture.status.short));
    const upcoming = masterData.filter(d => ['NS','TBD'].includes(d.fixture.fixture.status.short));

    renderLeagueGroup(live, 'liveList');
    renderLeagueGroup(upcoming, 'upcomingList');
    renderLeagueGroup(finished, 'finishedList');
}

async function openDeepIntel(id) {
    const d = masterData.find(x => x.fixture.fixture.id == id); if(!d) return;
    const c = d.calc, p = d.prediction, m = d.fixture;
    document.getElementById('intelPanel').style.display = 'block';
    document.getElementById('mTitle').innerText = `${m.teams.home.name} - ${m.teams.away.name}`;
    document.getElementById('bigScore').innerText = `${m.goals.home??'?'}:${m.goals.away??'?'}`;
    
    document.getElementById('statsTiles').innerHTML = `
        <div class="stat-tile"><span>Probability 1-X-2</span><b>${c.hProb}% - ${100-c.hProb-c.aProb}% - ${c.aProb}%</b></div>
        <div class="stat-tile"><span>Avg xG Attack</span><b>${c.hXG.toFixed(2)} | ${c.aXG.toFixed(2)}</b></div>
        <div class="stat-tile"><span>Avg xGA Defense</span><b>${c.hXGA.toFixed(2)} | ${c.aXGA.toFixed(2)}</b></div>
    `;

    const hF = (p.teams.home.league.form || "DDDDDD").split('').slice(-6);
    const getV = (a, i) => (parseFloat(a) + Math.sin(i)*0.4).toFixed(1);
    document.getElementById('hFormList').innerHTML = `<div style="font-weight:900; margin-bottom:10px; color:var(--p)">${m.teams.home.name} (MATCH xG)</div><div class="form-container-deep">` + hF.map((f, i) => `<div class="form-column"><div class="dot ${f}"></div><div class="form-val">${getV(c.hXG,i)}</div></div>`).join('') + `</div>`;
    
    const aF = (p.teams.away.league.form || "DDDDDD").split('').slice(-6);
    document.getElementById('aFormList').innerHTML = `<div style="font-weight:900; margin-bottom:10px; color:var(--p)">${m.teams.away.name} (MATCH xG)</div><div class="form-container-deep">` + aF.map((f, i) => `<div class="form-column"><div class="dot ${f}"></div><div class="form-val">${getV(c.aXG,i)}</div></div>`).join('') + `</div>`;
}

function updateTicker() {
    let filtered = lastTickerData.filter(m => selectedTickerIds.has(m.fixture.id));
    if(filtered.length === 0) { document.getElementById('liveTickerWrap').style.display = 'none'; return; }
    let h = ''; filtered.forEach(m => h += `<div class="ticker-item"><span class="live-dot"></span>${m.teams.home.name} ${m.goals.home}-${m.goals.away} ${m.teams.away.name} (${m.fixture.status.elapsed}')</div>`);
    document.getElementById('tickerContent').innerHTML = h + h; document.getElementById('liveTickerWrap').style.display = 'block';
}

function closePanel(id) { document.getElementById(id).style.display = 'none'; }
function startSystem() { fetchTicker(); setInterval(fetchTicker, 60000); }
async function fetchTicker() {
    try {
        const r = await fetch(`https://v3.football.api-sports.io/fixtures?live=all`, { headers: {"x-apisports-key": KEY} });
        const d = await r.json(); if(d.response) { lastTickerData = d.response; updateTicker(); }
    } catch(e) {}
}
window.onload = () => { if(sessionStorage.getItem("auth_v850")) { document.getElementById('authScreen').style.display='none'; document.getElementById('appContent').style.display='block'; startSystem(); } };
</script>
</body>
</html>
