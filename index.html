<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>APEX OMEGA v4714 - Live Tracker Edition</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root {
      --bg: #010409; --card: #0d1117; --card2: #0b1016;
      --border: #21262d; --border2: #30363d;
      --p: #00f2ff; --p-dim: rgba(0,242,255,0.12); --p-glow: rgba(0,242,255,0.25);
      --split-color: #fbbf24; --gold: #f59e0b; --gold-dim: rgba(245,158,11,0.12);
      --neon-live: #39ff14; --neon-dim: rgba(57,255,20,0.10);
      --alert: #da3633; --alert-dim: rgba(218,54,51,0.08);
      --txt: #f0f6fc; --txt-muted: #8b949e;
      --magenta: #ff00ff; --magenta-dim: rgba(255,0,255,0.10);
      --grad: linear-gradient(135deg, #00f2ff 0%, #8b5cf6 100%);
      --grad-gold: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
      --pick-bg: rgba(57,255,20,0.08); --pick-border: rgba(57,255,20,0.45);
      --radius: 14px; --radius-sm: 8px; --radius-pill: 999px;
      --shadow: 0 12px 40px rgba(0,0,0,0.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--txt); line-height: 1.55; -webkit-font-smoothing: antialiased; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,242,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(0,242,255,0.015) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }

    .orbitron { font-family: 'Orbitron', monospace; }
    .mono { font-family: 'Space Mono', monospace; }

    .container { max-width: 1300px; margin: 0 auto; padding: 16px; position: relative; z-index: 1; }

    /* CREDIT BAR */
    .credit-bar { background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,242,255,0.2); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; gap: 12px; }
    .credit-bar-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .credit-logo { font-family: 'Orbitron', monospace; color: var(--p); font-size: 0.75rem; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 8px var(--p-glow); }
    .credit-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--txt-muted); letter-spacing: 1px; }
    .credit-value { font-family: 'Orbitron', monospace; font-size: 0.9rem; font-weight: 900; color: var(--p); text-shadow: 0 0 8px var(--p-glow); transition: color 0.3s, text-shadow 0.3s; }
    .credit-value.low { color: var(--alert); text-shadow: 0 0 8px rgba(218,54,51,0.5); animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* AUTH */
    #auth { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 1; }
    .auth-card { background: rgba(13,17,23,0.9); border: 1px solid rgba(0,242,255,0.2); border-radius: 20px; padding: 48px 40px; max-width: 380px; width: 100%; box-shadow: 0 0 60px rgba(0,242,255,0.06), var(--shadow); text-align: center; }
    .auth-title { font-family: 'Orbitron', monospace; color: var(--p); font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 20px var(--p-glow); margin-bottom: 8px; }
    .auth-input { width: 100%; background: rgba(0,0,0,0.6); color: var(--p); border: 1px solid rgba(0,242,255,0.3); padding: 18px; font-size: 2rem; text-align: center; border-radius: var(--radius); font-family: 'Orbitron', monospace; outline: none; letter-spacing: 8px; transition: border-color 0.3s, box-shadow 0.3s; }
    .auth-input:focus { border-color: var(--p); box-shadow: 0 0 0 3px var(--p-glow); }

    /* UI PANELS & CARDS */
    .cyber-card { background: var(--card); border: 1px solid var(--border2); border-radius: var(--radius); padding: 22px; margin-bottom: 18px; border-left: 4px solid var(--p); box-shadow: var(--shadow); animation: fadeUp 0.35s ease-out both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .section-panel { background: var(--card2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 18px; box-shadow: var(--shadow); }
    .section-title { font-family: 'Orbitron', monospace; color: var(--gold); font-size: 0.78rem; font-weight: 900; margin-bottom: 14px; letter-spacing: 1.5px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }

    /* TOOLBARS & INPUTS */
    .toolbar { background: rgba(13,17,23,0.8); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
    .toolbar-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 130px; }
    .toolbar-label { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--txt-muted); letter-spacing: 1px; text-transform: uppercase; }
    .field { background: rgba(0,0,0,0.5); color: var(--p); border: 1px solid rgba(0,242,255,0.25); padding: 13px 15px; border-radius: var(--radius-sm); font-family: 'Space Mono', monospace; font-size: 0.85rem; outline: none; width: 100%; transition: border-color 0.2s; }
    .field:focus { border-color: var(--p); box-shadow: 0 0 0 3px var(--p-glow); }
    select.field option { background: #0b1016; color: #fff; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 13px 20px; background: var(--grad); color: #fff; border: none; border-radius: var(--radius-sm); font-weight: 800; font-family: 'Syne', sans-serif; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; transition: filter 0.2s, transform 0.15s; white-space: nowrap; }
    .btn:hover:not(:disabled) { filter: brightness(1.12); transform: translateY(-2px); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-danger { background: linear-gradient(135deg, #da3633, #b91c1c); }

    /* ABSOLUTE LOCK BADGES */
    .lock-badge { display: inline-block; padding: 6px 12px; border-radius: 6px; font-family: 'Orbitron', monospace; font-weight: 900; font-size: 0.75rem; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 0 15px rgba(0,0,0,0.5); animation: pulseLock 1.5s infinite; }
    .lock-o25 { background: linear-gradient(135deg, #ff4b2b, #ff416c); color: #fff; border: 1px solid #ff416c; }
    .lock-btts { background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; border: 1px solid #38ef7d; }
    @keyframes pulseLock { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

    /* OMEGA PICK */
    .omega-pick { margin-top: 5px; padding: 16px; border-radius: 10px; background: var(--pick-bg); border: 1px dashed var(--pick-border); text-align: center; position: relative; overflow: hidden; }
    .omega-pick.no-bet { background: var(--alert-dim); border-color: rgba(218,54,51,0.4); }
    .omega-pick.bomb { background: var(--magenta-dim); border-color: rgba(255,0,255,0.4); }
    .pick-label { font-family: 'Space Mono', monospace; font-size: 0.64rem; color: var(--neon-live); font-weight: 700; letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }
    .omega-pick.no-bet .pick-label { color: var(--alert); }
    .omega-pick.bomb .pick-label { color: var(--magenta); }
    .pick-value { font-family: 'Orbitron', monospace; font-size: 1.25rem; color: #fff; font-weight: 900; line-height: 1.2; text-shadow: 0 0 12px rgba(57,255,20,0.4); }
    .omega-pick.no-bet .pick-value { text-shadow: none; color: #ffb3b3; }
    .omega-pick.bomb .pick-value { text-shadow: 0 0 12px rgba(255,0,255,0.5); }
    .pick-reason { font-size: 0.77rem; color: var(--txt-muted); margin-top: 8px; line-height: 1.5; }

    /* STATS & CARDS UI */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 14px; }
    .team-box { background: rgba(0,0,0,0.35); padding: 15px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.04); }
    .stat-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 0.82rem; border-bottom: 1px solid rgba(255,255,255,0.04); padding-bottom: 7px; }
    .stat-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .val-xg { color: var(--p); font-weight: 800; font-family: 'Space Mono', monospace; font-size: 0.9rem; }
    .val-split { color: var(--split-color); font-weight: 900; font-family: 'Space Mono', monospace; border: 1px solid rgba(251,191,36,0.3); padding: 2px 7px; border-radius: 4px; background: rgba(251,191,36,0.08); font-size: 0.85rem; }
    .season-xg { color: #fff; font-weight: 900; font-family: 'Space Mono', monospace; background: var(--alert); padding: 2px 7px; border-radius: 4px; font-size: 0.82rem; }
    .dev-badge { font-size: 0.65rem; font-weight: 900; padding: 2px 6px; border-radius: 4px; margin-left: 6px; font-family: 'Space Mono', monospace; }
    .dev-pos { background: rgba(35,134,54,0.25); color: #3fb950; border: 1px solid rgba(35,134,54,0.4); }
    .dev-neg { background: rgba(218,54,51,0.2); color: #ff8c8c; border: 1px solid rgba(218,54,51,0.35); }
    .form-dot { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; font-size: 0.55rem; font-weight: 900; margin-right: 3px; color: #fff; font-family: 'Orbitron', monospace; }
    .form-W { background: #238636; } .form-D { background: #444; } .form-L { background: #da3633; }
    .score-chip { display: inline-flex; align-items: center; padding: 4px 9px; border-radius: var(--radius-pill); font-size: 0.7rem; font-weight: 700; font-family: 'Space Mono', monospace; background: var(--p-dim); color: var(--p); border: 1px solid rgba(0,242,255,0.2); }
    .standing-pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: var(--radius-pill); font-size: 0.65rem; font-weight: 900; font-family: 'Space Mono', monospace; background: var(--gold-dim); color: #ffd27a; margin-left: 6px; border: 1px solid rgba(245,158,11,0.35); }
    .match-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; margin-bottom: 14px; }
    .match-team-name { font-family: 'Orbitron', monospace; font-size: 1rem; font-weight: 900; margin: 3px 0; }
    .live-score-big { font-family: 'Orbitron', monospace; font-size: 2rem; font-weight: 900; color: var(--gold); }
    .score-live-green { color: var(--neon-live) !important; text-shadow: 0 0 12px var(--neon-live); animation: pulseScore 1.5s infinite; }
    @keyframes pulseScore { 0% { opacity:1; } 50% { opacity:0.7; } 100% { opacity:1; } }
    .scores-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-end; }
    .h2h-box { margin-top: 14px; padding: 14px; border-radius: var(--radius-sm); background: var(--gold-dim); border: 1px solid rgba(245,158,11,0.2); }
    .tip-links { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
    .tip-link { display: inline-flex; padding: 6px 12px; border-radius: var(--radius-pill); background: var(--p-dim); border: 1px solid rgba(0,242,255,0.2); color: var(--p); text-decoration: none; font-size: 0.68rem; font-weight: 700; font-family: 'Space Mono', monospace; }

    /* PREDICTION TABS */
    .pred-tabs { display: flex; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.25); }
    .pred-tabs::-webkit-scrollbar { display: none; }
    .pred-tab { display: flex; align-items: center; gap: 6px; padding: 12px 16px; border: none; background: transparent; color: var(--txt-muted); font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: color 0.2s; }
    .pred-tab.active { color: var(--tab-color, var(--p)); border-bottom-color: var(--tab-color, var(--p)); background: rgba(255,255,255,0.02); }
    .pred-tab-count { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; border-radius: var(--radius-pill); font-size: 0.65rem; font-weight: 900; font-family: 'Space Mono', monospace; color: #000; }
    .pred-tab-panel { display: none; }
    .pred-tab-panel.active { display: block; }
    .pred-list { padding: 8px; max-height: 520px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
    .pred-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid transparent; cursor: pointer; transition: background 0.15s; }
    .pred-row:hover { background: rgba(255,255,255,0.04); border-color: var(--border2); }
    .pred-row:nth-child(odd) { background: rgba(0,0,0,0.15); }
    .pred-row-rank { font-family: 'Orbitron', monospace; font-size: 0.85rem; font-weight: 900; min-width: 26px; text-align: center; }
    .pred-row-info { flex: 1; min-width: 0; }
    .pred-row-match { font-size: 0.85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pred-row-score { text-align: center; border: 1px solid; border-radius: var(--radius-sm); padding: 6px 10px; min-width: 60px; }
    .pred-row-score-val { font-family: 'Orbitron', monospace; font-size: 0.9rem; font-weight: 900; line-height: 1; }
    .pred-row-score-lbl { font-family: 'Space Mono', monospace; font-size: 0.55rem; margin-top: 3px; opacity: 0.7; }

    /* WALLBET ACCA (DOUBLES ONLY) */
    .wallbet-container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 8px; }
    .wallbet-card { flex: 1; min-width: 280px; background: linear-gradient(145deg, #0b1016, #05080c); border: 1px solid var(--neon-live); border-radius: 20px; padding: 18px; box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
    .wallbet-title { font-family: 'Orbitron', monospace; color: var(--neon-live); font-size: 1rem; font-weight: 900; display: flex; align-items: center; gap: 8px; margin-bottom: 18px; border-left: 3px solid var(--neon-live); padding-left: 12px; }
    .wallbet-leg { background: rgba(0,0,0,0.45); border-left: 3px solid var(--p); padding: 12px; margin-bottom: 12px; border-radius: 12px; cursor: pointer; transition: background 0.2s; }
    .wallbet-leg:hover { background: rgba(0,242,255,0.1); }
    .wallbet-leg-match { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--txt-muted); margin-bottom: 6px; }
    .wallbet-leg-pick { font-weight: 800; color: #fff; font-size: 0.85rem; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .wallbet-leg-conf { font-family: 'Orbitron', monospace; font-size: 0.7rem; background: var(--p-dim); padding: 2px 8px; border-radius: 20px; color: var(--p); }

    /* SUMMARY TABLE */
    .league-group-title { background: linear-gradient(90deg, var(--gold-dim), transparent); border-left: 4px solid var(--gold); padding: 10px 15px; font-family: 'Orbitron', monospace; font-weight: 900; font-size: 0.85rem; color: var(--gold); margin-top: 20px; margin-bottom: 10px; text-transform: uppercase; }
    .summary-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; text-align: center; }
    .summary-table th { background: rgba(0,0,0,0.5); padding: 8px; color: var(--txt-muted); font-family: 'Space Mono', monospace; font-size: 0.65rem; border-bottom: 1px solid var(--border); }
    .summary-table td { padding: 10px 8px; border-bottom: 1px solid var(--border2); cursor: pointer; transition: background 0.15s; }
    .summary-table tbody tr:hover { background: rgba(0,242,255,0.05); }
    .summary-table tbody tr.live-match-row { background: rgba(57,255,20,0.05); border-left: 2px solid var(--neon-live); }
    .st-match { text-align: left; font-weight: bold; font-size: 0.8rem; }

    /* AUDIT TABLE */
    .audit-wrap { overflow-x: auto; border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .audit-table { width: 100%; border-collapse: collapse; min-width: 1100px; font-size: 0.78rem; }
    .audit-table th, .audit-table td { border-bottom: 1px solid var(--border); padding: 9px 10px; text-align: center; vertical-align: middle; }
    .audit-table th { color: var(--gold); font-family: 'Space Mono', monospace; font-size: 0.65rem; background: rgba(0,0,0,0.4); position: sticky; top: 0; z-index: 2;}
    .audit-hit { color: var(--neon-live); font-weight: 700; background: rgba(57,255,20,0.05); }
    .audit-miss { color: #ff8c8c; font-weight: 700; background: rgba(255,68,68,0.05); }

    /* PROGRESS */
    .progress-wrap { margin-bottom: 18px; }
    .progress-bar-bg { background: rgba(255,255,255,0.06); height: 6px; border-radius: 3px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--grad); transition: width 0.3s; border-radius: 3px; }
    .progress-status { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--p); margin-top: 6px; display: flex; justify-content: space-between; }

    @media (max-width: 680px) {
      .stats-grid { grid-template-columns: 1fr; }
      .match-header { flex-direction: column; }
      .wallbet-container { flex-direction: column; }
      .scores-row { justify-content: flex-start; }
      .summary-table th:nth-child(3), .summary-table td:nth-child(3),
      .summary-table th:nth-child(4), .summary-table td:nth-child(4),
      .summary-table th:nth-child(5), .summary-table td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

  <div class="credit-bar">
    <div class="credit-bar-left">
      <div class="credit-logo">APEX OMEGA</div>
      <div>
        <div class="credit-label">API CREDITS</div>
        <div id="creditDisplay" class="credit-value mono">— SYNC —</div>
      </div>
    </div>
  </div>

  <div id="auth">
    <div class="auth-card">
      <div class="auth-title">APEX OMEGA</div>
      <div class="auth-sub">v4714 · Live Tracker Edition</div>
      <input type="password" id="pin" class="auth-input" placeholder="• • • •" maxlength="8">
      <div id="authError" style="margin-top:12px; font-size:0.75rem; color:var(--alert); min-height:18px;"></div>
    </div>
  </div>

  <div id="app" style="display:none;">
    <div class="container">
      
      <div class="toolbar">
        <div class="toolbar-group">
          <div class="toolbar-label">Ημ/νία Έναρξης</div>
          <input type="date" id="scanStart" class="field">
        </div>
        <div class="toolbar-group">
          <div class="toolbar-label">Ημ/νία Λήξης</div>
          <input type="date" id="scanEnd" class="field">
        </div>
        <div class="toolbar-group" style="flex:2;">
          <div class="toolbar-label">Διοργάνωση</div>
          <select id="leagueFilter" class="field">
            <option value="ALL">🌐 Βασικές Διοργανώσεις (Top 24)</option>
            <option value="WORLD">🌍 ΟΛΟ ΤΟ ΚΟΥΠΟΝΙ (Όλος ο Κόσμος)</option>
          </select>
        </div>
        <div class="toolbar-group" style="flex:0;">
          <div class="toolbar-label">&nbsp;</div>
          <button class="btn" id="btnPre" onclick="runScan()">🚀 BATCH SCAN</button>
        </div>
      </div>

      <div class="section-panel" style="background: rgba(0,242,255,0.03); border: 1px dashed rgba(0,242,255,0.2);">
        <div class="section-title">🗄️ DATA VAULT & 4-PILLAR AUDIT</div>
        <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center;">
          <input type="date" id="auditStart" class="field" style="flex:1; min-width:120px;">
          <input type="date" id="auditEnd" class="field" style="flex:1; min-width:120px;">
          <select id="auditLeague" class="field" style="flex:1; min-width:140px;">
            <option value="ALL">🌐 Όλες οι Λίγκες</option>
          </select>
          <button class="btn" style="background: linear-gradient(135deg, #7c3aed, #9f67ff);" onclick="runCustomAudit()">📊 RUN AUDIT</button>
          <button class="btn" style="background: linear-gradient(135deg, #10b981, #34d399);" onclick="exportData()">⬇️ JSON</button>
          <label class="btn" style="background: linear-gradient(135deg, #3b82f6, #60a5fa); cursor:pointer;">
            ⬆️ IMPORT <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(event)">
          </label>
          <button class="btn btn-danger" onclick="clearVault()">🗑️ CLEAR</button>
        </div>
      </div>

      <div id="errorBox"></div>
      <div id="successBox"></div>

      <div id="loader" style="display:none;" class="progress-wrap">
        <div class="progress-bar-bg"><div id="bar" class="progress-bar" style="width:0%"></div></div>
        <div class="progress-status"><span id="status" class="mono"></span></div>
      </div>

      <div id="topSection"></div>
      
      <div id="wallbetSection"></div>
      
      <div id="summarySection"></div>
      
      <div id="feedFilterSection" style="display:none; margin-top:20px;">
        <div class="section-panel" style="border-color:var(--p); background: rgba(0,242,255,0.03); padding:14px;">
          <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
            <div class="section-title" style="margin:0; color:var(--p);">⚽ FEED ΑΓΩΝΩΝ (<span id="feedCount">0</span>)</div>

  <script>
    // --- CONFIG ---
    const API_KEY = "956cbd05f9e9bf934df78d9b72d9a3a0";

    const LEAGUES_DATA = [
      {id:2,name:"🏆 Champions League"},{id:3,name:"🏆 Europa League"},{id:848,name:"🏆 Conference League"},

      {id:78,name:"🇩🇪 Bundesliga"},{id:79,name:"🇩🇪 2. Bundesliga"},{id:61,name:"🇫🇷 Ligue 1"},{id:62,name:"🇫🇷 Ligue 2"},

    const GOLD_LEAGUES = new Set([78,262,88,253]); 

    let statsCache = new Map(), teamStatsCache = new Map(), lastFixCache = new Map(), standCache = new Map(), h2hCache = new Map();
    let isRunning = false, currentCredits = null;
    let latestTopLists = { exact:[], combo1:[], combo2:[], outcomes:[], over25:[], over35:[] };

    // --- AUTH & CREDITS ---

    function updateCredits(v) { const el = document.getElementById('creditDisplay'); if (v !== null) { el.textContent = v; el.className = `credit-value mono ${v < 50 ? 'low' : ''}`; } }

    async function apiReq(path) { await sleep(REQ_DELAY); try { const r = await fetch(`${API_BASE}/${path}`, { headers:{'x-apisports-key': API_KEY} }); if (typeof currentCredits === 'number') { currentCredits--; updateCredits(currentCredits); } if (!r.ok) return { response:[] }; return await r.json(); } catch { return { response:[] }; } }

    // --- UTILS ---
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    const clamp = (n, mn, mx) => Math.max(mn, Math.min(mx, n));
    const isLive = s => ["1H","2H","HT","LIVE","ET","BT","P"].includes(s);
    const isFinished = s => ["FT","AET","PEN"].includes(s);

    const todayISO = () => new Date().toISOString().split('T')[0];

    function setLoader(show, text='') { document.getElementById('loader').style.display = show ? 'block' : 'none'; document.getElementById('status').textContent = text; if (!show) document.getElementById('bar').style.width = '0%'; }
    function setProgress(pct, text='') { document.getElementById('bar').style.width = Math.round(clamp(pct,0,100)) + '%'; document.getElementById('status').textContent = text; }

    function showErr(msg) { document.getElementById('errorBox').innerHTML = `<div class="alert-box alert-error" style="background:var(--alert-dim); border:1px solid var(--alert); color:#ffb3b3; padding:12px; border-radius:8px; margin-bottom:15px;">⚠️ ${esc(msg)}</div>`; }
    function showOk(msg) { document.getElementById('successBox').innerHTML = `<div class="alert-box alert-success" style="background:rgba(35,134,54,0.08); border:1px solid #238636; color:#b7f7c4; padding:12px; border-radius:8px; margin-bottom:15px;">✅ ${esc(msg)}</div>`; setTimeout(() => document.getElementById('successBox').innerHTML='', 4000); }
    function clearAlerts() { document.getElementById('errorBox').innerHTML = ''; document.getElementById('successBox').innerHTML = ''; }

    function getPredStore() { try { return JSON.parse(localStorage.getItem(LS_PREDICTIONS) || "[]"); } catch { return []; } }
    function savePredStore(data) { localStorage.setItem(LS_PREDICTIONS, JSON.stringify(data)); }
    function upsertPrediction(record) { const store = getPredStore(); const idx = store.findIndex(x => String(x.fixtureId) === String(record.fixtureId)); if (idx >= 0) store[idx] = record; else store.push(record); savePredStore(store); updateAuditLeagueFilter(); }
    function exportData() { const d = getPredStore(); if(d.length===0) { showErr("Δεν υπάρχουν δεδομένα."); return; } const blob = new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `omega_vault_${todayISO()}.json`; a.click(); URL.revokeObjectURL(url); showOk("Εξαγωγή επιτυχής!"); }
    function importData(e) { const file = e.target.files[0]; if(!file) return; const r = new FileReader(); r.onload = function(ev) { try { const imp = JSON.parse(ev.target.result); if(Array.isArray(imp)) { const store = getPredStore(); const map = new Map(store.map(x => [String(x.fixtureId), x])); imp.forEach(it => { if(it.fixtureId) map.set(String(it.fixtureId), it); }); savePredStore(Array.from(map.values())); showOk(`Εισήχθησαν ${imp.length} προβλέψεις.`); updateAuditLeagueFilter(); } } catch { showErr("Λάθος μορφή αρχείου."); } }; r.readAsText(file); }
    function clearVault() { if(confirm("Είσαι σίγουρος ότι θέλεις να διαγράψεις ΟΛΑ τα δεδομένα από το Data Vault;")) { localStorage.removeItem(LS_PREDICTIONS); showOk("Η μνήμη καθάρισε! Έτοιμο για νέο Scan."); updateAuditLeagueFilter(); } }

    function updateAuditLeagueFilter() {
        const store = getPredStore(); const leagues = new Set(store.map(x => x.leagueId)); const sel = document.getElementById('auditLeague');
        sel.innerHTML = '<option value="ALL">🌐 Όλες οι Λίγκες</option>';
        LEAGUES_DATA.forEach(l => { if(leagues.has(l.id)) sel.innerHTML += `<option value="${l.id}">${l.name}</option>`; });
        const knownIds = new Set(LEAGUE_IDS);
        store.forEach(x => { if(!knownIds.has(x.leagueId) && x.leagueId) sel.innerHTML += `<option value="${x.leagueId}">${x.league}</option>`; knownIds.add(x.leagueId); });
    }

    async function getTStats(t, lg, s) { const k=`${t}_${lg}_${s}`; if(teamStatsCache.has(k)) return teamStatsCache.get(k); const d=await apiReq(`teams/statistics?team=${t}&league=${lg}&season=${s}`); teamStatsCache.set(k,d?.response||{}); return d?.response||{}; }
    async function getLFix(t, lg, s) { const k=`${t}_${lg}_${s}`; if(lastFixCache.has(k)) return lastFixCache.get(k); const d=await apiReq(`fixtures?team=${t}&league=${lg}&season=${s}&last=20&status=FT`); lastFixCache.set(k,d?.response||[]); return d?.response||[]; }
    async function getStand(lg, s) { const k=`${lg}_${s}`; if(standCache.has(k)) return standCache.get(k); const d=await apiReq(`standings?league=${lg}&season=${s}`); const f=Array.isArray(d?.response?.[0]?.league?.standings)?d.response[0].league.standings.flat():[]; standCache.set(k,f); return f; }
    async function getHeadToHead(t1, t2, lg, s) { const k=`${t1}_${t2}_${lg||'a'}_${s||'a'}`; if(h2hCache.has(k)) return h2hCache.get(k); let path=`fixtures/headtohead?h2h=${t1}-${t2}`; if(lg&&s) path+=`&league=${lg}&season=${s}`; const d=await apiReq(path); h2hCache.set(k,d?.response||[]); return d?.response||[]; }
    
    const getTeamRank = (standings, tId) => { if(!Array.isArray(standings)) return null; const row=standings.find(x=>String(x?.team?.id)===String(tId)); return row?.rank??null; };
    const getTeamGoals = (f, t) => f?.teams?.home?.id===t ? (f?.goals?.home??0) : (f?.goals?.away??0);
    const getOppGoals = (f, t) => f?.teams?.home?.id===t ? (f?.goals?.away??0) : (f?.goals?.home??0);
    const statVal = (arr, type) => parseFloat(String((arr.find(x=>x.type===type)||{}).value||0).replace('%',''))||0;

    function getFormHistory(fixtures, teamId) { return fixtures.map(f => { const my = getTeamGoals(f,teamId), op = getOppGoals(f,teamId); return my > op ? {res:'Ν',cls:'W'} : (my < op ? {res:'Η',cls:'L'} : {res:'Ι',cls:'D'}); }).reverse(); }
    function devBadge(curr, base) { if(!base || base <= 0) return `<span class="dev-badge">N/A</span>`; const d = (((parseFloat(curr)-base)/base)*100).toFixed(1); return `<span class="dev-badge ${d>=0?'dev-pos':'dev-neg'}">${d>0?'+':''}${d}%</span>`; }
    function estXG(arr, g=0) { return (statVal(arr,'Shots on Goal')*0.19)+(statVal(arr,'Shots off Goal')*0.07)+(statVal(arr,'Corner Kicks')*0.028)+(g*0.30)||0.65+g*0.32; }
    
    async function batchCalc(list, tId) { 
      if(!list.length) return {xg:'0.00',xga:'0.00',cor:'0.0',crd:'0.0'}; 
      let x=0,xa=0,c=0,cr=0,n=0; 
      for(const f of list) { 
        const st = await apiReq(`fixtures/statistics?fixture=${f.fixture.id}`); 
        if(!st?.response||st.response.length<2) continue; 
        const my = st.response.find(z=>z.team.id===tId)?.statistics||[]; const op = st.response.find(z=>z.team.id!==tId)?.statistics||[]; 
        x += (statVal(my,'Expected Goals') || estXG(my, getTeamGoals(f,tId))); 
        xa += (statVal(op,'Expected Goals') || estXG(op, getOppGoals(f,tId))); 
        c += statVal(my,'Corner Kicks'); cr += statVal(my,'Yellow Cards') + statVal(my,'Red Cards'); n++; 
      } 
      return { xg:n>0?(x/n).toFixed(2):'0.00', xga:n>0?(xa/n).toFixed(2):'0.00', cor:n>0?(c/n).toFixed(1):'0.0', crd:n>0?(cr/n).toFixed(1):'0.0' }; 
    }

    async function buildIntel(tId, lg, s, isHome) { 
      const [ss, allFix] = await Promise.all([getTStats(tId,lg,s), getLFix(tId,lg,s)]); 
      const gen = allFix.slice(0,6); const split = allFix.filter(f=>(isHome?f.teams.home.id:f.teams.away.id)===tId).slice(0,6); 
      const [fData, sData] = await Promise.all([batchCalc(gen,tId), batchCalc(split,tId)]); 
      const baseXG = parseFloat(ss?.goals?.for?.average?.total)||1.10; const baseXGA = parseFloat(ss?.goals?.against?.average?.total)||1.10; 
      return { fXG:safeNum(fData.xg), fXGA:safeNum(fData.xga), sXG:safeNum(sData.xg), sXGA:safeNum(sData.xga), cor:safeNum(fData.cor), crd:safeNum(fData.crd), scrd:safeNum(sData.crd), uiXG: fData.xg, uiXGA: fData.xga, uiDevXG: devBadge(fData.xg, baseXG), uiDevXGA: devBadge(fData.xga, baseXGA), uiSXG: sData.xg, uiSXGA: sData.xga, uiSeasXG: baseXG.toFixed(2), uiSeasXGA: baseXGA.toFixed(2), history: getFormHistory(gen, tId) }; 
    }
    
    function summarizeH2H(fixtures, homeId, awayId) { let hw=0,aw=0,dr=0,gh=0,ga=0,last=[]; for(const f of fixtures.slice(0,8)) { const hg=f?.goals?.home??0, ag=f?.goals?.away??0; const myG=f?.teams?.home?.id===homeId?hg:ag; const opG=f?.teams?.home?.id===awayId?hg:ag; gh+=myG; ga+=opG; if(myG>opG) hw++; else if(opG>myG) aw++; else dr++; last.push(`${myG}-${opG}`); } return {homeWins:hw,awayWins:aw,draws:dr,goalsHome:gh,goalsAway:ga,lastResults:last}; }

            <div class="match-team-name">${esc(d.ht)} ${d.hr!==99?`<span class="standing-pill">#${d.hr}</span>`:''}</div>

          <div class="team-box"><div class="stat-row"><span class="stat-key">Σύνολο Κόρνερ</span><span class="val-split">${d.totCors.toFixed(1)}</span></div><div class="stat-row"><span class="stat-key">Προβλ. Κόρνερ</span><span class="val-xg">${d.hCors} - ${d.aCors}</span></div></div>
        </div>

        <div class="h2h-box">

          <div style="display:flex; justify-content:space-between; text-align:center; margin-bottom:10px;">
             <div><div style="font-family:'Orbitron'; font-size:1.1rem; font-weight:900;">${d.h2h.homeWins}</div><div style="font-size:0.65rem; color:var(--txt-muted);">1 Νίκες</div></div>

          </div>
          <div class="team-box">
            <div style="font-family:'Space Mono'; font-size:0.72rem; font-weight:700; margin-bottom:12px; color:var(--magenta);">✈️ ${esc(d.at)}</div>
            <div style="margin-bottom:10px;">${d.aS.history.map(f=>`<span class="form-dot form-${f.cls}">${f.res}</span>`).join('')}</div>
            <div class="stat-row"><span class="stat-key">xG (Φόρμα)</span><div><span class="val-xg">${d.aS.uiXG}</span>${d.aS.uiDevXG}</div></div>

    function buildTipLinks(h,a) { const q=encodeURIComponent(`${h} vs ${a}`); return { forebet:`https://www.google.com/search?q=site:forebet.com+${q}`, windrawwin:`https://www.google.com/search?q=site:windrawwin.com+${q}` }; }

    // --- MAIN BATCH ENGINE ---
    async function runScan() {
      if(isRunning) return; isRunning=true; clearAlerts(); setBtnsDisabled(true); setLoader(true,'ΑΝΑΖΗΤΗΣΗ ΑΓΩΝΩΝ...');
      document.getElementById('topSection').innerHTML=''; document.getElementById('summarySection').innerHTML=''; document.getElementById('matchesFeed').innerHTML=''; document.getElementById('auditSection').innerHTML=''; document.getElementById('wallbetSection').innerHTML=''; document.getElementById('feedFilterSection').style.display='none';
      window.scannedMatchesData = [];
      
      try {
        const start = document.getElementById('scanStart').value || todayISO(); const end = document.getElementById('scanEnd').value || start; const selLg = document.getElementById('leagueFilter').value;
        const dates = getDatesInRange(start, end); let allMatches = [];
        
        for(let i=0; i<dates.length; i++) { 
          setProgress((i/dates.length)*10, `Λήψη Κουπονιού ${dates[i]}`); 
          const res = await apiReq(`fixtures?date=${dates[i]}`); 
          const dm = (res.response||[]).filter(m => { if (selLg === 'WORLD') return true; if (selLg === 'ALL') return LEAGUE_IDS.includes(m.league.id); return m.league.id === parseInt(selLg); }); 
          allMatches.push(...dm); 
          if(allMatches.length > 350) break;
        }
        
        if(!allMatches.length) { showErr('Δεν βρέθηκαν αγώνες στο επιλεγμένο διάστημα.'); isRunning=false; setBtnsDisabled(false); setLoader(false); return; }
        if(allMatches.length > 350) { showOk(`Βρέθηκαν πάρα πολλοί αγώνες. Θα αναλυθούν οι πρώτοι 350.`); allMatches = allMatches.slice(0, 350); }
        
        const scored = [];
        for(let i=0; i<allMatches.length; i++) {
          const m = allMatches[i]; setProgress(10 + ((i+1)/allMatches.length)*90, `(${i+1}/${allMatches.length}) ${m.teams.home.name}`);
          const [hS, aS, stand, h2hFix] = await Promise.all([buildIntel(m.teams.home.id, m.league.id, m.league.season, true), buildIntel(m.teams.away.id, m.league.id, m.league.season, false), getStand(m.league.id, m.league.season), getHeadToHead(m.teams.home.id, m.teams.away.id, m.league.id, m.league.season)]);

          let omegaPick = "⚖️ NO BET", reason = "Ανεπαρκές μαθηματικό πλεονέκτημα.", pickScore = 0;

    // --- LIVE SYNC BUTTON LOGIC ---
    window.syncLiveScores = async function() {
      if(isRunning) return;
      const btn = document.getElementById('btnSyncLive');
      if(btn) btn.innerText = '🔄 SYNCING...';
      
      try {
        const res = await apiReq('fixtures?live=all');
        const liveFixs = res.response || [];
        const liveMap = new Map();
        liveFixs.forEach(f => liveMap.set(f.fixture.id, f));
        
        let updated = 0;
        window.scannedMatchesData.forEach(d => {
          if(liveMap.has(d.fixId)) {
            const liveData = liveMap.get(d.fixId);
            d.m.goals = liveData.goals;
            d.m.fixture.status = liveData.fixture.status;
            updated++;
          }
        });
        
        // Re-render summary and feed to show green live scores
        if(updated > 0) {
            renderSummaryTable();
            window.filterFeed();
            showOk(`Ανανεώθηκαν τα σκορ σε ${updated} ζωντανά ματς!`);
        } else {
            showOk(`Δεν βρέθηκαν ζωντανά ματς από αυτά που έχετε σκανάρει.`);
        }
      } catch(e) {
        showErr("Σφάλμα ανανέωσης live: " + e.message);
      } finally {
        if(btn) btn.innerText = '🔄 SYNC LIVE (1 Credit)';
      }

        let feedHtml = '';
        let visibleCount = 0;
        
        window.scannedMatchesData.forEach(d => {
            let show = false;
            const pick = d.omegaPick;

            else if(filter === 'O25' && pick.includes('OVER 2.5')) show = true;
            else if(filter === 'O35' && pick.includes('OVER 3.5')) show = true;
            else if(filter === 'BTTS' && pick.includes('GOAL/GOAL')) show = true;
            else if(filter === 'COR' && pick.includes('ΚΟΡΝΕΡ')) show = true;
            else if(filter === 'BOMB' && pick.includes('ΒΟΜΒΑ')) show = true;
            else if(filter === 'UNDER' && pick.includes('UNDER')) show = true;

            if(show) { feedHtml += getMatchCardHTML(d); visibleCount++; }

      if(legsAccA.length >= 2) wallHtml += `<div class="wallbet-card"><div class="wallbet-title"><span>⚡ PREMIUM PARLAY</span><span class="wallbet-badge" style="background:rgba(57,255,20,0.1); color:var(--neon-live);">Ασφαλές</span></div>${legsAccA.map(leg => `<div class="wallbet-leg" onclick="scrollToMatch('card-${leg.match.fixId}')" style="cursor:pointer;"><div class="wallbet-leg-match">${leg.match.ht} vs ${leg.match.at}</div><div class="wallbet-leg-pick"><span>🎲 ${leg.pickDesc}</span></div></div>`).join('')}</div>`;
      if(legsAccB.length >= 2) wallHtml += `<div class="wallbet-card"><div class="wallbet-title"><span>🎯 EXACT EDGE</span><span class="wallbet-badge" style="background:rgba(218,54,51,0.1); color:var(--alert);">Υψηλό Ρίσκο</span></div>${legsAccB.map(leg => `<div class="wallbet-leg" onclick="scrollToMatch('card-${leg.match.fixId}')" style="cursor:pointer;"><div class="wallbet-leg-match">${leg.match.ht} vs ${leg.match.at}</div><div class="wallbet-leg-pick"><span>🎯 ${leg.pickDesc}</span></div></div>`).join('')}</div>`;
      if(legsAccA.length < 2 && legsAccB.length < 2) wallHtml += `<div style="text-align:center; padding:20px; width:100%; color:var(--txt-muted);">⚠️ Μη επαρκείς αυστηρές επιλογές.</div>`;
      wallHtml += `</div></div>`; wallDiv.innerHTML = wallHtml;
    }

    async function runCustomAudit() {
      if(isRunning) return;
      const s = document.getElementById('auditStart').value; const e = document.getElementById('auditEnd').value; const lgFilter = document.getElementById('auditLeague').value;
      if(!s||!e){ showErr('Επίλεξε ημερομηνίες για Audit.'); return; }
      isRunning=true; clearAlerts(); setBtnsDisabled(true); setLoader(true,'AUDIT & AI CALIBRATION...');
      document.getElementById('topSection').innerHTML=''; document.getElementById('summarySection').innerHTML=''; document.getElementById('matchesFeed').innerHTML=''; document.getElementById('wallbetSection').innerHTML=''; document.getElementById('feedFilterSection').style.display='none';
      
      try {
        const endD = new Date(e); endD.setDate(endD.getDate()+1);
        const store = getPredStore();
        let cands = store.filter(x => { const d = new Date(x.date); return d >= new Date(s) && d < endD; });
        if(lgFilter !== 'ALL') cands = cands.filter(x => String(x.leagueId) === lgFilter);
        if(!cands.length) { document.getElementById('auditSection').innerHTML = `<div class="section-panel">Δεν υπάρχουν αποθηκευμένες προβλέψεις.</div>`; return; }

        let rows = [], stats = { games:0, outHit:0, o25Tot:0, o25Hit:0, o35Tot:0, o35Hit:0, exHit:0 };
        
        for(let i=0; i<cands.length; i++) {
          const p = cands[i]; setProgress(Math.round(((i+1)/cands.length)*100), `AUDIT: ${p.homeTeam}`);
          const fr = await apiReq(`fixtures?id=${p.fixtureId}`); const fix = fr?.response?.[0];
          if(!fix || !isFinished(fix?.fixture?.status?.short)) continue;
          
          const ah = safeNum(fix.goals.home), aa = safeNum(fix.goals.away);
          const atot = ah+aa; const aExact = `${ah}-${aa}`; const aOut = ah > aa ? '1' : (ah < aa ? '2' : 'X');
          const pOut = p.outPick || '-'; const pEx = p.exactScorePred || '-'; const pOmega = p.omegaPick || '-';

          const hitOut = pOut === aOut; 
          const hitEx = pEx === aExact;
          
          stats.games++; 
          if(hitOut && pOut !== 'X') stats.outHit++; 
          if(hitEx) stats.exHit++;
          if(p.predOver25) { stats.o25Tot++; if(atot > 2.5) stats.o25Hit++; }
          if(p.predOver35) { stats.o35Tot++; if(atot > 3.5) stats.o35Hit++; }
          
          rows.push({ date: p.date.slice(0,10), lg: p.league, match: `${p.homeTeam} vs ${p.awayTeam}`, pOut, aOut, hitOut, pO25: p.predOver25, aO25: atot>2.5, pO35: p.predOver35, aO35: atot>3.5, pEx, aEx: aExact, hitEx, omega: pOmega });
        }

        if(!stats.games) { document.getElementById('auditSection').innerHTML = `<div class="section-panel">Δεν βρέθηκαν ολοκληρωμένοι αγώνες.</div>`; return; }

        const validOutGames = rows.filter(r => r.pOut === '1' || r.pOut === '2').length;
        const outRate = validOutGames > 0 ? ((stats.outHit/validOutGames)*100).toFixed(1) : 0;
        const o25Rate = stats.o25Tot>0 ? ((stats.o25Hit/stats.o25Tot)*100).toFixed(1) : 0;
        const o35Rate = stats.o35Tot>0 ? ((stats.o35Hit/stats.o35Tot)*100).toFixed(1) : 0;
        const exRate = ((stats.exHit/stats.games)*100).toFixed(1);

        let suggestions = [];
        if(parseFloat(outRate) < 80 && validOutGames > 0) suggestions.push(`📉 <b>ΣΗΜΕΙΑ (1X2):</b> Win Rate ${outRate}%. Αύξηση xG Diff σε > 0.85.`);
        if(parseFloat(o25Rate) < 80 && stats.o25Tot > 0) suggestions.push(`📉 <b>OVER 2.5:</b> Ποσοστό ${o25Rate}%. Αύξηση ελάχιστου Total xG στο 2.95.`);
        if(parseFloat(o35Rate) < 70 && stats.o35Tot > 0) suggestions.push(`📉 <b>OVER 3.5:</b> Ποσοστό ${o35Rate}%. Αυστηρότερο φίλτρο απαιτείται.`);
        if(parseFloat(exRate) < 15) suggestions.push(`📉 <b>ΑΚΡΙΒΕΣ ΣΚΟΡ:</b> Ποσοστό ${exRate}%. Προσαρμογή Poisson σε Tight Leagues.`);

        let sugHtml = suggestions.length ? `<div style="background:var(--alert-dim); border:1px solid var(--alert); padding:15px; border-radius:8px; margin-bottom:15px;"><div style="color:var(--gold); font-weight:bold; margin-bottom:8px;">🤖 AUTO-CALIBRATION: ΠΡΟΤΑΣΕΙΣ ΓΙΑ ${lgFilter==='ALL'?'ΟΛΕΣ ΤΙΣ ΛΙΓΚΕΣ':rows[0].lg}</div><ul style="font-size:0.8rem; margin-left:15px; color:#ddd;">${suggestions.map(s=>`<li style="margin-bottom:5px;">${s}</li>`).join('')}</ul></div>` : `<div style="background:rgba(35,134,54,0.1); border:1px solid #238636; padding:15px; border-radius:8px; margin-bottom:15px; color:#b7f7c4; font-weight:bold;">🤖 AUTO-CALIBRATION: Ο αλγόριθμος λειτουργεί τέλεια στα επιθυμητά όρια!</div>`;

        document.getElementById('auditSection').innerHTML = `
          <div class="section-panel">
            <div class="section-title">📊 4-PILLAR AUDIT & AI CALIBRATION (${s} έως ${e})</div>
            <div style="font-size:0.75rem; color:var(--txt-muted); margin-bottom:15px;">Ελεγμένοι Αγώνες: ${stats.games}</div>
            
            <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:15px; text-align:center;">
              <div style="background:rgba(0,0,0,0.4); padding:10px; border-radius:8px;"><div style="color:#3b82f6;font-weight:bold;font-size:1.2rem;">${outRate}%</div><div style="font-size:0.6rem;color:#888;">ΣΗΜΕΙΟ HIT RATE</div></div>
              <div style="background:rgba(0,0,0,0.4); padding:10px; border-radius:8px;"><div style="color:var(--p);font-weight:bold;font-size:1.2rem;">${o25Rate}%</div><div style="font-size:0.6rem;color:#888;">OVER 2.5 HIT RATE</div></div>
              <div style="background:rgba(0,0,0,0.4); padding:10px; border-radius:8px;"><div style="color:#a78bfa;font-weight:bold;font-size:1.2rem;">${o35Rate}%</div><div style="font-size:0.6rem;color:#888;">OVER 3.5 HIT RATE</div></div>
              <div style="background:rgba(0,0,0,0.4); padding:10px; border-radius:8px;"><div style="color:var(--neon-live);font-weight:bold;font-size:1.2rem;">${exRate}%</div><div style="font-size:0.6rem;color:#888;">EXACT HIT RATE</div></div>
            </div>

            ${sugHtml}

            <div class="audit-wrap"><table class="audit-table" style="min-width:1100px;">
              <thead><tr><th>Ημ/νία</th><th>Ματς</th><th>Σημείο (P-A)</th><th>O2.5 (P-A)</th><th>O3.5 (P-A)</th><th>Exact (P-A)</th><th>Τελική Πρόταση (Omega)</th></tr></thead>
              <tbody>${rows.map(r=>`<tr>
                <td>${r.date}</td><td>${esc(r.match)}</td>
                <td class="${r.pOut==='-'?'':(r.pOut==='X'?'':(r.hitOut?'audit-hit':'audit-miss'))}">${r.pOut} | ${r.aOut}</td>
                <td style="color:${r.pO25===r.aO25&&r.pO25?'var(--neon-live)':(r.pO25?'#ff4444':'#666')}">${r.pO25?'Y':'N'} | ${r.aO25?'Y':'N'}</td>
                <td style="color:${r.pO35===r.aO35&&r.pO35?'var(--neon-live)':(r.pO35?'#ff4444':'#666')}">${r.pO35?'Y':'N'} | ${r.aO35?'Y':'N'}</td>
                <td class="${r.pEx==='-'?'':(r.hitEx?'audit-hit':'audit-miss')}">${r.pEx} | ${r.aEx}</td>
                <td style="font-size:0.7rem;">${r.omega}</td>
              </tr>`).join('')}</tbody>
            </table></div>
          </div>`;
          showOk(`Το Audit ολοκληρώθηκε.`);
      } catch(e) { showErr(e.message); } finally { isRunning=false; setLoader(false); setBtnsDisabled(false); }
    }

    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('scanStart').value = todayISO();
      document.getElementById('scanEnd').value = todayISO();
      const d30 = new Date(); d30.setDate(d30.getDate()-15);
      document.getElementById('auditStart').value = d30.toISOString().split('T')[0];
      document.getElementById('auditEnd').value = todayISO();
      updateAuditLeagueFilter();
    });
  </script>
</body>
</html>
