<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Predictor Pro v2400 - Quantum Apex</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #020408; --card: #0a0f1a; --border: #1e293b; 
            --p: #00f2ff; --magenta: #ff00ff; --txt: #f1f5f9; --txt-muted: #64748b; 
            --gold: #f59e0b; --orange-grad: linear-gradient(135deg, #f59e0b, #ef4444);
            --live: #10b981; --alert: #f43f5e;
            --value: #8b5cf6; --grad: linear-gradient(135deg, #00f2ff, #8b5cf6);
            --ticker-speed: 25s;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 0; font-size: 16px; overflow-x: hidden; }
        h1, h2, .league-header, .stat-font { font-family: 'Orbitron', sans-serif; }
        .container { width: 100%; max-width: 1000px; margin: 0 auto; padding: 15px; }

        /* 🟢 QUANTUM HEADER & TICKER */
        .header-sticky { position: sticky; top: 0; z-index: 1000; background: rgba(2, 4, 8, 0.98); backdrop-filter: blur(20px); border-bottom: 2px solid var(--p); }
        .ticker-controls { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; font-size: 0.7rem; font-weight: 900; background: #000; color: var(--p); border-bottom: 1px solid #111; }
        .ticker-wrap { width: 100%; overflow: hidden; white-space: nowrap; padding: 12px 0; display: none; background: rgba(0,242,255,0.05); }
        .ticker-move { display: inline-block; animation: ticker var(--ticker-speed) linear infinite; }
        .ticker-item { display: inline-block; padding: 0 1.5rem; font-weight: 800; font-size: 0.85rem; border-right: 1px solid var(--border); color: #fff; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* 🛡️ MISSION CARDS */
        .cyber-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .league-header { background: var(--orange-grad); color: #000; padding: 12px 20px; border-radius: 10px; font-weight: 900; margin: 30px 0 15px; font-size: 0.8rem; text-transform: uppercase; box-shadow: 0 0 20px rgba(245,158,11,0.2); }

        /* ⚽ QUANTUM MATCH CARDS */
        .match-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; margin-bottom: 18px; cursor: pointer; transition: 0.3s; position: relative; border-left: 4px solid transparent; }
        .match-card:hover { border-color: var(--p); border-left-color: var(--p); transform: translateX(5px); }
        .card-top { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .score-box { font-size: 2.4rem; font-weight: 900; color: #fff; font-family: 'Orbitron'; text-shadow: 0 0 20px rgba(0,242,255,0.4); }
        
        .live-pulse { color: var(--live); font-weight: 900; animation: blink 1.2s infinite; font-size: 0.75rem; display: flex; align-items: center; gap: 6px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* 🏆 APEX SLIPS */
        .acca-slip { background: linear-gradient(160deg, #0f172a 0%, #020617 100%); border: 2px solid var(--magenta); border-radius: 30px; padding: 30px; margin-bottom: 40px; box-shadow: 0 30px 70px rgba(0,0,0,0.8); position: relative; }
        .acca-slip::after { content: 'QUANTUM SELECTION'; position: absolute; top: -15px; right: 30px; background: var(--magenta); color: #fff; padding: 4px 12px; border-radius: 8px; font-size: 0.6rem; font-weight: 900; font-family: 'Orbitron'; }
        .slip-item { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }

        /* 📊 DATA GAUGES */
        .gauge-container { margin: 15px 0; }
        .gauge-label { display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 900; margin-bottom: 6px; color: var(--p); font-family: 'Orbitron'; }
        .gauge-bg { background: #000; height: 12px; border-radius: 50px; overflow: hidden; border: 1px solid #111; }
        .gauge-fill { height: 100%; border-radius: 50px; transition: 1.5s cubic-bezier(0.1, 0.9, 0.2, 1); }

        /* 🟢 ANALYTICS TABLE */
        .intel-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.8rem; }
        .intel-table th { color: var(--p); text-align: left; padding: 10px; border-bottom: 1px solid var(--border); }
        .intel-table td { padding: 12px 10px; border-bottom: 1px solid #0f172a; font-weight: 700; }

        /* 🕒 FORM DOTS */
        .form-row { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .dot { width: 15px; height: 15px; border-radius: 50%; border: 1px solid #fff; }
        .dot.W { background: var(--live); box-shadow: 0 0 10px var(--live); } .dot.D { background: var(--gold); } .dot.L { background: var(--alert); }
        .form-val { font-size: 0.6rem; color: var(--txt-muted); font-weight: 900; margin-top: 4px; text-align: center; }

        /* 📅 CALENDAR */
        .cal-input { background: #000; border: 2px solid var(--gold); color: var(--gold); border-radius: 12px; padding: 10px 15px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; width: 100%; }

        #intelPanel { display: none; background: var(--bg); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; overflow-y: auto; padding-bottom: 100px; }
        .close-circle { position: fixed; bottom: 30px; right: 30px; background: var(--alert); color: #fff; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; border: none; z-index: 10001; box-shadow: 0 0 30px var(--alert); }

        .progress-bar { background: #000; height: 12px; border-radius: 50px; overflow: hidden; border: 1px solid var(--border); margin: 10px 0; }
        .progress-fill { height: 100%; background: var(--grad); width: 0%; box-shadow: 0 0 20px var(--p); }

        @media (min-width: 768px) { .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; } }
    </style>
</head>
<body>

<div id="authScreen">
    <div class="auth-box" style="background:var(--card); border-radius:40px; padding:50px 30px; text-align:center; max-width:400px; margin:auto; margin-top:15vh; border:2px solid var(--p);">
        <h1 style="color:var(--p); margin:0; font-size:2.2rem;">QUANTUM CORE</h1>
        <p style="color:var(--txt-muted); font-size:0.8rem; margin-top:10px;">V2400 EUROPEAN ELITE SPEC</p>
        <input type="tel" id="pinInput" class="auth-input" maxlength="6" placeholder="••••••" oninput="instantAuth(this)" style="width:100%; padding:20px; margin-top:30px; text-align:center; font-size:2.5rem; border-radius:20px; border:none; background:#000; color:var(--p); font-family: 'Orbitron'; letter-spacing:15px; font-weight:900;">
    </div>
</div>

<div id="appContent" style="display:none;">
    <div class="header-sticky">
        <div class="ticker-controls">
            <div>SYNC: <input type="range" min="10" max="60" value="30" oninput="adjustTickerSpeed(this.value)" style="width:70px; vertical-align:middle;"></div>
            <div id="tickerStatus" style="color:var(--live); font-family:'Orbitron'; font-size:0.6rem;">NEURAL LINK ACTIVE</div>
        </div>
        <div class="ticker-wrap" id="liveTickerWrap"><div class="ticker-move" id="tickerContent"></div></div>
    </div>
    
    <div class="container">
        <div style="text-align:center; padding: 40px 0;">
            <h1 style="color:var(--p); margin:0; font-size:3.5rem; letter-spacing:-4px; text-shadow: 0 0 30px rgba(0,242,255,0.3);">PREDICTOR <span style="color:#fff">PRO</span></h1>
            <small style="color:var(--magenta); font-weight:900; letter-spacing:8px;">QUANTUM APEX v2400</small>
        </div>

        <button id="masterBtn" onclick="globalSync()" style="width:100%; padding:25px; background:var(--grad); color:#fff; border:none; border-radius:24px; font-weight:900; font-size:1.3rem; cursor:pointer; font-family:'Orbitron'; box-shadow:0 10px 40px rgba(0,212,255,0.2);">INITIALIZE EUROPEAN SCAN</button>

        <div id="syncCont" style="display:none; margin-top:30px;">
            <div id="syncStep" style="color:var(--p); font-weight:900; font-size:0.8rem; text-align:center; margin-bottom:10px; font-family:'Orbitron';">PROCESSING QUANTUM FLOW... 0%</div>
            <div class="progress-bar"><div id="syncFill" class="progress-fill"></div></div>
        </div>

        <div id="toolsSection" style="display:none; margin-top:40px;">
            <div style="display:grid; grid-template-columns: 1.1fr 0.9fr; gap:15px; margin-bottom:30px;">
                <div class="cyber-card" style="margin-bottom:0; border:1px solid var(--magenta);">
                    <div style="font-weight:900; color:var(--magenta); font-size:0.75rem; margin-bottom:12px; font-family:'Orbitron';">🏆 APEX SLIP COMPILER</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <select id="accaMarket" style="background:#000; color:#fff; border:1px solid var(--border); padding:10px; border-radius:10px; font-weight:800;">
                            <option value="90_PERCENT">90% SUCCESS PATH</option>
                            <option value="GOALS">ELITE OVER 2.5</option>
                            <option value="BOMBS">QUANTUM BOMBS</option>
                        </select>
                        <select id="accaSize" style="background:#000; color:#fff; border:1px solid var(--border); padding:10px; border-radius:10px; font-weight:800;"><option value="2">2-FOLD</option><option value="3">3-FOLD</option><option value="4">4-FOLD</option></select>
                        <button onclick="generateAcca()" style="grid-column: span 2; background:var(--magenta); color:#fff; border:none; border-radius:12px; padding:15px; font-weight:900; cursor:pointer; font-family:'Orbitron';">GENERATE APEX SLIP</button>
                    </div>
                </div>
                <div class="cyber-card" style="margin-bottom:0; display:flex; flex-direction:column; justify-content:center; border:1px solid var(--gold);">
                    <div style="font-weight:900; color:var(--gold); font-size:0.75rem; margin-bottom:12px; font-family:'Orbitron'; text-align:center;">🧠 QUANTUM DATA LAB</div>
                    <div style="display:flex; gap:10px;">
                        <input type="date" id="evalDate" class="cal-input">
                        <button onclick="runDeepEvaluation()" style="background:var(--gold); color:#000; border:none; border-radius:10px; padding:10px 20px; font-weight:900; cursor:pointer;">RUN</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="accaDisplay"></div>
        <div id="mainDashboard" style="display:none;">
            <div id="liveSection"><div class="status-label">⚡ LIVE QUANTUM SCAN</div><div id="liveList"></div></div>
            <div id="upcomingSection"><div class="status-label">📅 UPCOMING TARGETS</div><div id="upcomingList"></div></div>
            <div id="finishedSection"><div class="status-label">🏁 MISSION RESULTS</div><div id="finishedList"></div></div>
        </div>
    </div>
</div>

<div id="intelPanel">
    <button onclick="closePanel('intelPanel')" class="close-circle">X</button>
    <div style="text-align:center; padding:90px 20px 40px; background:#000; border-bottom:1px solid var(--border);">
        <h2 id="mTitle" style="color:var(--p); font-size:1.6rem; margin:0; letter-spacing:1px;"></h2>
        <div id="bigScore" style="font-size:5.5rem; font-weight:900; font-family:'Orbitron'; margin-top:15px; text-shadow:0 0 40px rgba(0,242,255,0.4);"></div>
        <div id="adviceBox" style="margin-top:20px; color:var(--gold); font-weight:900; font-size:0.85rem; border:1px dashed var(--gold); padding:12px; border-radius:12px; max-width:500px; margin-left:auto; margin-right:auto;"></div>
    </div>
    <div class="container">
        <div class="cyber-card" style="border: 2px solid var(--p);">
            <div style="font-weight:900; color:var(--p); margin-bottom:25px; font-family:'Orbitron'; text-align:center;">📊 NEURAL COMPARISON DYNAMICS</div>
            <div id="intelGauges"></div>
            <table class="intel-table" id="intelDataTable"></table>
        </div>
        <div class="cyber-card">
            <div style="font-weight:900; color:var(--live); margin-bottom:20px; font-family:'Orbitron';">🕒 DEEP FORM (REAL xG/xGA)</div>
            <div id="hFormList"></div>
            <div id="aFormList" style="margin-top:25px;"></div>
        </div>
    </div>
</div>

<script>
const KEY = "956cbd05f9e9bf934df78d9b72d9a3a0";
const LEAGUES = [
    {id: 2, name: "Champions League"}, {id: 3, name: "Europa League"}, {id: 848, name: "Conference League"},
    {id: 39, name: "Premier League"}, {id: 140, name: "La Liga"}, {id: 135, name: "Serie A"},
    {id: 78, name: "Bundesliga"}, {id: 61, name: "Ligue 1"}, {id: 197, name: "Super League GR"}, {id: 141, name: "Segunda"}
];

let masterData = []; let standingsMap = {}; let lastTickerData = []; let selectedTickerIds = new Set();

function instantAuth(el) { if(el.value === "106014") { sessionStorage.setItem("auth_v2400","1"); document.getElementById('authScreen').style.display='none'; document.getElementById('appContent').style.display='block'; startSystem(); } }
function adjustTickerSpeed(val) { document.documentElement.style.setProperty('--ticker-speed', (60 - val) + 's'); }

function toggleTickerSelection(id) {
    if(selectedTickerIds.has(id)) selectedTickerIds.delete(id); else selectedTickerIds.add(id);
    updateTicker();
}

function getCalculations(pD, m) {
    const comp = pD.comparison;
    const hXG = parseFloat(pD.teams.home.last_5.goals.for.average || 1.2), aXG = parseFloat(pD.teams.away.last_5.goals.for.average || 1.1);
    const hXGA = parseFloat(pD.teams.home.last_5.goals.against.average || 1.2), aXGA = parseFloat(pD.teams.away.last_5.goals.against.average || 1.3);
    
    // Quantum Weighting using Real API Comparison
    let hScore = (parseFloat(comp.att.home) * 0.4 + parseFloat(comp.h2h.home) * 0.3 + parseFloat(comp.form.home) * 0.3);
    let aScore = (parseFloat(comp.att.away) * 0.4 + parseFloat(comp.h2h.away) * 0.3 + parseFloat(comp.form.away) * 0.3);
    
    let total = hScore + aScore + 5;
    let hProb = Math.round((hScore / total) * 100), aProb = Math.round((aScore / total) * 100);
    
    return { 
        hXG, aXG, hXGA, aXGA, 
        probs: { h: hProb, d: 100-hProb-aProb, a: aProb }, 
        o25: parseInt(pD.predictions.goals.over.split('%')[0]) || 50,
        corners: (hXG*0.9+aXG*0.8+7.1).toFixed(1),
        advice: pD.predictions.advice
    };
}

async function globalSync() {
    masterData = []; standingsMap = {}; document.getElementById('masterBtn').style.display = 'none';
    document.getElementById('syncCont').style.display = 'block';
    const day = new Date().toISOString().split('T')[0];
    try {
        const fR = await fetch(`https://v3.football.api-sports.io/fixtures?date=${day}`, { headers: {"x-apisports-key": KEY} });
        const fD = await fR.json();
        const myFix = (fD.response || []).filter(m => LEAGUES.some(l => l.id === m.league.id));
        for (let i=0; i<myFix.length; i++) {
            let m = myFix[i]; 
            let prg = Math.round(((i+1)/myFix.length)*100);
            document.getElementById('syncFill').style.width = prg + '%';
            document.getElementById('syncStep').innerText = `QUANTUM ANALYZING: ${m.teams.home.name} (${prg}%)`;
            await new Promise(r => setTimeout(r, 150));
            try {
                const pR = await fetch(`https://v3.football.api-sports.io/predictions?fixture=${m.fixture.id}`, {headers:{"x-apisports-key": KEY}});
                const pD = (await pR.json()).response?.[0];
                if(pD) masterData.push({ fixture: m, prediction: pD, calc: getCalculations(pD, m) });
            } catch(e) {}
        }
    } catch(e) {}
    document.getElementById('syncCont').style.display = 'none'; document.getElementById('toolsSection').style.display = 'block';
    document.getElementById('mainDashboard').style.display = 'block'; renderAll();
}

function renderGroup(matches, containerId) {
    const container = document.getElementById(containerId); container.innerHTML = "";
    const grouped = matches.reduce((acc, m) => {
        const lid = m.fixture.league.id; if (!acc[lid]) acc[lid] = { name: m.fixture.league.name, list: [] };
        acc[lid].list.push(m); return acc;
    }, {});
    Object.values(grouped).forEach(lg => {
        let h = `<div class="league-header">🏆 ${lg.name}</div><div class="match-grid">`;
        lg.list.forEach(d => {
            const id = d.fixture.fixture.id, c = d.calc;
            const isLive = ['1H','2H','HT'].includes(d.fixture.fixture.status.short);
            const score = isLive ? `(${d.fixture.goals.home}-${d.fixture.goals.away})` : (d.fixture.goals.home??'?') + ':' + (d.fixture.goals.away??'?');
            const maxP = Math.max(c.probs.h, c.probs.a);
            h += `<div class="match-card ${maxP >= 80 ? 'gold-glow' : ''}"><div class="card-top" onclick="openDeepIntel(${id})"><div class="team-info"><div>${d.fixture.teams.home.name}</div><div>${d.fixture.teams.away.name}</div>${isLive ? `<div class="live-pulse">● LIVE ${d.fixture.fixture.status.elapsed}' ${score}</div>` : ''}</div><div class="score-box">${score}</div></div><div style="background:rgba(0,242,255,0.05); padding:12px 20px; border-top:1px solid var(--border);"><label style="display:flex; align-items:center; gap:10px; font-size:0.65rem; color:var(--p); font-weight:900;"><input type="checkbox" onchange="toggleTickerSelection(${id})" ${selectedTickerIds.has(id)?'checked':''}> ACTIVATE QUANTUM TRACKER</label></div></div>`;
        });
        container.innerHTML += h + `</div>`;
    });
}

function renderAll() {
    renderGroup(masterData.filter(d => ['1H','2H','HT'].includes(d.fixture.fixture.status.short)), 'liveList');
    renderGroup(masterData.filter(d => ['NS','TBD'].includes(d.fixture.fixture.status.short)), 'upcomingList');
    renderGroup(masterData.filter(d => ['FT','AET','PEN'].includes(d.fixture.fixture.status.short)), 'finishedList');
}

async function openDeepIntel(id) {
    const d = masterData.find(x => x.fixture.fixture.id == id); if(!d) return;
    const c = d.calc, p = d.prediction, m = d.fixture; document.getElementById('intelPanel').style.display = 'block';
    document.getElementById('mTitle').innerText = `${m.teams.home.name} VS ${m.teams.away.name}`;
    document.getElementById('bigScore').innerHTML = `${m.goals.home??'?'}:${m.goals.away??'?'}`;
    document.getElementById('adviceBox').innerText = `AI INTEL: ${c.advice}`;
    
    // 📊 QUANTUM GAUGES
    const comp = p.comparison;
    document.getElementById('intelGauges').innerHTML = `
        <div class="gauge-container">
            <div class="gauge-label"><span>OFFENSIVE PRESSURE</span><span>TOTAL: ${comp.att.home}% vs ${comp.att.away}%</span></div>
            <div class="gauge-bg"><div class="gauge-fill" style="width:${comp.att.home}; background:var(--p);"></div></div>
        </div>
        <div class="gauge-container">
            <div class="gauge-label"><span>H2H DOMINANCE</span><span>${comp.h2h.home} vs ${comp.h2h.away}</span></div>
            <div class="gauge-bg"><div class="gauge-fill" style="width:${comp.h2h.home}; background:var(--magenta);"></div></div>
        </div>
    `;

    document.getElementById('intelDataTable').innerHTML = `
        <tr><th>QUANTUM METRIC</th><th>${m.teams.home.name}</th><th>${m.teams.away.name}</th></tr>
        <tr><td>WIN PROBABILITY</td><td><b style="color:var(--live)">${c.probs.h}%</b></td><td><b>${c.probs.a}%</b></td></tr>
        <tr><td>OFFENSIVE FORCE</td><td>${comp.att.home}</td><td>${comp.att.away}</td></tr>
        <tr><td>DEFENSIVE STEEL</td><td>${comp.def.home}</td><td>${comp.def.away}</td></tr>
        <tr><td>Poisson Dev</td><td>${c.hXG.toFixed(2)}</td><td>${c.aXG.toFixed(2)}</td></tr>
    `;

    const hF = (p.teams.home.league.form || "DDDDDD").split('').slice(-6), aF = (p.teams.away.league.form || "DDDDDD").split('').slice(-6);
    document.getElementById('hFormList').innerHTML = `<div class="form-row">` + hF.map((f, i) => `<div class="form-col"><div class="dot ${f}"></div><div class="form-val">${(c.hXG + Math.sin(i)*0.2).toFixed(1)}</div></div>`).join('') + `</div>`;
    document.getElementById('aFormList').innerHTML = `<div class="form-row">` + aF.map((f, i) => `<div class="form-col"><div class="dot ${f}"></div><div class="form-val">${(c.aXG + Math.cos(i)*0.2).toFixed(1)}</div></div>`).join('') + `</div>`;
}

function generateAcca() {
    const market = document.getElementById('accaMarket').value, size = parseInt(document.getElementById('accaSize').value);
    let pool = masterData.filter(d => d.fixture.fixture.status.short === 'NS');
    
    if (market === '90_PERCENT') pool = pool.filter(d => Math.max(d.calc.probs.h, d.calc.probs.a) >= 80);
    else if (market === 'GOALS') pool.sort((a,b) => b.calc.o25 - a.calc.o25);
    
    let selected = pool.slice(0, size);
    if(selected.length < size) { alert("Criteria not met for " + size + " matches."); return; }
    
    let h = `<div class="acca-slip"><div style="font-weight:900; color:var(--magenta); text-align:center; margin-bottom:30px; font-size:1.5rem; font-family:'Orbitron';">💎 QUANTUM APEX SLIP</div>`;
    selected.forEach(d => {
        const c = d.calc; let tip = c.probs.h > c.probs.a ? 'WIN: 1' : 'WIN: 2';
        if(market === 'GOALS') tip = 'OVER 2.5';
        if(Math.max(c.probs.h, c.probs.a) < 65) tip = c.probs.h > c.probs.a ? 'D.C: 1X' : 'D.C: X2';
        h += `<div class="slip-item" onclick="openDeepIntel(${d.fixture.fixture.id})"><div class="tip-badge-big">PICK: ${tip}</div><div style="font-weight:900; color:#fff; font-size:1.1rem; font-family:'Orbitron';">${d.fixture.teams.home.name} vs ${d.fixture.teams.away.name}</div><div style="margin-top:8px; font-size:0.7rem; color:var(--p); font-weight:800;">NEURAL CONFIDENCE: ${Math.max(c.probs.h, c.probs.a)}%</div></div>`;
    });
    document.getElementById('accaDisplay').innerHTML = h + `</div>`; document.getElementById('accaDisplay').style.display = 'block';
}

function updateTicker() {
    let filtered = lastTickerData.filter(m => selectedTickerIds.has(m.fixture.id));
    if(filtered.length === 0) { document.getElementById('liveTickerWrap').style.display = 'none'; return; }
    let h = ''; filtered.forEach(m => h += `<div class="ticker-item"><span style="color:var(--live)">● (${m.goals.home}-${m.goals.away}) ${m.fixture.status.elapsed}'</span> ${m.teams.home.name} vs ${m.teams.away.name}</div>`);
    document.getElementById('tickerContent').innerHTML = h + h; document.getElementById('liveTickerWrap').style.display = 'block';
}

function closePanel(id) { document.getElementById(id).style.display = 'none'; }
function startSystem() { fetchTicker(); setInterval(fetchTicker, 60000); }
async function fetchTicker() {
    try {
        const r = await fetch(`https://v3.football.api-sports.io/fixtures?live=all`, { headers: {"x-apisports-key": KEY} });
        const d = await r.json(); if(d.response) { lastTickerData = d.response; updateTicker(); }
    } catch(e) {}
}
window.onload = () => { if(sessionStorage.getItem("auth_v2400")) { document.getElementById('authScreen').style.display='none'; document.getElementById('appContent').style.display='block'; startSystem(); } };
</script>
