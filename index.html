<!DOCTYPE html>
<html lang="el">
<head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root {
      --bg: #010409; --card: #0d1117; --card2: #0b1016;
      --border: #21262d; --border2: #30363d;
      --p: #00f2ff; --p-dim: rgba(0,242,255,0.12); --p-glow: rgba(0,242,255,0.25);

      --txt: #f0f6fc; --txt-muted: #8b949e;
      --magenta: #ff00ff; --magenta-dim: rgba(255,0,255,0.10);
      --grad: linear-gradient(135deg, #00f2ff 0%, #8b5cf6 100%);
      --grad-gold: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
      --pick-bg: rgba(57,255,20,0.08); --pick-border: rgba(57,255,20,0.45);
      --radius: 14px; --radius-sm: 8px; --radius-pill: 999px;
      --shadow: 0 12px 40px rgba(0,0,0,0.35);

    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    
    body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--txt); line-height: 1.55; -webkit-font-smoothing: antialiased; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,242,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(0,242,255,0.015) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }

    .orbitron { font-family: 'Orbitron', monospace; }
    .mono { font-family: 'Space Mono', monospace; }

    .container { max-width: 1300px; margin: 0 auto; padding: 16px; position: relative; z-index: 1; }

    /* CREDIT BAR */
    .credit-bar { background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,242,255,0.2); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; gap: 12px; }
    .credit-bar-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .credit-logo { font-family: 'Orbitron', monospace; color: var(--p); font-size: 0.75rem; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 8px var(--p-glow); }
    .credit-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--txt-muted); letter-spacing: 1px; }
    .credit-value { font-family: 'Orbitron', monospace; font-size: 0.9rem; font-weight: 900; color: var(--p); text-shadow: 0 0 8px var(--p-glow); transition: color 0.3s, text-shadow 0.3s; }
    .credit-value.low { color: var(--alert); text-shadow: 0 0 8px rgba(218,54,51,0.5); animation: pulse 1s infinite; }
    .credit-value.critical { color: #ff4444; animation: pulse 0.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* AUTH */
    #auth { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 1; }
    .auth-card { background: rgba(13,17,23,0.9); border: 1px solid rgba(0,242,255,0.2); border-radius: 20px; padding: 48px 40px; max-width: 380px; width: 100%; box-shadow: 0 0 60px rgba(0,242,255,0.06), var(--shadow); text-align: center; }
    .auth-title { font-family: 'Orbitron', monospace; color: var(--p); font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 20px var(--p-glow); margin-bottom: 8px; }
    .auth-sub { color: var(--txt-muted); font-size: 0.78rem; margin-bottom: 30px; letter-spacing: 0.5px; }
    .auth-input { width: 100%; background: rgba(0,0,0,0.6); color: var(--p); border: 1px solid rgba(0,242,255,0.3); padding: 18px; font-size: 2rem; text-align: center; border-radius: var(--radius); font-family: 'Orbitron', monospace; outline: none; letter-spacing: 8px; transition: border-color 0.3s, box-shadow 0.3s; }
    .auth-input:focus { border-color: var(--p); box-shadow: 0 0 0 3px var(--p-glow); }
    .auth-input.error { border-color: var(--alert); box-shadow: 0 0 0 3px rgba(218,54,51,0.25); animation: shake 0.4s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    .auth-hint { margin-top: 16px; font-size: 0.72rem; color: var(--txt-muted); }

    /* CARDS */
    .cyber-card { background: var(--card); border: 1px solid var(--border2); border-radius: var(--radius); padding: 22px; margin-bottom: 18px; border-left: 4px solid var(--p); box-shadow: var(--shadow); animation: fadeUp 0.35s ease-out both; }
    .live-card { border-left-color: var(--neon-live); box-shadow: 0 0 24px var(--neon-dim), var(--shadow); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .section-title { font-family: 'Orbitron', monospace; color: var(--gold); font-size: 0.78rem; font-weight: 900; margin-bottom: 14px; letter-spacing: 1.5px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }

    /* PICKS */
    .omega-pick { margin-top: 16px; padding: 16px; border-radius: 10px; background: var(--pick-bg); border: 1px dashed var(--pick-border); text-align: center; position: relative; overflow: hidden; }
    .omega-pick::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 60%, rgba(57,255,20,0.04)); pointer-events: none; }
    .omega-pick.no-bet { background: var(--alert-dim); border-color: rgba(218,54,51,0.4); }
    .omega-pick.bomb { background: var(--magenta-dim); border-color: rgba(255,0,255,0.4); }
    .pick-label { font-family: 'Space Mono', monospace; font-size: 0.64rem; color: var(--neon-live); font-weight: 700; letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }
    .omega-pick.no-bet .pick-label { color: var(--alert); }
    .omega-pick.bomb .pick-label { color: var(--magenta); }
    .pick-value { font-family: 'Orbitron', monospace; font-size: 1.25rem; color: #fff; font-weight: 900; line-height: 1.2; text-shadow: 0 0 12px rgba(57,255,20,0.4); }
    .omega-pick.no-bet .pick-value { text-shadow: none; color: #ffb3b3; }
    .omega-pick.bomb .pick-value { text-shadow: 0 0 12px rgba(255,0,255,0.5); }
    .pick-reason { font-size: 0.77rem; color: var(--txt-muted); margin-top: 8px; line-height: 1.5; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 14px; }

    .season-xga { color: var(--txt-muted); font-weight: 700; font-family: 'Space Mono', monospace; margin-left: 4px; font-size: 0.82rem; }

    .dev-badge { font-size: 0.65rem; font-weight: 900; padding: 2px 6px; border-radius: 4px; margin-left: 6px; font-family: 'Space Mono', monospace; letter-spacing: 0.5px; }
    .dev-pos { background: rgba(35,134,54,0.25); color: #3fb950; border: 1px solid rgba(35,134,54,0.4); }
    .dev-neg { background: rgba(218,54,51,0.2); color: #ff8c8c; border: 1px solid rgba(218,54,51,0.35); }

    .form-dot { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; font-size: 0.55rem; font-weight: 900; margin-right: 3px; color: #fff; font-family: 'Orbitron', monospace; transition: transform 0.15s; }

    .live-chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: var(--radius-pill); font-size: 0.7rem; font-weight: 700; font-family: 'Space Mono', monospace; background: var(--neon-dim); color: var(--neon-live); border: 1px solid rgba(57,255,20,0.3); }

    /* BUTTONS & INPUTS */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 13px 20px; background: var(--grad); color: #fff; border: none; border-radius: var(--radius-sm); font-weight: 800; font-family: 'Syne', sans-serif; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; transition: filter 0.2s, transform 0.15s, opacity 0.2s; box-shadow: 0 4px 16px rgba(0,0,0,0.25); white-space: nowrap; }
    .btn:hover:not(:disabled) { filter: brightness(1.12); transform: translateY(-2px); }

    .btn-live { background: linear-gradient(135deg, #da3633, #ff6b6b); }

    .btn-danger { background: linear-gradient(135deg, #da3633, #b91c1c); }

    .field { background: rgba(0,0,0,0.5); color: var(--p); border: 1px solid rgba(0,242,255,0.25); padding: 13px 15px; border-radius: var(--radius-sm); font-family: 'Space Mono', monospace; font-size: 0.85rem; outline: none; width: 100%; transition: border-color 0.2s; }
    .field:focus { border-color: var(--p); box-shadow: 0 0 0 3px var(--p-glow); }
    select.field option { background: #0b1016; color: #fff; }

    .toolbar { background: rgba(13,17,23,0.8); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
    .toolbar-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 130px; }
    .toolbar-label { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--txt-muted); letter-spacing: 1px; text-transform: uppercase; }
    .vault-panel { background: rgba(0,242,255,0.03); border: 1px dashed rgba(0,242,255,0.2); border-radius: var(--radius); padding: 16px; margin-bottom: 18px; }

    .progress-wrap { margin-bottom: 18px; }

    .progress-bar { height: 100%; background: var(--grad); transition: width 0.3s; border-radius: 3px; }
    .progress-status { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--p); margin-top: 6px; display: flex; justify-content: space-between; }

    /* MATCH HEADER */
    .match-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; margin-bottom: 14px; }
    .match-teams { flex: 1; min-width: 0; }
    .match-league { color: var(--gold); font-size: 0.68rem; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.5px; font-family: 'Space Mono', monospace; }

    .scores-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-end; }

    .pred-tabs { display: flex; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.25); }
    .pred-tabs::-webkit-scrollbar { display: none; }
    .pred-tab { display: flex; align-items: center; gap: 6px; padding: 12px 16px; border: none; background: transparent; color: var(--txt-muted); font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; flex-shrink: 0; }
    .pred-tab.active { color: var(--tab-color, var(--p)); border-bottom-color: var(--tab-color, var(--p)); background: rgba(255,255,255,0.02); }
    .pred-tab-count { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; border-radius: var(--radius-pill); font-size: 0.65rem; font-weight: 900; font-family: 'Space Mono', monospace; color: #000; }

    .pred-tab-panel.active { display: block; }
    .pred-list { padding: 8px; display: flex; flex-direction: column; gap: 4px; max-height: 520px; overflow-y: auto; }
    .pred-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid transparent; cursor: pointer; transition: background 0.15s; }
    .pred-row:hover { background: rgba(255,255,255,0.04); border-color: var(--border2); }

    .pred-row-score { text-align: center; border: 1px solid; border-radius: var(--radius-sm); padding: 6px 10px; min-width: 60px; flex-shrink: 0; }
    .pred-row-score-val { font-family: 'Orbitron', monospace; font-size: 0.9rem; font-weight: 900; line-height: 1; }
    .pred-row-score-lbl { font-family: 'Space Mono', monospace; font-size: 0.55rem; margin-top: 3px; opacity: 0.7; letter-spacing: 0.5px; }

    /* WALLBET & BANK */
    .wallbet-box { background: linear-gradient(135deg, var(--gold-dim), var(--p-dim)); border: 1px solid rgba(245,158,11,0.3); border-radius: var(--radius); padding: 18px; }

    @media (max-width: 680px) {
      .stats-grid { grid-template-columns: 1fr; }
      .match-header { flex-direction: column; }
      .match-meta { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
      .bank-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

        initCredits(); renderBank();
      }
    });

    // Helpers
    const sleep = ms => new Promise(r => setTimeout(r, ms));
    const safeNum = (x, d=0) => Number.isFinite(Number(x)) ? Number(x) : d;
    const clamp = (n, mn, mx) => Math.max(mn, Math.min(mx, n));
    const isFinished = s => ["FT","AET","PEN"].includes(s);
    const esc = str => String(str??'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));

    function setLoader(show, text='') {
      document.getElementById('loader').style.display = show ? 'block' : 'none';
      document.getElementById('status').textContent = text;
      if (!show) document.getElementById('bar').style.width = '0%';
    }
    function setProgress(pct, text='') {
      document.getElementById('bar').style.width = Math.round(clamp(pct,0,100)) + '%';
      document.getElementById('status').textContent = text;
    }

    function updateCredits(v) {
      const el = document.getElementById('creditDisplay');
      if (v !== null) { el.textContent = v; el.className = `credit-value mono ${v < 50 ? 'low' : ''}`; }
    }

    async function initCredits() {
      try {
        const r = await fetch(`${API_BASE}/status`, { headers:{'x-apisports-key': API_KEY} });
        const d = await r.json();
        currentCredits = (d.response?.requests?.limit_day||500) - (d.response?.requests?.current||0);
        updateCredits(currentCredits);
      } catch {}
    }

    async function apiReq(path) {
      await sleep(REQ_DELAY);
      try {
        const r = await fetch(`${API_BASE}/${path}`, { headers:{'x-apisports-key': API_KEY} });
        if (typeof currentCredits === 'number') { currentCredits--; updateCredits(currentCredits); }
        if (!r.ok) return { response:[] }; return await r.json();
      } catch { return { response:[] }; }
    }

    // Data Fetchers
    async function getTStats(t, lg, s) { const k=`${t}_${lg}_${s}`; if(teamStatsCache.has(k)) return teamStatsCache.get(k); const d=await apiReq(`teams/statistics?team=${t}&league=${lg}&season=${s}`); teamStatsCache.set(k,d?.response||{}); return d?.response||{}; }
    async function getLFix(t, lg, s) { const k=`${t}_${lg}_${s}`; if(lastFixCache.has(k)) return lastFixCache.get(k); const d=await apiReq(`fixtures?team=${t}&league=${lg}&season=${s}&last=20&status=FT`); lastFixCache.set(k,d?.response||[]); return d?.response||[]; }
    async function getFStats(f) { if(statsCache.has(f)) return statsCache.get(f); const d=await apiReq(`fixtures/statistics?fixture=${f}`); statsCache.set(f,d); return d; }
    async function getStand(lg, s) { const k=`${lg}_${s}`; if(standCache.has(k)) return standCache.get(k); const d=await apiReq(`standings?league=${lg}&season=${s}`); const f=Array.isArray(d?.response?.[0]?.league?.standings)?d.response[0].league.standings.flat():[]; standCache.set(k,f); return f; }
    
    const getTeamGoals = (f, t) => f?.teams?.home?.id===t ? (f?.goals?.home??0) : (f?.goals?.away??0);
    const getOppGoals = (f, t) => f?.teams?.home?.id===t ? (f?.goals?.away??0) : (f?.goals?.home??0);
    const statVal = (arr, type) => parseFloat(String((arr.find(x=>x.type===type)||{}).value||0).replace('%',''))||0;

    function estXG(arr, g=0) {
      let xg = (statVal(arr,'Shots on Goal')*0.19) + (statVal(arr,'Shots off Goal')*0.07) + (statVal(arr,'Corner Kicks')*0.028) + (g*0.30);
      return xg > 0 ? xg : (0.65 + g*0.32);
    }

    async function batchCalc(list, tId) {
      if(!list.length) return {xg:'0.00',xga:'0.00',cor:'0.0'};
      let x=0, xa=0, c=0, n=0;
      for(const f of list) {
        const st = await getFStats(f.fixture.id);
        if(!st?.response||st.response.length<2) continue;
        const my = st.response.find(z=>z.team.id===tId)?.statistics||[];
        const op = st.response.find(z=>z.team.id!==tId)?.statistics||[];
        x += (statVal(my,'Expected Goals') || estXG(my, getTeamGoals(f,tId)));
        xa += (statVal(op,'Expected Goals') || estXG(op, getOppGoals(f,tId)));
        c += statVal(my,'Corner Kicks'); n++;
      }
      return { xg:n>0?(x/n).toFixed(2):'0.00', xga:n>0?(xa/n).toFixed(2):'0.00', cor:n>0?(c/n).toFixed(1):'0.0' };
    }

    async function buildIntel(tId, lg, s, isHome) {
      const [ss, allFix] = await Promise.all([getTStats(tId,lg,s), getLFix(tId,lg,s)]);
      const gen = allFix.slice(0, LAST_G);
      const split = allFix.filter(f=>(isHome?f.teams.home.id:f.teams.away.id)===tId).slice(0, LAST_S);
      const [fData, sData] = await Promise.all([batchCalc(gen,tId), batchCalc(split,tId)]);
      return { fXG:safeNum(fData.xg), fXGA:safeNum(fData.xga), sXG:safeNum(sData.xg), sXGA:safeNum(sData.xga), cor:safeNum(fData.cor) };
    }

    function buildScoreHTML(m) {
      if(m?.goals?.home==null) return '';
      return `<div class="live-score-big" style="color:var(--gold); text-shadow:none;">${m.goals.home} — ${m.goals.away}</div>`;
    }

    // MAIN ENGINE
    async function runScan() {
      if(isRunning) return; isRunning=true; setBtnsDisabled(true); setLoader(true,'MINING...');
      document.getElementById('topSection').innerHTML='';
      document.getElementById('dropdownSection').style.display='none';
      document.getElementById('selectedMatchCard').innerHTML='';
      window.scannedMatchesData = [];

      try {
        const start = document.getElementById('scanStart').value || todayISO();
        const end = document.getElementById('scanEnd').value || start;
        const selLg = document.getElementById('leagueFilter').value;
        const dates = getDatesInRange(start, end);
        let allMatches = [];

        for(let i=0; i<dates.length; i++) {
          setProgress((i/dates.length)*10, `Λήψη ${dates[i]}`);
          const res = await apiReq(`fixtures?date=${dates[i]}`);
          const dm = (res.response||[]).filter(m=>selLg==='ALL'?LEAGUE_IDS.includes(m.league.id):m.league.id===parseInt(selLg));
          allMatches.push(...dm);
        }

        if(!allMatches.length) { showErr('Δεν βρέθηκαν αγώνες.'); isRunning=false; setBtnsDisabled(false); setLoader(false); return; }
        if(allMatches.length>200) allMatches=allMatches.slice(0,200);
        
        const scored = [];

        for(let i=0; i<allMatches.length; i++) {
          const m = allMatches[i];
          setProgress(10 + ((i+1)/allMatches.length)*90, `(${i+1}/${allMatches.length}) ${m.teams.home.name}`);

          const [hS, aS, stand] = await Promise.all([
            buildIntel(m.teams.home.id, m.league.id, m.league.season, true),
            buildIntel(m.teams.away.id, m.league.id, m.league.season, false),
            getStand(m.league.id, m.league.season)
          ]);

          let tXG = hS.fXG + aS.fXG;
          if(TRAP_LEAGUES.has(m.league.id)) { tXG*=0.80; hS.fXG*=0.80; aS.fXG*=0.80; }
          else if(TIGHT_LEAGUES.has(m.league.id)) { tXG*=0.85; hS.fXG*=0.85; aS.fXG*=0.85; }
          else if(GOLD_LEAGUES.has(m.league.id)) tXG*=1.05;

          // Markets
          let o25 = (tXG*24)+((hS.sXG+aS.sXG)*9)+((aS.fXGA+hS.fXGA)*6);
          let o35 = (tXG*22)+((hS.sXG+aS.sXG)*12)+((aS.fXGA+hS.fXGA)*10);
          let btts = (Math.min(hS.fXG,aS.fXG)*40)+((hS.fXGA+aS.fXGA)*12)+(Math.min(hS.sXG,aS.sXG)*12);
          const cor = hS.cor + aS.cor;

          // Exact Score (Simplified Math)
          const hExp = clamp((hS.fXG*0.42)+(hS.sXG*0.35)+(aS.fXGA*0.23), 0.15, 4.0);
          const aExp = clamp((aS.fXG*0.42)+(aS.sXG*0.35)+(hS.fXGA*0.23), 0.15, 4.0);
          let hG = hExp>=2.05?2: hExp>=0.90?1:0;
          let aG = aExp>=2.05?2: aExp>=0.90?1:0;
          if(Math.abs(hExp-aExp)<0.20) { if(hG>aG) aG=hG; else if(aG>hG) hG=Math.max(0,aG-1); }
          
          let exactConf = 100 - ((Math.abs(hExp - Math.round(hExp)) + Math.abs(aExp - Math.round(aExp))) * 50);
          if(TIGHT_LEAGUES.has(m.league.id) && hG===1 && aG===1) exactConf += 15;

          // Outcomes 1X2
          let outPick = "X", outScore = 80 - (Math.abs(hS.fXG - aS.fXG) * 100);
          if (hS.fXG > aS.fXG + 0.4 && hS.sXG > aS.sXG) { outPick = "1"; outScore = ((hS.fXG - aS.fXG)*35) + (hS.sXG*15); }
          else if (aS.fXG > hS.fXG + 0.4 && aS.sXG > hS.sXG) { outPick = "2"; outScore = ((aS.fXG - hS.fXG)*35) + (aS.sXG*15); }

          // Mixed Absolute Strength
          let omegaPick = "NO BET", strength = 0;
          if (o35 >= 132 && tXG >= 3.1) { omegaPick = "OVER 3.5"; strength = o35; }
          else if (o25 >= 104 && tXG >= 2.45) { omegaPick = "OVER 2.5"; strength = o25; }
          else if (btts >= 92 && Math.min(hS.fXG, aS.fXG) >= 0.85) { omegaPick = "GOAL/GOAL"; strength = btts; }
          else if (cor >= 11.5) { omegaPick = "OVER 9.5 ΚΟΡΝΕΡ"; strength = cor * 10; }
          else if (outScore >= 60 && outPick !== "X") { omegaPick = outPick==="1"?"ΑΣΟΣ":"ΔΙΠΛΟ"; strength = outScore; }

          const rec = {
            m, fixId: m.fixture.id,
            ht: m.teams.home.name, at: m.teams.away.name,
            hr: getTeamRank(stand, m.teams.home.id), ar: getTeamRank(stand, m.teams.away.id),
            lg: m.league.name,
            o25, o35, btts, cor,
            outPick, outScore,
            exact: `${hG}-${aG}`, exactConf,
            omegaPick, strength,
            hx: hExp.toFixed(2), ax: aExp.toFixed(2)
          };
          scored.push(rec);
          window.scannedMatchesData.push(rec);
        }

        // Categorize & Sort
        latestTopLists.mixed = [...scored].filter(x => x.strength > 85).sort((a,b)=>b.strength - a.strength).slice(0,5);
        latestTopLists.outcomes = [...scored].filter(x => x.outScore >= 55).sort((a,b)=>b.outScore - a.outScore).slice(0,5);
        latestTopLists.over25 = [...scored].filter(x => x.o25 >= 100).sort((a,b)=>b.o25 - a.o25).slice(0,5);
        latestTopLists.over35 = [...scored].filter(x => x.o35 >= 128).sort((a,b)=>b.o35 - a.o35).slice(0,5);
        latestTopLists.exact = [...scored].sort((a,b)=>b.exactConf - a.exactConf).slice(0,5);
        latestTopLists.corners = [...scored].filter(x => x.cor >= 10.3).sort((a,b)=>b.cor - a.cor).slice(0,5);

        renderTopSections();

        // Render Dropdown
        const drop = document.getElementById('matchSelector');
        drop.innerHTML = '<option value="">— Επίλεξε Αγώνα για Ανάλυση —</option>';
        window.scannedMatchesData.forEach((d, idx) => {
          let icon = d.omegaPick.includes('OVER')?'🔥': d.omegaPick.includes('GOAL')?'🎯': d.omegaPick.includes('ΚΟΡΝΕΡ')?'🚩': d.omegaPick.includes('ΑΣΟΣ')||d.omegaPick.includes('ΔΙΠΛΟ')?'⚖️':'⚙️';
          drop.innerHTML += `<option value="${idx}">${icon} ${d.ht} vs ${d.at} | ${d.omegaPick}</option>`;
        });
        document.getElementById('dropdownSection').style.display = 'block';

      } catch(e) { showErr(e.message); }
      finally { isRunning=false; setLoader(false); setBtnsDisabled(false); }
    }

    function renderTopSections() {
      const tabs = [
        {id:'mixed', lbl:'ΜΙΚΤΕΣ', e:'🔥', d:latestTopLists.mixed, sk:'strength', sl:'VAL', c:'var(--gold)'},
        {id:'outcomes', lbl:'ΣΗΜΕΙΑ', e:'⚖️', d:latestTopLists.outcomes, sk:'outScore', sl:'1X2', c:'#3b82f6', isOut:true},
        {id:'over25', lbl:'OVER 2.5', e:'⚽', d:latestTopLists.over25, sk:'o25', sl:'O2.5', c:'var(--p)'},
        {id:'over35', lbl:'OVER 3.5', e:'🚀', d:latestTopLists.over35, sk:'o35', sl:'O3.5', c:'#a78bfa'},
        {id:'exact', lbl:'ΑΚΡΙΒΕΣ', e:'🎯', d:latestTopLists.exact, sk:'exactConf', sl:'CONF', c:'#34d399', isEx:true},
        {id:'corners', lbl:'ΚΟΡΝΕΡ', e:'🚩', d:latestTopLists.corners, sk:'cor', sl:'COR', c:'#f43f5e'}
      ];

      let html = `<div class="section-panel" style="padding:0; overflow:hidden;"><div class="pred-tabs">`;
      tabs.forEach((t,i) => {
        html += `<button class="pred-tab ${i===0?'active':''}" onclick="switchTab('${t.id}')" id="tab-btn-${t.id}" style="--tab-color:${t.c}">
          ${t.e} <span class="pred-tab-label">${t.lbl}</span> <span class="pred-tab-count" style="background:${t.d.length?t.c:'#444'}">${t.d.length}</span>
        </button>`;
      });
      html += `</div>`;

      tabs.forEach((t,i) => {
        html += `<div class="pred-tab-panel ${i===0?'active':''}" id="tabpanel-${t.id}"><div class="pred-list">`;
        if(!t.d.length) html += `<div style="padding:20px;text-align:center;color:#666;">Καμία ισχυρή επιλογή.</div>`;
        t.d.forEach((x,j) => {
          let val = t.id==='mixed' ? x.omegaPick.split(' ')[0] : t.isOut ? x.outPick : t.isEx ? x.exact : x[t.sk].toFixed(1);
          html += `
          <div class="pred-row" onclick="document.getElementById('matchSelector').value='${window.scannedMatchesData.indexOf(x)}'; renderSpecificMatch('${window.scannedMatchesData.indexOf(x)}')">
            <div class="pred-row-rank" style="color:${j<3?t.c:'#666'}">${j+1}</div>
            <div class="pred-row-info">
              <div class="pred-row-match"><span style="color:var(--p)">${esc(x.ht)}</span> <span style="color:#666">vs</span> <span style="color:#ccc">${esc(x.at)}</span></div>
              <div class="pred-row-meta"><span style="font-size:0.65rem;color:#888">${esc(x.lg)}</span></div>
            </div>
            <div class="pred-row-score" style="color:${t.c};border-color:${t.c}40">
              <div class="pred-row-score-val">${val}</div>
              <div class="pred-row-score-lbl">${t.sl}</div>
            </div>
          </div>`;
        });
        html += `</div></div>`;
      });
      html += `</div>`;
      document.getElementById('topSection').innerHTML = html;
    }

    window.switchTab = function(id) {
      document.querySelectorAll('.pred-tab').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.pred-tab-panel').forEach(p=>p.classList.remove('active'));
      document.getElementById('tab-btn-'+id).classList.add('active');
      document.getElementById('tabpanel-'+id).classList.add('active');
    };

    window.renderSpecificMatch = function(idx) {
      const div = document.getElementById('selectedMatchCard');
      if(!idx) { div.innerHTML = ''; return; }
      const d = window.scannedMatchesData[idx];
      
      div.innerHTML = `
      <div class="cyber-card" style="margin-top:15px;">
        <div class="match-header">
          <div>
            <div style="font-size:0.7rem;color:var(--gold);margin-bottom:5px;">${esc(d.lg)}</div>
            <div style="font-family:'Orbitron';font-weight:900;">${esc(d.ht)} ${d.hr?`<span class="standing-pill">#${d.hr}</span>`:''}</div>
            <div style="font-family:'Orbitron';font-weight:900;color:#aaa;">${esc(d.at)} ${d.ar?`<span class="standing-pill">#${d.ar}</span>`:''}</div>
          </div>
          ${buildScoreHTML(d.m)}
        </div>
        <div class="omega-pick">
          <div class="pick-label">💡 OMEGA PICK</div>
          <div class="pick-value">${d.omegaPick}</div>
        </div>
        <div class="stats-grid">
          <div class="team-box">
            <div style="font-size:0.7rem;color:#888;margin-bottom:5px;">ΑΚΡΙΒΕΣ ΣΚΟΡ</div>
            <div style="color:var(--split-color);font-size:1.2rem;font-weight:900;font-family:'Space Mono'">${d.exact}</div>
            <div style="font-size:0.7rem;color:#888;margin-top:5px;">xG: ${d.hx} - ${d.ax}</div>
          </div>
          <div class="team-box">
            <div style="font-size:0.7rem;color:#888;margin-bottom:5px;">ΣΥΝΟΛΟ ΚΟΡΝΕΡ</div>
            <div style="color:var(--p);font-size:1.2rem;font-weight:900;font-family:'Space Mono'">${d.cor.toFixed(1)}</div>
          </div>
        </div>
      </div>`;
      div.scrollIntoView({behavior:'smooth',block:'start'});
    };

    // Init
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('scanStart').value = todayISO();
      document.getElementById('scanEnd').value = todayISO();
      const sel = document.getElementById('leagueFilter');
      LEAGUES_DATA.forEach(l => sel.innerHTML += `<option value="${l.id}">${l.name}</option>`);
    });
  </script>
</body>
</html>
