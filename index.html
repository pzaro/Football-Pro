  <script>
    const KEY = "956cbd05f9e9bf934df78d9b72d9a3a0";
    const API = "https://v3.football.api-sports.io";

    const LEAGUES_DATA = [
      {id: 2, name: "🏆 UEFA Champions League"},
      {id: 3, name: "🏆 UEFA Europa League"},
      {id: 848, name: "🏆 UEFA Europa Conference League"},
      {id: 39, name: "🇬🇧 Premier League"},
      {id: 40, name: "🇬🇧 Championship"},

      {id: 140, name: "🇪🇸 La Liga"},
      {id: 141, name: "🇪🇸 La Liga 2"},
      {id: 135, name: "🇮🇹 Serie A"},
      {id: 136, name: "🇮🇹 Serie B"},
      {id: 78, name: "🇩🇪 Bundesliga"},
      {id: 79, name: "🇩🇪 2. Bundesliga"},
      {id: 61, name: "🇫🇷 Ligue 1"},
      {id: 62, name: "🇫🇷 Ligue 2"},
      {id: 88, name: "🇳🇱 Eredivisie"},
      {id: 144, name: "🇧🇪 Belgium Jupiler"},
      {id: 203, name: "🇹🇷 Turkey Süper Lig"},
      {id: 253, name: "🇺🇸 MLS"},
      {id: 262, name: "🇲🇽 Liga MX"},
      {id: 197, name: "🇬🇷 Greece Super League"}
    ];

    const LEAGUES = LEAGUES_DATA.map(l => l.id);
    const REQUEST_DELAY_MS = 220;
    const REQUEST_TIMEOUT_MS = 15000;
    const LAST_GENERAL = 3;
    const LAST_SPLIT = 3;
    const MAX_MATCHES = 24;

    const LS_WALLBET_BANK = "omega_wallbet_bank_v470680";
    const LS_WALLBET_LAST = "omega_wallbet_last_v470680";
    const LS_PREDICTIONS = "omega_predictions_v470680";

    let statsCache = new Map();
    let teamStatsCache = new Map();
    let lastFixturesCache = new Map();
    let standingsCache = new Map();
    let h2hCache = new Map();

    let isRunning = false;
    let latestTopLists = { mixed: [] };
    let latestWallBet = null;

    function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }
    function safeNum(x,d=0){ const n=Number(x); return Number.isFinite(n)?n:d; }
    function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }
    function isLiveStatus(short){ return ["1H","2H","HT","LIVE","ET","BT","P"].includes(short); }
    function isFinishedStatus(short){ return ["FT","AET","PEN"].includes(short); }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function getTodayISO(){
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }

    function showError(msg){ document.getElementById("errorBox").innerHTML = `<div class="error-box">${escapeHtml(msg)}</div>`; }
    function clearError(){ document.getElementById("errorBox").innerHTML = ""; }
    function showSuccess(msg){ document.getElementById("successBox").innerHTML = `<div class="success-box">${escapeHtml(msg)}</div>`; }
    function clearSuccess(){ document.getElementById("successBox").innerHTML = ""; }
    function showDebug(msg){ document.getElementById("debugBox").innerHTML = `<div class="debug-box">${escapeHtml(msg)}</div>`; }
    function clearDebug(){ document.getElementById("debugBox").innerHTML = ""; }

    function setLoader(show, text=""){
      document.getElementById("loader").style.display = show ? "block" : "none";
      document.getElementById("status").innerText = text;
      if(!show) document.getElementById("bar").style.width = "0%";
    }

    function setProgress(percent, text=""){
      document.getElementById("bar").style.width = `${percent}%`;
      document.getElementById("status").innerText = text;
    }

    function setButtonsDisabled(disabled){
      ["btnPre","btnLive","btnAudit","btnPdf","btnSaveWallbet","btnApi","leagueFilter","topPickCount"].forEach(id=>{
        const el=document.getElementById(id);
        if(el) el.disabled=disabled;
      });
      document.querySelectorAll("#marketChecks input").forEach(el=>el.disabled=disabled);
    }

    function getPredictionStore(){
      try { return JSON.parse(localStorage.getItem(LS_PREDICTIONS) || "[]"); }
      catch { return []; }
    }

    function savePredictionStore(data){
      localStorage.setItem(LS_PREDICTIONS, JSON.stringify(data));
    }

    function upsertPrediction(record){
      const store = getPredictionStore();
      const idx = store.findIndex(x => String(x.fixtureId) === String(record.fixtureId));
      if(idx >= 0) store[idx] = record;
      else store.push(record);
      savePredictionStore(store);
    }

    function getWallBetBank(){
      try {
        return JSON.parse(localStorage.getItem(LS_WALLBET_BANK) || '{"totalBets":0,"stakeSum":0,"profit":0,"wins":0,"losses":0}');
      } catch {
        return { totalBets:0, stakeSum:0, profit:0, wins:0, losses:0 };
      }
    }

    function saveWallBetBank(v){
      localStorage.setItem(LS_WALLBET_BANK, JSON.stringify(v));
    }

    function renderBankSection(){
      const bank = getWallBetBank();
      const roi = bank.stakeSum > 0 ? ((bank.profit / bank.stakeSum) * 100).toFixed(1) : "0.0";
      document.getElementById("bankSection").innerHTML = `
        <div class="section-panel">
          <div class="section-title">🏦 WALLBET ΤΑΜΕΙΟ</div>
          <div class="bank-grid">
            <div class="bank-box"><div class="bank-label">Σύνολο Δελτίων</div><div class="bank-value">${bank.totalBets}</div></div>
            <div class="bank-box"><div class="bank-label">Συνολικό Ποντάρισμα</div><div class="bank-value">${bank.stakeSum.toFixed(2)}</div></div>
            <div class="bank-box"><div class="bank-label">Καθαρό Κέρδος</div><div class="bank-value">${bank.profit.toFixed(2)}</div></div>
            <div class="bank-box"><div class="bank-label">ROI %</div><div class="bank-value">${roi}%</div></div>
          </div>
        </div>
      `;
    }

    async function throttledFetch(url, timeout = REQUEST_TIMEOUT_MS){
      await sleep(REQUEST_DELAY_MS);
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeout);
      try {
        return await fetch(url, {
          headers: { "x-apisports-key": KEY },
          signal: controller.signal
        });
      } finally {
        clearTimeout(timer);
      }
    }

    async function apiReq(path){
      try{
        const response = await throttledFetch(`${API}/${path}`);
        const text = await response.text();
        let json = {};
        try { json = text ? JSON.parse(text) : {}; } catch { json = { raw: text }; }

        if(!response.ok){
          return {
            ok:false,
            response:[],
            errors: json?.errors || json?.message || text || `HTTP ${response.status}`,
            status: response.status,
            raw: json
          };
        }

        if(json?.errors && (Array.isArray(json.errors) ? json.errors.length : Object.keys(json.errors).length)){
          return {
            ok:false,
            response: json?.response || [],
            errors: json.errors,
            status: response.status,
            raw: json
          };
        }

        return {
          ok:true,
          response: json?.response || [],
          results: json?.results || 0,
          status: response.status,
          raw: json
        };
      } catch(err){
        return {
          ok:false,
          response:[],
          errors: err?.name === "AbortError" ? "timeout" : (err?.message || "network error"),
          status: 0,
          raw: null
        };
      }
    }

    async function testApiConnection(){
      clearError(); clearSuccess(); clearDebug();
      setLoader(true, "TEST API...");
      try{
        const date = document.getElementById("scanDate").value || getTodayISO();
        const res = await apiReq(`fixtures?date=${date}`);
        if(res.ok){
          showSuccess(`Η σύνδεση API δουλεύει. Βρέθηκαν ${res.results ?? res.response?.length ?? 0} εγγραφές.`);
          showDebug(JSON.stringify({
            ok: res.ok,
            status: res.status,
            results: res.results,
            sampleFixtureId: res.response?.[0]?.fixture?.id || null
          }, null, 2));
        } else {
          showError("Αποτυχία σύνδεσης API.");
          showDebug(JSON.stringify({
            ok: res.ok,
            status: res.status,
            errors: res.errors,
            raw: res.raw
          }, null, 2));
        }
      } finally {
        setLoader(false);
      }
    }

    async function getTeamSeasonStats(teamId, leagueId, season){
      const key = `${teamId}_${leagueId}_${season}`;
      if(teamStatsCache.has(key)) return teamStatsCache.get(key);
      const data = await apiReq(`teams/statistics?team=${teamId}&league=${leagueId}&season=${season}`);
      const response = data.ok ? (data.response || {}) : {};
      teamStatsCache.set(key, response);
      return response;
    }

    async function getLastFixtures(teamId, leagueId, season){
      const key = `team_last_${teamId}_${leagueId}_${season}`;
      if(lastFixturesCache.has(key)) return lastFixturesCache.get(key);
      const data = await apiReq(`fixtures?team=${teamId}&league=${leagueId}&season=${season}&last=10&status=FT`);
      const response = data.ok ? (data.response || []) : [];
      lastFixturesCache.set(key, response);
      return response;
    }

    async function getFixtureStats(fixtureId){
      if(statsCache.has(fixtureId)) return statsCache.get(fixtureId);
      const data = await apiReq(`fixtures/statistics?fixture=${fixtureId}`);
      statsCache.set(fixtureId, data);
      return data;
    }

    async function getLeagueStandings(leagueId, season){
      const key = `${leagueId}_${season}`;
      if(standingsCache.has(key)) return standingsCache.get(key);

      const data = await apiReq(`standings?league=${leagueId}&season=${season}`);
      const rawStandings = data.ok ? (data?.response?.[0]?.league?.standings || []) : [];
      const flattened = Array.isArray(rawStandings) ? rawStandings.flat().filter(Boolean) : [];
      standingsCache.set(key, flattened);
      return flattened;
    }

    async function getHeadToHead(team1Id, team2Id, leagueId = null, season = null){
      const key = `${team1Id}_${team2Id}_${leagueId || "all"}_${season || "all"}`;
      if(h2hCache.has(key)) return h2hCache.get(key);

      let path = `fixtures/headtohead?h2h=${team1Id}-${team2Id}`;
      if(leagueId && season) path += `&league=${leagueId}&season=${season}`;

      const data = await apiReq(path);
      const response = data.ok ? (data.response || []) : [];
      h2hCache.set(key, response);
      return response;
    }

    function statVal(statsArr, type){
      if(!Array.isArray(statsArr)) return 0;
      const item = statsArr.find(x => x.type === type);
      if(!item || item.value == null) return 0;
      return parseFloat(String(item.value).replace("%","").trim()) || 0;
    }

    function getTeamGoals(fixture, teamId){
      return fixture?.teams?.home?.id === teamId ? (fixture?.goals?.home ?? 0) : (fixture?.goals?.away ?? 0);
    }

    function getOpponentGoals(fixture, teamId){
      return fixture?.teams?.home?.id === teamId ? (fixture?.goals?.away ?? 0) : (fixture?.goals?.home ?? 0);
    }

    function estimateXG(statsArr, goals = 0){
      const shotsOnGoal = statVal(statsArr, "Shots on Goal");
      const shotsOffGoal = statVal(statsArr, "Shots off Goal");
      const totalShots = statVal(statsArr, "Total Shots");
      const dangerous = statVal(statsArr, "Dangerous Attacks");
      const corners = statVal(statsArr, "Corner Kicks");

      let xg =
        (shotsOnGoal * 0.18) +
        (shotsOffGoal * 0.07) +
        (Math.max(totalShots - shotsOnGoal - shotsOffGoal, 0) * 0.03) +
        (dangerous * 0.008) +
        (corners * 0.02) +
        (goals * 0.30);

      if(!Number.isFinite(xg) || xg <= 0) xg = goals > 0 ? (0.65 + goals * 0.28) : 0.70;
      return xg;
    }

    async function batchCalculate(list, teamId){
      if(!list.length) return { xg:"0.00", xga:"0.00", cor:"0.0", crd:"0.0" };

      let xgSum=0, xgaSum=0, corSum=0, crdSum=0, count=0;

      for(const f of list){
        const st = await getFixtureStats(f.fixture.id);
        if(!st?.ok || !st?.response || st.response.length < 2) continue;

        const myObj = st.response.find(x => x.team.id === teamId);
        const opObj = st.response.find(x => x.team.id !== teamId);
        if(!myObj || !opObj) continue;

        const my = myObj.statistics || [];
        const op = opObj.statistics || [];

        let myXG = statVal(my, "Expected Goals");
        if(myXG <= 0) myXG = estimateXG(my, getTeamGoals(f, teamId));

        let oppXG = statVal(op, "Expected Goals");
        if(oppXG <= 0) oppXG = estimateXG(op, getOpponentGoals(f, teamId));

        xgSum += myXG;
        xgaSum += oppXG;
        corSum += statVal(my, "Corner Kicks");
        crdSum += statVal(my, "Yellow Cards") + statVal(my, "Red Cards");
        count++;
      }

      return {
        xg: count > 0 ? (xgSum / count).toFixed(2) : "0.00",
        xga: count > 0 ? (xgaSum / count).toFixed(2) : "0.00",
        cor: count > 0 ? (corSum / count).toFixed(1) : "0.0",
        crd: count > 0 ? (crdSum / count).toFixed(1) : "0.0"
      };
    }

    async function getTeamData(teamId, leagueId, season, venueType){
      const [seasonStats, allFixs] = await Promise.all([
        getTeamSeasonStats(teamId, leagueId, season),
        getLastFixtures(teamId, leagueId, season)
      ]);

      const genLast = allFixs.slice(0, LAST_GENERAL);
      const splitLast = allFixs.filter(f => venueType === "home" ? f.teams.home.id === teamId : f.teams.away.id === teamId).slice(0, LAST_SPLIT);

      const [form, split] = await Promise.all([
        batchCalculate(genLast, teamId),
        batchCalculate(splitLast, teamId)
      ]);

      const baseXG = parseFloat(seasonStats?.goals?.for?.average?.total) || 1.10;
      const baseXGA = parseFloat(seasonStats?.goals?.against?.average?.total) || 1.10;

      return {
        seasonXG: baseXG.toFixed(2),
        seasonXGA: baseXGA.toFixed(2),
        formXG: form.xg,
        formXGA: form.xga,
        splitXG: split.xg,
        splitXGA: split.xga,
        corners: form.cor,
        cards: form.crd,
        splitCards: split.crd,
        history: genLast.slice(0,5).map(f => {
          const myG = getTeamGoals(f, teamId);
          const opG = getOpponentGoals(f, teamId);
          return myG > opG ? { res:"Ν", cls:"W" } : (myG < opG ? { res:"Η", cls:"L" } : { res:"Ι", cls:"D" });
        }).reverse()
      };
    }

    function getTeamRankFromStandings(standings, teamId){
      if(!Array.isArray(standings) || !standings.length) return null;
      const row = standings.find(x => String(x?.team?.id) === String(teamId));
      return row?.rank ?? null;
    }

    function computeMarketScores(hStats, aStats){
      const hSeasonXG = safeNum(hStats.seasonXG, 1.10);
      const aSeasonXG = safeNum(aStats.seasonXG, 1.10);
      const hSeasonXGA = safeNum(hStats.seasonXGA, 1.10);
      const aSeasonXGA = safeNum(aStats.seasonXGA, 1.10);

      const hFormXG = safeNum(hStats.formXG, 1.10);
      const aFormXG = safeNum(aStats.formXG, 1.10);
      const hFormXGA = safeNum(hStats.formXGA, 1.10);
      const aFormXGA = safeNum(aStats.formXGA, 1.10);

      const hSplitXG = safeNum(hStats.splitXG, hFormXG);
      const aSplitXG = safeNum(aStats.splitXG, aFormXG);
      const hSplitXGA = safeNum(hStats.splitXGA, hFormXGA);
      const aSplitXGA = safeNum(aStats.splitXGA, aFormXGA);

      const hAttack = (hFormXG * 0.46) + (hSplitXG * 0.34) + (hSeasonXG * 0.20);
      const aAttack = (aFormXG * 0.46) + (aSplitXG * 0.34) + (aSeasonXG * 0.20);

      const hLeak = (hFormXGA * 0.52) + (hSplitXGA * 0.28) + (hSeasonXGA * 0.20);
      const aLeak = (aFormXGA * 0.52) + (aSplitXGA * 0.28) + (aSeasonXGA * 0.20);

      const homeExp = clamp((hAttack * 0.62) + (aLeak * 0.38), 0.35, 3.8);
      const awayExp = clamp((aAttack * 0.62) + (hLeak * 0.38), 0.30, 3.6);
      const adjTotalXG = clamp(homeExp + awayExp, 0.80, 6.40);
      const gap = Math.abs(homeExp - awayExp);

      return {
        homeExp:Number(homeExp.toFixed(2)),
        awayExp:Number(awayExp.toFixed(2)),
        adjTotalXG:Number(adjTotalXG.toFixed(2)),
        gap:Number(gap.toFixed(2))
      };
    }

      return {

        points: document.getElementById("chkPoints").checked,
        goals25: document.getElementById("chkGoals25").checked,

    function marketLabel(market){
      const map = {
        HOME:"1",
        AWAY:"2",
        OVER_2_5:"OVER 2.5 GOALS",
        OVER_3_5:"OVER 3.5 GOALS",
        CARDS_OVER_2_5:"OVER 2.5 CARDS",
        CORNERS_OVER_8_5:"OVER 8.5 CORNERS"
      };
      return map[market] || market;
    }

    function buildCandidates(scores, hStats, aStats, enabled){
      const candidates = [];

      const homeExp = safeNum(scores.homeExp);
      const awayExp = safeNum(scores.awayExp);
      const totalXG = safeNum(scores.adjTotalXG);
      const gap = safeNum(scores.gap);

      const hCorners = safeNum(hStats.corners);
      const aCorners = safeNum(aStats.corners);
      const hCards = safeNum(hStats.cards);
      const aCards = safeNum(aStats.cards);

      const totalCornersBase =
        (hCorners * 0.34) +
        (aCorners * 0.34) +
        ((safeNum(hStats.splitXG) + safeNum(aStats.splitXG)) * 0.85) +
        2.8;

      const cardsBase =
        (hCards * 0.52) +
        (aCards * 0.52) +
        ((safeNum(hStats.splitCards) + safeNum(aStats.splitCards)) * 0.25);

      if(enabled.points && homeExp >= 1.55 && gap >= 0.60 && safeNum(hStats.splitXG) >= 1.45){
        candidates.push({
          market:"HOME",
          score:Number((88 + gap * 18 + homeExp * 7).toFixed(2)),
          reason:`Εντός υπεροχή | H ${homeExp.toFixed(2)} vs A ${awayExp.toFixed(2)}`
        });
      }

      if(enabled.points && awayExp >= 1.45 && gap >= 0.58 && safeNum(aStats.splitXG) >= 1.40){
        candidates.push({
          market:"AWAY",
          score:Number((88 + gap * 18 + awayExp * 7).toFixed(2)),
          reason:`Εκτός υπεροχή | A ${awayExp.toFixed(2)} vs H ${homeExp.toFixed(2)}`
        });
      }

      if(enabled.goals25 && totalXG >= 2.55 && homeExp >= 1.00 && awayExp >= 0.90){
        candidates.push({
          market:"OVER_2_5",
          score:Number((82 + totalXG * 8).toFixed(2)),
          reason:`Ισορροπημένο over profile | xG ${totalXG.toFixed(2)}`
        });
      }

      if(enabled.goals35 && totalXG >= 3.25 && homeExp >= 1.25 && awayExp >= 1.10){
        candidates.push({
          market:"OVER_3_5",
          score:Number((84 + totalXG * 9).toFixed(2)),
          reason:`High scoring profile | xG ${totalXG.toFixed(2)}`
        });
      }

      if(enabled.cards && cardsBase >= 2.9){
        candidates.push({
          market:"CARDS_OVER_2_5",
          score:Number((76 + cardsBase * 5.2).toFixed(2)),
          reason:`Πειθαρχική ένταση | Est ${cardsBase.toFixed(1)}`
        });
      }

      if(enabled.corners && totalCornersBase >= 8.7){
        candidates.push({
          market:"CORNERS_OVER_8_5",
          score:Number((78 + totalCornersBase * 2.8).toFixed(2)),
          reason:`Ισχυρό corner volume | Est ${totalCornersBase.toFixed(1)}`
        });
      }

      if(enabled.mixed && !enabled.points && !enabled.goals25 && !enabled.goals35 && !enabled.cards && !enabled.corners){
        if(totalXG >= 2.55) {
          candidates.push({
            market:"OVER_2_5",
            score:Number((80 + totalXG * 8).toFixed(2)),
            reason:`Μικτή fallback επιλογή | xG ${totalXG.toFixed(2)}`
          });
        }
      }

      return candidates.sort((a,b)=>b.score-a.score);
    }

    function generateOmegaPick(bestCandidate){
      if(!bestCandidate){
        return {
          pick:"⚖️ NO BET (ΑΠΟΧΗ)",
          reason:"Δεν βρέθηκε ισχυρή μαθηματική επιλογή για το ματς.",
          noBet:true
        };
      }
      return {
        pick: marketLabel(bestCandidate.market),
        reason: bestCandidate.reason,
        noBet:false
      };
    }

    function poissonProb(lambda, k){
      if(lambda <= 0) return k === 0 ? 1 : 0;
      let fact = 1;
      for(let i=2;i<=k;i++) fact *= i;
      return (Math.exp(-lambda) * Math.pow(lambda, k)) / fact;
    }

    function predictExactScoreAndCorners(hStats, aStats){
      const scores = computeMarketScores(hStats, aStats);
      const homeGoalExp = scores.homeExp;
      const awayGoalExp = scores.awayExp;

      let bestScore = "1-1";
      let bestProb = -1;

      for(let hg=0; hg<=5; hg++){
        for(let ag=0; ag<=5; ag++){
          const prob = poissonProb(homeGoalExp, hg) * poissonProb(awayGoalExp, ag);
          if(prob > bestProb){
            bestProb = prob;
            bestScore = `${hg}-${ag}`;
          }
        }
      }

      const hCorners = safeNum(hStats.corners);
      const aCorners = safeNum(aStats.corners);
      const totalCorners = clamp(Math.round((hCorners * 0.50) + (aCorners * 0.50) + 2.8), 6, 16);

      return {
        homeGoalExp: homeGoalExp.toFixed(2),
        awayGoalExp: awayGoalExp.toFixed(2),
        exactScore: bestScore,
        totalCorners
      };
    }

    function getWinnerTeamIdFromFixture(f){
      const hg = f?.goals?.home ?? 0;
      const ag = f?.goals?.away ?? 0;
      if(hg > ag) return f?.teams?.home?.id;
      if(ag > hg) return f?.teams?.away?.id;
      return null;
    }

    function summarizeH2H(h2hFixtures, homeTeamId, awayTeamId){
      if(!Array.isArray(h2hFixtures) || !h2hFixtures.length){
        return { matches:0, homeWins:0, awayWins:0, draws:0, goalsHome:0, goalsAway:0, lastResults:[] };
      }

      let homeWins=0, awayWins=0, draws=0, goalsHome=0, goalsAway=0;
      const lastResults = [];

      for(const f of h2hFixtures.slice(0,5)){
        const winnerId = getWinnerTeamIdFromFixture(f);
        const hg = f?.goals?.home ?? 0;
        const ag = f?.goals?.away ?? 0;

        const homeGoalsThis = f?.teams?.home?.id === homeTeamId ? hg : ag;
        const awayGoalsThis = f?.teams?.home?.id === awayTeamId ? hg : ag;

        goalsHome += homeGoalsThis;
        goalsAway += awayGoalsThis;

        if(winnerId === homeTeamId) homeWins++;
        else if(winnerId === awayTeamId) awayWins++;
        else draws++;

        lastResults.push(`${homeGoalsThis}-${awayGoalsThis}`);
      }

      return { matches:Math.min(h2hFixtures.length,5), homeWins, awayWins, draws, goalsHome, goalsAway, lastResults };
    }

      return {
        date:getTodayISO(),
        stake:safeNum(document.getElementById("wallbetStake")?.value, 10),
        legs:[leg1, leg2],
        estimatedScore:Number((leg1.score + leg2.score).toFixed(2))
      };
    }

          </div>
        `;

    function saveWallBet(){
      if(!latestWallBet){
        showError("Δεν υπάρχει διαθέσιμο WallBet για αποθήκευση.");
        return;
      }
      localStorage.setItem(LS_WALLBET_LAST, JSON.stringify(latestWallBet));
      const bank = getWallBetBank();
      bank.totalBets += 1;
      bank.stakeSum += safeNum(latestWallBet.stake, 10);
      saveWallBetBank(bank);
      renderBankSection();
      clearError();
      showSuccess("Το WallBet αποθηκεύτηκε.");

    async function run30DayAudit(){
      if(isRunning) return;

      isRunning = true;
      clearError(); clearSuccess(); clearDebug();
      setButtonsDisabled(true);
      setLoader(true, "AUDIT 30 ΗΜΕΡΩΝ...");

      document.getElementById("display").innerHTML = "";
      document.getElementById("topSection").innerHTML = "";
      document.getElementById("wallbetSection").innerHTML = "";

      try{
        const store = getPredictionStore();
        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - 30);

        const candidates = store.filter(x => new Date(x.date) >= cutoff);
        if(!candidates.length){
          document.getElementById("auditSection").innerHTML = `
            <div class="section-panel">
              <div class="section-title">📊 AUDIT 30 ΗΜΕΡΩΝ</div>
              <div style="color:var(--muted);">Δεν υπάρχουν αποθηκευμένες προβλέψεις στο τελευταίο 30ήμερο.</div>
            </div>
          `;
          return;
        }

        let rows = [];
        let totals = { games:0, mixedHits:0, exactHits:0, cornersAbsErrorSum:0, cornersValidGames:0 };

        for(let i=0;i<candidates.length;i++){
          const p = candidates[i];
          setProgress(Math.round(((i+1)/candidates.length)*100), `AUDIT: ${p.homeTeam} vs ${p.awayTeam}`);

          const fixtureResp = await apiReq(`fixtures?id=${p.fixtureId}`);
          const fixture = fixtureResp?.response?.[0];
          if(!fixture) continue;
          if(!isFinishedStatus(fixture?.fixture?.status?.short)) continue;

          const actualHome = safeNum(fixture?.goals?.home);
          const actualAway = safeNum(fixture?.goals?.away);
          const actualTotal = actualHome + actualAway;
          const actualExact = `${actualHome}-${actualAway}`;

          const statsResp = await getFixtureStats(p.fixtureId);
          let actualCorners = null;
          let actualCards = null;

          if(statsResp?.ok && statsResp?.response && statsResp.response.length >= 2){
            const h = statsResp.response[0]?.statistics || [];
            const a = statsResp.response[1]?.statistics || [];
            actualCorners = statVal(h, "Corner Kicks") + statVal(a, "Corner Kicks");
            actualCards = statVal(h, "Yellow Cards") + statVal(a, "Yellow Cards") + statVal(h, "Red Cards") + statVal(a, "Red Cards");
          }

          let mixedHit = null;
          switch (p.bestMixedMarket) {
            case "HOME": mixedHit = actualHome > actualAway; break;
            case "AWAY": mixedHit = actualAway > actualHome; break;
            case "OVER_2_5": mixedHit = actualTotal > 2.5; break;
            case "OVER_3_5": mixedHit = actualTotal > 3.5; break;
            case "CORNERS_OVER_8_5": mixedHit = actualCorners != null ? actualCorners > 8.5 : null; break;
            case "CARDS_OVER_2_5": mixedHit = actualCards != null ? actualCards > 2.5 : null; break;
            default: mixedHit = null;
          }

          const hitExact = String(p.exactScorePred) === actualExact;

          let cornersError = null;
          if(actualCorners != null && Number.isFinite(actualCorners)){
            cornersError = Math.abs(safeNum(p.cornersPred) - actualCorners);
            totals.cornersAbsErrorSum += cornersError;
            totals.cornersValidGames += 1;
          }

          totals.games += 1;
          if(mixedHit === true) totals.mixedHits += 1;
          if(hitExact) totals.exactHits += 1;

          rows.push({
            date:p.date?.slice(0,10) || "",
            league:p.league,
            match:`${p.homeTeam} vs ${p.awayTeam}`,
            market:p.bestMixedMarket ? marketLabel(p.bestMixedMarket) : "-",
            actualResult:`${actualHome}-${actualAway}`,
            mixedHit,
            predExact:p.exactScorePred,
            actualExact,
            hitExact,
            predCorners:p.cornersPred,
            actualCorners:actualCorners == null ? "-" : actualCorners,
            cornersError:cornersError == null ? "-" : cornersError.toFixed(1)
          });
        }

        const mixedAcc = totals.games ? ((totals.mixedHits / totals.games) * 100).toFixed(1) : "0.0";
        const exactAcc = totals.games ? ((totals.exactHits / totals.games) * 100).toFixed(1) : "0.0";
        const cornersMae = totals.cornersValidGames ? (totals.cornersAbsErrorSum / totals.cornersValidGames).toFixed(2) : "-";

        document.getElementById("auditSection").innerHTML = `
          <div class="section-panel">
            <div class="section-title">📊 AUDIT 30 ΗΜΕΡΩΝ</div>

            <div class="bank-grid" style="margin-bottom:16px;">
              <div class="bank-box"><div class="bank-label">Αγώνες</div><div class="bank-value">${totals.games}</div></div>
              <div class="bank-box"><div class="bank-label">Mixed Pick Accuracy</div><div class="bank-value">${mixedAcc}%</div></div>
              <div class="bank-box"><div class="bank-label">Exact Score Hit Rate</div><div class="bank-value">${exactAcc}%</div></div>
              <div class="bank-box"><div class="bank-label">Corners MAE</div><div class="bank-value">${cornersMae}</div></div>
            </div>

            <div class="audit-table-wrap">
              <table class="audit-table">
                <thead>
                  <tr>
                    <th>Ημ/νία</th>
                    <th>Λίγκα</th>
                    <th>Ματς</th>
                    <th>Top Market</th>
                    <th>Τελικό</th>
                    <th>Hit</th>
                    <th>Exact Pred</th>
                    <th>Exact Act</th>
                    <th>Hit</th>
                    <th>Corners Pred</th>
                    <th>Corners Act</th>
                    <th>Error</th>
                  </tr>
                </thead>
                <tbody>
                  ${rows.map(r=>`
                    <tr>
                      <td>${escapeHtml(r.date)}</td>
                      <td>${escapeHtml(r.league)}</td>
                      <td>${escapeHtml(r.match)}</td>
                      <td>${escapeHtml(String(r.market))}</td>
                      <td>${escapeHtml(String(r.actualResult))}</td>
                      <td class="${r.mixedHit ? 'audit-hit' : 'audit-miss'}">${r.mixedHit === null ? '-' : (r.mixedHit ? 'YES' : 'NO')}</td>
                      <td>${escapeHtml(r.predExact)}</td>
                      <td>${escapeHtml(r.actualExact)}</td>
                      <td class="${r.hitExact ? 'audit-hit' : 'audit-miss'}">${r.hitExact ? 'YES' : 'NO'}</td>
                      <td>${escapeHtml(String(r.predCorners))}</td>
                      <td>${escapeHtml(String(r.actualCorners))}</td>
                      <td>${escapeHtml(String(r.cornersError))}</td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          </div>
        `;
        showSuccess("Ο έλεγχος 30 ημερών ολοκληρώθηκε.");
      } catch(err){
        showError(`Σφάλμα audit: ${err?.message || "Άγνωστο σφάλμα"}`);
      } finally {
        setLoader(false);
        setButtonsDisabled(false);
        isRunning = false;
      }
    }

    async function runScan(){
      if(isRunning) return;

      isRunning = true;
      clearError(); clearSuccess(); clearDebug();
      setButtonsDisabled(true);
      setLoader(true, "ΑΝΑΖΗΤΗΣΗ ΚΑΛΥΤΕΡΩΝ ΕΠΙΛΟΓΩΝ...");

      const display = document.getElementById("display");
      display.innerHTML = "";
      document.getElementById("topSection").innerHTML = "";
      document.getElementById("wallbetSection").innerHTML = "";
      document.getElementById("auditSection").innerHTML = "";

      try{
        const selectedDate = document.getElementById("scanDate").value || getTodayISO();
        const selectedLeague = document.getElementById("leagueFilter").value;
        const selectedCount = safeNum(document.getElementById("topPickCount")?.value, 5);
        const enabled = getEnabledModes();

        const fixturesResp = await apiReq(`fixtures?date=${selectedDate}`);

        if(!fixturesResp.ok){
          showError("API error στα fixtures.");
          showDebug(JSON.stringify({
            status: fixturesResp.status,
            errors: fixturesResp.errors,
            raw: fixturesResp.raw
          }, null, 2));
          return;
        }

        let matches = (fixturesResp.response || []).filter(m => {
          if(selectedLeague === "ALL") return LEAGUES.includes(m.league.id);
          return m.league.id === parseInt(selectedLeague, 10);
        });

        matches.sort((a,b)=> (a.fixture.timestamp || 0) - (b.fixture.timestamp || 0));
        matches = matches.slice(0, MAX_MATCHES);

        if(!matches.length){
          display.innerHTML = `<div class="cyber-card"><h3 class="orbitron" style="text-align:center;color:var(--gold);margin:0;">Δεν βρέθηκαν αγώνες.</h3></div>`;
          return;
        }

        const allCandidates = [];
        let htmlBuffer = "";

        for(let i=0;i<matches.length;i++){
          const m = matches[i];
          setProgress(Math.round(((i+1)/matches.length)*100), `ΑΝΑΛΥΣΗ: ${m.teams.home.name} vs ${m.teams.away.name}`);

          const [intelHome, intelAway, standings, h2hFixtures] = await Promise.all([
            getTeamData(m.teams.home.id, m.league.id, m.league.season, "home"),
            getTeamData(m.teams.away.id, m.league.id, m.league.season, "away"),
            getLeagueStandings(m.league.id, m.league.season),
            getHeadToHead(m.teams.home.id, m.teams.away.id, m.league.id, m.league.season)
          ]);

          const scores = computeMarketScores(intelHome, intelAway);
          const h2hSummary = summarizeH2H(h2hFixtures, m.teams.home.id, m.teams.away.id);
          const candidates = buildCandidates(scores, intelHome, intelAway, enabled);
          const bestCandidate = candidates[0] || null;

          for(const cand of candidates){
            allCandidates.push({
              fixtureId:m.fixture.id,
              homeTeam:m.teams.home.name,
              awayTeam:m.teams.away.name,
              league:m.league.name,
              leagueId:m.league.id,
              homeRank:getTeamRankFromStandings(standings, m.teams.home.id),
              awayRank:getTeamRankFromStandings(standings, m.teams.away.id),
              market:cand.market,
              score:cand.score,
              reason:cand.reason
            });
          }

          htmlBuffer += buildMatchCard(
            m,
            { h:intelHome, a:intelAway },
            scores,
            standings,
            h2hSummary,
            bestCandidate
          );
        }

        latestTopLists.mixed = [...allCandidates]
          .sort((a,b)=>b.score-a.score)
          .slice(0, selectedCount);

        renderTopSections();
        renderWallBet();
        display.innerHTML = htmlBuffer;
        showSuccess("Το scan ολοκληρώθηκε.");

        showDebug(JSON.stringify({
          fixturesLoaded: matches.length,
          candidatesFound: allCandidates.length,
          topRendered: latestTopLists.mixed.length
        }, null, 2));

      } catch(err){
        showError(`Σφάλμα scan: ${err?.message || "Άγνωστο σφάλμα"}`);
      } finally {
        setLoader(false);
        setButtonsDisabled(false);
        isRunning = false;
      }
    }

    async function runLiveScan(){
      if(isRunning) return;

      isRunning = true;
      clearError(); clearSuccess(); clearDebug();
      setButtonsDisabled(true);
      setLoader(true, "ΑΝΑΖΗΤΗΣΗ LIVE ΑΓΩΝΩΝ...");

      const display = document.getElementById("display");
      display.innerHTML = "";
      document.getElementById("topSection").innerHTML = "";
      document.getElementById("wallbetSection").innerHTML = "";
      document.getElementById("auditSection").innerHTML = "";

      try{
        const selectedDate = document.getElementById("scanDate").value || getTodayISO();
        const selectedLeague = document.getElementById("leagueFilter").value;

        const fixturesResp = await apiReq(`fixtures?date=${selectedDate}`);
        if(!fixturesResp.ok){
          showError("API error στα live fixtures.");
          showDebug(JSON.stringify({
            status: fixturesResp.status,
            errors: fixturesResp.errors,
            raw: fixturesResp.raw
          }, null, 2));
          return;
        }

        let matches = (fixturesResp.response || []).filter(m => {
          const leagueOk = selectedLeague === "ALL"
            ? LEAGUES.includes(m.league.id)
            : m.league.id === parseInt(selectedLeague, 10);
          return leagueOk && isLiveStatus(m.fixture.status.short);
        });

        if(!matches.length){
          display.innerHTML = `<div class="cyber-card"><h3 class="orbitron" style="text-align:center;color:var(--gold);margin:0;">Δεν υπάρχουν live αγώνες.</h3></div>`;
          return;
        }

        let htmlBuffer = "";

        for(let i=0;i<matches.length;i++){
          const m = matches[i];
          setProgress(Math.round(((i+1)/matches.length)*100), `LIVE: ${m.teams.home.name} vs ${m.teams.away.name}`);

          const [statResp, standings, h2hFixtures] = await Promise.all([
            getFixtureStats(m.fixture.id),
            getLeagueStandings(m.league.id, m.league.season),
            getHeadToHead(m.teams.home.id, m.teams.away.id, m.league.id, m.league.season)
          ]);

          let liveStats = null;
          if(statResp?.ok && statResp?.response && statResp.response.length >= 2){
            const homeObj = statResp.response.find(x => x.team?.id === m.teams.home.id);
            const awayObj = statResp.response.find(x => x.team?.id === m.teams.away.id);

            const homeStats = homeObj?.statistics || [];
            const awayStats = awayObj?.statistics || [];

            liveStats = {
              h: {
                corners: statVal(homeStats, "Corner Kicks"),
                yellow: statVal(homeStats, "Yellow Cards"),
                red: statVal(homeStats, "Red Cards"),
                shots: statVal(homeStats, "Shots on Goal"),
                danger: statVal(homeStats, "Dangerous Attacks"),
                poss: statVal(homeStats, "Ball Possession")
              },
              a: {
                corners: statVal(awayStats, "Corner Kicks"),
                yellow: statVal(awayStats, "Yellow Cards"),
                red: statVal(awayStats, "Red Cards"),
                shots: statVal(awayStats, "Shots on Goal"),
                danger: statVal(awayStats, "Dangerous Attacks"),
                poss: statVal(awayStats, "Ball Possession")
              }
            };
          }

          const h2hSummary = summarizeH2H(h2hFixtures, m.teams.home.id, m.teams.away.id);
          htmlBuffer += buildLiveCard(m, liveStats, standings, h2hSummary);
        }

        display.innerHTML = htmlBuffer;
      } catch(err){
        showError(`Σφάλμα live: ${err?.message || "Άγνωστο σφάλμα"}`);
      } finally {
        setLoader(false);
        setButtonsDisabled(false);
        isRunning = false;
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      document.getElementById("scanDate").value = getTodayISO();
      const select = document.getElementById("leagueFilter");
      LEAGUES_DATA.forEach(l => {
        const opt = document.createElement("option");
        opt.value = l.id;
        opt.textContent = l.name;
        select.appendChild(opt);
      });
      renderBankSection();
    });
  </script>
