<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Predictor Pro v4700.10 - The Complete Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root {
      --bg: #010409; --card: #0d1117; --card-deep: #161b22; --border: #30363d;
      --p: #00f2ff; --magenta: #ff00ff; --txt: #f0f6fc; --txt-muted: #8b949e;
      --gold: #f59e0b; --live: #238636; --alert: #da3633; --neon-live: #39ff14;
      --grad: linear-gradient(135deg, #00f2ff, #8b5cf6);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 0; }
    h1, h2, h3, h4, .orbitron { font-family: 'Orbitron', sans-serif; }
    .container { width: 100%; max-width: 950px; margin: 0 auto; padding: 15px; }

    /* LIVE PULSE */
    .live-score-pulse { color: var(--neon-live); font-size: 1.5rem; font-weight: 900; animation: neonPulse 1.2s infinite; text-shadow: 0 0 10px rgba(57, 255, 20, 0.6); }
    @keyframes neonPulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    .cyber-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    .standard-glow { border-left: 5px solid var(--p); }
    .live-glow { border-left: 5px solid var(--neon-live); box-shadow: 0 0 15px rgba(57, 255, 20, 0.1); }
    .finished-glow { border-left: 5px solid #555; opacity: 0.85; }

    .btn-wrap { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
    .btn-main { flex: 1; min-width: 180px; padding: 15px; background: var(--grad); color:#fff; border:none; border-radius:12px; font-weight:900; cursor:pointer; font-family:'Orbitron'; text-transform: uppercase; }
    
    .acca-box { background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
    .motd-card { background: linear-gradient(135deg, #f59e0b, #d97706); border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 25px; color: #000; }
    
    .form-dot { display: inline-block; width: 20px; height: 20px; border-radius: 50%; text-align: center; line-height: 20px; font-size: 0.7rem; font-weight: 900; margin-right: 4px; color: #fff; }
    .form-W { background: var(--live); } .form-D { background: #666; } .form-L { background: var(--alert); }
    .stat-val { font-family: 'Orbitron'; font-weight: 900; color: var(--p); }
  </style>
</head>

<body>
  <div id="authScreen" style="text-align:center; margin-top:20vh;">
    <h1 class="orbitron" style="color:var(--p);">APEX ALPHA v4700.10</h1>
    <input type="password" id="pin" placeholder="PIN" oninput="if(this.value==='106014'){document.getElementById('authScreen').style.display='none';document.getElementById('app').style.display='block';}" 
           style="background:#000; color:var(--p); border:1px solid var(--p); padding:15px; text-align:center; font-size:2rem; border-radius:12px; font-family:'Orbitron'; outline:none;">
  </div>

  <div id="app" style="display:none;">
    <div class="container">
      <header style="text-align:center; padding:20px 0;">
        <h1 class="orbitron" style="color:var(--p); margin:0;">OMEGA TERMINAL</h1>
      </header>

      <div class="btn-wrap">
        <button class="btn-main" onclick="runScan('pre')">🚀 PRE-MATCH SCAN</button>
        <button class="btn-main" style="background:#da3633" onclick="runScan('live')">🔴 LIVE RADAR</button>
        <button class="btn-main" style="background:#222;" onclick="exportPDF()">📄 PDF</button>
        <button class="btn-main" style="background:#222;" onclick="exportXML()">📋 XML</button>
      </div>

      <div id="loader" style="display:none; text-align:center; margin-bottom:20px;">
        <div id="bar" style="width:0%; height:10px; background:var(--grad); transition:0.3s; border-radius:5px;"></div>
        <p id="status" class="orbitron" style="font-size:0.7rem; color:var(--p);"></p>
      </div>

      <div id="labSection"></div>
      <div id="display"></div>
    </div>
  </div>

  <script>
    const KEY = "956cbd05f9e9bf934df78d9b72d9a3a0";
    const API = "https://v3.football.api-sports.io";
    const LEAGUES = [39, 40, 41, 140, 141, 135, 78, 79, 61, 62, 253, 262, 128, 197, 318, 94, 88, 144, 2, 3, 84, 203, 357];
    let masterData = [];

    async function fetchData(path) {
      const r = await fetch(`${API}/${path}`, { headers: {"x-apisports-key": KEY} });
      return await r.json();
    }

    async function getDeepStats(teamId) {
      const r = await fetchData(`fixtures?team=${teamId}&last=6&status=FT`);
      const fixs = r.response || [];
      let txG = 0, txGA = 0, tCor = 0, tCrd = 0, form = [];

      for(let f of fixs) {
        let isH = f.teams.home.id === teamId;
        form.push(isH ? (f.goals.home > f.goals.away ? 'W' : (f.goals.home < f.goals.away ? 'L' : 'D')) : (f.goals.away > f.goals.home ? 'W' : (f.goals.away < f.goals.home ? 'L' : 'D')));
        
        const sR = await fetchData(`fixtures/statistics?fixture=${f.fixture.id}`);
        const sA = sR.response || [];
        if(sA.length === 2) {
          let my = sA.find(s => s.team.id === teamId).statistics;
          let op = sA.find(s => s.team.id !== teamId).statistics;
          let getV = (a, t) => { 
            let o = a.find(x => x.type === t); 
            let v = o && o.value ? parseFloat(o.value) : 0;
            return isNaN(v) ? 0 : v;
          };

          // SMART xG INFERENCE
          let xG = getV(my, "Expected Goals");
          if(xG === 0) xG = (getV(my, "Shots on Goal") * 0.15) + ((isH ? f.goals.home : f.goals.away) * 0.6);
          
          let xGA = getV(op, "Expected Goals");
          if(xGA === 0) xGA = (getV(op, "Shots on Goal") * 0.15) + ((isH ? f.goals.away : f.goals.home) * 0.6);

          txG += xG; txGA += xGA;
          tCor += getV(my, "Corner Kicks");
          tCrd += (getV(my, "Yellow Cards") + getV(my, "Red Cards"));
        }
        await new Promise(res => setTimeout(res, 120));
      }
      return { xG: (txG/6).toFixed(2), xGA: (txGA/6).toFixed(2), corners: (tCor/6).toFixed(1), cards: (tCrd/6).toFixed(1), form: form.reverse() };
    }

    async function runScan(mode) {
      document.getElementById('loader').style.display = 'block';
      document.getElementById('display').innerHTML = "";
      document.getElementById('labSection').innerHTML = "";
      const date = new Date().toISOString().split('T')[0];
      const res = await fetchData(`fixtures?date=${date}`);
      const matches = (res.response || []).filter(m => LEAGUES.includes(m.league.id));
      masterData = [];

      for(let i=0; i < matches.length; i++) {
        let m = matches[i];
        document.getElementById('bar').style.width = ((i+1)/matches.length * 100) + "%";
        document.getElementById('status').innerText = `CALIBRATING: ${m.teams.home.name}`;
        
        let stats = null;
        if(mode === 'pre') {
          stats = { h: await getDeepStats(m.teams.home.id), a: await getDeepStats(m.teams.away.id) };
          // Calculate Win Prob based on xG
          let total = parseFloat(stats.h.xG) + parseFloat(stats.a.xG) + 0.5;
          stats.probH = Math.round((stats.h.xG / total) * 100);
          stats.probA = Math.round((stats.a.xG / total) * 100);
          stats.conf = Math.max(stats.probH, stats.probA);
        }
        masterData.push({ m, stats, mode });
        renderMatch(m, stats, mode);
      }
      if(mode === 'pre') renderLab();
      document.getElementById('loader').style.display = 'none';
    }

    function renderLab() {
      let motd = [...masterData].sort((a,b) => b.stats.conf - a.stats.conf)[0];
      let safe = masterData.filter(d => d.stats.conf > 70).slice(0,6);
      let bombs = masterData.filter(d => d.stats.conf < 55 && (parseFloat(d.stats.h.xG) + parseFloat(d.stats.a.xG) > 3));

      document.getElementById('labSection').innerHTML = `
        <div class="motd-card">
          <h2 class="orbitron">🏆 MATCH OF THE DAY</h2>
          <h3>${motd.m.teams.home.name} vs ${motd.m.teams.away.name}</h3>
          <p style="font-weight:900; font-size:1.5rem;">PICK: ${motd.stats.probH > motd.stats.probA ? '1' : '2'} (${motd.stats.conf}%)</p>
        </div>
        <div class="acca-box">
          <h4 class="orbitron" style="color:var(--p);">🛡️ SAFE ACCA (>70%)</h4>
          ${safe.map(s => `<div>${s.m.teams.home.name} - ${s.m.teams.away.name} : <b>${s.stats.probH > s.stats.probA ? '1' : '2'}</b></div>`).join('')}
        </div>
      `;
    }

    function renderMatch(m, s, mode) {
      const isLive = ["1H","2H","HT","LIVE"].includes(m.fixture.status.short);
      const isFT = m.fixture.status.short === "FT";
      const glow = isLive ? 'live-glow' : (isFT ? 'finished-glow' : 'standard-glow');
      
      document.getElementById('display').innerHTML += `
        <div class="cyber-card ${glow}">
          <div style="display:flex; justify-content:space-between;">
            <div>
              <span class="status-badge ${isLive ? 'badge-live' : ''}">${isLive ? 'LIVE '+m.fixture.status.elapsed+"'" : m.fixture.status.short}</span>
              <div class="orbitron">${m.teams.home.name}</div>
              <div class="orbitron">${m.teams.away.name}</div>
            </div>
            <div class="${isLive ? 'live-score-pulse' : ''}" style="font-size:2rem;">${m.goals.home ?? 0} - ${m.goals.away ?? 0}</div>
          </div>
          ${mode === 'pre' ? `<div style="margin-top:10px; font-size:0.8rem; color:var(--txt-muted);">
            Home xG: ${s.h.xG} | Away xG: ${s.a.xG} <br>
            xC: ${s.h.corners}-${s.a.corners} | xCard: ${s.h.cards}-${s.a.cards}
          </div>` : ''}
        </div>`;
    }

    function exportPDF() { html2pdf().from(document.getElementById('app')).save('Apex_Report.pdf'); }
    function exportXML() {
      let xml = "<Report>" + masterData.map(d => `<Match><Teams>${d.m.teams.home.name}-${d.m.teams.away.name}</Teams><Score>${d.m.goals.home}-${d.m.goals.away}</Score></Match>`).join('') + "</Report>";
      navigator.clipboard.writeText(xml); alert("XML Copied!");
    }
  </script>
</body>
</html>
