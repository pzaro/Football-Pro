<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Predictor Pro v4700.4 - The Ultimate Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #010409; --card: #0d1117; --card-deep: #161b22; --border: #30363d;
      --p: #00f2ff; --magenta: #ff00ff; --txt: #f0f6fc; --txt-muted: #8b949e;
      --gold: #f59e0b; --live: #238636; --alert: #da3633;
      --grad: linear-gradient(135deg, #00f2ff, #8b5cf6);
      --grad-gold: linear-gradient(135deg, #f59e0b, #d97706);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 0; font-size: 16px; overflow-x: hidden; }
    h1, h2, h3, .orbitron { font-family: 'Orbitron', sans-serif; }
    .container { width: 100%; max-width: 900px; margin: 0 auto; padding: 15px; }

    /* --- LIVESCORE TICKER CSS --- */
    .ticker-wrap { width: 100%; overflow: hidden; background: #000; border-bottom: 1px solid var(--p); padding: 10px 0; box-sizing: border-box; box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }
    .ticker-move { display: inline-flex; white-space: nowrap; animation: ticker 35s linear infinite; }
    .ticker-move:hover { animation-play-state: paused; }
    .ticker-item { display: inline-block; padding: 0 25px; color: var(--txt); font-size: 0.85rem; font-family: 'Orbitron', sans-serif; font-weight: 700; border-right: 1px solid #333; }
    .ticker-live { color: var(--alert); animation: pulseTicker 1.5s infinite; margin-right: 6px; }
    .ticker-score { color: var(--gold); font-size: 1.05rem; margin: 0 6px; }
    @keyframes ticker { 0% { transform: translate3d(100vw, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
    @keyframes pulseTicker { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    .shock-bar-bg { background: #222; height: 6px; border-radius: 3px; margin-top: 5px; overflow: hidden; border: 1px solid #333; }
    .shock-bar-fill { height: 100%; transition: width 0.5s; }
    .shock-low { background: var(--live); box-shadow: 0 0 10px var(--live); }
    .shock-med { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
    .shock-high { background: var(--alert); box-shadow: 0 0 15px var(--alert); animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    .cyber-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; transition: 0.3s; }
    .gold-glow { border-left: 4px solid var(--gold); box-shadow: 0 0 20px rgba(245,158,11,0.1); }
    .standard-glow { border-left: 4px solid var(--p); }
    
    .status-badge { font-size: 0.65rem; font-weight: 900; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; margin-bottom: 8px; display: inline-block; letter-spacing: 1px;}
    .badge-fatigue { background: rgba(218, 54, 51, 0.2); color: var(--alert); border: 1px solid var(--alert); }
    .badge-stable { background: rgba(35, 134, 54, 0.2); color: var(--live); border: 1px solid var(--live); }

    .team-name { font-weight: 800; font-size: 1.15rem; color: #fff; margin: 4px 0; }
    .btn-apex { width: 100%; padding: 20px; background: var(--grad); color:#fff; border:none; border-radius:16px; font-weight:900; cursor:pointer; font-family:'Orbitron'; font-size: 1.1rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; transition: 0.2s;}
    .btn-apex:hover { transform: scale(1.02); }

    .btn-toggle { background: transparent; color: var(--txt-muted); border: 1px solid var(--border); padding: 8px 15px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; font-weight: 700; width: 100%; margin-top: 15px; transition: 0.2s;}
    .btn-toggle:hover { background: var(--border); color: #fff; }
    
    .deep-intel-box { display: none; background: var(--card-deep); border-radius: 12px; padding: 15px; margin-top: 15px; border: 1px solid #222; font-size: 0.85rem; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #333; }
    .stat-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px solid #222; }
    .stat-title { color: var(--txt-muted); font-size: 0.65rem; text-transform: uppercase; font-weight: 800; margin-bottom: 5px; }
    .stat-value { font-family: 'Orbitron'; font-size: 1.1rem; font-weight: 900; color: #fff; }
    
    .form-circle { display: inline-block; width: 18px; height: 18px; border-radius: 50%; text-align: center; line-height: 18px; font-size: 0.6rem; font-weight: 900; color: #fff; margin-right: 3px; }
    .form-W { background: var(--live); }
    .form-D { background: #555; }
    .form-L { background: var(--alert); }

    .rule-item { margin-bottom: 8px; padding-left: 15px; border-left: 2px solid var(--magenta); color: #c9d1d9; }

    /* DATA LAB & PAROLI CSS */
    .lab-panel { background: #000; border: 1px solid var(--p); border-radius: 16px; padding: 20px; margin-bottom: 25px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.05); }
    .motd-card { background: var(--grad-gold); color: #fff; border-radius: 16px; padding: 2px; margin-bottom: 25px; box-shadow: 0 0 25px rgba(245, 158, 11, 0.3); }
    .motd-inner { background: #000; border-radius: 14px; padding: 20px; text-align: center; }
    .acca-box { background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
    .acca-row { display: flex; justify-content: space-between; border-bottom: 1px dashed #333; padding: 8px 0; font-size: 0.9rem; }
    .acca-row:last-child { border-bottom: none; }
  </style>
</head>

<body>
  <div id="authScreen">
    <div class="container" style="margin-top:20vh; text-align:center;">
      <h1 class="orbitron" style="color:var(--p); font-size:3rem; margin-bottom:10px;">APEX ALPHA</h1>
      <p style="color:var(--txt-muted); font-weight:600; letter-spacing:1px;">SOVEREIGN OMEGA v4700.4 // LAB ENABLED</p>
      <input type="password" id="pinInput" placeholder="••••••" oninput="instantAuth(this)" 
             style="width:280px; padding:20px; text-align:center; font-size:2.5rem; border-radius:16px; border:1px solid var(--border); background:#000; color:var(--p); font-family:'Orbitron'; letter-spacing:10px; outline:none; margin-top: 20px;">
    </div>
  </div>

  <div id="appContent" style="display:none;">
    <div class="ticker-wrap" id="liveTickerWrap" style="display:none;">
      <div class="ticker-move" id="liveTicker"></div>
    </div>

    <div class="container">
      <header style="text-align:center; padding: 20px 0 30px 0;">
        <h1 class="orbitron" style="color:var(--p); margin:0; font-size:2.2rem; letter-spacing:-1px;">PREDICTOR <span style="color:#fff">PRO</span></h1>
        <small style="color:var(--magenta); font-weight:900; letter-spacing:4px; font-size:0.7rem;">DATA LAB & PAROLI ENGINE</small>
      </header>

      <button class="btn-apex" id="scanBtn" onclick="runApexScan()">🚀 START DEEP SCAN</button>

      <div id="syncCont" style="display:none; margin-bottom:30px;">
        <div style="background:#000; height:8px; border-radius:4px; overflow:hidden;">
          <div id="syncFill" style="background:var(--grad); height:100%; width:0%; transition:0.3s;"></div>
        </div>
        <p id="syncStep" class="orbitron" style="text-align:center; color:var(--p); font-size:0.75rem; font-weight:900; margin-top:12px;"></p>
      </div>

      <div id="resultsDashboard">
        <div id="labSection"></div>
        <div id="upcomingList"></div>
      </div>
    </div>
  </div>

  <script>
    const KEY = "956cbd05f9e9bf934df78d9b72d9a3a0";
    const API_BASE = "https://v3.football.api-sports.io";
    let masterData = [];

    const targetLeagues = [39, 40, 140, 135, 78, 79, 61, 253, 262, 128, 197, 318, 94, 88, 144, 2, 3, 84];

    function instantAuth(el) {
      if (el.value === "106014") {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('appContent').style.display = 'block';
        fetchLiveScores();
        setInterval(fetchLiveScores, 60000); 
      }
    }

    function toggleIntel(id) {
      const el = document.getElementById(`intel-${id}`);
      el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    async function apiFetch(path) {
      try {
        const r = await fetch(`${API_BASE}/${path}`, { headers: {"x-apisports-key": KEY} });
        return await r.json();
      } catch(e) { return { response: [] }; }
    }

    async function fetchLiveScores() {
      const liveLeagues = targetLeagues.join('-');
      try {
        const res = await apiFetch(`fixtures?live=${liveLeagues}`);
        const matches = res.response || [];
        const tickerEl = document.getElementById('liveTicker');
        const wrapEl = document.getElementById('liveTickerWrap');

        if (matches.length > 0) {
          wrapEl.style.display = 'block';
          let html = '';
          matches.forEach(m => {
            let time = m.fixture.status.elapsed ? m.fixture.status.elapsed + "'" : "HT";
            html += `<div class="ticker-item"><span class="ticker-live">⏱ ${time}</span> ${m.teams.home.name} <span class="ticker-score">${m.goals.home} - ${m.goals.away}</span> ${m.teams.away.name}</div>`;
          });
          tickerEl.innerHTML = html + html; 
        } else {
          wrapEl.style.display = 'none';
        }
      } catch(e) {}
    }

    async function getRealFormStats(teamId) {
      let res = await apiFetch(`fixtures?team=${teamId}&last=6&status=FT`);
      let pastFixs = res.response || [];
      let totalXG = 0, totalXGA = 0, totalCorners = 0, totalCards = 0;
      let formArr = []; let count = 0;

      for(let pf of pastFixs) {
        let fixId = pf.fixture.id;
        let isHome = pf.teams.home.id === teamId;
        let goalsFor = isHome ? pf.goals.home : pf.goals.away;
        let goalsAgainst = isHome ? pf.goals.away : pf.goals.home;
        
        if (goalsFor > goalsAgainst) formArr.push('W');
        else if (goalsFor < goalsAgainst) formArr.push('L');
        else formArr.push('D');

        let statsRes = await apiFetch(`fixtures/statistics?fixture=${fixId}`);
        let statsArr = statsRes.response || [];
        
        if(statsArr.length === 2) {
          let myStats = statsArr.find(s => s.team.id === teamId)?.statistics || [];
          let oppStats = statsArr.find(s => s.team.id !== teamId)?.statistics || [];
          let getStat = (arr, type) => {
            let obj = arr.find(x => x.type === type);
            let val = obj && obj.value ? parseFloat(obj.value) : 0;
            return isNaN(val) ? 0 : val; 
          };

          let matchXG = getStat(myStats, "Expected Goals");
          let matchXGA = getStat(oppStats, "Expected Goals");
          
          if (matchXG === 0) matchXG = goalsFor > 0 ? goalsFor : 0.1;
          if (matchXGA === 0) matchXGA = goalsAgainst > 0 ? goalsAgainst : 0.1;

          totalXG += matchXG; totalXGA += matchXGA;
          totalCorners += getStat(myStats, "Corner Kicks");
          totalCards += getStat(myStats, "Yellow Cards") + getStat(myStats, "Red Cards");
          count++;
        }
        await new Promise(r => setTimeout(r, 120)); 
      }
      let avg = (val) => count > 0 ? (val/count).toFixed(2) : "0.00";
      return { xG: avg(totalXG), xGA: avg(totalXGA), corners: avg(totalCorners), cards: avg(totalCards), formStr: formArr.reverse() };
    }

    function calculateApex(hStats, aStats, pD, fixture) {
      let rulesLog = [];
      let rawHXG = parseFloat(hStats.xG) || 0.5; let rawAXG = parseFloat(aStats.xG) || 0.5;
      let hXG = rawHXG; let aXG = rawAXG;

      let h2hList = [];
      if (pD.h2h && pD.h2h.length > 0) {
        let maxH2h = Math.min(3, pD.h2h.length); 
        for(let i=0; i<maxH2h; i++) {
          let match = pD.h2h[i];
          if(match.goals.home !== null) {
            h2hList.push(`${match.teams.home.name} <span style="color:var(--p); font-weight:900;">${match.goals.home} - ${match.goals.away}</span> ${match.teams.away.name}`);
          }
        }
      }
      if(h2hList.length === 0) h2hList.push("Δεν υπάρχει πρόσφατη προϊστορία");

      let isFatigued = false;
      const eliteLeagues = [39, 140, 135, 78, 61, 2, 3, 84]; 
      if (eliteLeagues.includes(fixture.league.id)) {
        isFatigued = true; hXG *= 0.88; 
        rulesLog.push("⚠️ Fatigue Penalty (-12% xG) βάσει L-12 match density.");
      }

      const favoriteStrength = Math.max(hXG, aXG); const underdogAttack = Math.min(hXG, aXG);
      let shockScore = ((underdogAttack / favoriteStrength) * 100).toFixed(0);
      if (isFatigued) shockScore = Math.min(parseInt(shockScore) + 15, 100);

      let total = hXG + aXG + 0.6; 
      let hP = Math.round((hXG / total) * 100);
      let aP = Math.round((aXG / total) * 100);
      let dP = 100 - hP - aP;

      let mainPick = hP > aP ? '1' : '2';
      let pickColor = 'var(--p)'; let isDC = false;
      
      if (Math.max(hP, aP) >= 60 && Math.max(hP, aP) <= 72) {
        mainPick = hP > aP ? '1X' : 'X2'; pickColor = 'var(--gold)'; isDC = true;
        rulesLog.push("⚖️ Derby Deadlock Guard ενεργό: DC Protection.");
      }

      let marketText = "2-3 GOALS";
      if (!isDC && shockScore < 50) marketText = "OVER 1.5 TEAM GOALS";

      return { 
        rawHXG: rawHXG.toFixed(2), rawAXG: rawAXG.toFixed(2),
        rawHXGA: hStats.xGA, rawAXGA: aStats.xGA,
        hXCorner: hStats.corners, aXCorner: aStats.corners, 
        hXCards: hStats.cards, aXCards: aStats.cards, 
        hFormStr: hStats.formStr, aFormStr: aStats.formStr, h2hList,
        adjHXG: hXG.toFixed(2), adjAXG: aXG.toFixed(2),
        hP, dP, aP, shockScore, isFatigued, rulesLog, mainPick, pickColor, marketText,
        confidence: Math.max(hP, aP)
      };
    }

    async function runApexScan() {
      const btn = document.getElementById('scanBtn');
      btn.disabled = true; btn.innerText = "EXTRACTING DEEP STATS...";
      
      const tzOffset = (new Date()).getTimezoneOffset() * 60000;
      const day = (new Date(Date.now() - tzOffset)).toISOString().split('T')[0];
      
      document.getElementById('syncCont').style.display = 'block';
      masterData = []; document.getElementById('upcomingList').innerHTML = "";
      document.getElementById('labSection').innerHTML = "";

      const fD = await apiFetch(`fixtures?date=${day}`);
      const allFixtures = fD.response || [];
      const filteredFixtures = allFixtures.filter(m => targetLeagues.includes(m.league.id));
      const fixtures = filteredFixtures.slice(0, 15); 

      if(fixtures.length === 0) {
          document.getElementById('syncStep').innerText = "ΚΑΝΕΝΑ ΜΑΤΣ ΑΠΟ ΤΙΣ ΛΙΓΚΕΣ ΜΑΣ ΣΗΜΕΡΑ";
          document.getElementById('syncFill').style.width = '100%';
          setTimeout(() => { document.getElementById('syncCont').style.display = 'none'; btn.disabled = false; btn.innerText = "🚀 Run Premium Scan"; }, 3000);
          return;
      }

      for (let i = 0; i < fixtures.length; i++) {
        const m = fixtures[i];
        document.getElementById('syncFill').style.width = Math.round(((i) / fixtures.length) * 100) + '%';
        document.getElementById('syncStep').innerText = `ANALYZING: ${m.teams.home.name}`;

        const hStats = await getRealFormStats(m.teams.home.id);
        const aStats = await getRealFormStats(m.teams.away.id);
        const pData = await apiFetch(`predictions?fixture=${m.fixture.id}`);
        const p0 = pData.response?.[0];
        
        if (p0) masterData.push({ id: m.fixture.id, fixture: m, calc: calculateApex(hStats, aStats, p0, m) });
      }

      document.getElementById('syncFill').style.width = '100%';
      document.getElementById('syncCont').style.display = 'none';
      btn.style.display = 'none'; 
      renderLabAndAccas();
      renderApexDashboard();
    }

    function buildFormHtml(formArray) {
      if(!formArray || formArray.length === 0) return `<span class="form-circle form-D">-</span>`;
      return formArray.map(f => `<span class="form-circle form-${f}">${f}</span>`).join('');
    }

    // --- RENDER MOTD, LAB & ACCAS ---
    function renderLabAndAccas() {
      const labContainer = document.getElementById('labSection');
      
      // 1. Data Lab Calculations
      let totalGoalsExp = masterData.reduce((sum, d) => sum + parseFloat(d.calc.adjHXG) + parseFloat(d.calc.adjAXG), 0);
      let avgGoals = (totalGoalsExp / masterData.length).toFixed(2);
      let highRiskCount = masterData.filter(d => d.calc.shockScore > 65).length;
      
      // 2. MOTD Calculation (Υψηλότερο Confidence, Χαμηλότερο Shock)
      let sortedMOTD = [...masterData].sort((a, b) => {
        if(b.calc.confidence !== a.calc.confidence) return b.calc.confidence - a.calc.confidence;
        return a.calc.shockScore - b.calc.shockScore;
      });
      let motd = sortedMOTD[0];

      // 3. Παρολί (Accas)
      let safeAccaMatches = sortedMOTD.slice(0, 4); // Τα 4 πιο "safe"
      let valueAccaMatches = masterData.filter(d => d.calc.marketText === "2-3 GOALS" && d.calc.shockScore < 60).slice(0, 3);

      let safeAccaHtml = safeAccaMatches.map(m => `<div class="acca-row"><span>${m.fixture.teams.home.name} - ${m.fixture.teams.away.name}</span> <strong style="color:var(--p)">${m.calc.mainPick}</strong></div>`).join('');
      let valueAccaHtml = valueAccaMatches.map(m => `<div class="acca-row"><span>${m.fixture.teams.home.name} - ${m.fixture.teams.away.name}</span> <strong style="color:var(--gold)">2-3 GOALS</strong></div>`).join('');
      if(valueAccaHtml === "") valueAccaHtml = "<div style='color:var(--txt-muted); font-size:0.8rem; text-align:center;'>Δεν βρέθηκαν ιδανικά Value Matches σήμερα.</div>";

      labContainer.innerHTML = `
        <h3 class="orbitron" style="color:var(--gold); text-align:center; margin-bottom:10px;">🏆 MATCH OF THE DAY</h3>
        <div class="motd-card">
          <div class="motd-inner">
            <span class="status-badge" style="background:var(--gold); color:#000;">⭐ OMEGA CONFIDENCE: ${motd.calc.confidence}%</span>
            <h2 style="margin:10px 0;">${motd.fixture.teams.home.name} vs ${motd.fixture.teams.away.name}</h2>
            <div style="font-size:1.5rem; color:var(--p); font-weight:900; font-family:'Orbitron';">ΠΡΟΤΑΣΗ: ${motd.calc.mainPick}</div>
            <p style="color:var(--txt-muted); font-size:0.85rem;">Με βάση τα Real Stats, αυτό το ματς παρουσιάζει την υψηλότερη στατιστική επαλήθευση (Shock Potential: ${motd.calc.shockScore}%).</p>
          </div>
        </div>

        <div class="lab-panel">
          <div class="stats-grid" style="border-bottom:none; margin-bottom:0; padding-bottom:0;">
            
            <div>
              <h4 class="orbitron" style="color:var(--p); margin-top:0;">📋 OMEGA ACCAS</h4>
              <div class="acca-box">
                <div style="color:var(--p); font-size:0.75rem; font-weight:900; margin-bottom:8px;">🟢 SAFE ACCA (Βασικά Σημεία)</div>
                ${safeAccaHtml}
              </div>
              <div class="acca-box">
                <div style="color:var(--gold); font-size:0.75rem; font-weight:900; margin-bottom:8px;">🟡 VALUE STRIKE (Αγορές Γκολ)</div>
                ${valueAccaHtml}
              </div>
            </div>

            <div>
              <h4 class="orbitron" style="color:var(--p); margin-top:0;">🔬 DATA LAB</h4>
              <div class="stat-box" style="margin-bottom:10px;">
                <div class="stat-title">ΣΑΡΩΣΗ ΑΓΩΝΩΝ</div>
                <div class="stat-value" style="color:#fff;">${masterData.length} Matches</div>
              </div>
              <div class="stat-box" style="margin-bottom:10px;">
                <div class="stat-title">ΜΕΣΟΣ ΟΡΟΣ xGOALS ΚΟΥΠΟΝΙΟΥ</div>
                <div class="stat-value" style="color:var(--p);">${avgGoals}</div>
              </div>
              <div class="stat-box">
                <div class="stat-title">ΑΓΩΝΕΣ ΥΨΗΛΟΥ ΚΙΝΔΥΝΟΥ (ΒΟΜΒΕΣ)</div>
                <div class="stat-value" style="color:var(--alert);">${highRiskCount}</div>
              </div>
            </div>

          </div>
        </div>
      `;
    }

    function renderApexDashboard() {
      const container = document.getElementById('upcomingList');
      container.innerHTML = "<h2 class='orbitron' style='text-align:center; color:var(--txt-muted); margin-bottom: 30px; margin-top: 30px;'>📊 ΑΝΑΛΥΤΙΚΗ ΛΙΣΤΑ ΑΓΩΝΩΝ</h2>";

      masterData.forEach(d => {
        const c = d.calc; const fix = d.fixture;
        const shockClass = c.shockScore > 70 ? 'shock-high' : (c.shockScore > 45 ? 'shock-med' : 'shock-low');
        const cardGlow = Math.max(c.hP, c.aP) >= 75 ? 'gold-glow' : 'standard-glow';
        let rulesHtml = c.rulesLog.map(r => `<div class="rule-item">${r}</div>`).join('');
        let h2hHtml = c.h2hList.map(h => `<div style="padding: 4px 0; border-bottom: 1px dashed #333;">${h}</div>`).join('');

        container.innerHTML += `
          <div class="cyber-card ${cardGlow}">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <div style="flex: 1;">
                <span class="status-badge ${c.isFatigued ? 'badge-fatigue' : 'badge-stable'}">
                  ${c.isFatigued ? '⚠️ HIGH FATIGUE' : '✅ STABLE'}
                </span>
                <span style="color:var(--txt-muted); font-size:0.7rem; margin-left:8px;">${fix.league.name}</span>
                <div class="team-name">${fix.teams.home.name}</div>
                <div class="team-name">${fix.teams.away.name}</div>
                <div style="margin-top:12px; max-width: 200px;">
                  <small style="color:var(--txt-muted); font-size:0.65rem; font-weight:900;">SHOCK POTENTIAL: ${c.shockScore}%</small>
                  <div class="shock-bar-bg"><div class="shock-bar-fill ${shockClass}" style="width:${c.shockScore}%"></div></div>
                </div>
              </div>
              <div style="text-align:right; min-width: 120px;">
                <div style="color:var(--gold); font-family:'Orbitron'; font-weight:900; font-size:0.65rem;">${c.marketText}</div>
                <div style="background:#000; padding:15px; border-radius:12px; margin-top:5px; border:1px solid var(--border); display:inline-block;">
                  <span style="color:${c.pickColor}; font-weight:900; font-size:1.3rem; font-family:'Orbitron';">${c.mainPick}</span>
                </div>
              </div>
            </div>
            <button class="btn-toggle" onclick="toggleIntel(${d.id})">🔍 ΠΛΗΡΗΣ ΑΝΑΛΥΣΗ OMEGA</button>
            <div id="intel-${d.id}" class="deep-intel-box">
              <div class="stats-grid">
                <div class="stat-box">
                  <div class="stat-title">🏠 ΓΗΠΕΔΟΥΧΟΣ (Τελ. 6)</div>
                  <div style="margin-bottom: 5px;">${buildFormHtml(c.hFormStr)}</div>
                  <div style="display:flex; justify-content:space-between; margin-top:8px;">
                    <div><span style="color:var(--txt-muted); font-size:0.7rem;">xG:</span> <span class="stat-value" style="color:var(--p);">${c.rawHXG}</span></div>
                    <div><span style="color:var(--txt-muted); font-size:0.7rem;">xGA:</span> <span class="stat-value" style="color:var(--alert);">${c.rawHXGA}</span></div>
                  </div>
                </div>
                <div class="stat-box">
                  <div class="stat-title">✈️ ΦΙΛΟΞΕΝΟΥΜΕΝΟΣ (Τελ. 6)</div>
                  <div style="margin-bottom: 5px;">${buildFormHtml(c.aFormStr)}</div>
                  <div style="display:flex; justify-content:space-between; margin-top:8px;">
                    <div><span style="color:var(--txt-muted); font-size:0.7rem;">xG:</span> <span class="stat-value" style="color:var(--p);">${c.rawAXG}</span></div>
                    <div><span style="color:var(--txt-muted); font-size:0.7rem;">xGA:</span> <span class="stat-value" style="color:var(--alert);">${c.rawAXGA}</span></div>
                  </div>
                </div>
              </div>
              <div class="stats-grid" style="grid-template-columns: 1fr 1fr 1fr 1fr; text-align:center;">
                <div class="stat-box"><div class="stat-title">🚩 xC (HOME)</div><div class="stat-value">${c.hXCorner}</div></div>
                <div class="stat-box"><div class="stat-title">🚩 xC (AWAY)</div><div class="stat-value">${c.aXCorner}</div></div>
                <div class="stat-box"><div class="stat-title">🟨 xCard (H)</div><div class="stat-value" style="color:#f1c40f;">${c.hXCards}</div></div>
                <div class="stat-box"><div class="stat-title">🟨 xCard (A)</div><div class="stat-value" style="color:#f1c40f;">${c.aXCards}</div></div>
              </div>
              <div style="margin-bottom: 15px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px solid #222;">
                <div class="stat-title" style="margin-bottom:8px;">⚔️ ΤΕΛΕΥΤΑΙΑ Η2Η</div>
                ${h2hHtml}
              </div>
              <div style="color:var(--txt-muted); font-size:0.7rem; margin-bottom:5px; font-weight:800; text-transform:uppercase;">Εφαρμοσμενα Νευρωνικα Φιλτρα:</div>
              ${rulesHtml}
            </div>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
