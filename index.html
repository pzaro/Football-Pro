<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Predictor Pro v4705.10 - Master Algorithm Final</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root {
      --bg: #010409;
      --card: #0d1117;
      --border: #30363d;
      --p: #00f2ff;
      --split-color: #fbbf24;
      --gold: #f59e0b;
      --neon-live: #39ff14;
      --alert: #da3633;
      --txt-muted: #8b949e;
      --grad: linear-gradient(135deg, #00f2ff, #8b5cf6);
      --pick-bg: rgba(57, 255, 20, 0.1);
      --pick-border: #39ff14;
      --magenta: #ff00ff;
    }

    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f0f6fc; margin: 0; padding: 0; }
    .orbitron { font-family: 'Orbitron', sans-serif; }
    .container { max-width: 1080px; margin: 0 auto; padding: 15px; }

    .cyber-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border-left: 5px solid var(--p);
    }

    .omega-pick {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      background: var(--pick-bg);
      border: 1px dashed var(--pick-border);
      text-align: center;
    }

    .omega-pick.no-bet {
      background: rgba(218, 54, 51, 0.1);
      border-color: var(--alert);
    }

    .omega-pick.no-bet .pick-value {
      color: #ffb3b3;
      text-shadow: none;
    }

    .pick-title {
      font-size: 0.75rem;
      color: var(--neon-live);
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    .omega-pick.no-bet .pick-title { color: var(--alert); }

    .pick-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3rem;
      color: #fff;
      font-weight: 900;
      text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
    }

    .pick-reason {
      font-size: 0.75rem;
      color: var(--txt-muted);
      margin-top: 4px;
    }

    .season-xg-red {
      background: var(--alert);
      color: #fff;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 900;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
    }

    .season-xga-plain {
      color: #8b949e;
      font-weight: 600;
      font-family: 'Orbitron', sans-serif;
      margin-left: 5px;
    }

    .val-xg {
      color: var(--p);
      font-weight: 800;
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
    }

    .val-split {
      color: var(--split-color);
      font-weight: 900;
      font-family: 'Orbitron', sans-serif;
      border: 1px solid var(--split-color);
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(251, 191, 36, 0.1);
    }

    .dev-badge {
      font-size: 0.75rem;
      font-weight: 900;
      padding: 3px 6px;
      border-radius: 4px;
      margin-left: 8px;
      font-family: 'Orbitron', sans-serif;
    }

    .dev-pos {
      background: #238636;
      color: #fff;
      border: 1px solid var(--neon-live);
    }

    .dev-neg {
      background: #da3633;
      color: #fff;
      border: 1px solid #ff4d4d;
    }

    .btn-main {
      padding: 14px 20px;
      background: var(--grad);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 900;
      font-family: 'Orbitron', sans-serif;
      cursor: pointer;
      text-transform: uppercase;
      margin: 5px;
      transition: 0.25s;
      font-size: 0.84rem;
    }

    .btn-main:hover { filter: brightness(1.15); transform: translateY(-2px); }

    .btn-main:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    .date-input, .league-select {
      background: #000;
      color: var(--p);
      border: 1px solid var(--p);
      padding: 13px 14px;
      border-radius: 8px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.95rem;
    }

    .league-select { min-width: 220px; cursor: pointer; }
    .date-input { min-width: 180px; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 15px;
    }

    .team-box {
      background: rgba(0, 0, 0, 0.5);
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #222;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 0.85rem;
      border-bottom: 1px solid #1a1d23;
      padding-bottom: 5px;
      align-items: center;
    }

    .stat-row:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .form-dot {
      display: inline-block;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      text-align: center;
      line-height: 18px;
      font-size: 0.6rem;
      font-weight: 900;
      margin-right: 3px;
      color: #fff;
    }

    .form-W { background: #238636; }
    .form-D { background: #666; }
    .form-L { background: #da3633; }

    .toolbar {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }

    .small-note {
      color: var(--txt-muted);
      font-size: 0.8rem;
      margin-top: 10px;
    }

    .error-box {
      background: rgba(218, 54, 51, 0.08);
      border: 1px solid rgba(218, 54, 51, 0.5);
      color: #ffb3b3;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      font-size: 0.9rem;
    }

    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div id="auth" style="text-align:center; margin-top:20vh;">
    <h1 class="orbitron" style="color:var(--p);">APEX OMEGA v4705.10</h1>
    <input
      type="password"
      id="pin"
      placeholder="PIN"
      oninput="if(this.value==='106014'){this.parentElement.style.display='none';document.getElementById('app').style.display='block';}"
      style="background:#000; color:var(--p); border:1px solid var(--p); padding:15px; font-size:2rem; text-align:center; border-radius:12px; font-family:'Orbitron'; outline:none;"
    >
    <div class="small-note">Master Algorithm - Final Fixed Version</div>
  </div>

  <div id="app" style="display:none;">
    <div class="container">
      <header style="text-align:center; padding:20px 0;">
        <h1 class="orbitron" style="color:var(--p); margin:0;">OMEGA TERMINAL <span style="color:#fff">PROFIT</span></h1>
        <div style="margin-top: 6px; color: var(--txt-muted); font-size: 0.8rem;">v4705.10 Smart League Rules / Fixed xGA</div>
      </header>

      <div class="toolbar">
        <input type="date" id="scanDate" class="date-input">
        <select id="leagueFilter" class="league-select">
          <option value="ALL">🌐 Όλα τα Πρωταθλήματα</option>
        </select>
        <button class="btn-main" id="btnPre" onclick="runScan()">🚀 ΕΥΡΕΣΗ ΣΗΜΕΙΩΝ (SCAN)</button>
        <button class="btn-main" id="btnPdf" style="background:#222;" onclick="exportPDF()">📄 SAVE PDF</button>
      </div>

      <div id="errorBox"></div>

      <div id="loader" style="display:none; text-align:center; margin-bottom:20px;">
        <div style="width:100%; background:#222; height:8px; border-radius:4px; overflow:hidden;">
          <div id="bar" style="width:0%; height:100%; background:var(--grad); transition:0.3s;"></div>
        </div>
        <p id="status" class="orbitron" style="font-size:0.7rem; color:var(--p); margin-top:8px;"></p>
      </div>

      <div id="display"></div>
    </div>
  </div>

  <script>
    const KEY = "956cbd05f9e9bf934df78d9b72d9a3a0";
    const API = "https://v3.football.api-sports.io";

    const LEAGUES_DATA = [
      {id: 39, name: "🇬🇧 Premier League"},
      {id: 40, name: "🇬🇧 Championship"},
      {id: 41, name: "🇬🇧 League One"},
      {id: 140, name: "🇪🇸 La Liga"},
      {id: 141, name: "🇪🇸 La Liga 2"},
      {id: 135, name: "🇮🇹 Serie A"},
      {id: 136, name: "🇮🇹 Serie B"},
      {id: 78, name: "🇩🇪 Bundesliga"},
      {id: 79, name: "🇩🇪 2. Bundesliga"},
      {id: 61, name: "🇫🇷 Ligue 1"},
      {id: 62, name: "🇫🇷 Ligue 2"},
      {id: 88, name: "🇳🇱 Eredivisie"},
      {id: 144, name: "🇧🇪 Belgium Jupiler"},
      {id: 203, name: "🇹🇷 Turkey Süper Lig"},
      {id: 262, name: "🇲🇽 Liga MX"},
      {id: 197, name: "🇬🇷 Greece Super League"}
    ];
    const LEAGUES = LEAGUES_DATA.map(l => l.id);

    const REQUEST_DELAY_MS = 260;
    const REQUEST_TIMEOUT_MS = 12000;
    const LAST_GENERAL = 6;
    const LAST_SPLIT = 6;
    const MAX_MATCHES = 100;

    let statsCache = new Map();
    let teamStatsCache = new Map();
    let lastFixturesCache = new Map();
    let isRunning = false;

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function showError(msg) {
      document.getElementById("errorBox").innerHTML = `<div class="error-box">${escapeHtml(msg)}</div>`;
    }

    function clearError() {
      document.getElementById("errorBox").innerHTML = "";
    }

    function setLoader(show, text = "") {
      document.getElementById("loader").style.display = show ? "block" : "none";
      document.getElementById("status").innerText = text;
      if (!show) document.getElementById("bar").style.width = "0%";
    }

    function setProgress(percent, text = "") {
      document.getElementById("bar").style.width = `${percent}%`;
      document.getElementById("status").innerText = text;
    }

    function setButtonsDisabled(disabled) {
      ["btnPre", "btnPdf", "leagueFilter"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.disabled = disabled;
      });
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getTodayISO() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    async function throttledFetch(url, timeout = REQUEST_TIMEOUT_MS) {
      await sleep(REQUEST_DELAY_MS);
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeout);
      try {
        return await fetch(url, {
          headers: { "x-apisports-key": KEY },
          signal: controller.signal
        });
      } finally {
        clearTimeout(timer);
      }
    }

    async function apiReq(path) {
      try {
        const response = await throttledFetch(`${API}/${path}`);
        if (!response.ok) {
          return { response: [], errors: { status: response.status } };
        }
        return await response.json() || { response: [] };
      } catch (err) {
        return { response: [], errors: { message: err?.name === "AbortError" ? "timeout" : (err?.message || "unknown") } };
      }
    }

    async function getTeamSeasonStats(teamId, leagueId, season) {
      const key = `${teamId}_${leagueId}_${season}`;
      if (teamStatsCache.has(key)) return teamStatsCache.get(key);

      const data = await apiReq(`teams/statistics?team=${teamId}&league=${leagueId}&season=${season}`);
      const response = data?.response || {};
      teamStatsCache.set(key, response);
      return response;
    }

    async function getLastFixtures(teamId, leagueId, season) {
      const key = `team_last_${teamId}_${leagueId}_${season}`;
      if (lastFixturesCache.has(key)) return lastFixturesCache.get(key);

      const data = await apiReq(`fixtures?team=${teamId}&league=${leagueId}&season=${season}&last=20&status=FT`);
      const response = data?.response || [];
      lastFixturesCache.set(key, response);
      return response;
    }

    async function getFixtureStats(fixtureId) {
      if (statsCache.has(fixtureId)) return statsCache.get(fixtureId);
      const data = await apiReq(`fixtures/statistics?fixture=${fixtureId}`);
      statsCache.set(fixtureId, data);
      return data;
    }

    function statVal(statsArr, type) {
      if (!Array.isArray(statsArr)) return 0;
      const item = statsArr.find(x => x.type === type);
      if (!item || item.value == null) return 0;
      return parseFloat(String(item.value).replace("%", "").trim()) || 0;
    }

    function getTeamGoals(fixture, teamId) {
      return fixture?.teams?.home?.id === teamId
        ? (fixture?.goals?.home ?? 0)
        : (fixture?.goals?.away ?? 0);
    }

    function getOpponentGoals(fixture, teamId) {
      return fixture?.teams?.home?.id === teamId
        ? (fixture?.goals?.away ?? 0)
        : (fixture?.goals?.home ?? 0);
    }

    function estimateXG(statsArr, goals = 0) {
      const shotsOnGoal = statVal(statsArr, "Shots on Goal");
      const shotsOffGoal = statVal(statsArr, "Shots off Goal");
      const totalShots = statVal(statsArr, "Total Shots");
      const dangerous = statVal(statsArr, "Dangerous Attacks");
      const corners = statVal(statsArr, "Corner Kicks");

      let xg =
        (shotsOnGoal * 0.18) +
        (shotsOffGoal * 0.07) +
        (Math.max(totalShots - shotsOnGoal - shotsOffGoal, 0) * 0.03) +
        (dangerous * 0.008) +
        (corners * 0.025) +
        (goals * 0.35);

      if (!Number.isFinite(xg) || xg <= 0) {
        xg = goals > 0 ? (0.70 + goals * 0.30) : 0.70;
      }
      return xg;
    }

    function getFormHistory(fixtures, teamId) {
      return fixtures.map(f => {
        const myG = getTeamGoals(f, teamId);
        const opG = getOpponentGoals(f, teamId);
        return myG > opG
          ? { res: "Ν", cls: "W" }
          : (myG < opG ? { res: "Η", cls: "L" } : { res: "Ι", cls: "D" });
      }).reverse();
    }

    function getDev(curr, base) {
      if (!base || base <= 0) return `<span class="dev-badge dev-pos">N/A</span>`;
      const d = (((parseFloat(curr) - base) / base) * 100).toFixed(1);
      return `<span class="dev-badge ${d >= 0 ? "dev-pos" : "dev-neg"}">${d > 0 ? "+" : ""}${d}%</span>`;
    }

    async function batchCalculate(list, teamId) {
      if (!list.length) {
        return { xg: "0.00", xga: "0.00", cor: "0.0", crd: "0.0" };
      }

      let xgSum = 0;
      let xgaSum = 0;
      let corSum = 0;
      let crdSum = 0;
      let count = 0;

      for (const f of list) {
        const st = await getFixtureStats(f.fixture.id);
        if (!st?.response || st.response.length < 2) continue;

        const myObj = st.response.find(x => x.team.id === teamId);
        const opObj = st.response.find(x => x.team.id !== teamId);
        if (!myObj || !opObj) continue;

        const my = myObj.statistics || [];
        const op = opObj.statistics || [];

        let myXG = statVal(my, "Expected Goals");
        if (myXG <= 0) myXG = estimateXG(my, getTeamGoals(f, teamId));

        let oppXG = statVal(op, "Expected Goals");
        if (oppXG <= 0) oppXG = estimateXG(op, getOpponentGoals(f, teamId));

        xgSum += myXG;
        xgaSum += oppXG;
        corSum += statVal(my, "Corner Kicks");
        crdSum += statVal(my, "Yellow Cards") + statVal(my, "Red Cards");
        count++;
      }

      return {
        xg: count > 0 ? (xgSum / count).toFixed(2) : "0.00",
        xga: count > 0 ? (xgaSum / count).toFixed(2) : "0.00",
        cor: count > 0 ? (corSum / count).toFixed(1) : "0.0",
        crd: count > 0 ? (crdSum / count).toFixed(1) : "0.0"
      };
    }

    async function getTeamData(teamId, leagueId, season, venueType) {
      const [seasonStats, allFixs] = await Promise.all([
        getTeamSeasonStats(teamId, leagueId, season),
        getLastFixtures(teamId, leagueId, season)
      ]);

      const genLast = allFixs.slice(0, LAST_GENERAL);
      const splitLast = allFixs
        .filter(f => venueType === "home" ? f.teams.home.id === teamId : f.teams.away.id === teamId)
        .slice(0, LAST_SPLIT);

      const [form, split] = await Promise.all([
        batchCalculate(genLast, teamId),
        batchCalculate(splitLast, teamId)
      ]);

      const baseXG = parseFloat(seasonStats?.goals?.for?.average?.total) || 1.10;
      const baseXGA = parseFloat(seasonStats?.goals?.against?.average?.total) || 1.10;

      return {
        seasonXG: baseXG.toFixed(2),
        seasonXGA: baseXGA.toFixed(2),
        formXG: form.xg,
        formXGA: form.xga,
        devXG: getDev(form.xg, baseXG),
        devXGA: getDev(form.xga, baseXGA),
        splitXG: split.xg,
        splitXGA: split.xga,
        corners: form.cor,
        cards: form.crd,
        history: getFormHistory(genLast, teamId)
      };
    }

    function generateOmegaPick(hStats, aStats, leagueId) {
      let hXG = parseFloat(hStats.formXG);
      let aXG = parseFloat(aStats.formXG);
      let totalXG = hXG + aXG;

      if (!Number.isFinite(totalXG) || totalXG < 0.90) {
        return {
          pick: "⚠️ NO DATA (ΑΓΝΟΗΣΕ ΤΟ ΜΑΤΣ)",
          reason: "Το σύστημα της API δεν έχει προσκομίσει επαρκή στατιστικά xG για αυτές τις ομάδες.",
          noBet: true
        };
      }

      const trapLeagues = [40, 41, 136, 141, 79, 62];
      const goldLeagues = [78, 262, 88];
      const tightLeagues = [61, 94, 197, 135];

      if (trapLeagues.includes(leagueId)) {
        totalXG *= 0.80;
        hXG *= 0.80;
        aXG *= 0.80;
      } else if (tightLeagues.includes(leagueId)) {
        totalXG *= 0.85;
        hXG *= 0.85;
        aXG *= 0.85;
      } else if (goldLeagues.includes(leagueId)) {
        totalXG *= 1.05;
      }

      let pick = "";
      let reason = "";
      let noBet = false;

      if (totalXG >= 3.35) {
        pick = "🔥 OVER 2.5 GOALS";
        reason = `Εξαιρετικός ρυθμός. Το προσαρμοσμένο xG δείχνει ${totalXG.toFixed(2)} γκολ.`;
      } else if (totalXG >= 2.65 && hXG >= 1.25 && aXG >= 1.25) {
        pick = "🎯 GOAL/GOAL (BTTS)";
        reason = `Και οι δύο ομάδες σκοράρουν, αλλά οι άμυνες δεν διαλύονται εύκολα. Ασφάλεια έναντι του Over.`;
      } else if (hXG > (aXG + 1.20) && parseFloat(hStats.splitXG) > 1.80) {
        pick = "🏠 ΑΣΟΣ (1)";
        reason = `Ξεκάθαρη εντός έδρας υπεροχή (Split xG Εντός: ${hStats.splitXG}).`;
      } else if (aXG > (hXG + 1.10) && parseFloat(aStats.splitXG) > 1.65) {
        pick = "✈️ ΔΙΠΛΟ (2)";
        reason = `Η φιλοξενούμενη εμφανίζει καθαρή επιθετική υπεροχή και σταθερό εκτός έδρας split.`;
      } else if (totalXG < 2.15) {
        pick = "🛡️ UNDER 2.5 GOALS";
        reason = `Πολύ κλειστό ματς, τακτική προσέγγιση (Total xG: ${totalXG.toFixed(2)}).`;
      } else {
        const totalCards = parseFloat(hStats.cards) + parseFloat(aStats.cards);
        if (totalCards > 5.5) {
          pick = "🟨 OVER ΚΑΡΤΕΣ";
          reason = `Οι ομάδες κάνουν πολλά σκληρά φάουλ (Μ.Ο. ${totalCards.toFixed(1)} κάρτες/ματς).`;
        } else {
          pick = "⚖️ NO BET (ΑΠΟΧΗ)";
          reason = `Ισορροπημένα στατιστικά. Καμία μαθηματική αξία για στοιχηματισμό.`;
          noBet = true;
        }
      }

      return { pick, reason, noBet };
    }

    function buildMatchCard(m, s) {
      const omega = generateOmegaPick(s.h, s.a, m.league.id);

      return `
        <div class="cyber-card">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
              <span style="background:#222; padding:4px 8px; border-radius:4px;">${escapeHtml(m.fixture.status.short)}</span>
              <div style="color:var(--gold); font-size:0.7rem; font-weight:800; margin-top:5px;">${escapeHtml(m.league.name)}</div>
              <h2 class="orbitron" style="margin:5px 0;">${escapeHtml(m.teams.home.name)}</h2>
              <h2 class="orbitron" style="margin:2px 0;">${escapeHtml(m.teams.away.name)}</h2>
            </div>
            <div style="font-size:2rem; font-weight:900;">VS</div>
          </div>

          <div class="omega-pick ${omega.noBet ? 'no-bet' : ''}">
             <div class="pick-title">💡 ΠΡΟΤΕΙΝΟΜΕΝΟ ΣΤΟΙΧΗΜΑ (VALUE)</div>
             <div class="pick-value">${omega.pick}</div>
             <div class="pick-reason">${omega.reason}</div>
          </div>

          <div class="stats-grid">
            <div class="team-box">
              <div style="color:var(--p); font-size:0.75rem; font-weight:900; margin-bottom:10px;">🏠 ${escapeHtml(m.teams.home.name)}</div>

                <span>Μέσος Όρος Σεζόν:</span>

                <span>Κόρνερ:</span>

              <div class="stat-row">
                <span>Κάρτες:</span>

            <div class="team-box">
              <div style="color:var(--magenta); font-size:0.75rem; font-weight:900; margin-bottom:10px;">✈️ ${escapeHtml(m.teams.away.name)}</div>
              ${(s?.a?.history || []).map(f => `<span class="form-dot form-${f.cls}">${f.res}</span>`).join("")}

                <span>Μέσος Όρος Σεζόν:</span>
                <div><span class="season-xg-red">${s?.a?.seasonXG}</span><span class="season-xga-plain">/ ${s?.a?.seasonXGA}</span></div>
              </div>
              <div class="stat-row">
                <span>xG Υπέρ (Φόρμα):</span>

        </div>
      `;
    }

    async function runScan() {
      if (isRunning) return;

      isRunning = true;
      clearError();
      setButtonsDisabled(true);
      setLoader(true, "ΑΝΑΖΗΤΗΣΗ ΣΗΜΕΙΩΝ ΜΕ ΑΞΙΑ...");

      const display = document.getElementById("display");
      display.innerHTML = "";

      try {
        const selectedDate = document.getElementById("scanDate").value || getTodayISO();
        const selectedLeague = document.getElementById("leagueFilter").value;

        const fixturesResp = await apiReq(`fixtures?date=${selectedDate}`);
        let matches = (fixturesResp.response || []).filter(m => {
          if (selectedLeague === "ALL") return LEAGUES.includes(m.league.id);
          return m.league.id === parseInt(selectedLeague, 10);
        }).slice(0, MAX_MATCHES);

        if (!matches.length) {
          display.innerHTML = `<div class="cyber-card"><h3 class="orbitron" style="text-align:center; color:var(--gold); margin:0;">Δεν βρέθηκαν αγώνες.</h3></div>`;
          return;
        }

        let htmlBuffer = "";
        for (let i = 0; i < matches.length; i++) {
          const m = matches[i];
          setProgress(Math.round(((i + 1) / matches.length) * 100), `ΑΝΑΛΥΣΗ: ${m.teams.home.name} vs ${m.teams.away.name}`);

          const [intelHome, intelAway] = await Promise.all([
            getTeamData(m.teams.home.id, m.league.id, m.league.season, "home"),
            getTeamData(m.teams.away.id, m.league.id, m.league.season, "away")
          ]);

          htmlBuffer += buildMatchCard(m, { h: intelHome, a: intelAway });
        }

        display.innerHTML = htmlBuffer;
      } catch (err) {
        showError(`Σφάλμα: ${err?.message || "Άγνωστο σφάλμα"}`);
      } finally {
        setLoader(false);
        setButtonsDisabled(false);
        isRunning = false;
      }
    }

    function exportPDF() {
      html2pdf().set({
        margin: 8,
        filename: `Value_Bets_${getTodayISO()}.pdf`,
        image: { type: "jpeg", quality: 0.96 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
      }).from(document.getElementById("app")).save();
    }

    window.addEventListener("DOMContentLoaded", () => {
      document.getElementById("scanDate").value = getTodayISO();
      const select = document.getElementById("leagueFilter");
      LEAGUES_DATA.forEach(l => {
        const opt = document.createElement("option");
        opt.value = l.id;
        opt.textContent = l.name;
        select.appendChild(opt);
      });
    });
  </script>
</body>
