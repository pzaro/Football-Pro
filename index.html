<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Predictor Pro v4500 - Ultimate Stability</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #010409; --card: #0d1117; --border: #30363d; 
            --p: #00f2ff; --magenta: #ff00ff; --txt: #f0f6fc; --txt-muted: #8b949e; 
            --gold: #f59e0b; --orange-grad: linear-gradient(135deg, #f59e0b, #ef4444);
            --live: #238636; --alert: #da3633;
            --grad: linear-gradient(135deg, #00f2ff, #8b5cf6);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 0; overflow-x: hidden; }
        h1, h2, .league-header, .motd-title { font-family: 'Orbitron', sans-serif; }
        .container { width: 100%; max-width: 1000px; margin: 0 auto; padding: 15px; }

        /* 🟢 NAVIGATION STYLES */
        .header-sticky { position: sticky; top: 0; z-index: 1000; background: rgba(1, 4, 9, 0.98); border-bottom: 2px solid var(--p); backdrop-filter: blur(10px); }
        .ticker-wrap { width: 100%; overflow: hidden; white-space: nowrap; padding: 12px 0; background: rgba(0,242,255,0.03); display: none; }
        .ticker-move { display: inline-block; animation: ticker 30s linear infinite; }
        .ticker-item { display: inline-block; padding: 0 20px; font-weight: 800; font-size: 0.85rem; color: #fff; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* 🛡️ CARDS & UI */
        .cyber-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 20px; }
        .league-header { background: var(--orange-grad); color: #000; padding: 12px; border-radius: 12px; font-weight: 900; margin: 25px 0 15px; text-transform: uppercase; font-size: 0.8rem; }
        
        .match-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; margin-bottom: 12px; cursor: pointer; border-left: 5px solid transparent; transition: 0.3s; }
        .match-card:hover { border-color: var(--p); background: #161b22; transform: translateX(5px); }
        .match-card.gold-glow { border-left-color: var(--gold); box-shadow: 0 0 15px rgba(245,158,11,0.2); }

        .score-box { font-size: 2.2rem; font-weight: 900; font-family: 'Orbitron'; color: #fff; }

        /* 📊 PROGRESS BARS (STRICT VISIBILITY) */
        #syncCont { display: none; margin: 20px 0; }
        .cyber-progress-bg { background: #000; height: 20px; border-radius: 50px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        .cyber-progress-fill { height: 100%; background: var(--grad); width: 0%; transition: width 0.4s ease; box-shadow: 0 0 15px var(--p); }

        /* 📅 BUTTONS */
        #masterBtn { width: 100%; padding: 25px; background: var(--grad); color: #fff; border: none; border-radius: 20px; font-weight: 900; font-size: 1.2rem; cursor: pointer; font-family: 'Orbitron'; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        #intelPanel { display: none; background: var(--bg); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; overflow-y: auto; padding-bottom: 100px; }
        .close-circle { position: fixed; bottom: 30px; right: 30px; background: var(--alert); color: #fff; width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; border: none; z-index: 10001; cursor: pointer; }

        @media (min-width: 768px) { .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; } }
    </style>
</head>
<body>

<div id="authScreen">
    <div class="auth-box" style="background:var(--card); border-radius:45px; padding:60px 40px; text-align:center; max-width:400px; margin:auto; margin-top:15vh; border:2px solid var(--p);">
        <h1 style="color:var(--p); margin:0; font-size:2.2rem;">OMEGA 4500</h1>
        <p style="color:var(--txt-muted); font-size:0.8rem; margin-top:10px;">STABILITY INTEGRITY Spec</p>
        <input type="tel" id="pinInput" maxlength="6" placeholder="••••••" oninput="instantAuth(this)" style="width:100%; padding:20px; margin-top:30px; text-align:center; font-size:2.5rem; border-radius:20px; border:none; background:#000; color:var(--p); font-family: 'Orbitron'; letter-spacing:10px;">
    </div>
</div>

<div id="appContent" style="display:none;">
    <div class="header-sticky">
        <div style="display:flex; justify-content:space-between; padding:12px 15px; background:#000; color:var(--p); font-size:0.7rem; font-weight:900;">
            <div>SYNC STATUS: ACTIVE</div>
            <div id="tickerStatus" style="color:var(--live);">PAID ENCRYPTED LINK</div>
        </div>
        <div class="ticker-wrap" id="liveTickerWrap"><div class="ticker-move" id="tickerContent"></div></div>
    </div>

    <div class="container">
        <div style="text-align:center; padding: 40px 0;">
            <h1 style="color:var(--p); margin:0; font-size:3rem; letter-spacing:-3px;">PREDICTOR <span style="color:#fff">PRO</span></h1>
            <small style="color:var(--magenta); font-weight:900; letter-spacing:6px;">SOVEREIGN STABILITY v4500</small>
        </div>

        <button id="masterBtn" onclick="startQuantumScan()">🚀 INITIALIZE PAID FLOW SCAN</button>

        <div id="syncCont">
            <div class="cyber-progress-bg"><div id="syncFill" class="cyber-progress-fill"></div></div>
            <div id="syncStep" style="text-align:center; font-family:'Orbitron'; color:var(--p); font-size:0.8rem; font-weight:900; margin-top:10px;">PREPARING NEURAL CORE...</div>
        </div>

        <div id="mainDashboard" style="display:none; margin-top:30px;">
            <div id="liveSection"></div>
            <div id="upcomingSection"></div>
        </div>
    </div>
</div>

<div id="intelPanel">
    <button onclick="closePanel('intelPanel')" class="close-circle">X</button>
    <div style="text-align:center; padding:80px 20px 40px; background:#000;">
        <h2 id="mTitle" style="color:var(--p); font-size:1.4rem;"></h2>
        <div id="bigScore" style="font-size:5rem; font-weight:900; margin:10px 0;"></div>
        <div id="adviceBox" style="color:var(--gold); border:1px dashed var(--gold); padding:15px; border-radius:15px; max-width:600px; margin:auto; font-weight:800; font-size:0.85rem;"></div>
    </div>
    <div class="container">
        <div class="cyber-card" style="border: 2px solid var(--p);">
            <div style="font-weight:900; text-align:center; margin-bottom:15px; font-family:'Orbitron';">📊 ANALYTICS TABLE</div>
            <div style="overflow-x:auto;"><table id="intelDataTable" style="width:100%; border-collapse:collapse; font-size:0.8rem;"></table></div>
        </div>
    </div>
</div>

<script>
// 🔑 CREDENTIALS
const KEY = "956cbd05f9e9bf934df78d9b72d9a3a0";
const HOST = "api-football-v1.p.rapidapi.com";
const BASE = "https://api-football-v1.p.rapidapi.com/v3";
const LEAGUES = [2, 3, 848, 197, 61, 40, 94, 262, 128, 253];

let masterData = [];

function instantAuth(el) {
    if(el.value === "106014") {
        sessionStorage.setItem("omega_auth", "true");
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('appContent').style.display = 'block';
    }
}

async function apiCall(end) {
    try {
        const r = await fetch(`${BASE}/${end}`, {
            headers: { "x-rapidapi-key": KEY, "x-rapidapi-host": HOST }
        });
        const d = await r.json();
        if(d.errors && Object.keys(d.errors).length > 0) throw new Error(JSON.stringify(d.errors));
        return d;
    } catch(e) {
        console.error("API Error:", e);
        return { response: [] };
    }
}

function startQuantumScan() {
    document.getElementById('masterBtn').style.display = 'none';
    document.getElementById('syncCont').style.display = 'block';
    document.getElementById('syncFill').style.width = '5%';
    setTimeout(globalSync, 500);
}

async function globalSync() {
    const day = new Date().toISOString().split('T')[0];
    const data = await apiCall(`fixtures?date=${day}`);
    let fixtures = (data.response || []).filter(m => LEAGUES.includes(m.league.id));
    
    if(fixtures.length === 0) fixtures = (data.response || []).slice(0, 10); // Fallback

    for (let i = 0; i < fixtures.length; i++) {
        let m = fixtures[i];
        let prg = Math.round(((i + 1) / fixtures.length) * 100);
        document.getElementById('syncFill').style.width = prg + '%';
        document.getElementById('syncStep').innerText = `ANALYZING: ${m.teams.home.name} (${prg}%)`;
        
        const predData = await apiCall(`predictions?fixture=${m.fixture.id}`);
        if(predData.response?.[0]) {
            masterData.push({ fixture: m, prediction: predData.response[0] });
        }
        await new Promise(r => setTimeout(r, 100));
    }

    document.getElementById('syncCont').style.display = 'none';
    document.getElementById('mainDashboard').style.display = 'block';
    renderDashboard();
}

function renderDashboard() {
    const live = masterData.filter(d => ['1H','2H','HT'].includes(d.fixture.fixture.status.short));
    const up = masterData.filter(d => ['NS','TBD'].includes(d.fixture.fixture.status.short));

    const renderList = (list, id, title) => {
        let h = `<div class="league-header">🏆 ${title}</div><div class="match-grid">`;
        list.forEach(d => {
            const score = d.fixture.goals.home + ':' + d.fixture.goals.away;
            h += `<div class="match-card gold-glow" onclick="openIntel(${d.fixture.fixture.id})">
                    <div class="card-top">
                        <div style="font-weight:800;">${d.fixture.teams.home.name}<br>${d.fixture.teams.away.name}</div>
                        <div class="score-box">${score}</div>
                    </div>
                </div>`;
        });
        document.getElementById(id).innerHTML = h + `</div>`;
    };

    renderList(live, 'liveSection', 'LIVE SCAN');
    renderList(up, 'upcomingSection', 'UPCOMING TARGETS');
}

function openIntel(id) {
    const d = masterData.find(x => x.fixture.fixture.id == id);
    if(!d) return;
    document.getElementById('intelPanel').style.display = 'block';
    document.getElementById('mTitle').innerText = `${d.fixture.teams.home.name} VS ${d.fixture.teams.away.name}`;
    document.getElementById('bigScore').innerText = d.fixture.goals.home + ':' + d.fixture.goals.away;
    document.getElementById('adviceBox').innerText = "AI PRO ADVICE: " + (d.prediction.predictions.advice || "No specific advice available.");
    
    document.getElementById('intelDataTable').innerHTML = `
        <tr><td style="padding:10px; border-bottom:1px solid #222;">WIN PROBABILITY</td><td style="text-align:right; font-weight:900; color:var(--p);">${d.prediction.predictions.percent.home} - ${d.prediction.predictions.percent.draw} - ${d.prediction.predictions.percent.away}</td></tr>
        <tr><td style="padding:10px; border-bottom:1px solid #222;">EXPECTED GOALS</td><td style="text-align:right; font-weight:900;">Over 2.5: ${d.prediction.predictions.goals.over || 'N/A'}</td></tr>
    `;
}

function closePanel(id) { document.getElementById(id).style.display = 'none'; }

// AUTO-LOGIN CHECK
window.onload = () => {
    if(sessionStorage.getItem("omega_auth")) {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('appContent').style.display = 'block';
    }
};
</script>
</body>
</html>
