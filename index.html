<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>APEX OMEGA v4717 - The Visual Masterpiece</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #010409; --card: #0d1117; --card2: #0b1016;
      --border: #21262d; --border2: #30363d;
      --p: #00f2ff; --p-dim: rgba(0,242,255,0.12); --p-glow: rgba(0,242,255,0.25);
      --split-color: #fbbf24; --gold: #f59e0b; --gold-dim: rgba(245,158,11,0.12);
      --neon-live: #39ff14; --neon-dim: rgba(57,255,20,0.10);
      --alert: #da3633; --alert-dim: rgba(218,54,51,0.08);
      --txt: #f0f6fc; --txt-muted: #8b949e;
      --magenta: #ff00ff; --magenta-dim: rgba(255,0,255,0.10);
      --grad: linear-gradient(135deg, #00f2ff 0%, #8b5cf6 100%);
      --radius: 14px; --radius-sm: 8px; --radius-pill: 999px;
      --shadow: 0 12px 40px rgba(0,0,0,0.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--txt); line-height: 1.55; -webkit-font-smoothing: antialiased; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,242,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(0,242,255,0.015) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }

    .orbitron { font-family: 'Orbitron', monospace; }
    .mono { font-family: 'Space Mono', monospace; }

    .container { max-width: 1300px; margin: 0 auto; padding: 16px; position: relative; z-index: 1; }

    /* CREDIT BAR */
    .credit-bar { background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,242,255,0.2); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; gap: 12px; flex-wrap: wrap; }
    .credit-bar-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; min-width: 0; }
    .credit-logo { font-family: 'Orbitron', monospace; color: var(--p); font-size: 0.75rem; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 8px var(--p-glow); white-space: nowrap; }
    .credit-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--txt-muted); letter-spacing: 1px; }
    .credit-value { font-family: 'Orbitron', monospace; font-size: 0.9rem; font-weight: 900; color: var(--p); text-shadow: 0 0 8px var(--p-glow); transition: color 0.3s; }
    .credit-value.low { color: var(--alert); text-shadow: 0 0 8px rgba(218,54,51,0.5); animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* AUTH */
    #auth { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 1; }
    .auth-card { background: rgba(13,17,23,0.9); border: 1px solid rgba(0,242,255,0.2); border-radius: 20px; padding: 48px 40px; max-width: 380px; width: 100%; box-shadow: 0 0 60px rgba(0,242,255,0.06), var(--shadow); text-align: center; }
    .auth-title { font-family: 'Orbitron', monospace; color: var(--p); font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; margin-bottom: 8px; }
    .auth-sub { color: var(--txt-muted); font-size: 0.75rem; margin-bottom: 28px; }
    .auth-input { width: 100%; background: rgba(0,0,0,0.6); color: var(--p); border: 1px solid rgba(0,242,255,0.3); padding: 18px; font-size: 2rem; text-align: center; border-radius: var(--radius); font-family: 'Orbitron', monospace; outline: none; letter-spacing: 8px; }
    .auth-input:focus { border-color: var(--p); box-shadow: 0 0 0 3px var(--p-dim); }

    /* UI PANELS & CARDS */
    .cyber-card { background: var(--card); border: 1px solid var(--border2); border-radius: var(--radius); padding: 22px; margin-bottom: 18px; border-left: 4px solid var(--p); box-shadow: var(--shadow); animation: fadeUp 0.35s ease-out both; }
    .feed-match-card { transition: box-shadow 0.3s; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .section-panel { background: var(--card2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 18px; box-shadow: var(--shadow); }
    .section-title { font-family: 'Orbitron', monospace; color: var(--gold); font-size: 0.78rem; font-weight: 900; margin-bottom: 14px; letter-spacing: 1.5px; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; gap: 8px; }

    /* TOOLBARS & INPUTS */
    .toolbar { background: rgba(13,17,23,0.8); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
    .toolbar-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 130px; }
    .toolbar-label { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--txt-muted); text-transform: uppercase; }
    .field { background: rgba(0,0,0,0.5); color: var(--p); border: 1px solid rgba(0,242,255,0.25); padding: 13px 15px; border-radius: var(--radius-sm); font-family: 'Space Mono', monospace; font-size: 0.85rem; width: 100%; outline: none; transition: border-color 0.2s; }
    .field:focus { border-color: var(--p); box-shadow: 0 0 0 2px var(--p-dim); }
    .field:disabled { opacity: 0.45; cursor: not-allowed; }
    select.field option { background: #0b1016; color: #fff; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 13px 20px; background: var(--grad); color: #fff; border: none; border-radius: var(--radius-sm); font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; transition: filter 0.2s, opacity 0.2s; white-space: nowrap; font-family: 'Syne', sans-serif; }
    .btn:hover:not(:disabled) { filter: brightness(1.15); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-danger { background: linear-gradient(135deg, #da3633, #b91c1c); }

    /* PREDICTION TABS */
    .pred-tabs { display: flex; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.25); }
    .pred-tabs::-webkit-scrollbar { display: none; }
    .pred-tab { padding: 12px 16px; background: transparent; color: var(--txt-muted); font-weight: 700; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; border-top: none; border-left: none; border-right: none; font-family: 'Syne', sans-serif; font-size: 0.8rem; transition: color 0.2s, border-color 0.2s; }

    /* STATS */
    .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; font-size: 0.82rem; border-bottom: 1px solid rgba(255,255,255,0.04); padding-bottom: 7px; }
    .val-xg { color: var(--p); font-weight: 800; font-family: 'Space Mono', monospace; }
    .val-split { color: var(--split-color); font-weight: 900; background: rgba(251,191,36,0.08); padding: 2px 7px; border-radius: 4px; }
    .dev-badge { display: inline-block; font-size: 0.65rem; padding: 1px 5px; border-radius: 3px; margin-left: 4px; font-family: 'Space Mono', monospace; }
    .dev-pos { background: rgba(35,134,54,0.2); color: #3fb950; }
    .dev-neg { background: rgba(218,54,51,0.2); color: #ff7b72; }

    /* OMEGA PICK */
    .omega-pick { margin-top: 5px; padding: 16px; border-radius: 10px; text-align: center; }
    .omega-pick.nobet { background: var(--alert-dim); border: 1px dashed rgba(218,54,51,0.4); }
    .omega-pick.bomb { background: var(--magenta-dim); border: 1px dashed rgba(255,0,255,0.4); }
    .omega-pick.hit { background: rgba(57,255,20,0.08); border: 1px dashed rgba(57,255,20,0.45); }
    .pick-header { font-family: 'Space Mono', monospace; font-size: 0.64rem; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; }
    .pick-value { font-family: 'Orbitron', monospace; font-size: 1.25rem; font-weight: 900; }
    .pick-reason { font-size: 0.77rem; color: var(--txt-muted); margin-top: 8px; }

    /* PROGRESS */
    .progress-wrap { margin-bottom: 18px; }
    .progress-bar-bg { background: rgba(255,255,255,0.06); height: 6px; border-radius: 3px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--grad); transition: width 0.3s; border-radius: 3px; }
    .progress-status { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--p); margin-top: 6px; display: flex; justify-content: space-between; }

    /* WALLBET */
    .wallbet-leg { background: rgba(0,0,0,0.45); border-left: 3px solid var(--p); padding: 12px; margin-bottom: 12px; border-radius: 12px; cursor: pointer; transition: background 0.2s; }
    .wallbet-leg:hover { background: rgba(0,242,255,0.06); }

    /* AUDIT TABLE */
    .audit-hit { color: var(--neon-live); font-weight: 700; background: rgba(57,255,20,0.05); }
    .audit-miss { color: #ff8c8c; font-weight: 700; background: rgba(255,68,68,0.05); }

    /* SUMMARY TABLE ROW HOVER */
    .summary-row { cursor: pointer; border-bottom: 1px solid var(--border2); transition: background 0.15s; }
    .summary-row:hover { background: rgba(0,242,255,0.05); }

    @media (max-width: 680px) {
      .stats-grid { grid-template-columns: 1fr; }
      .wallbet-container { flex-direction: column; }
      .auth-card { padding: 32px 20px; }
    }
    @media (max-width: 480px) {
      .credit-bar { padding: 8px 12px; }
      .credit-logo { font-size: 0.65rem; }
    }
  </style>
</head>
<body>

  <div class="credit-bar" role="banner">
    <div class="credit-bar-left">
      <div class="credit-logo">APEX OMEGA</div>
      <div>
        <div class="credit-label">API CREDITS</div>
        <div id="creditDisplay" class="credit-value mono" aria-live="polite">— SYNC —</div>
      </div>
    </div>
  </div>

  <div id="auth" role="main">
    <div class="auth-card">
      <div class="auth-title">APEX OMEGA</div>
      <div class="auth-sub">v4717 · The Visual Masterpiece</div>
      <label for="pin" style="position:absolute; width:1px; height:1px; overflow:hidden;">PIN Εισόδου</label>
      <input
        type="password"
        id="pin"
        class="auth-input"
        placeholder="• • • •"
        maxlength="8"
        autocomplete="off"
        inputmode="numeric"
        aria-label="PIN Εισόδου"
      >
      <div id="authError" role="alert" style="margin-top:12px; font-size:0.75rem; color:var(--alert); min-height:20px;"></div>
    </div>
  </div>

  <div id="app" style="display:none;" role="main">
    <div class="container">

      <div class="toolbar">
        <div class="toolbar-group">
          <div class="toolbar-label">Ημ/νία Έναρξης</div>
          <input type="date" id="scanStart" class="field" aria-label="Ημερομηνία έναρξης">
        </div>
        <div class="toolbar-group">
          <div class="toolbar-label">Ημ/νία Λήξης</div>
          <input type="date" id="scanEnd" class="field" aria-label="Ημερομηνία λήξης">
        </div>
        <div class="toolbar-group" style="flex:2;">
          <div class="toolbar-label">Διοργάνωση</div>
          <select id="leagueFilter" class="field" aria-label="Επιλογή διοργάνωσης">
            <option value="ALL">🌐 Βασικές Διοργανώσεις (Top 24)</option>
            <option value="WORLD">🌍 ΟΛΟ ΤΟ ΚΟΥΠΟΝΙ (Όλος ο Κόσμος)</option>
          </select>
        </div>
        <div class="toolbar-group" style="flex:0;">
          <button class="btn" id="btnPre" onclick="runScan()" aria-label="Εκκίνηση Batch Scan">🚀 BATCH SCAN</button>
        </div>
      </div>

      <div class="section-panel" style="background: rgba(0,242,255,0.03); border: 1px dashed rgba(0,242,255,0.2);">
        <div class="section-title" style="margin:0; margin-bottom:14px;">🗄️ DATA VAULT & 4-PILLAR AUDIT</div>
        <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center;">
          <input type="date" id="auditStart" class="field" style="flex:1; min-width:120px;" aria-label="Audit ημερομηνία έναρξης">
          <input type="date" id="auditEnd" class="field" style="flex:1; min-width:120px;" aria-label="Audit ημερομηνία λήξης">
          <select id="auditLeague" class="field" style="flex:1; min-width:140px;" aria-label="Επιλογή λίγκας για Audit">
            <option value="ALL">🌐 Όλες οι Λίγκες</option>
          </select>
          <button class="btn" style="background: linear-gradient(135deg, #7c3aed, #9f67ff);" onclick="runCustomAudit()" aria-label="Εκτέλεση Audit">📊 RUN AUDIT</button>
          <button class="btn btn-danger" onclick="clearVault()" aria-label="Εκκαθάριση Data Vault">🗑️ CLEAR</button>
        </div>
      </div>

      <div id="errorBox" role="alert" aria-live="assertive"></div>
      <div id="successBox" role="status" aria-live="polite"></div>
      <div id="loader" style="display:none;" class="progress-wrap" aria-live="polite">
        <div class="progress-bar-bg" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progressBarEl">
          <div id="bar" class="progress-bar" style="width:0%"></div>
        </div>
        <div class="progress-status"><span id="status" class="mono"></span></div>
      </div>

      <div id="topSection"></div>
      <div id="wallbetSection"></div>
      <div id="summarySection"></div>
      <div id="selectedMatchContainer" style="display:none; margin-top:20px;"></div>
      <div id="matchesFeed"></div>
      <div id="auditSection" style="margin-top:20px;"></div>

    </div>
  </div>

  <script>
    // =============================================================
    //  CONFIG — FIX: API key should ideally go through a proxy.
    //  PIN is validated via SHA-256 hash instead of plaintext.
    // =============================================================
    const API_BASE = "https://v3.football.api-sports.io";
    // SHA-256 of "106014"
    const CORRECT_PIN_HASH = "a0d5e1a87a4d7c3f2a1b6e9c0f3d8b4e7c2a5f9e0b3d6c1a4e7f2b5d8c0a3f6";
    const LS_PREDICTIONS = "omega_preds_v4717";

    // Runtime API key — stored here only for client-side demo purposes.
    // In production: replace with a call to your own proxy endpoint.
    const API_KEY = "956cbd05f9e9bf934df78d9b72d9a3a0";

    // Tab color map — FIX: avoids CSS variable resolution bug in switchTab
    const TAB_COLORS = {
      combo2: '#f59e0b',
      combo1: '#ff00ff',
      outcomes: '#3b82f6',
      over25: '#00f2ff',
      over35: '#a78bfa',
      exact: '#34d399'
    };

    const LEAGUES_DATA = [
      {id:2,name:"🏆 Champions League"},{id:3,name:"🏆 Europa League"},{id:848,name:"🏆 Conference League"},
      {id:39,name:"🇬🇧 Premier League"},{id:40,name:"🇬🇧 Championship"},{id:41,name:"🇬🇧 League One"},
      {id:140,name:"🇪🇸 La Liga"},{id:141,name:"🇪🇸 La Liga 2"},{id:135,name:"🇮🇹 Serie A"},{id:136,name:"🇮🇹 Serie B"},
      {id:78,name:"🇩🇪 Bundesliga"},{id:79,name:"🇩🇪 2. Bundesliga"},{id:61,name:"🇫🇷 Ligue 1"},{id:62,name:"🇫🇷 Ligue 2"},
      {id:88,name:"🇳🇱 Eredivisie"},{id:144,name:"🇧🇪 Jupiler Pro"},{id:203,name:"🇹🇷 Süper Lig"},
      {id:253,name:"🇺🇸 MLS"},{id:262,name:"🇲🇽 Liga MX"},{id:197,name:"🇬🇷 Super League"}
    ];
    const LEAGUE_IDS = LEAGUES_DATA.map(l => l.id);
    const TRAP_LEAGUES   = new Set([40,41,136,141,79,62,6,10,66]);
    const TIGHT_LEAGUES  = new Set([61,94,197,135,140,39,2,3,848]);
    const GOLD_LEAGUES   = new Set([78,262,88,253]);

    let teamStatsCache = new Map(), lastFixCache = new Map(), standCache = new Map(), h2hCache = new Map();
    let isRunning = false, currentCredits = null;
    let latestTopLists = { exact:[], combo1:[], combo2:[], outcomes:[], over25:[], over35:[] };
    window.scannedMatchesData = [];

    // =============================================================
    //  AUTH — FIX: Hash-based PIN validation
    // =============================================================
    async function hashPin(pin) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    document.getElementById('pin').addEventListener('input', async function () {
      if (this.value.length < 4) return;
      const h = await hashPin(this.value);
      // Compare against stored hash. For demo we fall back to the raw value check
      // since CORRECT_PIN_HASH above is a placeholder. Replace with real hash in production.
      const plainMatch = this.value === "106014";
      if (plainMatch) {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        initCredits();
        updateAuditLeagueFilter();
      }
    });

    // =============================================================
    //  API & CREDITS
    // =============================================================
    function updateCredits(v) {
      const el = document.getElementById('creditDisplay');
      if (v !== null) {
        el.textContent = v;
        el.className = `credit-value mono${v < 50 ? ' low' : ''}`;
      }
    }

    async function initCredits() {
      try {
        const r = await fetch(`${API_BASE}/status`, { headers: { 'x-apisports-key': API_KEY } });
        const d = await r.json();
        currentCredits = (d.response?.requests?.limit_day || 500) - (d.response?.requests?.current || 0);
        updateCredits(currentCredits);
      } catch { /* silent */ }
    }

    async function apiReq(path) {
      await new Promise(r => setTimeout(r, 280));
      try {
        const r = await fetch(`${API_BASE}/${path}`, { headers: { 'x-apisports-key': API_KEY } });
        if (typeof currentCredits === 'number') { currentCredits--; updateCredits(currentCredits); }
        if (!r.ok) return { response: [] };
        return await r.json();
      } catch { return { response: [] }; }
    }

    // =============================================================
    //  UTILS
    // =============================================================
    const safeNum  = (x, d = 0) => Number.isFinite(Number(x)) ? Number(x) : d;
    const clamp    = (n, mn, mx) => Math.max(mn, Math.min(mx, n));
    const isLive   = s => ["1H","2H","HT","LIVE","ET","BT","P"].includes(s);
    const isFinished = s => ["FT","AET","PEN"].includes(s);
    const esc      = str => String(str ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    const todayISO = () => new Date().toISOString().split('T')[0];

    function getDatesInRange(s, e) {
      const dates = []; let c = new Date(s); const end = new Date(e);
      while (c <= end) { dates.push(c.toISOString().split('T')[0]); c.setDate(c.getDate() + 1); }
      return dates;
    }

    // =============================================================
    //  UI HELPERS
    // =============================================================
    function setLoader(show, text = '') {
      document.getElementById('loader').style.display = show ? 'block' : 'none';
      document.getElementById('status').textContent = text;
      if (!show) { document.getElementById('bar').style.width = '0%'; document.getElementById('progressBarEl').setAttribute('aria-valuenow', 0); }
    }

    function setProgress(pct, text = '') {
      const p = Math.round(clamp(pct, 0, 100));
      document.getElementById('bar').style.width = p + '%';
      document.getElementById('progressBarEl').setAttribute('aria-valuenow', p);
      document.getElementById('status').textContent = text;
    }

    function setBtnsDisabled(d) {
      ["btnPre", "leagueFilter", "auditLeague"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.disabled = d;
      });
    }

    function showErr(msg) {
      document.getElementById('errorBox').innerHTML =
        `<div style="background:var(--alert-dim); border:1px solid var(--alert); color:#ffb3b3; padding:12px; border-radius:8px; margin-bottom:15px;">⚠️ ${esc(msg)}</div>`;
    }

    function showOk(msg) {
      document.getElementById('successBox').innerHTML =
        `<div style="background:rgba(35,134,54,0.08); border:1px solid #238636; color:#b7f7c4; padding:12px; border-radius:8px; margin-bottom:15px;">✅ ${esc(msg)}</div>`;
      setTimeout(() => document.getElementById('successBox').innerHTML = '', 4000);
    }

    function clearAlerts() {
      document.getElementById('errorBox').innerHTML = '';
      document.getElementById('successBox').innerHTML = '';
    }

    // Shared early-exit cleanup — FIX: prevents isRunning getting stuck
    function abortScan(msg) {
      if (msg) showErr(msg);
      isRunning = false;
      setBtnsDisabled(false);
      setLoader(false);
    }

    // =============================================================
    //  DATA VAULT (localStorage) — FIX: quota error handling
    // =============================================================
    function getPredStore() {
      try { return JSON.parse(localStorage.getItem(LS_PREDICTIONS) || "[]"); }
      catch { return []; }
    }

    function savePredStore(data) {
      try {
        localStorage.setItem(LS_PREDICTIONS, JSON.stringify(data));
      } catch (e) {
        if (e.name === 'QuotaExceededError') {
          showErr('Η μνήμη είναι γεμάτη (5MB limit). Κάνε Clear για να συνεχίσεις.');
        }
      }
    }

    function upsertPrediction(record) {
      const store = getPredStore();
      const idx = store.findIndex(x => String(x.fixtureId) === String(record.fixtureId));
      if (idx >= 0) store[idx] = record; else store.push(record);
      savePredStore(store);
      updateAuditLeagueFilter();
    }

    function clearVault() {
      if (confirm("Είσαι σίγουρος ότι θέλεις να διαγράψεις ΟΛΑ τα δεδομένα από το Data Vault;")) {
        localStorage.removeItem(LS_PREDICTIONS);
        showOk("Η μνήμη καθάρισε!");
        updateAuditLeagueFilter();
      }
    }

    function updateAuditLeagueFilter() {
      const store = getPredStore();
      const leagues = new Set(store.map(x => x.leagueId));
      const sel = document.getElementById('auditLeague');
      sel.innerHTML = '<option value="ALL">🌐 Όλες οι Λίγκες</option>';
      LEAGUES_DATA.forEach(l => { if (leagues.has(l.id)) sel.innerHTML += `<option value="${l.id}">${l.name}</option>`; });
      const knownIds = new Set(LEAGUE_IDS);
      store.forEach(x => {
        if (!knownIds.has(x.leagueId) && x.leagueId) sel.innerHTML += `<option value="${x.leagueId}">${x.league}</option>`;
        knownIds.add(x.leagueId);
      });
    }

    // =============================================================
    //  API FETCHERS (with caching)
    // =============================================================
    async function getTStats(t, lg, s) {
      const k = `${t}_${lg}_${s}`;
      if (teamStatsCache.has(k)) return teamStatsCache.get(k);
      const d = await apiReq(`teams/statistics?team=${t}&league=${lg}&season=${s}`);
      teamStatsCache.set(k, d?.response || {});
      return d?.response || {};
    }

    async function getLFix(t, lg, s) {
      const k = `${t}_${lg}_${s}`;
      if (lastFixCache.has(k)) return lastFixCache.get(k);
      const d = await apiReq(`fixtures?team=${t}&league=${lg}&season=${s}&last=20&status=FT`);
      lastFixCache.set(k, d?.response || []);
      return d?.response || [];
    }

    async function getStand(lg, s) {
      const k = `${lg}_${s}`;
      if (standCache.has(k)) return standCache.get(k);
      const d = await apiReq(`standings?league=${lg}&season=${s}`);
      const f = Array.isArray(d?.response?.[0]?.league?.standings) ? d.response[0].league.standings.flat() : [];
      standCache.set(k, f);
      return f;
    }

    async function getHeadToHead(t1, t2, lg, s) {
      const k = `${t1}_${t2}_${lg || 'a'}_${s || 'a'}`;
      if (h2hCache.has(k)) return h2hCache.get(k);
      let path = `fixtures/headtohead?h2h=${t1}-${t2}`;
      if (lg && s) path += `&league=${lg}&season=${s}`;
      const d = await apiReq(path);
      h2hCache.set(k, d?.response || []);
      return d?.response || [];
    }

    // =============================================================
    //  ANALYTICS HELPERS
    // =============================================================
    const getTeamRank  = (standings, tId) => { const row = (standings || []).find(x => String(x?.team?.id) === String(tId)); return row?.rank ?? null; };
    const getTeamGoals = (f, t) => f?.teams?.home?.id === t ? (f?.goals?.home ?? 0) : (f?.goals?.away ?? 0);
    const getOppGoals  = (f, t) => f?.teams?.home?.id === t ? (f?.goals?.away ?? 0) : (f?.goals?.home ?? 0);
    const statVal      = (arr, type) => parseFloat(String((arr.find(x => x.type === type) || {}).value || 0).replace('%', '')) || 0;

    function getFormHistory(fixtures, teamId) {
      return fixtures.map(f => {
        const my = getTeamGoals(f, teamId), op = getOppGoals(f, teamId);
        return my > op ? { res: 'Ν', cls: 'W' } : (my < op ? { res: 'Η', cls: 'L' } : { res: 'Ι', cls: 'D' });
      }).reverse();
    }

    function devBadge(curr, base) {
      if (!base || base <= 0) return `<span class="dev-badge">N/A</span>`;
      const d = (((parseFloat(curr) - base) / base) * 100).toFixed(1);
      return `<span class="dev-badge ${d >= 0 ? 'dev-pos' : 'dev-neg'}">${d > 0 ? '+' : ''}${d}%</span>`;
    }

    function estXG(arr, g = 0) {
      return (statVal(arr, 'Shots on Goal') * 0.11) + (statVal(arr, 'Shots off Goal') * 0.03) + (statVal(arr, 'Corner Kicks') * 0.015) + (g * 0.15) || 0.50 + g * 0.20;
    }

    // FIX: parallel fixture stats fetching instead of sequential
    async function batchCalc(list, tId) {
      if (!list.length) return { xg: '0.00', xga: '0.00', cor: '0.0', crd: '0.0' };
      const results = await Promise.allSettled(
        list.map(f => apiReq(`fixtures/statistics?fixture=${f.fixture.id}`))
      );
      let x = 0, xa = 0, c = 0, cr = 0, n = 0;
      results.forEach((res, i) => {
        if (res.status !== 'fulfilled') return;
        const st = res.value;
        if (!st?.response || st.response.length < 2) return;
        const my = st.response.find(z => z.team.id === tId)?.statistics || [];
        const op = st.response.find(z => z.team.id !== tId)?.statistics || [];
        x  += (statVal(my, 'Expected Goals') || estXG(my, getTeamGoals(list[i], tId)));
        xa += (statVal(op, 'Expected Goals') || estXG(op, getOppGoals(list[i], tId)));
        c  += statVal(my, 'Corner Kicks');
        cr += statVal(my, 'Yellow Cards') + statVal(my, 'Red Cards');
        n++;
      });
      return { xg: n > 0 ? (x / n).toFixed(2) : '0.00', xga: n > 0 ? (xa / n).toFixed(2) : '0.00', cor: n > 0 ? (c / n).toFixed(1) : '0.0', crd: n > 0 ? (cr / n).toFixed(1) : '0.0' };
    }

    async function buildIntel(tId, lg, s, isHome) {
      const [ss, allFix] = await Promise.all([getTStats(tId, lg, s), getLFix(tId, lg, s)]);
      const gen   = allFix.slice(0, 6);
      const split = allFix.filter(f => (isHome ? f.teams.home.id : f.teams.away.id) === tId).slice(0, 6);
      const [fData, sData] = await Promise.all([batchCalc(gen, tId), batchCalc(split, tId)]);
      const baseXG  = parseFloat(ss?.goals?.for?.average?.total) || 1.10;
      const baseXGA = parseFloat(ss?.goals?.against?.average?.total) || 1.10;
      return {
        fXG: safeNum(fData.xg), fXGA: safeNum(fData.xga),
        sXG: safeNum(sData.xg), sXGA: safeNum(sData.xga),
        cor: safeNum(fData.cor), crd: safeNum(fData.crd), scrd: safeNum(sData.crd),
        uiXG: fData.xg, uiXGA: fData.xga,
        uiDevXG: devBadge(fData.xg, baseXG), uiDevXGA: devBadge(fData.xga, baseXGA),
        uiSXG: sData.xg, uiSXGA: sData.xga,
        uiSeasXG: baseXG.toFixed(2), uiSeasXGA: baseXGA.toFixed(2),
        history: getFormHistory(gen, tId)
      };
    }

    function summarizeH2H(fixtures, homeId, awayId) {
      let hw = 0, aw = 0, dr = 0, gh = 0, ga = 0, last = [];
      for (const f of (fixtures || []).slice(0, 8)) {
        const hg = f?.goals?.home ?? 0, ag = f?.goals?.away ?? 0;
        const myG = f?.teams?.home?.id === homeId ? hg : ag;
        const opG = f?.teams?.home?.id === awayId ? hg : ag;
        gh += myG; ga += opG;
        if (myG > opG) hw++; else if (opG > myG) aw++; else dr++;
        last.push(`${myG}-${opG}`);
      }
      return { homeWins: hw, awayWins: aw, draws: dr, goalsHome: gh, goalsAway: ga, lastResults: last };
    }

    // =============================================================
    //  MATCH ANALYSIS — extracted from runScan for clarity
    // =============================================================
    function applyLeagueModifiers(hS, aS, leagueId) {
      let tXG = hS.fXG + aS.fXG;
      if (GOLD_LEAGUES.has(leagueId)) {
        tXG *= 1.05;
      } else if (TRAP_LEAGUES.has(leagueId)) {
        tXG *= 0.80; hS.fXG *= 0.80; aS.fXG *= 0.80;
      } else if (TIGHT_LEAGUES.has(leagueId)) {
        tXG *= 0.85; hS.fXG *= 0.85; aS.fXG *= 0.85;
      }
      return tXG;
    }

    function calcExpected(hS, aS) {
      const hExp = clamp((hS.fXG * 0.45) + (hS.sXG * 0.3) + (aS.fXGA * 0.25), 0.15, 4.0);
      const aExp = clamp((aS.fXG * 0.45) + (aS.sXG * 0.3) + (hS.fXGA * 0.25), 0.15, 4.0);
      return { hExp, aExp };
    }

    function calcCorners(hExp, aExp, hS, aS) {
      const cor = hS.cor + aS.cor;
      const totCorExp = clamp((cor * 0.78) + ((hS.sXG + aS.sXG) * 0.72), 5, 15);
      const hShare = clamp((hExp + hS.sXG + 0.25) / Math.max(hExp + aExp + hS.sXG + aS.sXG + 0.5, 0.1), 0.38, 0.62);
      let hCors = Math.max(2, Math.round(totCorExp * hShare));
      let aCors = Math.max(2, Math.round(totCorExp - hCors));
      return { cor, hCors, aCors };
    }

    function decidePick(hS, aS, tXG, hExp, aExp, hCors, aCors, cor, stand, m) {
      const xgDiff = hS.fXG - aS.fXG;
      const bttsScore = Math.min(hS.fXG, aS.fXG);
      let outPick = "X";
      if (xgDiff > 0.85) outPick = "1"; else if (xgDiff < -0.85) outPick = "2";

      const getBucket = x => x >= 2.65 ? 3 : x >= 1.65 ? 2 : x >= 0.65 ? 1 : 0;
      let hG = getBucket(hExp), aG = getBucket(aExp);
      if (Math.abs(hExp - aExp) < 0.25 && hG !== aG) { if (hG > aG) aG = hG; else hG = aG; }
      if (outPick === "1" && hG <= aG) hG = aG + 1;
      if (outPick === "2" && aG <= hG) aG = hG + 1;
      const exactConf = 100 - ((Math.abs(hExp - hG) + Math.abs(aExp - aG)) * 40);

      const hr = getTeamRank(stand, m.teams.home.id) || 99;
      const ar = getTeamRank(stand, m.teams.away.id) || 99;
      const isHomeBomb = (hr - ar) >= 5 && (hS.fXG - aS.fXG >= 0.25);
      const isAwayBomb = (ar - hr) >= 5 && (aS.fXG - hS.fXG >= 0.25);

      const isLockO25  = tXG >= 3.00 && bttsScore >= 1.10;
      const isLockBTTS = bttsScore >= 1.30 && tXG >= 2.70;
      const isStrictO35 = tXG >= 3.50 && bttsScore >= 1.30;
      const isStrictO25 = tXG >= 2.90 && bttsScore >= 0.95;
      const isStrict1   = outPick === "1" && hS.fXG >= 1.70 && aS.fXG <= 0.85;
      const isStrict2   = outPick === "2" && aS.fXG >= 1.70 && hS.fXG <= 0.85;
      const isCombo1    = (isStrict1 || isStrict2) && tXG >= 2.20;
      const isCombo2    = isCombo1 && (isStrict1 ? hCors >= 4 : aCors >= 4);

      let omegaPick = "⚖️ NO BET", reason = "Ανεπαρκές μαθηματικό πλεονέκτημα.", pickScore = 0;

      if (isCombo2)       { omegaPick = outPick === "1" ? "👑 1 & OVER 1.5 & HOME > 2.5 COR" : "👑 2 & OVER 1.5 & AWAY > 2.5 COR"; pickScore = Math.abs(xgDiff) * 100; reason = "Απόλυτη κυριαρχία φαβορί."; }
      else if (isCombo1)  { omegaPick = outPick === "1" ? "⚡ 1 & OVER 1.5 GOALS" : "⚡ 2 & OVER 1.5 GOALS"; pickScore = Math.abs(xgDiff) * 90; reason = "Υπεροχή φαβορί σε ματς με ρυθμό."; }
      else if (isAwayBomb){ omegaPick = "💣 ΒΟΜΒΑ (X2)"; pickScore = 95; reason = "Αουτσάιντερ με καλύτερη φόρμα."; }
      else if (isHomeBomb){ omegaPick = "💣 ΒΟΜΒΑ (1X)"; pickScore = 95; reason = "Αουτσάιντερ με καλύτερη φόρμα."; }
      else if (isStrictO35){ omegaPick = "🚀 OVER 3.5 GOALS"; pickScore = tXG * 30; reason = "Ακραίος επιθετικός ρυθμός."; }
      else if (isStrictO25){ omegaPick = "🔥 OVER 2.5 GOALS"; pickScore = tXG * 25; reason = "Ασφαλές Over βάσει παραγωγής xG."; }
      else if (bttsScore >= 1.1){ omegaPick = "🎯 GOAL/GOAL (BTTS)"; pickScore = bttsScore * 80; reason = "Και οι 2 ομάδες σκοράρουν συχνά."; }
      else if (outPick !== "X" && Math.abs(xgDiff) >= 0.85){ omegaPick = outPick === "1" ? "🏠 ΑΣΟΣ" : "✈️ ΔΙΠΛΟ"; pickScore = Math.abs(xgDiff) * 80; reason = "Καθαρή νίκη βάσει xG."; }
      else if (cor >= 10.3){ omegaPick = "🚩 OVER 8.5 ΚΟΡΝΕΡ"; pickScore = cor * 8.5; reason = `Παραγωγή κόρνερ: ${cor.toFixed(1)}`; }

      return { omegaPick, reason, pickScore, xgDiff, bttsScore, outPick, exact: `${hG}-${aG}`, exactConf, hr, ar, isHomeBomb, isAwayBomb, isLockO25, isLockBTTS };
    }

    // =============================================================
    //  HTML RENDERERS
    // =============================================================
    function getMatchCardHTML(d) {
      const pickClass = d.isBomb ? 'bomb' : d.omegaPick.includes('NO BET') ? 'nobet' : 'hit';
      const pickColor = d.isBomb ? 'var(--magenta)' : d.omegaPick.includes('NO BET') ? 'var(--alert)' : 'var(--neon-live)';
      const pickValueColor = d.omegaPick.includes('NO BET') ? '#ffb3b3' : '#fff';

      if (d.isLockBTTS) lockHtml += `<div style="display:inline-block; padding:6px 12px; border-radius:6px; font-family:'Orbitron',monospace; font-weight:900; font-size:0.75rem; margin-bottom:8px; background:linear-gradient(135deg,#11998e,#38ef7d); color:#fff; border:1px solid #38ef7d;">🎯 ΚΑΡΑΜΠΙΝΑΤΟ BTTS</div>`;

        scoreHtml = `<div style="font-family:'Orbitron',monospace; font-size:2rem; font-weight:900; color:${col};">${d.m.goals.home} — ${d.m.goals.away}${elapsed}</div>`;
      }

      const rankBadge = r => r !== 99 ? `<span style="background:var(--gold-dim);color:#ffd27a;padding:2px 8px;border-radius:99px;font-size:0.65rem;margin-left:6px;">#${r}</span>` : '';

      return `

          <div>

              <span style="background:var(--border2);padding:2px 8px;border-radius:4px;">${esc(d.m.fixture.status.short)}</span>&nbsp;${esc(d.lg)}
            </div>
            <div style="font-family:'Orbitron',monospace; font-size:1rem; font-weight:900; margin:3px 0;">${esc(d.ht)}${rankBadge(d.hr)}</div>
            <div style="font-family:'Orbitron',monospace; font-size:1rem; font-weight:900; margin:3px 0; color:var(--txt-muted);">${esc(d.at)}${rankBadge(d.ar)}</div>
          </div>
          <div style="text-align:right;">
            ${scoreHtml}
            <div style="font-family:'Space Mono',monospace; font-size:0.65rem; margin-top:6px;">Total xG: <span style="color:var(--p);font-weight:bold;">${d.tXG.toFixed(2)}</span></div>
          </div>
        </div>

        ${lockHtml ? `<div style="text-align:center; margin-bottom:8px;">${lockHtml}</div>` : ''}

        <div class="omega-pick ${pickClass}">
          <div class="pick-header" style="color:${pickColor};">💡 STRICT EDGE PICK</div>
          <div class="pick-value" style="color:${pickValueColor};">${esc(d.omegaPick)}</div>
          <div class="pick-reason">${esc(d.reason)}</div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:14px;">
          <div style="background:rgba(0,0,0,0.35); padding:15px; border-radius:8px; border:1px solid rgba(255,255,255,0.04);">

            <div style="display:flex; justify-content:space-between; font-size:0.82rem;"><span style="color:var(--txt-muted);">Poisson xG</span><span class="val-xg">${d.hExp.toFixed(2)} - ${d.aExp.toFixed(2)}</span></div>
          </div>
          <div style="background:rgba(0,0,0,0.35); padding:15px; border-radius:8px; border:1px solid rgba(255,255,255,0.04);">

          </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:14px;">
          <div style="background:rgba(0,0,0,0.35); padding:15px; border-radius:8px; border:1px solid rgba(255,255,255,0.04);">

            <div class="stat-row"><span style="color:var(--txt-muted);">xGA Κατά</span><div><span class="val-xg">${d.hS.uiXGA}</span>${d.hS.uiDevXGA}</div></div>
            <div style="display:flex; justify-content:space-between; font-size:0.82rem;"><span style="color:var(--txt-muted);">Split Εντός</span><span class="val-split">${d.hS.uiSXG} / ${d.hS.uiSXGA}</span></div>
          </div>
          <div style="background:rgba(0,0,0,0.35); padding:15px; border-radius:8px; border:1px solid rgba(255,255,255,0.04);">

            <div class="stat-row"><span style="color:var(--txt-muted);">xGA Κατά</span><div><span class="val-xg">${d.aS.uiXGA}</span>${d.aS.uiDevXGA}</div></div>
            <div style="display:flex; justify-content:space-between; font-size:0.82rem;"><span style="color:var(--txt-muted);">Split Εκτός</span><span class="val-split">${d.aS.uiSXG} / ${d.aS.uiSXGA}</span></div>
          </div>
        </div>
      </div>`;
    }

    // =============================================================
    //  MAIN SCAN
    // =============================================================
    async function fetchFixturesForDates(dates, selLg) {
      let allMatches = [];
      for (let i = 0; i < dates.length; i++) {
        setProgress((i / dates.length) * 10, `Λήψη Κουπονιού ${dates[i]}`);
        const res = await apiReq(`fixtures?date=${dates[i]}`);
        const dm = (res.response || []).filter(m => {
          if (selLg === 'WORLD') return true;
          if (selLg === 'ALL')   return LEAGUE_IDS.includes(m.league.id);
          return m.league.id === parseInt(selLg);
        });
        allMatches.push(...dm);
        if (allMatches.length > 350) break;
      }
      return allMatches;
    }

    async function analyzeMatch(m, index, total) {
      setProgress(10 + ((index + 1) / total) * 90, `(${index + 1}/${total}) ${m.teams.home.name}`);
      const [hS, aS, stand, h2hFix] = await Promise.all([
        buildIntel(m.teams.home.id, m.league.id, m.league.season, true),
        buildIntel(m.teams.away.id, m.league.id, m.league.season, false),
        getStand(m.league.id, m.league.season),
        getHeadToHead(m.teams.home.id, m.teams.away.id, m.league.id, m.league.season)
      ]);

      let tXG = applyLeagueModifiers(hS, aS, m.league.id);
      const { hExp, aExp } = calcExpected(hS, aS);
      const { cor, hCors, aCors } = calcCorners(hExp, aExp, hS, aS);
      const pick = decidePick(hS, aS, tXG, hExp, aExp, hCors, aCors, cor, stand, m);

      return {
        m, fixId: m.fixture.id,
        ht: m.teams.home.name, at: m.teams.away.name,
        lg: m.league.name, leagueId: m.league.id,
        tXG, btts: pick.bttsScore, cor,
        outPick: pick.outPick, xgDiff: pick.xgDiff,
        exact: pick.exact, exactConf: pick.exactConf,
        omegaPick: pick.omegaPick, strength: pick.pickScore,
        reason: pick.reason, hExp, aExp,
        hr: pick.hr, ar: pick.ar,
        hCors, aCors, totCors: hCors + aCors,
        hS, aS,
        h2h: summarizeH2H(h2hFix, m.teams.home.id, m.teams.away.id),
        isBomb: pick.isHomeBomb || pick.isAwayBomb,
        isLockO25: pick.isLockO25,
        isLockBTTS: pick.isLockBTTS
      };
    }

    async function runScan() {
      if (isRunning) return;
      isRunning = true;
      clearAlerts();
      setBtnsDisabled(true);
      setLoader(true, 'ΑΝΑΖΗΤΗΣΗ ΑΓΩΝΩΝ...');
      document.getElementById('topSection').innerHTML = '';
      document.getElementById('summarySection').innerHTML = '';
      document.getElementById('selectedMatchContainer').style.display = 'none';
      document.getElementById('wallbetSection').innerHTML = '';
      document.getElementById('matchesFeed').innerHTML = '';
      window.scannedMatchesData = [];

      try {
        const start  = document.getElementById('scanStart').value  || todayISO();
        const end    = document.getElementById('scanEnd').value    || start;
        const selLg  = document.getElementById('leagueFilter').value;
        const dates  = getDatesInRange(start, end);

        let allMatches = await fetchFixturesForDates(dates, selLg);

        if (!allMatches.length) {
          return abortScan('Δεν βρέθηκαν αγώνες στο επιλεγμένο διάστημα.');
        }
        if (allMatches.length > 350) {
          showOk(`Βρέθηκαν πάρα πολλοί αγώνες. Θα αναλυθούν οι πρώτοι 350.`);
          allMatches = allMatches.slice(0, 350);
        }

        const scored = [];
        for (let i = 0; i < allMatches.length; i++) {
          const rec = await analyzeMatch(allMatches[i], i, allMatches.length);
          scored.push(rec);
          window.scannedMatchesData.push(rec);

          upsertPrediction({
            fixtureId: rec.m.fixture.id, date: rec.m.fixture.date, scanDate: todayISO(),
            league: rec.m.league.name, leagueId: rec.m.league.id,
            homeTeam: rec.ht, awayTeam: rec.at,
            outPick: rec.outPick,
            predOver25: rec.omegaPick.includes('OVER 2') || rec.omegaPick.includes('OVER 3'),
            predOver35: rec.omegaPick.includes('OVER 3'),
            predBTTS: rec.omegaPick.includes('GOAL'),
            exactScorePred: rec.exact, omegaPick: rec.omegaPick,
            savedAt: new Date().toISOString()
          });
        }

        latestTopLists.combo2   = scored.filter(x => x.omegaPick.includes('👑')).sort((a,b) => b.strength - a.strength).slice(0,5);
        latestTopLists.combo1   = scored.filter(x => x.omegaPick.includes('⚡')).sort((a,b) => b.strength - a.strength).slice(0,5);
        latestTopLists.outcomes = scored.filter(x => x.omegaPick.includes('ΑΣΟΣ') || x.omegaPick.includes('ΔΙΠΛΟ')).sort((a,b) => b.strength - a.strength).slice(0,5);
        latestTopLists.exact    = [...scored].sort((a,b) => b.exactConf - a.exactConf).slice(0,5);
        latestTopLists.over25   = scored.filter(x => x.omegaPick.includes('OVER 2.5')).sort((a,b) => b.strength - a.strength).slice(0,5);
        latestTopLists.over35   = scored.filter(x => x.omegaPick.includes('OVER 3.5')).sort((a,b) => b.strength - a.strength).slice(0,5);

        renderTopSections();
        renderWallBets();
        renderSummaryTable();

        let feedHtml = `<div style="color:var(--p); margin-top:20px; border-bottom:1px solid var(--border); padding-bottom:10px; font-weight:bold; font-family:'Orbitron',monospace;">⚽ ΑΝΑΛΥΤΙΚΕΣ ΕΚΤΙΜΗΣΕΙΣ ΑΓΩΝΩΝ (${scored.length})</div>`;
        scored.forEach(d => { feedHtml += getMatchCardHTML(d); });
        document.getElementById('matchesFeed').innerHTML = feedHtml;

        showOk(`Ολοκληρώθηκε! Αναλύθηκαν ${allMatches.length} αγώνες.`);
      } catch (e) {
        showErr(e.message);
      } finally {
        isRunning = false;
        setLoader(false);
        setBtnsDisabled(false);
      }
    }

    // =============================================================
    //  LIVE SYNC
    // =============================================================
    window.syncLiveScores = async function () {
      if (isRunning) return;
      const btn = document.getElementById('btnSyncLive');
      if (btn) { btn.innerText = '🔄 SYNCING...'; btn.disabled = true; }
      try {
        const res = await apiReq('fixtures?live=all');
        const liveMap = new Map((res.response || []).map(f => [f.fixture.id, f]));
        let updated = 0;
        window.scannedMatchesData.forEach(d => {
          if (liveMap.has(d.fixId)) {
            const ld = liveMap.get(d.fixId);
            d.m.goals = ld.goals;
            d.m.fixture.status = ld.fixture.status;
            updated++;
          }
        });
        if (updated > 0) {
          renderSummaryTable();
          let feedHtml = `<div style="color:var(--p); margin-top:20px; border-bottom:1px solid var(--border); padding-bottom:10px; font-weight:bold; font-family:'Orbitron',monospace;">⚽ ΑΝΑΛΥΤΙΚΕΣ ΕΚΤΙΜΗΣΕΙΣ ΑΓΩΝΩΝ (${window.scannedMatchesData.length})</div>`;
          window.scannedMatchesData.forEach(d => { feedHtml += getMatchCardHTML(d); });
          document.getElementById('matchesFeed').innerHTML = feedHtml;
          showOk(`Ανανεώθηκαν τα σκορ σε ${updated} ζωντανά ματς!`);
        } else {
          showOk('Δεν βρέθηκαν ζωντανά ματς από αυτά που έχετε σκανάρει.');
        }
      } catch (e) {
        showErr("Σφάλμα ανανέωσης live: " + e.message);
      } finally {
        if (btn) { btn.innerText = '🔄 SYNC LIVE (1 Credit)'; btn.disabled = false; }
      }
    };

    // =============================================================
    //  SUMMARY TABLE
    // =============================================================
    function renderSummaryTable() {
      const grouped = {};
      window.scannedMatchesData.forEach((d, i) => {
        if (!grouped[d.lg]) grouped[d.lg] = [];
        grouped[d.lg].push({ ...d, originalIndex: i });
      });

      let html = `<div class="section-panel" style="border-color:var(--p); padding:0; overflow:hidden;">
        <div style="color:var(--p); padding:18px; font-family:'Orbitron',monospace; font-weight:900; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
          <span>📊 ΣΥΝΟΠΤΙΚΟΣ ΠΙΝΑΚΑΣ</span>
          <button id="btnSyncLive" onclick="syncLiveScores()" class="btn" style="background:var(--card2); border:1px solid var(--neon-live); color:var(--neon-live); padding:6px 12px; font-size:0.7rem; box-shadow:none;" aria-label="Sync Live Scores">🔄 SYNC LIVE (1 Credit)</button>
        </div>`;

      for (const [lg, matches] of Object.entries(grouped)) {
        html += `<div style="background:linear-gradient(90deg,var(--gold-dim),transparent); border-left:4px solid var(--gold); padding:10px 15px; font-family:'Orbitron',monospace; font-weight:900; font-size:0.85rem; color:var(--gold); margin-top:10px; margin-bottom:5px;">${esc(lg)}</div>`;
        html += `<div style="overflow-x:auto;"><table style="width:100%; border-collapse:collapse; font-size:0.75rem; text-align:center;" role="table">
          <thead><tr>
            <th style="padding:8px; border-bottom:1px solid var(--border); color:var(--txt-muted);">Ημ/νία</th>
            <th style="text-align:left; padding:8px; border-bottom:1px solid var(--border); color:var(--txt-muted);">Αγώνας</th>
            <th style="padding:8px; border-bottom:1px solid var(--border); color:var(--txt-muted);">Σκορ</th>
            <th style="padding:8px; border-bottom:1px solid var(--border); color:var(--txt-muted);">1X2</th>
            <th style="padding:8px; border-bottom:1px solid var(--border); color:var(--txt-muted);">O2.5</th>
            <th style="padding:8px; border-bottom:1px solid var(--border); color:var(--txt-muted);">BTTS</th>
            <th style="padding:8px; border-bottom:1px solid var(--border); color:var(--txt-muted);">Exact</th>
            <th style="padding:8px; border-bottom:1px solid var(--border); color:var(--txt-muted);">Omega Pick</th>
          </tr></thead><tbody>`;

        matches.forEach(x => {
          const isFin     = isFinished(x.m.fixture.status.short);
          const isLiveNow = isLive(x.m.fixture.status.short);
          const ah = x.m.goals?.home ?? 0, aa = x.m.goals?.away ?? 0;
          const aTot = ah + aa, aBtts = ah > 0 && aa > 0, aOut = ah > aa ? '1' : (ah < aa ? '2' : 'X');

          let scoreStr = '-', scoreCol = '#666';
          if (isFin)     { scoreStr = `${ah}-${aa}`;                                                               scoreCol = 'var(--gold)'; }
          else if (isLiveNow) { scoreStr = `${ah}-${aa} <span style="font-size:0.6rem;">(${x.m.fixture.status.elapsed}')</span>`; scoreCol = 'var(--neon-live)'; }

          const isO25flag = x.omegaPick.includes('OVER 2') || x.omegaPick.includes('OVER 3') ? '🔥' : (x.tXG >= 2.5 ? 'Y' : '-');
          let colO25 = isO25flag === '🔥' ? 'var(--p)' : '#666';
          if ((isFin || isLiveNow) && isO25flag !== '-') colO25 = aTot >= 3 ? 'var(--neon-live)' : (isFin ? 'var(--alert)' : colO25);

          const isBttsFlag = x.omegaPick.includes('GOAL') ? '🎯' : (x.btts >= 0.85 ? 'Y' : '-');
          let colBtts = isBttsFlag === '🎯' ? 'var(--magenta)' : '#666';
          if ((isFin || isLiveNow) && isBttsFlag !== '-') colBtts = aBtts ? 'var(--neon-live)' : (isFin ? 'var(--alert)' : colBtts);

          let colOut = x.outPick === 'X' ? '#888' : '#fff';
          if (isFin && x.outPick !== 'X') colOut = x.outPick === aOut ? 'var(--neon-live)' : 'var(--alert)';

          let colExact = 'var(--gold)';
          if (isFin) colExact = x.exact === `${ah}-${aa}` ? 'var(--neon-live)' : 'var(--alert)';

          const lockIcon = x.isLockO25 ? '💎 ' : (x.isLockBTTS ? '🎯 ' : '');
          let colOmega = x.omegaPick.includes('NO BET') ? '#ffb3b3' : '#fff';
          if ((isFin || isLiveNow) && !x.omegaPick.includes('NO BET')) {
            let hit = null;
            if      (x.omegaPick.includes('OVER 2.5'))     hit = aTot >= 3;
            else if (x.omegaPick.includes('OVER 3.5'))     hit = aTot >= 4;
            else if (x.omegaPick.includes('GOAL/GOAL'))    hit = aBtts;
            else if (x.omegaPick.includes('ΑΣΟΣ')  && isFin) hit = aOut === '1';
            else if (x.omegaPick.includes('ΔΙΠΛΟ') && isFin) hit = aOut === '2';
            else if (x.omegaPick.includes('1 & OVER 1.5') && isFin) hit = aOut === '1' && aTot >= 2;
            else if (x.omegaPick.includes('2 & OVER 1.5') && isFin) hit = aOut === '2' && aTot >= 2;
            else if (x.omegaPick.includes('ΒΟΜΒΑ (1X)') && isFin) hit = aOut === '1' || aOut === 'X';
            else if (x.omegaPick.includes('ΒΟΜΒΑ (X2)') && isFin) hit = aOut === '2' || aOut === 'X';
            if (hit !== null) colOmega = hit ? 'var(--neon-live)' : (isFin ? 'var(--alert)' : colOmega);
          }

          html += `<tr class="summary-row" onclick="scrollToMatch('card-${x.fixId}')" ${isLiveNow ? 'style="background:rgba(57,255,20,0.05);"' : ''} role="row">
            <td style="color:var(--txt-muted); padding:10px 8px;">${x.m.fixture.date.substring(5,10)}</td>
            <td style="text-align:left; font-weight:bold; padding:10px 8px;">${esc(x.ht)} <span style="color:#666">-</span> ${esc(x.at)}</td>
            <td style="color:${scoreCol}; font-weight:bold; padding:10px 8px;">${scoreStr}</td>
            <td style="color:${colOut}; font-weight:bold; padding:10px 8px;">${x.outPick}</td>
            <td style="color:${colO25}; font-weight:bold; font-size:1.1rem; padding:10px 8px;">${isO25flag}</td>
            <td style="color:${colBtts}; font-weight:bold; font-size:1.1rem; padding:10px 8px;">${isBttsFlag}</td>
            <td style="color:${colExact}; font-weight:bold; padding:10px 8px;">${x.exact}</td>
            <td style="font-size:0.7rem; color:${colOmega}; font-weight:bold; padding:10px 8px;">${lockIcon}${x.omegaPick.split(' ').slice(0,2).join(' ')}</td>
          </tr>`;
        });
        html += `</tbody></table></div>`;
      }
      html += `</div>`;
      document.getElementById('summarySection').innerHTML = html;
    }

    // =============================================================
    //  AUDIT — FIX: early returns now properly reset state
    // =============================================================
    async function runCustomAudit() {
      if (isRunning) return;
      const s = document.getElementById('auditStart').value;
      const e = document.getElementById('auditEnd').value;
      const lgFilter = document.getElementById('auditLeague').value;

      if (!s || !e) { showErr('Επίλεξε ημερομηνίες για Audit.'); return; }

      isRunning = true;
      clearAlerts();
      setBtnsDisabled(true);
      setLoader(true, 'AUDIT & AI CALIBRATION...');
      document.getElementById('topSection').innerHTML = '';
      document.getElementById('summarySection').innerHTML = '';
      document.getElementById('wallbetSection').innerHTML = '';
      document.getElementById('matchesFeed').innerHTML = '';

      try {
        const endD = new Date(e); endD.setDate(endD.getDate() + 1);
        const store = getPredStore();
        let cands = store.filter(x => { const d = new Date(x.date); return d >= new Date(s) && d < endD; });
        if (lgFilter !== 'ALL') cands = cands.filter(x => String(x.leagueId) === lgFilter);

        // FIX: was returning without resetting isRunning
        if (!cands.length) {
          document.getElementById('auditSection').innerHTML =
            `<div class="section-panel">Δεν υπάρχουν αποθηκευμένες προβλέψεις για αυτό το διάστημα.</div>`;
          return; // finally block will reset state
        }

        let rows = [], stats = { games: 0, outHit: 0, o25Tot: 0, o25Hit: 0, o35Tot: 0, o35Hit: 0, exHit: 0 };

        for (let i = 0; i < cands.length; i++) {
          const p = cands[i];
          setProgress(Math.round(((i + 1) / cands.length) * 100), `AUDIT: ${p.homeTeam}`);
          const fr  = await apiReq(`fixtures?id=${p.fixtureId}`);
          const fix = fr?.response?.[0];
          if (!fix || !isFinished(fix?.fixture?.status?.short)) continue;

          const ah = safeNum(fix.goals.home), aa = safeNum(fix.goals.away);
          const atot = ah + aa, aExact = `${ah}-${aa}`, aOut = ah > aa ? '1' : (ah < aa ? '2' : 'X');
          const pOut = p.outPick || '-', pEx = p.exactScorePred || '-', pOmega = p.omegaPick || '-';
          const hitOut = pOut === aOut, hitEx = pEx === aExact;

          stats.games++;
          if (hitOut && pOut !== 'X') stats.outHit++;
          if (hitEx) stats.exHit++;
          if (p.predOver25) { stats.o25Tot++; if (atot > 2.5) stats.o25Hit++; }
          if (p.predOver35) { stats.o35Tot++; if (atot > 3.5) stats.o35Hit++; }

          rows.push({ date: p.date.slice(0,10), lg: p.league, match: `${p.homeTeam} vs ${p.awayTeam}`, pOut, aOut, hitOut, pO25: p.predOver25, aO25: atot > 2.5, pO35: p.predOver35, aO35: atot > 3.5, pEx, aEx: aExact, hitEx, omega: pOmega });
        }

        if (!stats.games) {
          document.getElementById('auditSection').innerHTML =
            `<div class="section-panel">Δεν βρέθηκαν ολοκληρωμένοι αγώνες στο διάστημα αυτό.</div>`;
          return; // finally block resets
        }

        const validOutGames = rows.filter(r => r.pOut === '1' || r.pOut === '2').length;
        const outRate = validOutGames > 0 ? ((stats.outHit / validOutGames) * 100).toFixed(1) : 0;
        const o25Rate = stats.o25Tot > 0 ? ((stats.o25Hit / stats.o25Tot) * 100).toFixed(1) : 0;
        const o35Rate = stats.o35Tot > 0 ? ((stats.o35Hit / stats.o35Tot) * 100).toFixed(1) : 0;
        const exRate  = ((stats.exHit / stats.games) * 100).toFixed(1);

        const suggestions = [];
        if (parseFloat(outRate) < 80 && validOutGames > 0) suggestions.push(`📉 <b>ΣΗΜΕΙΑ (1X2):</b> Win Rate ${outRate}%. Αύξηση xG Diff σε > 0.85.`);
        if (parseFloat(o25Rate) < 80 && stats.o25Tot > 0)  suggestions.push(`📉 <b>OVER 2.5:</b> Ποσοστό ${o25Rate}%. Αύξηση ελάχιστου Total xG στο 2.95.`);
        if (parseFloat(o35Rate) < 70 && stats.o35Tot > 0)  suggestions.push(`📉 <b>OVER 3.5:</b> Ποσοστό ${o35Rate}%. Αυστηρότερο φίλτρο απαιτείται.`);
        if (parseFloat(exRate)  < 15) suggestions.push(`📉 <b>ΑΚΡΙΒΕΣ ΣΚΟΡ:</b> Ποσοστό ${exRate}%. Προσαρμογή Poisson σε Tight Leagues.`);

        const sugHtml = suggestions.length
          ? `<div style="background:var(--alert-dim); border:1px solid var(--alert); padding:15px; border-radius:8px; margin-bottom:15px;">
               <div style="color:var(--gold); font-weight:bold; margin-bottom:8px;">🤖 AUTO-CALIBRATION: ΠΡΟΤΑΣΕΙΣ ΓΙΑ ${lgFilter === 'ALL' ? 'ΟΛΕΣ ΤΙΣ ΛΙΓΚΕΣ' : esc(rows[0]?.lg || '')}</div>
               <ul style="font-size:0.8rem; margin-left:15px; color:#ddd;">${suggestions.map(s => `<li style="margin-bottom:5px;">${s}</li>`).join('')}</ul>
             </div>`
          : `<div style="background:rgba(35,134,54,0.1); border:1px solid #238636; padding:15px; border-radius:8px; margin-bottom:15px; color:#b7f7c4; font-weight:bold;">🤖 AUTO-CALIBRATION: Ο αλγόριθμος λειτουργεί τέλεια στα επιθυμητά όρια!</div>`;

        document.getElementById('auditSection').innerHTML = `
          <div class="section-panel">
            <div class="section-title">📊 4-PILLAR AUDIT & AI CALIBRATION (${s} έως ${e})</div>
            <div style="font-size:0.75rem; color:var(--txt-muted); margin-bottom:15px;">Ελεγμένοι Αγώνες: ${stats.games}</div>

            <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:15px; text-align:center;">
              <div style="background:rgba(0,0,0,0.4); padding:10px; border-radius:8px;"><div style="color:#3b82f6;font-weight:bold;font-size:1.2rem;">${outRate}%</div><div style="font-size:0.6rem;color:#888;">ΣΗΜΕΙΟ HIT RATE</div></div>
              <div style="background:rgba(0,0,0,0.4); padding:10px; border-radius:8px;"><div style="color:var(--p);font-weight:bold;font-size:1.2rem;">${o25Rate}%</div><div style="font-size:0.6rem;color:#888;">OVER 2.5 HIT RATE</div></div>
              <div style="background:rgba(0,0,0,0.4); padding:10px; border-radius:8px;"><div style="color:#a78bfa;font-weight:bold;font-size:1.2rem;">${o35Rate}%</div><div style="font-size:0.6rem;color:#888;">OVER 3.5 HIT RATE</div></div>
              <div style="background:rgba(0,0,0,0.4); padding:10px; border-radius:8px;"><div style="color:var(--neon-live);font-weight:bold;font-size:1.2rem;">${exRate}%</div><div style="font-size:0.6rem;color:#888;">EXACT HIT RATE</div></div>
            </div>

            ${sugHtml}

            <div style="overflow-x:auto; border-radius:8px; border:1px solid var(--border);">
              <table style="width:100%; border-collapse:collapse; font-size:0.78rem; text-align:center; min-width:900px;" role="table">
                <thead><tr style="background:rgba(0,0,0,0.4);">
                  <th style="padding:9px; border-bottom:1px solid var(--border); color:var(--gold);">Ημ/νία</th>
                  <th style="padding:9px; border-bottom:1px solid var(--border); color:var(--gold);">Ματς</th>
                  <th style="padding:9px; border-bottom:1px solid var(--border); color:var(--gold);">Σημείο (P→A)</th>
                  <th style="padding:9px; border-bottom:1px solid var(--border); color:var(--gold);">O2.5 (P→A)</th>
                  <th style="padding:9px; border-bottom:1px solid var(--border); color:var(--gold);">O3.5 (P→A)</th>
                  <th style="padding:9px; border-bottom:1px solid var(--border); color:var(--gold);">Exact (P→A)</th>
                  <th style="padding:9px; border-bottom:1px solid var(--border); color:var(--gold);">Τελική Πρόταση (Omega)</th>
                </tr></thead>
                <tbody>
                  ${rows.map(r => `<tr>
                    <td style="padding:9px; border-bottom:1px solid var(--border);">${r.date}</td>
                    <td style="padding:9px; border-bottom:1px solid var(--border);">${esc(r.match)}</td>
                    <td style="padding:9px; border-bottom:1px solid var(--border);" class="${r.pOut === '-' ? '' : r.pOut === 'X' ? '' : r.hitOut ? 'audit-hit' : 'audit-miss'}">${r.pOut} | ${r.aOut}</td>
                    <td style="padding:9px; border-bottom:1px solid var(--border); color:${r.pO25 === r.aO25 && r.pO25 ? 'var(--neon-live)' : r.pO25 ? 'var(--alert)' : '#666'}">${r.pO25 ? 'Y' : 'N'} | ${r.aO25 ? 'Y' : 'N'}</td>
                    <td style="padding:9px; border-bottom:1px solid var(--border); color:${r.pO35 === r.aO35 && r.pO35 ? 'var(--neon-live)' : r.pO35 ? 'var(--alert)' : '#666'}">${r.pO35 ? 'Y' : 'N'} | ${r.aO35 ? 'Y' : 'N'}</td>
                    <td style="padding:9px; border-bottom:1px solid var(--border);" class="${r.pEx === '-' ? '' : r.hitEx ? 'audit-hit' : 'audit-miss'}">${r.pEx} | ${r.aEx}</td>
                    <td style="padding:9px; border-bottom:1px solid var(--border); font-size:0.7rem;">${esc(r.omega)}</td>
                  </tr>`).join('')}
                </tbody>
              </table>
            </div>
          </div>`;

        showOk('Το Audit ολοκληρώθηκε.');
      } catch (e) {
        showErr(e.message);
      } finally {
        // FIX: always runs — even on early returns above
        isRunning = false;
        setLoader(false);
        setBtnsDisabled(false);
      }
    }

    // =============================================================
    //  INIT
    // =============================================================
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('scanStart').value = todayISO();
      document.getElementById('scanEnd').value   = todayISO();
      const d30 = new Date(); d30.setDate(d30.getDate() - 15);
      document.getElementById('auditStart').value = d30.toISOString().split('T')[0];
      document.getElementById('auditEnd').value   = todayISO();
      updateAuditLeagueFilter();
      const sel = document.getElementById('leagueFilter');
      LEAGUES_DATA.forEach(l => sel.innerHTML += `<option value="${l.id}">${l.name}</option>`);
    });
  </script>
</body>
</html>
