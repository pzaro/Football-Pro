<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Predictor Pro v4700.9 - Total Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root {
      --bg: #010409; --card: #0d1117; --card-deep: #161b22; --border: #30363d;
      --p: #00f2ff; --magenta: #ff00ff; --txt: #f0f6fc; --txt-muted: #8b949e;
      --gold: #f59e0b; --live: #238636; --alert: #da3633; --neon-live: #39ff14;
      --grad: linear-gradient(135deg, #00f2ff, #8b5cf6);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 0; }
    h1, h2, h3, h4, .orbitron { font-family: 'Orbitron', sans-serif; }
    .container { width: 100%; max-width: 950px; margin: 0 auto; padding: 15px; }

    /* --- LIVE PULSE --- */
    .live-score-pulse { color: var(--neon-live); font-size: 1.5rem; font-weight: 900; animation: neonPulse 1.2s infinite; text-shadow: 0 0 10px rgba(57, 255, 20, 0.6); }
    @keyframes neonPulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    /* --- UI CARDS --- */
    .cyber-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; position: relative; }
    .standard-glow { border-left: 5px solid var(--p); }
    .live-glow { border-left: 5px solid var(--neon-live); box-shadow: 0 0 15px rgba(57, 255, 20, 0.1); }
    .finished-glow { border-left: 5px solid #555; opacity: 0.85; filter: grayscale(0.3); }

    .status-badge { font-size: 0.65rem; font-weight: 900; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; display: inline-block; }
    .badge-live { background: var(--alert); color: #fff; }
    .badge-finished { background: #333; color: #aaa; }

    .btn-wrap { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
    .btn-main { flex: 1; min-width: 200px; padding: 18px; background: var(--grad); color:#fff; border:none; border-radius:12px; font-weight:900; cursor:pointer; font-family:'Orbitron'; text-transform: uppercase; transition: 0.3s; }
    .btn-main:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,242,255,0.3); }
    
    .deep-intel { display: none; background: var(--card-deep); border-radius: 12px; padding: 15px; margin-top: 15px; border: 1px solid #222; }
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
    .stat-box { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; border: 1px solid #333; }
    .stat-val { font-family: 'Orbitron'; font-weight: 900; color: var(--p); font-size: 1.1rem; }
    
    .form-dot { display: inline-block; width: 20px; height: 20px; border-radius: 50%; text-align: center; line-height: 20px; font-size: 0.7rem; font-weight: 900; margin-right: 4px; color: #fff; }
    .form-W { background: var(--live); } .form-D { background: #666; } .form-L { background: var(--alert); }

    .btn-toggle { background: transparent; color: var(--p); border: 1px solid var(--p); padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: 800; font-size: 0.8rem; }
  </style>
</head>

<body>
  <div id="authScreen" style="text-align:center; margin-top:20vh;">
    <h1 class="orbitron" style="color:var(--p);">APEX ALPHA OMEGA</h1>
    <input type="password" id="pin" placeholder="PIN" oninput="if(this.value==='106014'){document.getElementById('authScreen').style.display='none';document.getElementById('app').style.display='block';}" 
           style="background:#000; color:var(--p); border:1px solid var(--p); padding:15px; text-align:center; font-size:2rem; border-radius:12px; font-family:'Orbitron'; outline:none;">
  </div>

  <div id="app" style="display:none;">
    <div class="container">
      <header style="text-align:center; padding:30px 0;">
        <h1 class="orbitron" style="color:var(--p); margin:0;">QUANT TERMINAL <span style="color:#fff">v4700.9</span></h1>
        <div style="color:var(--magenta); font-weight:900; font-size:0.7rem; letter-spacing:3px;">TOTAL MATCH ANALYTICS & LIVE RADAR</div>
      </header>

      <div class="btn-wrap">
        <button class="btn-main" onclick="runScan('pre')">🚀 PRE-MATCH & HISTORICAL SCAN</button>
        <button class="btn-main" style="background:var(--grad-live)" onclick="runScan('live')">🔴 LIVE RADAR (IN-PLAY)</button>
        <button class="btn-main" style="background:#222; min-width:100px;" onclick="exportPDF()">📄 PDF</button>
      </div>

      <div id="loader" style="display:none; text-align:center; margin-bottom:20px;">
        <div style="width:100%; background:#000; height:10px; border-radius:5px; overflow:hidden; border:1px solid #333;">
          <div id="bar" style="width:0%; height:100%; background:var(--grad); transition:0.3s;"></div>
        </div>
        <p id="status" class="orbitron" style="font-size:0.7rem; color:var(--p); margin-top:10px;"></p>
      </div>

      <div id="display"></div>
    </div>
  </div>

  <script>
    const KEY = "956cbd05f9e9bf934df78d9b72d9a3a0";
    const API = "https://v3.football.api-sports.io";
    const LEAGUES = [39, 40, 41, 140, 141, 135, 78, 79, 61, 62, 253, 262, 128, 197, 318, 94, 88, 144, 2, 3, 84, 203, 357];
    let currentData = [];

    async function fetchData(path) {
      const r = await fetch(`${API}/${path}`, { headers: {"x-apisports-key": KEY} });
      return await r.json();
    }

    async function getDeepStats(teamId) {
      const r = await fetchData(`fixtures?team=${teamId}&last=6&status=FT`);
      const fixs = r.response || [];
      let txG = 0, txGA = 0, tC = 0, tK = 0, form = [];
      for(let f of fixs) {
        let isH = f.teams.home.id === teamId;
        form.push(isH ? (f.goals.home > f.goals.away ? 'W' : (f.goals.home < f.goals.away ? 'L' : 'D')) : (f.goals.away > f.goals.home ? 'W' : (f.goals.away < f.goals.home ? 'L' : 'D')));
        const sR = await fetchData(`fixtures/statistics?fixture=${f.fixture.id}`);
        const sA = sR.response || [];
        if(sA.length === 2) {
          let my = sA.find(s => s.team.id === teamId).statistics;
          let op = sA.find(s => s.team.id !== teamId).statistics;
          let getV = (a, t) => { let o = a.find(x => x.type === t); return o && o.value ? parseFloat(o.value) : 0; };
          txG += getV(my, "Expected Goals"); txGA += getV(op, "Expected Goals");
          tC += (getV(my, "Yellow Cards") + getV(my, "Red Cards")); tK += getV(my, "Corner Kicks");
        }
        await new Promise(res => setTimeout(res, 100));
      }
      return { xG: (txG/6).toFixed(2), xGA: (txGA/6).toFixed(2), cards: (tC/6).toFixed(1), corners: (tK/6).toFixed(1), form: form.reverse() };
    }

    async function runScan(mode) {
      document.getElementById('loader').style.display = 'block';
      const disp = document.getElementById('display'); disp.innerHTML = "";
      const date = new Date().toISOString().split('T')[0];
      const res = await fetchData(`fixtures?date=${date}`);
      const matches = (res.response || []).filter(m => LEAGUES.includes(m.league.id));
      currentData = [];

      for(let i=0; i < matches.length; i++) {
        let m = matches[i];
        document.getElementById('bar').style.width = ((i+1)/matches.length * 100) + "%";
        document.getElementById('status').innerText = `ANALYZING: ${m.teams.home.name}`;
        
        let stats = null;
        if(mode === 'pre') {
          const h = await getDeepStats(m.teams.home.id);
          const a = await getDeepStats(m.teams.away.id);
          stats = { h, a };
        } else {
          const sR = await fetchData(`fixtures/statistics?fixture=${m.fixture.id}`);
          if(sR.response.length === 2) {
            let hS = sR.response[0].statistics; let aS = sR.response[1].statistics;
            let getV = (a, t) => { let o = a.find(x => x.type === t); return o && o.value ? parseInt(o.value) : 0; };
            stats = {
              h: { danger: getV(hS, "Dangerous Attacks"), shots: getV(hS, "Shots on Goal"), corners: getV(hS, "Corner Kicks") },
              a: { danger: getV(aS, "Dangerous Attacks"), shots: getV(aS, "Shots on Goal"), corners: getV(aS, "Corner Kicks") }
            };
          }
        }
        currentData.push({ m, stats, mode });
        renderMatch(m, stats, mode);
      }
      document.getElementById('loader').style.display = 'none';
    }

    function renderMatch(m, s, mode) {
      const disp = document.getElementById('display');
      const isLive = ["1H","2H","HT","ET","LIVE"].includes(m.fixture.status.short);
      const isFT = m.fixture.status.short === "FT";
      const glow = isLive ? 'live-glow' : (isFT ? 'finished-glow' : 'standard-glow');
      
      let html = `
        <div class="cyber-card ${glow}">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
              <span class="status-badge ${isLive ? 'badge-live' : (isFT ? 'badge-finished' : '')}">
                ${isLive ? 'LIVE '+m.fixture.status.elapsed+"'" : m.fixture.status.short}
              </span>
              <div style="color:var(--txt-muted); font-size:0.7rem; margin:5px 0;">${m.league.name}</div>
              <div class="orbitron" style="font-size:1.1rem;">${m.teams.home.name}</div>
              <div class="orbitron" style="font-size:1.1rem;">${m.teams.away.name}</div>
            </div>
            <div style="text-align:center;">
              <div class="${isLive ? 'live-score-pulse' : ''}" style="font-size:1.8rem; font-weight:900;">
                ${m.goals.home ?? 0} - ${m.goals.away ?? 0}
              </div>
            </div>
          </div>
          
          <button class="btn-toggle" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'block' ? 'none' : 'block'">
            🔍 ${mode === 'pre' ? 'DEEP PRE-MATCH ANALYSIS' : 'LIVE PRESSURE STATS'}
          </button>
          
          <div class="deep-intel">
            ${mode === 'pre' ? `
              <div class="stats-grid">
                <div class="stat-box">
                  <div style="font-size:0.6rem; color:var(--p);">HOME FORM (Last 6)</div>
                  ${s.h.form.map(f => `<span class="form-dot form-${f}">${f}</span>`).join('')}
                  <div style="margin-top:10px;">xG: <span class="stat-val">${s.h.xG}</span> | xGA: <span class="stat-val">${s.h.xGA}</span></div>
                </div>
                <div class="stat-box">
                  <div style="font-size:0.6rem; color:var(--p);">AWAY FORM (Last 6)</div>
                  ${s.a.form.map(f => `<span class="form-dot form-${f}">${f}</span>`).join('')}
                  <div style="margin-top:10px;">xG: <span class="stat-val">${s.a.xG}</span> | xGA: <span class="stat-val">${s.a.xGA}</span></div>
                </div>
              </div>
              <div class="stats-grid" style="grid-template-columns: repeat(4, 1fr); text-align:center;">
                <div class="stat-box"><div style="font-size:0.5rem;">xCOR (H)</div><div class="stat-val">${s.h.corners}</div></div>
                <div class="stat-box"><div style="font-size:0.5rem;">xCOR (A)</div><div class="stat-val">${s.a.corners}</div></div>
                <div class="stat-box"><div style="font-size:0.5rem;">xCRD (H)</div><div class="stat-val">${s.h.cards}</div></div>
                <div class="stat-box"><div style="font-size:0.5rem;">xCRD (A)</div><div class="stat-val">${s.a.cards}</div></div>
              </div>
            ` : `
              <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr); text-align:center;">
                <div class="stat-box"><div style="font-size:0.6rem;">DANGER ATK</div><div class="stat-val">${s.h.danger} - ${s.a.danger}</div></div>
                <div class="stat-box"><div style="font-size:0.6rem;">SHOTS ON</div><div class="stat-val">${s.h.shots} - ${s.a.shots}</div></div>
                <div class="stat-box"><div style="font-size:0.6rem;">CORNERS</div><div class="stat-val">${s.h.corners} - ${s.a.corners}</div></div>
              </div>
            `}
          </div>
        </div>`;
      disp.innerHTML += html;
    }

    function exportPDF() {
      const element = document.getElementById('display');
      html2pdf().from(element).set({
        margin: 0.5, filename: 'Apex_Report.pdf',
        html2canvas: { scale: 2, backgroundColor: '#010409' },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
      }).save();
    }
  </script>
</body>
</html>
