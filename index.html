<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vienna Local Guide</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sec: #94a3b8;
            --accent: #fbbf24;
            --food-color: #ef4444;
            --sight-color: #3b82f6;
            --arr-color: #10b981; 
            --dep-color: #8b5cf6; 
            --ticket-color: #f97316;
            --sweet-color: #ec4899;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            padding-bottom: 80px;
            -webkit-font-smoothing: antialiased;
        }

        /* Progress Bar */
        .progress-container { width: 100%; height: 4px; background: #334155; position: fixed; top: 0; z-index: 9999; }
        .progress-bar { height: 4px; background: var(--accent); width: 0%; border-radius: 0 2px 2px 0; }

        /* App Header & Tabs */
        .header {
            position: sticky;
            top: 4px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 15px 15px 10px;
            border-bottom: 1px solid #334155;
        }

        h1 { margin: 0 0 15px 0; font-size: 1.4rem; text-align: center; color: var(--accent); letter-spacing: 0.5px; }

        .tabs { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
        }
        
        .tab-btn {
            flex: 1 1 calc(33.333% - 8px); 
            padding: 10px 5px;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-sec);
            background: #334155;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        /* Active Tab Colors */
        .tab-btn.active.ticket { background: var(--ticket-color); color: #fff; box-shadow: 0 4px 15px rgba(249, 115, 22, 0.4); }
        .tab-btn.active.sweets { background: var(--sweet-color); color: #fff; box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4); }
        .tab-btn.active.food { background: var(--food-color); color: #fff; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }
        .tab-btn.active.sights { background: var(--sight-color); color: #fff; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .tab-btn.active.arrival { background: var(--arr-color); color: #fff; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        .tab-btn.active.departure { background: var(--dep-color); color: #fff; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }

        /* Cards Layout */
        .container { padding: 15px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid #334155;
            position: relative;
            overflow: hidden;
        }

        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; }
        .card.type-ticket::before { background: var(--ticket-color); }
        .card.type-sweets::before { background: var(--sweet-color); }
        .card.type-food::before { background: var(--food-color); }
        .card.type-sight::before { background: var(--sight-color); }
        .card.type-arrival::before { background: var(--arr-color); }
        .card.type-departure::before { background: var(--dep-color); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .card-title { font-size: 1.25rem; font-weight: 800; margin: 0; color: #fff; line-height: 1.3; }
        .card-cost { background: #064e3b; color: #34d399; padding: 4px 8px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; white-space: nowrap; margin-left: 10px; }

        .card-desc { font-size: 0.95rem; line-height: 1.6; color: var(--text-sec); margin: 0 0 15px 0; white-space: pre-line; }
        .card-desc strong { color: #fff; }
        
        .card-tip { background: rgba(251, 191, 36, 0.1); color: #fcd34d; padding: 12px; border-radius: 8px; font-size: 0.9rem; font-style: italic; margin-bottom: 15px; border-left: 3px solid var(--accent); }

        .actions { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border-radius: 10px; font-weight: 700; text-align: center; text-decoration: none; font-size: 0.9rem; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-audio { background: #334155; color: #fff; }
        .btn-map { background: var(--text-main); color: var(--bg-dark); }
        .btn-audio.playing { background: #ef4444; animation: pulse 1.5s infinite; }

        /* Εικόνα QR Code */
        .qr-image-container { margin-top: 15px; text-align: center; padding: 15px; background: #fff; border-radius: 10px; cursor: pointer; transition: transform 0.2s; }
        .qr-image-container:active { transform: scale(0.95); }
        .qr-image-container img { width: 100%; max-width: 300px; border-radius: 8px; }
        .qr-hint { color: #3b82f6; font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; }

        /* Full Screen Image Modal */
        #imageModal {
            display: none; 
            position: fixed; 
            z-index: 99999; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.95); 
            align-items: center; 
            justify-content: center;
            flex-direction: column;
        }
        #fullImage { max-width: 95%; max-height: 85%; border-radius: 12px; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
        .close-modal-text { color: #fff; margin-top: 20px; font-size: 1.1rem; font-weight: bold; opacity: 0.7; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="progress-container"><div class="progress-bar" id="myBar"></div></div>

    <div class="header">
        <h1>🇦🇹 Vienna Local Guide</h1>
        <div class="tabs">
            <button class="tab-btn ticket" onclick="setFilter('ticket')">🎫 Εισιτήρια</button>
            <button class="tab-btn arrival" onclick="setFilter('arrival')">🛬 Άφιξη</button>
            <button class="tab-btn departure" onclick="setFilter('departure')">🛫 Αναχώρ.</button>
            <button class="tab-btn food" onclick="setFilter('food')">🍔 Φαγητό</button>
            <button class="tab-btn sweets active" onclick="setFilter('sweets')">🍩 Γλυκά</button>
            <button class="tab-btn sights" onclick="setFilter('sights')">🏛️ Αξιοθέατα</button>
        </div>
    </div>

    <div class="container" id="content"></div>

    <div id="imageModal" onclick="closeModal()">
        <img id="fullImage" src="" alt="Full Screen QR">
        <div class="close-modal-text">Πατήστε οπουδήποτε για κλείσιμο ✖</div>
    </div>

    <script>
        const placesData = [
            // --- ΕΙΣΙΤΗΡΙΑ ΜΕ ΕΝΣΩΜΑΤΩΜΕΝΑ LINKS ΑΠΟ GITHUB ---
            { 
                type: "ticket", 
                id: "panos",
                name: "Ticket Panos", 
                cost: "Ενεργό", 
                tip: "Το εισιτήριο είναι ονομαστικό. Να έχετε πάντα ταυτότητα μαζί σε περίπτωση ελέγχου.", 
                desc: "<strong>ΕΠΙΒΑΤΗΣ:</strong> PANAGIOTIS ZAROGOULIDIS\n<strong>ΚΩΔΙΚΟΣ:</strong> 26020648370\n<strong>ΙΣΧΥΕΙ ΑΠΟ:</strong> 26.02.2026 00:00\n<strong>ΙΣΧΥΕΙ ΕΩΣ:</strong> 05.03.2026 00:59", 
                qrUrl: "https://github.com/pzaro/Vienna2026/blob/main/Tichet%20Panos.png?raw=true" 
            },
            { 
                type: "ticket", 
                id: "lia",
                name: "Ticket Lia", 
                cost: "Ενεργό", 
                tip: "Το εισιτήριο είναι ονομαστικό. Να έχετε πάντα ταυτότητα μαζί σε περίπτωση ελέγχου.", 
                desc: "<strong>ΕΠΙΒΑΤΗΣ:</strong> VASILEIA LIAPAKI\n<strong>ΚΩΔΙΚΟΣ:</strong> 26020648369\n<strong>ΙΣΧΥΕΙ ΑΠΟ:</strong> 26.02.2026 00:00\n<strong>ΙΣΧΥΕΙ ΕΩΣ:</strong> 05.03.2026 00:59", 
                qrUrl: "https://github.com/pzaro/Vienna2026/blob/main/Tichet%20Lia.png?raw=true" 
            },

            // --- ΓΛΥΚΑ & ΙΣΤΟΡΙΚΑ ΚΑΦΕ ---
            { type: "sweets", name: "Café Sacher", cost: "~10-15€", tip: "Οπλίσου με υπομονή γιατί συχνά έχει ουρά. Η αυθεντική Sachertorte σερβίρεται πάντα με άγλυκη σαντιγί.", desc: "Το πιο διάσημο καφέ της Βιέννης και το σπίτι της αυθεντικής Sachertorte! Είναι τουριστικό και οι τιμές είναι 'τσιμπημένες', αλλά αποτελεί την απόλυτη κλασική εμπειρία του ταξιδιού.", mapQuery: "Cafe Sacher Wien" },
            { type: "sweets", name: "Café Demel", cost: "~10-15€", tip: "Πήγαινε στο βάθος του ισογείου! Έχουν ένα γυάλινο τοίχο όπου μπορείς να δεις τους ζαχαροπλάστες να φτιάχνουν τα γλυκά ζωντανά.", desc: "Ο αιώνιος αντίπαλος του Sacher. Αυτό το πρώην αυτοκρατορικό ζαχαροπλαστείο διαθέτει εκπληκτική ιστορική διακόσμηση. Δοκίμασε την δική τους εκδοχή της Sachertorte ή το Kaiserschmarrn.", mapQuery: "Demel Vienna" },
            { type: "sweets", name: "Konditorei Groissböck", cost: "~3-5€", tip: "Εδώ πρέπει να φάτε Schaumrolle (ρολό με αφράτη κρέμα) και Krapfen (παραδοσιακός λουκουμάς με μαρμελάδα).", desc: "Μακριά από το ακριβό κέντρο. Αυτό είναι το απόλυτο παραδοσιακό ζαχαροπλαστείο της 12ης συνοικίας, όπου οι ντόπιοι κάνουν ουρές για τα γλυκά τους! Βρίσκεται μόλις 1 στάση μακριά από τον σταθμό Meidling (με το U6).", mapQuery: "Konditorei Groissböck Meidling Vienna" },
            { type: "sweets", name: "Aida Café-Konditorei", cost: "~4-6€", tip: "Δοκιμάστε το Apfelstrudel (Μηλόπιτα) ή το χαρακτηριστικό ροζ Punschkrapfen.", desc: "Η πιο ιστορική και ρετρό αλυσίδα ζαχαροπλαστείων της πόλης. Ξεχωρίζουν από μακριά χάρη στο χαρακτηριστικό ροζ χρώμα τους που θυμίζει δεκαετία του '50. Έχουν υποκαταστήματα παντού και οι τιμές είναι πολύ πιο τίμιες από τα πολυτελή καφέ.", mapQuery: "Aida Cafe Vienna" },
            { type: "sweets", name: "Vollpension", cost: "~5-7€", tip: "Συνδυάστε το γλυκό σας με ζεστή σοκολάτα ή βιεννέζικο Melange.", desc: "Ένα μοναδικό, ζεστό στέκι που μοιάζει με σαλόνι γιαγιάς! Ο λόγος; Τα γλυκά εδώ τα φτιάχνουν και τα σερβίρουν... πραγματικές Βιεννέζες γιαγιάδες και παππούδες! Απίστευτη ατμόσφαιρα, πεντανόστιμα σπιτικά κέικ (Buchteln) και εξαιρετικές τιμές.", mapQuery: "Vollpension Vienna" },

            // --- ΑΦΙΞΗ ---
            { type: "arrival", name: "Αεροδρόμιο ➔ Ξενοδοχείο", cost: "2,10€", tip: "Εισιτήρια: Το πρώτο τρένο χρειάζεται την 'Επέκταση' (2,10€). Μετά, το Μετρό U4 είναι 100% ΔΩΡΕΑΝ με την 7ήμερη κάρτα σου!", desc: "🚆 23:19 - Προαστιακός S7 (Προς Wien Floridsdorf)\nΣτάσεις που περνάς (8): Mannswörth, Schwechat, Kaiserebersdorf, Zentralfriedhof, Geiselbergstraße, St. Marx, Rennweg.\n👉 ΚΑΤΕΒΑΙΝΕΙΣ ΣΤΗΝ 9η: Wien Mitte-Landstraße\n\n🚇 23:47 - Μετρό U4 (Προς Wien Hütteldorf) - [ΔΩΡΕΑΝ με την 7ήμερη]\nΣτάσεις που περνάς (5): Stadtpark, Karlsplatz, Kettenbrückengasse, Pilgramgasse, Margaretengürtel.\n👉 ΚΑΤΕΒΑΙΝΕΙΣ ΣΤΗΝ 6η: Längenfeldgasse\n\n🚶‍♂️ 00:04 - Στο ξενοδοχείο: 7 λεπτά περπάτημα (375μ).", customMap: "https://www.google.com/maps/dir/Längenfeldgasse,+1120+Vienna,+Austria/Hampton+by+Hilton+Vienna+City+West,+Diefenbachgasse+1-3,+1150+Wien,+Austria" },

            // --- ΑΝΑΧΩΡΗΣΗ ---
            { type: "departure", name: "Ξενοδοχείο ➔ Αεροδρόμιο", cost: "2,10€", tip: "Εισιτήρια: Το Μετρό είναι ΔΩΡΕΑΝ. Για το τρένο προς το αεροδρόμιο θα βγάλεις ξανά μόνο το εισιτήριο επέκτασης 2,10€.", desc: "🚇 09:30 - Μετρό U6 (Προς Siebenhirten/Alterlaa) - [ΔΩΡΕΑΝ με την 7ήμερη]\nΣτάσεις που περνάς (1): Niederhofstraße.\n👉 ΚΑΤΕΒΑΙΝΕΙΣ ΣΤΗ 2η: Wien Meidling\n\n🚆 09:59 (ή 10:29) - Τρένο RJ (Προς Flughafen Wien)\nΣτάσεις που περνάς (1): Wien Hauptbahnhof.\n👉 ΚΑΤΕΒΑΙΝΕΙΣ ΣΤΗ 2η: Flughafen Wien (Αεροδρόμιο).", customMap: "https://www.google.com/maps/dir/Hampton+by+Hilton+Vienna+City+West,+Diefenbachgasse+1-3,+1150+Wien,+Austria/Flughafen+Wien+(VIE),+1300+Schwechat,+Austria" },

            // --- ΦΑΓΗΤΟ ---
            { type: "food", name: "Leberkas-Pepi", cost: "~4€", tip: "Ζήτα το Pepi-Leberkäse με τυρί και λίγη μουστάρδα.", desc: "Το απόλυτο βρώμικο των ντόπιων. Ένα ζεστό, παχύ κομμάτι ψητού πατέ κρέατος (σαν χοντρή πάριζα) μέσα σε τραγανό ψωμάκι. Γρήγορο, χορταστικό και φθηνό.", mapQuery: "Leberkas-Pepi Vienna" },
            { type: "food", name: "Würstelstand am Hohen Markt", cost: "~5€", tip: "Πάρε Käsekrainer κομμένο σε φέτες (geschnitten) με μαύρο ψωμί και φρέσκο χρένο.", desc: "Η πιο διάσημη καντίνα για λουκάνικα. Το Käsekrainer είναι χοντρό λουκάνικο γεμιστό με τυρί που λιώνει και πετάγεται.", mapQuery: "Würstelstand am Hohen Markt Vienna" },
            { type: "food", name: "Gasthaus Quell", cost: "~15-20€", tip: "Δοκίμασε το Schweinsbraten (χοιρινό ψητό με τραγανή πέτσα).", desc: "Αυθεντικό Wirtshaus στην 15η συνοικία. Ξύλινη επένδυση, καθόλου τουρίστες, μεγάλες μερίδες και εξαιρετική βαρελίσια μπύρα.", mapQuery: "Gasthaus Quell Vienna" },
            { type: "food", name: "Steman", cost: "~18€", tip: "Εδώ θα φας το πιο 'τίμιο' μοσχαρίσιο Wiener Schnitzel.", desc: "Κλασικό στέκι στην 6η συνοικία που υπάρχει πάνω από 100 χρόνια. Εξαιρετικό φαγητό, μακριά από τις εξωφρενικές τιμές του κέντρου.", mapQuery: "Steman Vienna" },
            
            // --- ΑΞΙΟΘΕΑΤΑ ---
            { type: "sights", name: "Κήποι Schönbrunn", cost: "Δωρεάν", tip: "Ανέβα τον λόφο μέχρι την αψίδα Gloriette για πανοραμική θέα όλης της πόλης.", desc: "Η βόλτα στους αχανείς κήπους είναι μαγική και εντελώς δωρεάν.", mapQuery: "Schonbrunn Palace Vienna" },
            { type: "sights", name: "Καθεδρικός Αγ. Στεφάνου", cost: "Δωρεάν", tip: "Αν θες να δεις τη θέα, η ανάβαση στον Πύργο κοστίζει περίπου 6€.", desc: "Το σύμβολο της Βιέννης στο κέντρο της πόλης. Μπορείς να μπεις δωρεάν στον κεντρικό χώρο.", mapQuery: "Stephansdom Vienna" },
            { type: "sights", name: "Hundertwasserhaus", cost: "Δωρεάν", tip: "Δες το από έξω. Ακριβώς απέναντι υπάρχει ένα μικρό 'χωριό' για καφέ.", desc: "Μια πολυκατοικία βγαλμένη από παραμύθι. Δεν έχει ίσιες γραμμές και είναι βαμμένη με έντονα χρώματα!", mapQuery: "Hundertwasserhaus Vienna" },
            { type: "sights", name: "Naschmarkt", cost: "Δωρεάν", tip: "Το Σάββατο το πρωί, ακριβώς δίπλα, στήνεται το υπαίθριο παζάρι αντικών (Flohmarkt).", desc: "Περιπλάνηση στις αγορές της πόλης. Χάζεψε τους πάγκους με τα μπαχαρικά και τα τυριά.", mapQuery: "Naschmarkt Vienna" }
        ];

        let currentFilter = 'sweets';
        let synth = window.speechSynthesis;
        let currentUtterance = null;
        let playingIndex = -1;
        let currentFilteredData = [];

        window.onscroll = () => {
            let winScroll = document.documentElement.scrollTop || document.body.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById("myBar").style.width = (winScroll / height) * 100 + "%";
        };

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tab-btn.${filter}`).classList.add('active');
            stopAudio();
            renderCards();
        }

        /* --- Λειτουργίες Full Screen Εικόνας --- */
        function openModal(imgUrl) {
            document.getElementById('fullImage').src = imgUrl;
            document.getElementById('imageModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        function renderCards() {
            const container = document.getElementById('content');
            container.innerHTML = '';
            
            currentFilteredData = placesData.filter(item => item.type === currentFilter);

            currentFilteredData.forEach((item, index) => {
                let emoji = '📍';
                let actionContent = '';
                
                if(item.type === 'ticket') {
                    emoji = '🎫';
                    actionContent = `
                        <div class="qr-image-container" onclick="openModal('${item.qrUrl}')">
                            <div class="qr-hint">🔍 Πάτα την εικόνα για πλήρη οθόνη</div>
                            <img src="${item.qrUrl}" alt="QR Code ${item.name}">
                        </div>
                    `;
                } else {
                    if(item.type === 'food') emoji = '🍔';
                    if(item.type === 'sweets') emoji = '🍩';
                    if(item.type === 'sights') emoji = '🏛️';
                    if(item.type === 'arrival') emoji = '🛬';
                    if(item.type === 'departure') emoji = '🛫';
                    
                    const mapLink = item.customMap ? item.customMap : `https://www.google.com/maps/search/?api=1&query=$${encodeURIComponent(item.mapQuery)}`;
                    actionContent = `
                        <div class="actions">
                            <button id="audio-btn-${index}" class="btn btn-audio" onclick="toggleAudio(${index})">🔊 Ακρόαση</button>
                            <a href="${mapLink}" target="_blank" class="btn btn-map">📍 Χάρτης</a>
                        </div>
                    `;
                }

                container.innerHTML += `
                    <div class="card type-${item.type}">
                        <div class="card-header">
                            <h2 class="card-title">${emoji} ${item.name}</h2>
                            <div class="card-cost">${item.cost}</div>
                        </div>
                        <div class="card-tip">💡 <b>Tip:</b> ${item.tip}</div>
                        <p class="card-desc">${item.desc}</p>
                        ${actionContent}
                    </div>
                `;
            });
        }

        function toggleAudio(index) {
            if (playingIndex === index && synth.speaking) {
                stopAudio();
            } else {
                stopAudio();
                playingIndex = index;
                document.getElementById(`audio-btn-${index}`).classList.add('playing');
                document.getElementById(`audio-btn-${index}`).innerText = "⏹️ Stop";
                
                let textToSpeak = currentFilteredData[index].desc.replace(/\n/g, ". ");
                textToSpeak = textToSpeak.replace(/<[^>]*>?/gm, '');
                
                currentUtterance = new SpeechSynthesisUtterance(textToSpeak);
                currentUtterance.lang = 'el-GR';
                currentUtterance.rate = 0.95;
                
                currentUtterance.onend = () => { stopAudio(); };
                synth.speak(currentUtterance);
            }
        }

        function stopAudio() {
            if (synth.speaking) synth.cancel();
            if (playingIndex !== -1) {
                const btn = document.getElementById(`audio-btn-${playingIndex}`);
                if (btn) {
                    btn.classList.remove('playing');
                    btn.innerHTML = "🔊 Ακρόαση";
                }
                playingIndex = -1;
            }
        }

        setFilter('sweets'); // Να ξεκινάει δείχνοντας την καρτέλα με τα Γλυκά
    </script>
</body>
</html>
