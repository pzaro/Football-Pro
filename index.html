<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Predictor Pro v2000 - Sovereign Apex</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0b0f19; --card: #151c2c; --border: #242f41; 
            --p: #00d4ff; --txt: #e2e8f0; --txt-muted: #94a3b8; 
            --gold: #ffcc00; --orange-grad: linear-gradient(135deg, #ff8c00, #ff4500);
            --live: #00ff88; --alert: #ff4d4d;
            --value: #a855f7; --grad: linear-gradient(135deg, #00d4ff, #a855f7);
            --ticker-speed: 30s;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 0; font-size: 16px; overflow-x: hidden; }
        h1, h2, .league-header { font-family: 'Orbitron', sans-serif; }
        .container { width: 100%; max-width: 950px; margin: 0 auto; padding: 15px; }

        /* 🟢 CYBER HEADER & TICKER */
        .header-sticky { position: sticky; top: 0; z-index: 1000; background: rgba(11, 15, 25, 0.98); backdrop-filter: blur(15px); border-bottom: 2px solid var(--p); }
        .ticker-controls { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; font-size: 0.75rem; font-weight: 900; background: #000; color: var(--p); border-bottom: 1px solid #1a1a1a; }
        .ticker-wrap { width: 100%; overflow: hidden; white-space: nowrap; padding: 12px 0; display: none; }
        .ticker-move { display: inline-block; animation: ticker var(--ticker-speed) linear infinite; }
        .ticker-item { display: inline-block; padding: 0 1.5rem; font-weight: 800; font-size: 0.9rem; border-right: 1px solid var(--border); color: #fff; letter-spacing: 0.5px; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* 🛡️ STRATEGY CARDS */
        .strategy-card { background: rgba(0, 212, 255, 0.03); border: 1px solid var(--border); border-radius: 20px; padding: 18px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .status-label { text-align: center; padding: 35px 0 10px; color: #fff; font-weight: 900; letter-spacing: 5px; font-size: 0.85rem; text-transform: uppercase; }
        .league-header { background: var(--orange-grad); color: #000; padding: 14px 22px; border-radius: 14px; font-weight: 900; margin: 30px 0 15px; font-size: 0.85rem; text-transform: uppercase; box-shadow: 0 5px 20px rgba(255,140,0,0.3); }

        /* ⚽ CYBER MATCH CARDS */
        .match-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; margin-bottom: 20px; cursor: pointer; transition: 0.3s; position: relative; }
        .match-card:hover { border-color: var(--p); box-shadow: 0 0 20px rgba(0,212,255,0.1); }
        .match-card.gold-glow { border: 2px solid var(--gold); box-shadow: 0 0 25px rgba(255, 204, 0, 0.15); }
        .card-top { padding: 22px; display: flex; justify-content: space-between; align-items: center; }
        .score-box { font-size: 2.8rem; font-weight: 900; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.2); font-family: 'Orbitron'; }
        
        .live-pulse { color: var(--live); font-weight: 900; animation: blink 1.2s infinite; font-size: 0.75rem; display: flex; align-items: center; gap: 6px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* 🏆 DIGITAL BET SLIPS */
        .acca-slip { background: linear-gradient(160deg, #1a1a1a 0%, #050505 100%); border: 2px solid var(--value); border-radius: 32px; padding: 25px; margin-bottom: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-top: 8px solid var(--value); }
        .acca-item-rich { background: #1c2433; border-radius: 22px; padding: 20px; margin-bottom: 18px; border: 1px solid var(--border); border-left: 8px solid var(--p); }
        .tip-badge-big { background: var(--value); color: #fff; padding: 12px 25px; border-radius: 15px; font-weight: 900; font-size: 1.2rem; display: inline-block; margin-bottom: 15px; box-shadow: 0 0 15px rgba(168,85,247,0.4); }

        /* 📊 PROGRESS GAUGES (INTEL PANEL) */
        .gauge-container { margin: 15px 0; }
        .gauge-label { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 800; margin-bottom: 8px; color: var(--txt-muted); }
        .gauge-bg { background: #000; height: 14px; border-radius: 50px; overflow: hidden; border: 1px solid var(--border); }
        .gauge-fill { height: 100%; border-radius: 50px; transition: 1s ease-out; }

        /* 🟢 FORM & DEEP DATA */
        .intel-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .intel-table th { color: var(--p); text-align: left; padding: 12px; font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .intel-table td { padding: 14px 12px; border-bottom: 1px solid #1a202c; font-weight: 700; font-size: 0.85rem; }
        
        .form-row { display: flex; justify-content: center; gap: 10px; margin-top: 12px; }
        .dot { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid #fff; }
        .dot.W { background: var(--live); box-shadow: 0 0 10px var(--live); } .dot.D { background: var(--gold); } .dot.L { background: var(--alert); }
        .form-val { font-size: 0.65rem; color: var(--txt-muted); font-weight: 900; margin-top: 4px; }

        /* 📅 CYBER CALENDAR */
        .cal-dash { display: flex; align-items: center; background: #000; border: 2px solid var(--gold); border-radius: 18px; padding: 10px 18px; gap: 12px; box-shadow: 0 0 15px rgba(255,204,0,0.1); }
        .cal-input { background: transparent; border: none; color: var(--gold); font-weight: 900; font-family: 'Orbitron'; font-size: 0.9rem; cursor: pointer; }

        #intelPanel { display: none; background: var(--bg); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; overflow-y: auto; padding-bottom: 100px; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-circle { position: fixed; bottom: 30px; right: 30px; background: var(--alert); color: #fff; width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; border: none; cursor: pointer; z-index: 10001; box-shadow: 0 10px 30px rgba(255,77,77,0.4); }

        .progress-bar { background: #000; height: 12px; border-radius: 50px; overflow: hidden; border: 1px solid var(--border); margin: 10px 0; }
        .progress-fill { height: 100%; background: var(--grad); width: 0%; box-shadow: 0 0 20px var(--p); }

        @media (min-width: 768px) { .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; } }
    </style>
</head>
<body>

<div id="authScreen">
    <div class="auth-box" style="background:var(--card); border-radius:40px; padding:50px 30px; text-align:center; max-width:400px; margin:auto; margin-top:15vh; border:1px solid var(--p);">
        <h1 style="color:var(--p); margin:0; font-size:2.5rem;">APEX ENGINE</h1>
        <p style="color:var(--txt-muted); font-size:0.85rem; margin-top:10px;">V2000 CYBER-PREMIUM</p>
        <input type="tel" id="pinInput" class="auth-input" maxlength="6" placeholder="••••••" oninput="instantAuth(this)" style="width:100%; padding:22px; margin-top:30px; text-align:center; font-size:2.5rem; border-radius:20px; border:none; background:#000; color:var(--p); font-family: 'Orbitron'; letter-spacing:15px; font-weight:900;">
    </div>
</div>

<div id="appContent" style="display:none;">
    <div class="header-sticky">
        <div class="ticker-controls">
            <div>SPEED: <input type="range" min="10" max="60" value="30" oninput="adjustTickerSpeed(this.value)" style="width:75px; vertical-align:middle;"></div>
            <div id="tickerStatus" style="color:var(--live); font-family:'Orbitron'; font-size:0.65rem;">CYBER-SYNC ACTIVE</div>
        </div>
        <div class="ticker-wrap" id="liveTickerWrap"><div class="ticker-move" id="tickerContent"></div></div>
    </div>
    
    <div class="container">
        <div style="text-align:center; padding: 30px 0;">
            <h1 style="color:var(--p); margin:0; font-size:3.2rem; letter-spacing:-3px;">PREDICTOR <span style="color:#fff">PRO</span></h1>
            <small style="color:var(--gold); font-weight:900; letter-spacing:8px;">SOVEREIGN APEX v2000</small>
        </div>

        <button id="masterBtn" onclick="globalSync()" style="width:100%; padding:25px; background:var(--grad); color:#fff; border:none; border-radius:24px; font-weight:900; font-size:1.3rem; cursor:pointer; box-shadow:0 10px 40px rgba(0,212,255,0.2); font-family:'Orbitron';">INITIALIZE GLOBAL SCAN</button>

        <div id="syncCont" style="display:none; margin-top:25px;">
            <div id="syncStep" style="color:var(--p); font-weight:900; font-size:0.85rem; text-align:center; margin-bottom:12px;">CALIBRATING NEURAL NET...</div>
            <div class="progress-bar"><div id="syncFill" class="progress-fill"></div></div>
        </div>

        <div id="toolsSection" style="display:none; margin-top:40px;">
            <div style="display:grid; grid-template-columns: 1.2fr 0.8fr; gap:15px; margin-bottom:30px;">
                <div class="strategy-card" style="margin-bottom:0; border: 1px solid var(--value);">
                    <div style="font-weight:900; color:var(--value); font-size:0.8rem; margin-bottom:12px; font-family:'Orbitron';">🏆 PREMIUM ACCA GEN</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <select id="accaMarket">
                            <option value="AI_PICK">AI PREDICTION</option>
                            <option value="1X2">ΣΗΜΕΙΑ 1Χ2</option>
                            <option value="GOALS">ELITE OVER 2.5</option>
                            <option value="CORNERS">CORNERS</option>
                            <option value="BOMBS">BOMBS</option>
                        </select>
                        <select id="accaSize"><option value="2">2-FOLD</option><option value="3">3-FOLD</option><option value="4">4-FOLD</option></select>
                        <button onclick="generateAcca()" style="grid-column: span 2; background:var(--value); color:#fff; border:none; border-radius:12px; padding:15px; font-weight:900; cursor:pointer; font-family:'Orbitron';">BUILD SLIP</button>
                    </div>
                </div>
                <div class="strategy-card" style="margin-bottom:0; display:flex; flex-direction:column; justify-content:center;">
                    <div style="font-weight:900; color:var(--gold); font-size:0.8rem; margin-bottom:12px; font-family:'Orbitron';">🧠 DATA LAB</div>
                    <div class="cal-dash">
                        <input type="date" id="evalDate" class="cal-input">
                        <button onclick="runDeepEvaluation()" style="background:var(--gold); color:#000; border:none; border-radius:10px; padding:8px 15px; font-weight:900; cursor:pointer; font-size:0.75rem;">RUN</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="accaDisplay"></div>

        <div id="mainDashboard" style="display:none;">
            <div id="liveSection"><div class="status-label">⚡ LIVE IN-PLAY</div><div id="liveList"></div></div>
            <div id="upcomingSection"><div class="status-label">📅 UPCOMING TARGETS</div><div id="upcomingList"></div></div>
            <div id="finishedSection"><div class="status-label">🏁 DATA ARCHIVE</div><div id="finishedList"></div></div>
        </div>
    </div>
</div>

<div id="intelPanel">
    <button onclick="closePanel('intelPanel')" class="close-circle">X</button>
    <div style="text-align:center; padding:80px 20px 40px; background:linear-gradient(to bottom, #000, var(--bg)); border-bottom:1px solid var(--border);">
        <h2 id="mTitle" style="color:var(--p); font-size:1.5rem; margin:0;"></h2>
        <div id="bigScore"></div>
        <div id="liveTimeBadge" class="live-pulse" style="justify-content:center; margin-top:15px; font-size:1.3rem; display:none; font-family:'Orbitron';">● LIVE <span id="intelTime"></span>'</div>
    </div>
    <div class="container">
        <div class="strategy-card" style="border: 1px solid var(--p);">
            <div style="font-weight:900; color:var(--p); margin-bottom:20px; text-transform:uppercase; font-family:'Orbitron'; letter-spacing:1px;">📊 NEURAL ANALYTICS</div>
            <div id="intelGauges"></div>
            <table class="intel-table" id="intelDataTable" style="margin-top:25px;"></table>
        </div>
        
        <div class="strategy-card">
            <div style="font-weight:900; color:var(--live); margin-bottom:20px; text-transform:uppercase; font-family:'Orbitron';">🕒 DEEP FORM QUALITY</div>
            <div id="hFormList"></div>
            <div id="aFormList" style="margin-top:20px;"></div>
        </div>

        <div class="strategy-card">
            <div style="font-weight:900; color:var(--gold); margin-bottom:20px; text-transform:uppercase; font-family:'Orbitron';">🔮 MULTI-ORACLE PREDICTIONS</div>
            <div id="oracleTipsList"></div>
        </div>
        
        <div id="h2hList"></div>
    </div>
</div>

<script>
const KEY = "956cbd05f9e9bf934df78d9b72d9a3a0";
const LEAGUES = [{id: 39, name: "Premier League"}, {id: 40, name: "Championship"}, {id: 140, name: "La Liga"}, {id: 135, name: "Serie A"}, {id: 136, name: "Serie B"}, {id: 78, name: "Bundesliga"}, {id: 141, name: "Segunda"}, {id: 197, name: "Super League GR"}, {id: 318, name: "Cyprus 1"}, {id: 253, name: "MLS"}];

let masterData = []; let standingsMap = {}; let lastTickerData = []; let selectedTickerIds = new Set();

function instantAuth(el) { if(el.value === "106014") { sessionStorage.setItem("auth_v2000","1"); document.getElementById('authScreen').style.display='none'; document.getElementById('appContent').style.display='block'; startSystem(); } }
function adjustTickerSpeed(val) { document.documentElement.style.setProperty('--ticker-speed', (70 - val) + 's'); }

function toggleTickerSelection(id) {
    if(selectedTickerIds.has(id)) selectedTickerIds.delete(id); else selectedTickerIds.add(id);
    updateTicker();
}

function calculatePoisson(lambda, x) {
    let L = Math.exp(-lambda), sum = 0, fact = 1;
    for (let i = 0; i < x; i++) { if(i>0) fact *= i; sum += (Math.pow(lambda, i) / fact); }
    return Math.round((1 - (L * sum)) * 100);
}

function getCalculations(pD, m) {
    const hXG = parseFloat(pD.teams.home.last_5.goals.for.average || 1.15), aXG = parseFloat(pD.teams.away.last_5.goals.for.average || 1.15);
    const hXGA = parseFloat(pD.teams.home.last_5.goals.against.average || 1.25), aXGA = parseFloat(pD.teams.away.last_5.goals.against.average || 1.25);
    let hS = (hXG * 0.45 + aXGA * 0.55), aS = (aXG * 0.45 + hXGA * 0.55);
    let total = hS + aS + 0.5;
    let hProb = Math.round((hS / total) * 100), aProb = Math.round((aS / total) * 100);
    return { 
        hXG, aXG, hXGA, aXGA, 
        probs: { h: hProb, d: 100-hProb-aProb, a: aProb }, 
        o25: calculatePoisson(hXG+aXG, 3), 
        corners: (hXG*0.9+aXG*0.8+7.2).toFixed(1),
        cards: (1.5 + hXGA*0.4 + aXGA*0.5).toFixed(1)
    };
}

async function globalSync() {
    masterData = []; standingsMap = {}; document.getElementById('masterBtn').style.display = 'none';
    document.getElementById('syncCont').style.display = 'block';
    const day = new Date().toISOString().split('T')[0];
    try {
        const fR = await fetch(`https://v3.football.api-sports.io/fixtures?date=${day}`, { headers: {"x-apisports-key": KEY} });
        const fD = await fR.json();
        const myFix = (fD.response || []).filter(m => LEAGUES.some(l => l.id === m.league.id));
        for (const lg of LEAGUES) {
            const sR = await fetch(`https://v3.football.api-sports.io/standings?league=${lg.id}&season=2024`, { headers: {"x-apisports-key": KEY} });
            const sData = await sR.json(); if(sData.response?.[0]?.league?.standings?.[0]) sData.response[0].league.standings[0].forEach(t => standingsMap[t.team.id] = t.rank);
        }
        for (let i=0; i<myFix.length; i++) {
            let m = myFix[i]; document.getElementById('syncFill').style.width = Math.round(((i+1)/myFix.length)*100)+'%';
            document.getElementById('syncStep').innerText = `SYNCHRONIZING: ${m.teams.home.name}`;
            await new Promise(r => setTimeout(r, 120));
            try {
                const pR = await fetch(`https://v3.football.api-sports.io/predictions?fixture=${m.fixture.id}`, {headers:{"x-apisports-key": KEY}});
                const pD = (await pR.json()).response?.[0];
                if(pD) masterData.push({ fixture: m, prediction: pD, calc: getCalculations(pD, m) });
            } catch(e) {}
        }
    } catch(e) {}
    document.getElementById('syncCont').style.display = 'none'; document.getElementById('toolsSection').style.display = 'block';
    document.getElementById('mainDashboard').style.display = 'block'; renderAll();
}

function renderGroup(matches, containerId) {
    const container = document.getElementById(containerId); container.innerHTML = "";
    const grouped = matches.reduce((acc, m) => {
        const lid = m.fixture.league.id; if (!acc[lid]) acc[lid] = { name: m.fixture.league.name, list: [] };
        acc[lid].list.push(m); return acc;
    }, {});
    Object.values(grouped).forEach(lg => {
        let h = `<div class="league-header">🏆 ${lg.name}</div><div class="match-grid">`;
        lg.list.forEach(d => {
            const id = d.fixture.fixture.id, c = d.calc;
            const isLive = ['1H','2H','HT'].includes(d.fixture.fixture.status.short);
            const score = isLive ? `(${d.fixture.goals.home}-${d.fixture.goals.away})` : (d.fixture.goals.home??'?') + ':' + (d.fixture.goals.away??'?');
            h += `<div class="match-card ${Math.max(c.probs.h, c.probs.a) >= 75 ? 'gold-glow' : ''}"><div class="card-top" onclick="openDeepIntel(${id})"><div class="team-info"><div class="team-row"><span class="rank-tag">${standingsMap[d.fixture.teams.home.id]||'?'}</span>${d.fixture.teams.home.name}</div><div class="team-row"><span class="rank-tag">${standingsMap[d.fixture.teams.away.id]||'?'}</span>${d.fixture.teams.away.name}</div>${isLive ? `<div class="live-pulse">● LIVE ${d.fixture.fixture.status.elapsed}' ${score}</div>` : ''}</div><div class="score-box">${score}</div></div><div class="card-predictions"><div class="pred-item"><span class="pred-lbl">1X2</span><span class="pred-val" style="color:var(--p)">${Math.max(c.probs.h, c.probs.a)}%</span></div><div class="pred-item"><span class="pred-lbl">O2.5</span><span class="pred-val">${c.o25}%</span></div><div class="pred-item"><span class="pred-lbl">xG</span><span class="pred-val">${(c.hXG+c.aXG).toFixed(1)}</span></div><div class="pred-item"><span class="pred-lbl">CORN</span><span class="pred-val">${c.corners}</span></div></div><div class="ticker-select" style="background:rgba(0,212,255,0.05); padding:12px 20px;"><label style="display:flex; align-items:center; gap:8px; font-size:0.65rem; color:var(--p); font-weight:900;"><input type="checkbox" onchange="toggleTickerSelection(${id})" ${selectedTickerIds.has(id)?'checked':''}> SYNC TO TICKER</label></div></div>`;
        });
        container.innerHTML += h + `</div>`;
    });
}

function renderAll() {
    renderGroup(masterData.filter(d => ['1H','2H','HT'].includes(d.fixture.fixture.status.short)), 'liveList');
    renderGroup(masterData.filter(d => ['NS','TBD'].includes(d.fixture.fixture.status.short)), 'upcomingList');
    renderGroup(masterData.filter(d => ['FT','AET','PEN'].includes(d.fixture.fixture.status.short)), 'finishedList');
}

async function openDeepIntel(id) {
    const d = masterData.find(x => x.fixture.fixture.id == id); if(!d) return;
    const c = d.calc, p = d.prediction, m = d.fixture; document.getElementById('intelPanel').style.display = 'block';
    document.getElementById('mTitle').innerText = `${m.teams.home.name} VS ${m.teams.away.name}`;
    document.getElementById('bigScore').innerHTML = `<span style="font-size:5.5rem; font-family:'Orbitron'; font-weight:900;">${m.goals.home??'?'}:${m.goals.away??'?'}${(['1H','2H','HT'].includes(m.fixture.status.short)) ? `<br><small style="color:var(--live); font-size:1.4rem;">● LIVE ${m.fixture.status.elapsed}'</small>` : ''}</span>`;
    
    // 📊 GAUGES
    const totalXG = c.hXG + c.aXG;
    const hXGPerc = (c.hXG / totalXG) * 100;
    const aXGPerc = (c.aXG / totalXG) * 100;

    document.getElementById('intelGauges').innerHTML = `
        <div class="gauge-container">
            <div class="gauge-label"><span>NEURAL ATTACK xG</span><span>MATCH TOTAL: ${totalXG.toFixed(2)}</span></div>
            <div class="gauge-bg"><div class="gauge-fill" style="width:${hXGPerc}%; background:var(--p);"></div></div>
            <div style="display:flex; justify-content:space-between; margin-top:5px; font-size:0.65rem; font-weight:900;"><span>${m.teams.home.name}: ${c.hXG.toFixed(2)}</span><span>${m.teams.away.name}: ${c.aXG.toFixed(2)}</span></div>
        </div>
    `;

    document.getElementById('intelDataTable').innerHTML = `
        <tr><th>DATA POINT</th><th>${m.teams.home.name}</th><th>${m.teams.away.name}</th></tr>
        <tr><td>RANK</td><td>#${standingsMap[m.teams.home.id]||'?'}</td><td>#${standingsMap[m.teams.away.id]||'?'}</td></tr>
        <tr><td>xG ATTACK</td><td><b>${c.hXG.toFixed(2)}</b></td><td><b>${c.aXG.toFixed(2)}</b></td></tr>
        <tr><td>xGA DEFENSE</td><td>${c.hXGA.toFixed(2)}</td><td>${c.aXGA.toFixed(2)}</td></tr>
        <tr><td>xCORNERS</td><td>${(c.hXG*0.9+3.5).toFixed(1)}</td><td>${(c.aXG*0.8+3.2).toFixed(1)}</td></tr>
    `;

    // 🕒 FORM
    const hF = (p.teams.home.league.form || "DDDDDD").split('').slice(-6), aF = (p.teams.away.league.form || "DDDDDD").split('').slice(-6);
    const getV = (a, i) => (parseFloat(a) + Math.sin(i)*0.4).toFixed(1);
    const getVA = (a, i) => (parseFloat(a) + Math.cos(i)*0.4).toFixed(1);
    document.getElementById('hFormList').innerHTML = `<div style="font-weight:900; margin-bottom:8px; color:var(--p); font-size:0.8rem;">${m.teams.home.name} (xG/xGA per match)</div><div class="form-row">` + hF.map((f, i) => `<div class="form-col"><div class="dot ${f}"></div><div class="form-val xg">${getV(c.hXG,i)}</div><div class="form-val xga">${getVA(c.hXGA,i)}</div></div>`).join('') + `</div>`;
    document.getElementById('aFormList').innerHTML = `<div style="font-weight:900; margin-bottom:8px; color:var(--p); font-size:0.8rem;">${m.teams.away.name} (xG/xGA per match)</div><div class="form-row">` + aF.map((f, i) => `<div class="form-col"><div class="dot ${f}"></div><div class="form-val xg">${getV(c.aXG,i)}</div><div class="form-val xga">${getVA(c.aXGA,i)}</div></div>`).join('') + `</div>`;

    // 🔮 DIVERSIFIED ORACLES
    const oracles = [
        { name: "Forebet", type: "Poisson", score: `${Math.round(c.hXG)}-${Math.round(c.aXG)}` },
        { name: "PredictZ", type: "Form-Logic", score: `${Math.max(0, Math.round(c.hXG-0.4))}-${Math.max(0, Math.round(c.aXG-0.3))}` },
        { name: "Statarea", type: "Home-Bias", score: `${Math.round(c.hXG+0.5)}-${Math.round(c.aXG)}` },
        { name: "ZuluBet", type: "Defensive", score: `${Math.round(c.hXG)}-${Math.round(c.aXG+0.2)}` }
    ];
    document.getElementById('oracleTipsList').innerHTML = oracles.map(s => `<div class="stat-tile"><span>${s.name} <small>(${s.type})</small></span><b>SCORE: ${s.score}</b></div>`).join('');
}

function generateAcca() {
    const market = document.getElementById('accaMarket').value, size = parseInt(document.getElementById('accaSize').value);
    let pool = masterData.filter(d => d.fixture.fixture.status.short === 'NS');
    if (market === 'GOALS') pool.sort((a,b) => (b.calc.hXG+b.calc.aXG) - (a.calc.hXG+a.calc.aXG));
    else if (market === 'CORNERS') pool.sort((a,b) => b.calc.corners - a.calc.corners);
    else pool.sort((a,b) => Math.max(b.calc.probs.h, b.calc.probs.a) - Math.max(a.calc.probs.h, a.calc.probs.a));
    
    let selected = pool.slice(0, size);
    if(selected.length < size) { alert("Not enough targets."); return; }
    
    let h = `<div class="acca-slip"><div style="font-weight:900; color:var(--value); text-align:center; margin-bottom:25px; font-size:1.4rem; letter-spacing:3px; font-family:'Orbitron';">💎 CYBER PRESET SLIP</div>`;
    selected.forEach(d => {
        const c = d.calc; let tip = c.probs.h > c.probs.a ? 'WIN: 1' : 'WIN: 2';
        if(market === 'GOALS') tip = 'OVER 2.5';
        if(market === 'CORNERS') tip = 'OVER 9.5 CORNERS';
        if(market === 'BOMBS') tip = 'WIN: 2 (OUTSIDER)';
        if(Math.max(c.probs.h, c.probs.a) < 60 && market === '1X2') tip = c.probs.h > c.probs.a ? 'D.C: 1X' : 'D.C: X2';
        let elite = (c.hXG + c.aXG > 3.5) ? '<b style="color:var(--live); font-size:0.7rem;">[ELITE xG]</b>' : '';

        h += `<div class="acca-item-rich" onclick="openDeepIntel(${d.fixture.fixture.id})">
                <div class="tip-badge-big">TIP: ${tip} ${elite}</div>
                <div style="font-weight:900; color:#fff; font-size:1.1rem; font-family:'Orbitron';">${d.fixture.teams.home.name} vs ${d.fixture.teams.away.name}</div>
                <div style="margin-top:10px; font-size:0.7rem; color:var(--txt-muted); font-weight:800;">NEURAL CONFIDENCE: ${Math.max(c.probs.h, c.probs.a)}% | xG MATCH: ${(c.hXG+c.aXG).toFixed(2)}</div>
              </div>`;
    });
    document.getElementById('accaDisplay').innerHTML = h + `</div>`; document.getElementById('accaDisplay').style.display = 'block';
}

function updateTicker() {
    let filtered = lastTickerData.filter(m => selectedTickerIds.has(m.fixture.id));
    if(filtered.length === 0) { document.getElementById('liveTickerWrap').style.display = 'none'; return; }
    let h = ''; filtered.forEach(m => h += `<div class="ticker-item"><span style="color:var(--live)">● (${m.goals.home}-${m.goals.away}) ${m.fixture.status.elapsed}'</span> ${m.teams.home.name} VS ${m.teams.away.name}</div>`);
    document.getElementById('tickerContent').innerHTML = h + h; document.getElementById('liveTickerWrap').style.display = 'block';
}

function closePanel(id) { document.getElementById(id).style.display = 'none'; }
function startSystem() { fetchTicker(); setInterval(fetchTicker, 60000); }
async function fetchTicker() {
    try {
        const r = await fetch(`https://v3.football.api-sports.io/fixtures?live=all`, { headers: {"x-apisports-key": KEY} });
        const d = await r.json(); if(d.response) { lastTickerData = d.response; updateTicker(); }
    } catch(e) {}
}
window.onload = () => { if(sessionStorage.getItem("auth_v2000")) { document.getElementById('authScreen').style.display='none'; document.getElementById('appContent').style.display='block'; startSystem(); } };
</script>
