  async function throttledFetch(url, timeout = REQUEST_TIMEOUT_MS) {
    await sleep(REQUEST_DELAY_MS);
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeout);
    try {
      return await fetch(url, {
        headers: { "x-apisports-key": KEY },
        signal: controller.signal
      });
    } finally {
      clearTimeout(timer);
    }
  }

  async function apiReq(path) {
    try {
      const response = await throttledFetch(`${API}/${path}`);
      if (!response.ok) return { response: [], errors: { status: response.status } };
      return await response.json() || { response: [] };
    } catch (err) {
      return { response: [], errors: { message: err?.name === "AbortError" ? "timeout" : (err?.message || "unknown") } };
    }
  }

  async function getTeamSeasonStats(teamId, leagueId, season) {

  function getTeamRankFromStandings(standings, teamId) {
    if (!Array.isArray(standings) || !standings.length) return null;

  function statVal(statsArr, type) {
    if (!Array.isArray(statsArr)) return 0;
    const item = statsArr.find(x => x.type === type);
    if (!item || item.value == null) return 0;
    return parseFloat(String(item.value).replace("%", "").trim()) || 0;
  }

  function getTeamGoals(fixture, teamId) {
    return fixture?.teams?.home?.id === teamId ? (fixture?.goals?.home ?? 0) : (fixture?.goals?.away ?? 0);
  }

  function getOpponentGoals(fixture, teamId) {
    return fixture?.teams?.home?.id === teamId ? (fixture?.goals?.away ?? 0) : (fixture?.goals?.home ?? 0);
  }

  function estimateXG(statsArr, goals = 0) {
    const shotsOnGoal = statVal(statsArr, "Shots on Goal");
    const shotsOffGoal = statVal(statsArr, "Shots off Goal");
    const totalShots = statVal(statsArr, "Total Shots");
    const dangerous = statVal(statsArr, "Dangerous Attacks");
    const corners = statVal(statsArr, "Corner Kicks");

    let xg =
      (shotsOnGoal * 0.18) +
      (shotsOffGoal * 0.07) +
      (Math.max(totalShots - shotsOnGoal - shotsOffGoal, 0) * 0.03) +
      (dangerous * 0.008) +
      (corners * 0.02) +
      (goals * 0.30);

    if (!Number.isFinite(xg) || xg <= 0) xg = goals > 0 ? (0.65 + goals * 0.28) : 0.70;
    return xg;
  }

  function getWinnerTeamIdFromFixture(f) {
    const hg = f?.goals?.home ?? 0;
    const ag = f?.goals?.away ?? 0;
    if (hg > ag) return f?.teams?.home?.id;
    if (ag > hg) return f?.teams?.away?.id;
    return null;
  }

  function summarizeH2H(h2hFixtures, homeTeamId, awayTeamId) {
    if (!Array.isArray(h2hFixtures) || !h2hFixtures.length) {
      return { matches: 0, homeWins: 0, awayWins: 0, draws: 0, goalsHome: 0, goalsAway: 0, lastResults: [] };
    }

    let homeWins = 0, awayWins = 0, draws = 0, goalsHome = 0, goalsAway = 0;
    const lastResults = [];

    for (const f of h2hFixtures.slice(0, 8)) {
      const winnerId = getWinnerTeamIdFromFixture(f);
      const hg = f?.goals?.home ?? 0;
      const ag = f?.goals?.away ?? 0;

      const homeGoalsThisH2H = f?.teams?.home?.id === homeTeamId ? hg : ag;
      const awayGoalsThisH2H = f?.teams?.home?.id === awayTeamId ? hg : ag;

      goalsHome += homeGoalsThisH2H;
      goalsAway += awayGoalsThisH2H;

      if (winnerId === homeTeamId) homeWins++;
      else if (winnerId === awayTeamId) awayWins++;
      else draws++;

      lastResults.push(`${homeGoalsThisH2H}-${awayGoalsThisH2H}`);
    }

    return {
      matches: h2hFixtures.slice(0, 8).length,
      homeWins,
      awayWins,
      draws,
      goalsHome,
      goalsAway,
      lastResults
    };
  }

  function getFormHistory(fixtures, teamId) {
    return fixtures.map(f => {
      const myG = getTeamGoals(f, teamId);
      const opG = getOpponentGoals(f, teamId);
      return myG > opG ? { res: "Ν", cls: "W" } : (myG < opG ? { res: "Η", cls: "L" } : { res: "Ι", cls: "D" });
    }).reverse();
  }

  function getDev(curr, base) {
    if (!base || base <= 0) return `<span class="dev-badge dev-pos">N/A</span>`;
    const d = (((parseFloat(curr) - base) / base) * 100).toFixed(1);
    return `<span class="dev-badge ${d >= 0 ? "dev-pos" : "dev-neg"}">${d > 0 ? "+" : ""}${d}%</span>`;
  }

  async function batchCalculate(list, teamId) {
    if (!list.length) return { xg: "0.00", xga: "0.00", cor: "0.0", crd: "0.0" };

    let xgSum = 0, xgaSum = 0, corSum = 0, crdSum = 0, count = 0;

    for (const f of list) {
      const st = await getFixtureStats(f.fixture.id);
      if (!st?.response || st.response.length < 2) continue;

      const myObj = st.response.find(x => x.team.id === teamId);
      const opObj = st.response.find(x => x.team.id !== teamId);
      if (!myObj || !opObj) continue;

      const my = myObj.statistics || [];
      const op = opObj.statistics || [];

      let myXG = statVal(my, "Expected Goals");
      if (myXG <= 0) myXG = estimateXG(my, getTeamGoals(f, teamId));

      let oppXG = statVal(op, "Expected Goals");
      if (oppXG <= 0) oppXG = estimateXG(op, getOpponentGoals(f, teamId));

      xgSum += myXG;
      xgaSum += oppXG;
      corSum += statVal(my, "Corner Kicks");
      crdSum += statVal(my, "Yellow Cards") + statVal(my, "Red Cards");
      count++;
    }

    return {
      xg: count > 0 ? (xgSum / count).toFixed(2) : "0.00",
      xga: count > 0 ? (xgaSum / count).toFixed(2) : "0.00",
      cor: count > 0 ? (corSum / count).toFixed(1) : "0.0",
      crd: count > 0 ? (crdSum / count).toFixed(1) : "0.0"
    };
  }

  async function getTeamData(teamId, leagueId, season, venueType) {
    const [seasonStats, allFixs] = await Promise.all([
      getTeamSeasonStats(teamId, leagueId, season),
      getLastFixtures(teamId, leagueId, season)
    ]);

    const genLast = allFixs.slice(0, LAST_GENERAL);
    const splitLast = allFixs.filter(f => venueType === "home" ? f.teams.home.id === teamId : f.teams.away.id === teamId).slice(0, LAST_SPLIT);

    const [form, split] = await Promise.all([
      batchCalculate(genLast, teamId),
      batchCalculate(splitLast, teamId)
    ]);

    const baseXG = parseFloat(seasonStats?.goals?.for?.average?.total) || 1.10;
    const baseXGA = parseFloat(seasonStats?.goals?.against?.average?.total) || 1.10;

    return {
      seasonXG: baseXG.toFixed(2),
      seasonXGA: baseXGA.toFixed(2),
      formXG: form.xg,
      formXGA: form.xga,
      devXG: getDev(form.xg, baseXG),
      devXGA: getDev(form.xga, baseXGA),
      splitXG: split.xg,
      splitXGA: split.xga,
      corners: form.cor,
      cards: form.crd,
      splitCards: split.crd,
      history: getFormHistory(genLast, teamId)
    };
  }

  function computeMarketScores(hStats, aStats, leagueId) {
    const p = getLeagueProfile(leagueId);

    const hSeasonXG = safeNum(hStats.seasonXG, 1.10);
    const aSeasonXG = safeNum(aStats.seasonXG, 1.10);
    const hSeasonXGA = safeNum(hStats.seasonXGA, 1.10);
    const aSeasonXGA = safeNum(aStats.seasonXGA, 1.10);

    const hFormXG = safeNum(hStats.formXG, 1.10);
    const aFormXG = safeNum(aStats.formXG, 1.10);
    const hFormXGA = safeNum(hStats.formXGA, 1.10);
    const aFormXGA = safeNum(aStats.formXGA, 1.10);

    const hSplitXG = safeNum(hStats.splitXG, hFormXG);
    const aSplitXG = safeNum(aStats.splitXG, aFormXG);
    const hSplitXGA = safeNum(hStats.splitXGA, hFormXGA);
    const aSplitXGA = safeNum(aStats.splitXGA, aFormXGA);

    const hCards = safeNum(hStats.cards);
    const aCards = safeNum(aStats.cards);
    const hSplitCards = safeNum(hStats.splitCards);
    const aSplitCards = safeNum(aStats.splitCards);

    const hAttack = (hFormXG * 0.46) + (hSplitXG * 0.34) + (hSeasonXG * 0.20);
    const aAttack = (aFormXG * 0.46) + (aSplitXG * 0.34) + (aSeasonXG * 0.20);

    const hLeak = (hFormXGA * 0.52) + (hSplitXGA * 0.28) + (hSeasonXGA * 0.20);
    const aLeak = (aFormXGA * 0.52) + (aSplitXGA * 0.28) + (aSeasonXGA * 0.20);

    const homeExp = clamp((hAttack * 0.62) + (aLeak * 0.38) + (p.tempo * 0.55), 0.35, 3.80);
    const awayExp = clamp((aAttack * 0.62) + (hLeak * 0.38) + (p.tempo * 0.45), 0.30, 3.60);
    const adjTotalXG = clamp(homeExp + awayExp, 0.80, 6.40);

    const minSide = Math.min(homeExp, awayExp);
    const maxSide = Math.max(homeExp, awayExp);
    const gap = Math.abs(homeExp - awayExp);
    const balance = clamp(1 - (gap / 2.3), 0, 1);

    const over25Score =
      (adjTotalXG * 28) +
      ((hSplitXG + aSplitXG) * 8) +
      ((aLeak + hLeak) * 4) +
      (balance * 10) +
      p.over25;

    const over35Score =
      (adjTotalXG * 30) +
      ((hSplitXG + aSplitXG) * 5) +
      (Math.max(minSide - 1.00, 0) * 18) +
      (balance * 6) +
      p.over35;

    const bttsScore =
      (minSide * 44) +
      (balance * 14) +
      (Math.min(hSplitXG, aSplitXG) * 9) +
      (Math.min(aLeak, hLeak) * 4) +
      p.btts;

    const cards4Score =
      ((hCards + aCards) * 17) +
      ((hSplitCards + aSplitCards) * 13);

    return {
      over25Score: Number(over25Score.toFixed(2)),
      over35Score: Number(over35Score.toFixed(2)),
      bttsScore: Number(bttsScore.toFixed(2)),
      cards4Score: Number(cards4Score.toFixed(2)),
      adjTotalXG: Number(adjTotalXG.toFixed(2)),
      homeExp: Number(homeExp.toFixed(2)),
      awayExp: Number(awayExp.toFixed(2)),
      balance: Number(balance.toFixed(2)),
      gap: Number(gap.toFixed(2))
    };
  }

  function getDynamicThresholds(leagueId) {
    const p = getLeagueProfile(leagueId);

    let o25 = 106;
    let o35 = 128;
    let btts = 95;
    let cards4 = 96;

    if (p.over25 >= 8) o25 = 102;
    if (p.over25 <= -10) o25 = 112;

    if (p.over35 >= 10) o35 = 122;
    if (p.over35 <= -14) o35 = 134;

    if (p.btts >= 6) btts = 91;
    if (p.btts <= -10) btts = 100;

    return { o25, o35, btts, cards4 };
  }

  function generateOmegaPick(hStats, aStats, leagueId) {
    const scores = computeMarketScores(hStats, aStats, leagueId);
    const thr = getDynamicThresholds(leagueId);

    const homeExp = scores.homeExp;
    const awayExp = scores.awayExp;
    const totalXG = scores.adjTotalXG;
    const gap = scores.gap;
    const minSide = Math.min(homeExp, awayExp);

    let pick = "", reason = "", noBet = false;

    if (!Number.isFinite(totalXG) || totalXG < 0.90) {
      return {
        pick: "⚠️ NO DATA (ΑΓΝΟΗΣΕ ΤΟ ΜΑΤΣ)",
        reason: "Μη επαρκή στατιστικά για αξιόπιστη εκτίμηση.",
        noBet: true
      };
    }

    if (
      scores.over35Score >= thr.o35 &&
      totalXG >= 3.30 &&
      homeExp >= 1.35 &&
      awayExp >= 1.15 &&
      minSide >= 1.10
    ) {
      pick = "🚀 OVER 3.5 GOALS";
      reason = `Πολύ ισχυρό high-scoring profile. xG: ${totalXG.toFixed(2)} | HomeExp ${homeExp.toFixed(2)} | AwayExp ${awayExp.toFixed(2)} | Score ${scores.over35Score}`;
    } else if (
      scores.over25Score >= thr.o25 &&
      totalXG >= 2.60 &&
      homeExp >= 1.05 &&
      awayExp >= 0.90
    ) {
      pick = "🔥 OVER 2.5 GOALS";
      reason = `Ισορροπημένο over profile χωρίς υπερβολή. xG: ${totalXG.toFixed(2)} | Score ${scores.over25Score}`;
    } else if (
      scores.bttsScore >= thr.btts &&
      homeExp >= 1.00 &&
      awayExp >= 1.00 &&
      scores.balance >= 0.50
    ) {
      pick = "🎯 GOAL/GOAL (BTTS)";
      reason = `Και οι δύο πλευρές έχουν πραγματική παραγωγική βάση. HomeExp ${homeExp.toFixed(2)} | AwayExp ${awayExp.toFixed(2)} | Score ${scores.bttsScore}`;
    } else if (
      homeExp >= 1.55 &&
      gap >= 0.65 &&
      safeNum(hStats.splitXG) >= 1.60 &&
      safeNum(aStats.splitXGA) >= 1.20
    ) {
      pick = "🏠 ΑΣΟΣ (1)";
      reason = `Καθαρό πλεονέκτημα γηπεδούχου. HomeExp ${homeExp.toFixed(2)} | AwayExp ${awayExp.toFixed(2)} | Gap ${gap.toFixed(2)}`;
    } else if (
      awayExp >= 1.45 &&
      gap >= 0.60 &&
      safeNum(aStats.splitXG) >= 1.50 &&
      safeNum(hStats.splitXGA) >= 1.20
    ) {
      pick = "✈️ ΔΙΠΛΟ (2)";
      reason = `Καθαρό πλεονέκτημα φιλοξενούμενης. HomeExp ${homeExp.toFixed(2)} | AwayExp ${awayExp.toFixed(2)} | Gap ${gap.toFixed(2)}`;
    } else if (
      scores.cards4Score >= thr.cards4 &&
      (safeNum(hStats.cards) + safeNum(aStats.cards)) >= 3.8
    ) {
      pick = "🟨 OVER 4 ΚΑΡΤΕΣ";
      reason = `Σημαντική πειθαρχική ένταση. Cards score: ${scores.cards4Score}`;
    } else if (
      totalXG <= 2.10 &&
      max(homeExp, awayExp) <= 1.55
    ) {
      pick = "🛡️ UNDER 2.5 GOALS";
      reason = `Χαμηλό επιθετικό ταβάνι και συντηρητικό match profile. xG ${totalXG.toFixed(2)}`;
    } else {
      pick = "⚖️ NO BET (ΑΠΟΧΗ)";
      reason = `Δεν υπάρχει καθαρή μαθηματική υπεροχή. Το νέο calibration προτιμά αποχή από αδύναμο YES.`;
      noBet = true;
    }

    return { pick, reason, noBet };
  }

  function max(a, b) {
    return a > b ? a : b;
  }

  function poissonProb(lambda, k) {
    if (lambda <= 0) return k === 0 ? 1 : 0;
    let fact = 1;
    for (let i = 2; i <= k; i++) fact *= i;
    return (Math.exp(-lambda) * Math.pow(lambda, k)) / fact;
  }

  function predictExactScoreAndCorners(hStats, aStats, leagueId) {
    const p = getLeagueProfile(leagueId);
    const scores = computeMarketScores(hStats, aStats, leagueId);

    const homeGoalExp = scores.homeExp;
    const awayGoalExp = scores.awayExp;

    let bestScore = "1-1";
    let bestProb = -1;

    for (let hg = 0; hg <= 5; hg++) {
      for (let ag = 0; ag <= 5; ag++) {
        const prob = poissonProb(homeGoalExp, hg) * poissonProb(awayGoalExp, ag);
        if (prob > bestProb) {
          bestProb = prob;
          bestScore = `${hg}-${ag}`;
        }
      }
    }

    const hCorners = safeNum(hStats.corners);
    const aCorners = safeNum(aStats.corners);
    const hSplitXG = safeNum(hStats.splitXG);
    const aSplitXG = safeNum(aStats.splitXG);

    const rawTotalCorners =
      (hCorners * 0.33) +
      (aCorners * 0.33) +
      ((hSplitXG + aSplitXG) * 0.90) +
      3.20 +
      p.corners;

    const shrunkTotalCorners =
      (rawTotalCorners * 0.68) +
      (p.baseCorners * 0.32);

    let totalCorners = clamp(Math.round(shrunkTotalCorners), 6, 16);

    const homeCornerShare =
      clamp(
        ((homeGoalExp + hSplitXG + 0.25) / Math.max(homeGoalExp + awayGoalExp + hSplitXG + aSplitXG + 0.50, 0.1)),
        0.36,
        0.64
      );

    let homeCornersPred = Math.round(totalCorners * homeCornerShare);
    let awayCornersPred = totalCorners - homeCornersPred;

    if (homeCornersPred < 2) homeCornersPred = 2;
    if (awayCornersPred < 2) awayCornersPred = 2;

    totalCorners = homeCornersPred + awayCornersPred;

    return {
      homeGoalExp: homeGoalExp.toFixed(2),
      awayGoalExp: awayGoalExp.toFixed(2),
      exactScore: bestScore,
      exactProb: bestProb,
      totalCorners,
      homeCorners: homeCornersPred,
      awayCorners: awayCornersPred
    };
  }

  function normalizeLabel(v) {
    return String(v || "")
      .toLowerCase()
      .replace(/\s+/g, " ")
      .trim();
  }

  function extractInterestingOdds(oddsResponse) {
    const results = [];
    const pushMarket = (market, odd, bookmaker) => {
      const nOdd = parseFloat(odd);
      if (!Number.isFinite(nOdd) || nOdd <= 1.01) return;
      results.push({ market, odd: nOdd, bookmaker: bookmaker || "-" });
    };

    for (const block of oddsResponse || []) {
      const bookmakers = block?.bookmakers || [];

      for (const bm of bookmakers) {
        const bets = bm?.bets || [];

        for (const bet of bets) {
          const betName = normalizeLabel(bet?.name);
          const values = bet?.values || [];

          for (const val of values) {
            const label = normalizeLabel(val?.value);
            const odd = val?.odd;

            if (betName.includes("match winner") || betName === "winner" || betName.includes("1x2")) {
              if (["home", "1"].includes(label)) pushMarket("HOME", odd, bm.name);
              if (["away", "2"].includes(label)) pushMarket("AWAY", odd, bm.name);
              if (["draw", "x"].includes(label)) pushMarket("DRAW", odd, bm.name);
            }

            if (betName.includes("both teams score") || betName.includes("both teams to score") || betName.includes("btts")) {
              if (label === "yes") pushMarket("BTTS_YES", odd, bm.name);
              if (label === "no") pushMarket("BTTS_NO", odd, bm.name);
            }

            if (betName.includes("goals over/under") || betName.includes("over/under") || betName.includes("total goals")) {
              if (label.includes("over 2.5")) pushMarket("OVER_2_5", odd, bm.name);
              if (label.includes("under 2.5")) pushMarket("UNDER_2_5", odd, bm.name);
              if (label.includes("over 3.5")) pushMarket("OVER_3_5", odd, bm.name);
              if (label.includes("under 3.5")) pushMarket("UNDER_3_5", odd, bm.name);
            }

            if (betName.includes("cards over/under") || betName.includes("total cards")) {
              if (label.includes("over 4.5")) pushMarket("CARDS_OVER_4_5", odd, bm.name);
              if (label.includes("over 3.5")) pushMarket("CARDS_OVER_3_5", odd, bm.name);
            }
          }
        }
      }
    }

    const bestPerMarket = new Map();
    for (const item of results) {
      const prev = bestPerMarket.get(item.market);
      if (!prev || item.odd > prev.odd) bestPerMarket.set(item.market, item);
    }

    return [...bestPerMarket.values()];
  }

  function getBestModelMarkets(scores, hStats, aStats, leagueId) {
    const thr = getDynamicThresholds(leagueId);
    const picks = [];

    const homeExp = scores.homeExp;
    const awayExp = scores.awayExp;
    const gap = scores.gap;
    const minSide = Math.min(homeExp, awayExp);

    if (
      scores.over35Score >= thr.o35 &&
      scores.adjTotalXG >= 3.30 &&
      homeExp >= 1.35 &&
      awayExp >= 1.15 &&
      minSide >= 1.10
    ) {
      picks.push({ market: "OVER_3_5", modelScore: scores.over35Score, reason: "Ισχυρό calibrated O3.5" });
    }

    if (
      scores.over25Score >= thr.o25 &&
      scores.adjTotalXG >= 2.60 &&
      homeExp >= 1.05 &&
      awayExp >= 0.90
    ) {
      picks.push({ market: "OVER_2_5", modelScore: scores.over25Score, reason: "Ισχυρό calibrated O2.5" });
    }

    if (
      scores.bttsScore >= thr.btts &&
      homeExp >= 1.00 &&
      awayExp >= 1.00 &&
      scores.balance >= 0.50
    ) {
      picks.push({ market: "BTTS_YES", modelScore: scores.bttsScore, reason: "Ισορροπημένο BTTS profile" });
    }

    if (
      homeExp >= 1.55 &&
      gap >= 0.65 &&
      safeNum(hStats.splitXG) >= 1.60 &&
      safeNum(aStats.splitXGA) >= 1.20
    ) {
      picks.push({
        market: "HOME",
        modelScore: Number((92 + (gap * 18) + (homeExp * 6)).toFixed(2)),
        reason: "Καθαρή εντός υπεροχή"
      });
    }

    if (
      awayExp >= 1.45 &&
      gap >= 0.60 &&
      safeNum(aStats.splitXG) >= 1.50 &&
      safeNum(hStats.splitXGA) >= 1.20
    ) {
      picks.push({
        market: "AWAY",
        modelScore: Number((92 + (gap * 18) + (awayExp * 6)).toFixed(2)),
        reason: "Καθαρή εκτός υπεροχή"
      });
    }

    if (scores.cards4Score >= thr.cards4 && (safeNum(hStats.cards) + safeNum(aStats.cards)) >= 3.8) {
      picks.push({
        market: "CARDS_OVER_4_5",
        modelScore: scores.cards4Score,
        reason: "Υψηλό cards profile"
      });
    }

    if (scores.adjTotalXG <= 2.10 && max(homeExp, awayExp) <= 1.55) {
      picks.push({
        market: "UNDER_2_5",
        modelScore: Number((98 - scores.adjTotalXG * 10).toFixed(2)),
        reason: "Κλειστό ματς / χαμηλό ceiling"
      });
    }

    return picks.sort((a, b) => b.modelScore - a.modelScore);
  }

  function marketToLabel(market) {
    const map = {
      HOME: "1",
      AWAY: "2",
      DRAW: "X",
      OVER_2_5: "OVER 2.5",
      UNDER_2_5: "UNDER 2.5",
      OVER_3_5: "OVER 3.5",
      UNDER_3_5: "UNDER 3.5",
      BTTS_YES: "BTTS YES",
      BTTS_NO: "BTTS NO",
      CARDS_OVER_3_5: "OVER 3.5 ΚΑΡΤΕΣ",
      CARDS_OVER_4_5: "OVER 4.5 ΚΑΡΤΕΣ"
    };
    return map[market] || market;
  }

  function pickClosestValueOption(modelMarkets, oddsMarkets, targetOdd, minOdd, maxOdd) {
    let best = null;
    const filteredOdds = oddsMarkets.filter(o => o.odd >= minOdd && o.odd <= maxOdd);

    for (const mm of modelMarkets) {
      const matchedOdds = filteredOdds.filter(o => o.market === mm.market);

      for (const o of matchedOdds) {
        const oddDistance = Math.abs(o.odd - targetOdd);
        const impliedProb = 1 / o.odd;
        const pseudoProb = clamp(mm.modelScore / 125, 0.14, 0.90);
        const edge = pseudoProb - impliedProb;

        const finalScore =
          (mm.modelScore * 0.70) +
          (edge * 100 * 1.20) -
          (oddDistance * 25);

        if (!best || finalScore > best.finalScore) {
          best = {
            market: mm.market,
            odd: o.odd,
            bookmaker: o.bookmaker,
            modelScore: mm.modelScore,
            reason: mm.reason,
            targetOdd,
            minOdd,
            maxOdd,
            oddDistance,
            impliedProb,
            pseudoProb,
            edge,
            finalScore: Number(finalScore.toFixed(2))
          };
        }
      }
    }

    return best;
  }

  function buildWallBet() {
    const candidates = [
      ...latestTopLists.over25.map(x => ({ ...x, market: "OVER 2.5", mainScore: x.over25Score })),
      ...latestTopLists.over35.map(x => ({ ...x, market: "OVER 3.5", mainScore: x.over35Score })),
      ...latestTopLists.btts.map(x => ({ ...x, market: "BTTS", mainScore: x.bttsScore })),
      ...latestTopLists.cards4.map(x => ({ ...x, market: "OVER 4 ΚΑΡΤΕΣ", mainScore: x.cards4Score })),
      ...latestTopLists.valuePicks.slice(0, 6).map(x => ({ ...x, market: marketToLabel(x.market), mainScore: x.finalScore }))
    ];

    const unique = [];
    const used = new Set();

    for (const c of candidates.sort((a, b) => b.mainScore - a.mainScore)) {
      const key = `${c.fixtureId}_${c.market}`;
      if (used.has(key)) continue;
      used.add(key);
      unique.push(c);
    }

    if (unique.length < 2) return null;

    const leg1 = unique[0];
    const leg2 = unique.find(x => x.fixtureId !== leg1.fixtureId) || unique[1];
    if (!leg2) return null;

    const estimatedScore = Number((leg1.mainScore + leg2.mainScore).toFixed(2));
    return {
      date: getTodayISO(),
      stake: safeNum(document.getElementById("wallbetStake")?.value, 10),
      legs: [leg1, leg2],
      estimatedScore
    };
  }

  async function run30DayAudit() {
    if (isRunning) return;

    isRunning = true;
    clearError();
    clearSuccess();
    setButtonsDisabled(true);
    setLoader(true, "AUDIT 30 ΗΜΕΡΩΝ...");

    document.getElementById("display").innerHTML = "";
    document.getElementById("topSection").innerHTML = "";
    document.getElementById("wallbetSection").innerHTML = "";

    try {
      const store = getPredictionStore();
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - 30);

      const candidates = store.filter(x => new Date(x.date) >= cutoff);
      if (!candidates.length) {
        document.getElementById("auditSection").innerHTML = `
          <div class="section-panel">
            <div class="section-title">📊 AUDIT 30 ΗΜΕΡΩΝ</div>
            <div style="color:var(--txt-muted);">Δεν υπάρχουν αποθηκευμένες προβλέψεις στο τελευταίο 30ήμερο.</div>
          </div>
        `;
        return;
      }

      let rows = [];
      let totals = {
        games: 0,
        over25Hits: 0,
        over35Hits: 0,
        bttsHits: 0,
        exactHits: 0,
        cornersAbsErrorSum: 0,
        cornersValidGames: 0
      };

      for (let i = 0; i < candidates.length; i++) {
        const p = candidates[i];
        setProgress(Math.round(((i + 1) / candidates.length) * 100), `AUDIT: ${p.homeTeam} vs ${p.awayTeam}`);

        const fixtureResp = await apiReq(`fixtures?id=${p.fixtureId}`);
        const fixture = fixtureResp?.response?.[0];
        if (!fixture) continue;
        if (!isFinishedStatus(fixture?.fixture?.status?.short)) continue;

        const actualHome = safeNum(fixture?.goals?.home);
        const actualAway = safeNum(fixture?.goals?.away);
        const actualTotal = actualHome + actualAway;
        const actualBTTS = actualHome > 0 && actualAway > 0;
        const actualExact = `${actualHome}-${actualAway}`;

        const statsResp = await getFixtureStats(p.fixtureId);
        let actualCorners = null;
        if (statsResp?.response && statsResp.response.length >= 2) {
          const h = statsResp.response[0]?.statistics || [];
          const a = statsResp.response[1]?.statistics || [];
          actualCorners = statVal(h, "Corner Kicks") + statVal(a, "Corner Kicks");
        }

        const thr = getDynamicThresholds(p.leagueId || 0);

        const predOver25 = safeNum(p.over25Score) >= thr.o25 && safeNum(p.adjTotalXG) >= 2.60;
        const predOver35 = safeNum(p.over35Score) >= thr.o35 && safeNum(p.adjTotalXG) >= 3.30;
        const predBTTS = safeNum(p.bttsScore) >= thr.btts && safeNum(p.homeExp) >= 1.00 && safeNum(p.awayExp) >= 1.00;

        const hitOver25 = predOver25 === (actualTotal > 2.5);
        const hitOver35 = predOver35 === (actualTotal > 3.5);
        const hitBTTS = predBTTS === actualBTTS;
        const hitExact = String(p.exactScorePred) === actualExact;

        let cornersError = null;
        if (actualCorners != null && Number.isFinite(actualCorners)) {
          cornersError = Math.abs(safeNum(p.cornersPred) - actualCorners);
          totals.cornersAbsErrorSum += cornersError;
          totals.cornersValidGames += 1;
        }

        totals.games += 1;
        if (hitOver25) totals.over25Hits += 1;
        if (hitOver35) totals.over35Hits += 1;
        if (hitBTTS) totals.bttsHits += 1;
        if (hitExact) totals.exactHits += 1;

        rows.push({
          date: p.date?.slice(0, 10) || "",
          league: p.league,
          match: `${p.homeTeam} vs ${p.awayTeam}`,
          predOver25: predOver25 ? "YES" : "NO",
          actualOver25: actualTotal > 2.5 ? "YES" : "NO",
          hitOver25,
          predOver35: predOver35 ? "YES" : "NO",
          actualOver35: actualTotal > 3.5 ? "YES" : "NO",
          hitOver35,
          predBTTS: predBTTS ? "YES" : "NO",
          actualBTTS: actualBTTS ? "YES" : "NO",
          hitBTTS,
          predExact: p.exactScorePred,
          actualExact,
          hitExact,
          predCorners: p.cornersPred,
          actualCorners: actualCorners == null ? "-" : actualCorners,
          cornersError: cornersError == null ? "-" : cornersError.toFixed(1)
        });
      }

      if (!totals.games) {
        document.getElementById("auditSection").innerHTML = `
          <div class="section-panel">
            <div class="section-title">📊 AUDIT 30 ΗΜΕΡΩΝ</div>
            <div style="color:var(--txt-muted);">Δεν βρέθηκαν ολοκληρωμένοι αγώνες για αξιολόγηση.</div>
          </div>
        `;
        return;

      const over25Acc = ((totals.over25Hits / totals.games) * 100).toFixed(1);
      const over35Acc = ((totals.over35Hits / totals.games) * 100).toFixed(1);
      const bttsAcc = ((totals.bttsHits / totals.games) * 100).toFixed(1);
      const exactAcc = ((totals.exactHits / totals.games) * 100).toFixed(1);
      const cornersMae = totals.cornersValidGames > 0
        ? (totals.cornersAbsErrorSum / totals.cornersValidGames).toFixed(2)
        : "-";

      document.getElementById("auditSection").innerHTML = `
        <div class="section-panel">
          <div class="section-title">📊 AUDIT 30 ΗΜΕΡΩΝ</div>

          <div class="bank-grid" style="margin-bottom:16px;">
            <div class="bank-box">
              <div class="bank-label">Αγώνες</div>
              <div class="bank-value">${totals.games}</div>
            </div>
            <div class="bank-box">
              <div class="bank-label">Accuracy Over 2.5</div>
              <div class="bank-value">${over25Acc}%</div>
            </div>
            <div class="bank-box">
              <div class="bank-label">Accuracy Over 3.5</div>
              <div class="bank-value">${over35Acc}%</div>
            </div>
            <div class="bank-box">
              <div class="bank-label">Accuracy BTTS</div>
              <div class="bank-value">${bttsAcc}%</div>
            </div>
          </div>

          <div class="bank-grid" style="margin-bottom:16px;">

              <div class="bank-value">${cornersMae}</div>
            </div>
            <div class="bank-box">
              <div class="bank-label">Hits Over 2.5</div>

            <div class="bank-box">

          <div class="audit-table-wrap">
            <table class="audit-table">
              <thead>
                <tr>
                  <th>Ημ/νία</th>
                  <th>Λίγκα</th>
                  <th>Ματς</th>

  async function runScan() {
    if (isRunning) return;

    isRunning = true;
    clearError();
    clearSuccess();
    setButtonsDisabled(true);
    setLoader(true, "ΑΝΑΖΗΤΗΣΗ ΣΗΜΕΙΩΝ ΜΕ ΑΞΙΑ...");

    const display = document.getElementById("display");
    display.innerHTML = "";
    document.getElementById("topSection").innerHTML = "";
    document.getElementById("wallbetSection").innerHTML = "";
    document.getElementById("auditSection").innerHTML = "";

    try {
      const selectedDate = document.getElementById("scanDate").value || getTodayISO();
      const selectedLeague = document.getElementById("leagueFilter").value;
      const targetOdd = safeNum(document.getElementById("targetOdd")?.value, 1.90);
      let minOdd = safeNum(document.getElementById("minOdd")?.value, 1.70);
      let maxOdd = safeNum(document.getElementById("maxOdd")?.value, 2.20);

      if (minOdd > maxOdd) {
        const tmp = minOdd;
        minOdd = maxOdd;
        maxOdd = tmp;
        if (document.getElementById("minOdd")) document.getElementById("minOdd").value = minOdd.toFixed(2);
        if (document.getElementById("maxOdd")) document.getElementById("maxOdd").value = maxOdd.toFixed(2);
      }

      const fixturesResp = await apiReq(`fixtures?date=${selectedDate}`);
      let matches = (fixturesResp.response || []).filter(m => {
        if (selectedLeague === "ALL") return LEAGUES.includes(m.league.id);
        return m.league.id === parseInt(selectedLeague, 10);
      });

      matches.sort((a, b) => {
        const aLive = isLiveStatus(a.fixture.status.short) ? 1 : 0;
        const bLive = isLiveStatus(b.fixture.status.short) ? 1 : 0;
        const aFinished = isFinishedStatus(a.fixture.status.short) ? 1 : 0;
        const bFinished = isFinishedStatus(b.fixture.status.short) ? 1 : 0;

        if (aLive !== bLive) return bLive - aLive;
        if (aFinished !== bFinished) return bFinished - aFinished;
        return (a.fixture.timestamp || 0) - (b.fixture.timestamp || 0);
      });

      matches = matches.slice(0, MAX_MATCHES);

      if (!matches.length) {
        display.innerHTML = `<div class="cyber-card"><h3 class="orbitron" style="text-align:center; color:var(--gold); margin:0;">Δεν βρέθηκαν αγώνες.</h3></div>`;
        return;
      }

      let htmlBuffer = "";
      const scoredMatches = [];
      const valuePicks = [];

      for (let i = 0; i < matches.length; i++) {
        const m = matches[i];
        setProgress(Math.round(((i + 1) / matches.length) * 100), `ΑΝΑΛΥΣΗ: ${m.teams.home.name} vs ${m.teams.away.name}`);

        const [intelHome, intelAway, standings, h2hFixtures, oddsResp] = await Promise.all([
          getTeamData(m.teams.home.id, m.league.id, m.league.season, "home"),
          getTeamData(m.teams.away.id, m.league.id, m.league.season, "away"),
          getLeagueStandings(m.league.id, m.league.season),
          getHeadToHead(m.teams.home.id, m.teams.away.id, m.league.id, m.league.season),
          getFixtureOdds(m.fixture.id)
        ]);

        const scores = computeMarketScores(intelHome, intelAway, m.league.id);
        const h2hSummary = summarizeH2H(h2hFixtures, m.teams.home.id, m.teams.away.id);
        const modelMarkets = getBestModelMarkets(scores, intelHome, intelAway, m.league.id);
        const oddsMarkets = extractInterestingOdds(oddsResp);
        const valuePick = pickClosestValueOption(modelMarkets, oddsMarkets, targetOdd, minOdd, maxOdd);

        const baseItem = {
          fixtureId: m.fixture.id,
          homeTeam: m.teams.home.name,
          awayTeam: m.teams.away.name,
          league: m.league.name,
          leagueId: m.league.id,
          homeRank: getTeamRankFromStandings(standings, m.teams.home.id),
          awayRank: getTeamRankFromStandings(standings, m.teams.away.id),
          over25Score: scores.over25Score,
          over35Score: scores.over35Score,
          bttsScore: scores.bttsScore,
          cards4Score: scores.cards4Score
        };

        scoredMatches.push(baseItem);

        if (valuePick) {
          valuePicks.push({
            ...baseItem,
            market: valuePick.market,
            odd: valuePick.odd,
            bookmaker: valuePick.bookmaker,
            modelScore: valuePick.modelScore,
            finalScore: valuePick.finalScore,
            oddDistance: valuePick.oddDistance,
            edge: valuePick.edge
          });
        }

        htmlBuffer += buildMatchCard(m, { h: intelHome, a: intelAway }, scores, standings, h2hSummary, valuePick);
      }

      latestTopLists.over25 = [...scoredMatches].sort((a, b) => b.over25Score - a.over25Score).slice(0, 5);
      latestTopLists.over35 = [...scoredMatches].sort((a, b) => b.over35Score - a.over35Score).slice(0, 5);
      latestTopLists.btts = [...scoredMatches].sort((a, b) => b.bttsScore - a.bttsScore).slice(0, 5);
      latestTopLists.cards4 = [...scoredMatches].sort((a, b) => b.cards4Score - a.cards4Score).slice(0, 5);
      latestTopLists.valuePicks = [...valuePicks].sort((a, b) => b.finalScore - a.finalScore).slice(0, 10);

      renderTopSections();
      renderWallBet();
      display.innerHTML = htmlBuffer;
      showSuccess("Το νέο calibrated scan ολοκληρώθηκε και οι προβλέψεις αποθηκεύτηκαν για audit.");
    } catch (err) {
      showError(`Σφάλμα: ${err?.message || "Άγνωστο σφάλμα"}`);
    } finally {
      setLoader(false);
      setButtonsDisabled(false);
      isRunning = false;
    }
  }

  async function runLiveScan() {
    if (isRunning) return;

    isRunning = true;
    clearError();
    clearSuccess();
    setButtonsDisabled(true);
    setLoader(true, "ΑΝΑΖΗΤΗΣΗ LIVE ΑΓΩΝΩΝ...");

    const display = document.getElementById("display");
    display.innerHTML = "";
    document.getElementById("topSection").innerHTML = "";
    document.getElementById("wallbetSection").innerHTML = "";
    document.getElementById("auditSection").innerHTML = "";

    try {
      const selectedDate = document.getElementById("scanDate").value || getTodayISO();
      const selectedLeague = document.getElementById("leagueFilter").value;

      const fixturesResp = await apiReq(`fixtures?date=${selectedDate}`);
      let matches = (fixturesResp.response || []).filter(m => {
        const leagueOk = selectedLeague === "ALL"
          ? LEAGUES.includes(m.league.id)
          : m.league.id === parseInt(selectedLeague, 10);
        return leagueOk && isLiveStatus(m.fixture.status.short);
      });

      if (!matches.length) {
        display.innerHTML = `<div class="cyber-card"><h3 class="orbitron" style="text-align:center; color:var(--gold); margin:0;">Δεν υπάρχουν live αγώνες.</h3></div>`;
        return;
      }

      let htmlBuffer = "";

      for (let i = 0; i < matches.length; i++) {
        const m = matches[i];
        setProgress(Math.round(((i + 1) / matches.length) * 100), `LIVE: ${m.teams.home.name} vs ${m.teams.away.name}`);

        const [statResp, standings, h2hFixtures] = await Promise.all([
          getFixtureStats(m.fixture.id),
          getLeagueStandings(m.league.id, m.league.season),
          getHeadToHead(m.teams.home.id, m.teams.away.id, m.league.id, m.league.season)
        ]);

        let liveStats = null;
        if (statResp?.response && statResp.response.length >= 2) {
          const homeObj = statResp.response.find(x => x.team?.id === m.teams.home.id);
          const awayObj = statResp.response.find(x => x.team?.id === m.teams.away.id);

          const homeStats = homeObj?.statistics || [];
          const awayStats = awayObj?.statistics || [];

          liveStats = {
            h: {
              corners: statVal(homeStats, "Corner Kicks"),
              yellow: statVal(homeStats, "Yellow Cards"),
              red: statVal(homeStats, "Red Cards"),
              shots: statVal(homeStats, "Shots on Goal"),
              danger: statVal(homeStats, "Dangerous Attacks"),
              poss: statVal(homeStats, "Ball Possession")
            },
            a: {
              corners: statVal(awayStats, "Corner Kicks"),
              yellow: statVal(awayStats, "Yellow Cards"),
              red: statVal(awayStats, "Red Cards"),
              shots: statVal(awayStats, "Shots on Goal"),
              danger: statVal(awayStats, "Dangerous Attacks"),
              poss: statVal(awayStats, "Ball Possession")
            }
          };
        }

        const h2hSummary = summarizeH2H(h2hFixtures, m.teams.home.id, m.teams.away.id);
        htmlBuffer += buildLiveCard(m, liveStats, standings, h2hSummary);
      }

      display.innerHTML = htmlBuffer;
    } catch (err) {
      showError(`Σφάλμα live: ${err?.message || "Άγνωστο σφάλμα"}`);
    } finally {
      setLoader(false);
      setButtonsDisabled(false);
      isRunning = false;
    }
  }

  function exportPDF() {
    html2pdf().set({
      margin: 8,
      filename: `Omega_${getTodayISO()}.pdf`,
      image: { type: "jpeg", quality: 0.96 },
      html2canvas: { scale: 2, useCORS: true },
      jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
    }).from(document.getElementById("app")).save();
  }

  window.addEventListener("DOMContentLoaded", () => {
    document.getElementById("scanDate").value = getTodayISO();
    const select = document.getElementById("leagueFilter");
    LEAGUES_DATA.forEach(l => {
      const opt = document.createElement("option");
      opt.value = l.id;
      opt.textContent = l.name;
      select.appendChild(opt);
    });
    renderBankSection();
  });
  </script>
