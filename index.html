<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Predictor Pro v4700.7 - The Omega Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root {
      --bg: #010409; --card: #0d1117; --card-deep: #161b22; --border: #30363d;
      --p: #00f2ff; --magenta: #ff00ff; --txt: #f0f6fc; --txt-muted: #8b949e;
      --gold: #f59e0b; --live: #238636; --alert: #da3633;
      --grad: linear-gradient(135deg, #00f2ff, #8b5cf6);
      --grad-live: linear-gradient(135deg, #da3633, #8b0000);
      --grad-gold: linear-gradient(135deg, #f59e0b, #d97706);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 0; font-size: 16px; overflow-x: hidden; }
    h1, h2, h3, h4, .orbitron { font-family: 'Orbitron', sans-serif; }
    .container { width: 100%; max-width: 950px; margin: 0 auto; padding: 15px; }

    /* LIVESCORE TICKER */
    .ticker-wrap { width: 100%; overflow: hidden; background: #000; border-bottom: 1px solid var(--p); padding: 10px 0; box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }
    .ticker-move { display: inline-flex; white-space: nowrap; animation: ticker 35s linear infinite; }
    .ticker-move:hover { animation-play-state: paused; }
    .ticker-item { display: inline-block; padding: 0 25px; color: var(--txt); font-size: 0.85rem; font-family: 'Orbitron', sans-serif; font-weight: 700; border-right: 1px solid #333; }
    .ticker-live { color: var(--alert); animation: pulseTicker 1.5s infinite; margin-right: 6px; }
    .ticker-score { color: var(--gold); font-size: 1.05rem; margin: 0 6px; }
    @keyframes ticker { 0% { transform: translate3d(100vw, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
    @keyframes pulseTicker { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    /* UI CARDS & BARS */
    .shock-bar-bg { background: #222; height: 6px; border-radius: 3px; margin-top: 5px; overflow: hidden; border: 1px solid #333; }
    .shock-bar-fill { height: 100%; transition: width 0.5s; }
    .shock-low { background: var(--live); box-shadow: 0 0 10px var(--live); }
    .shock-med { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
    .shock-high { background: var(--alert); box-shadow: 0 0 15px var(--alert); animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    .cyber-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; transition: 0.3s; }
    .gold-glow { border-left: 4px solid var(--gold); box-shadow: 0 0 20px rgba(245,158,11,0.1); }
    .standard-glow { border-left: 4px solid var(--p); }
    .live-glow { border-left: 4px solid var(--alert); box-shadow: 0 0 20px rgba(218,54,51,0.15); }
    
    .status-badge { font-size: 0.65rem; font-weight: 900; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; margin-bottom: 8px; display: inline-block; letter-spacing: 1px;}
    .badge-fatigue { background: rgba(218, 54, 51, 0.2); color: var(--alert); border: 1px solid var(--alert); }
    .badge-stable { background: rgba(35, 134, 54, 0.2); color: var(--live); border: 1px solid var(--live); }
    .badge-live { background: var(--alert); color: #fff; animation: pulseTicker 1.5s infinite; }

    .team-name { font-weight: 800; font-size: 1.15rem; color: #fff; margin: 4px 0; }
    
    /* BUTTONS */
    .btn-wrap { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .btn-apex { flex: 1; min-width: 200px; padding: 15px; background: var(--grad); color:#fff; border:none; border-radius:12px; font-weight:900; cursor:pointer; font-family:'Orbitron'; font-size: 0.95rem; text-transform: uppercase; transition: 0.2s;}
    .btn-live { flex: 1; min-width: 200px; padding: 15px; background: var(--grad-live); color:#fff; border:none; border-radius:12px; font-weight:900; cursor:pointer; font-family:'Orbitron'; font-size: 0.95rem; text-transform: uppercase; transition: 0.2s;}
    .btn-export { flex: 1; min-width: 140px; padding: 15px; background: #222; color:var(--txt); border:1px solid var(--border); border-radius:12px; font-weight:900; cursor:pointer; font-family:'Orbitron'; font-size: 0.85rem; text-transform: uppercase; transition: 0.2s;}
    .btn-apex:hover, .btn-live:hover, .btn-export:hover { transform: translateY(-2px); filter: brightness(1.2); }
    .btn-toggle { background: transparent; color: var(--txt-muted); border: 1px solid var(--border); padding: 8px 15px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; font-weight: 700; width: 100%; margin-top: 15px; transition: 0.2s;}
    
    /* DEEP INTEL & LAB */
    .deep-intel-box { display: none; background: var(--card-deep); border-radius: 12px; padding: 15px; margin-top: 15px; border: 1px solid #222; font-size: 0.85rem; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #333; }
    .stat-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px solid #222; }
    .stat-title { color: var(--txt-muted); font-size: 0.65rem; text-transform: uppercase; font-weight: 800; margin-bottom: 5px; }
    .stat-value { font-family: 'Orbitron'; font-size: 1.1rem; font-weight: 900; color: #fff; }
    .form-circle { display: inline-block; width: 18px; height: 18px; border-radius: 50%; text-align: center; line-height: 18px; font-size: 0.6rem; font-weight: 900; color: #fff; margin-right: 3px; }
    .form-W { background: var(--live); } .form-D { background: #555; } .form-L { background: var(--alert); }
    .rule-item { margin-bottom: 8px; padding-left: 15px; border-left: 2px solid var(--magenta); color: #c9d1d9; }

    /* DATA LAB PANEL */
    .lab-panel { background: #000; border: 1px solid var(--p); border-radius: 16px; padding: 20px; margin-bottom: 25px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.05); }
    .motd-card { background: var(--grad-gold); color: #fff; border-radius: 16px; padding: 2px; margin-bottom: 25px; box-shadow: 0 0 25px rgba(245, 158, 11, 0.2); }
    .motd-inner { background: #000; border-radius: 14px; padding: 20px; text-align: center; }
    .acca-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    @media (max-width: 768px) { .acca-grid { grid-template-columns: 1fr; } }
    .acca-box { background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
    .acca-row { display: flex; justify-content: space-between; border-bottom: 1px dashed #333; padding: 8px 0; font-size: 0.85rem; }
    .acca-row:last-child { border-bottom: none; }
    .poss-wrap { width: 100%; height: 8px; background: var(--alert); border-radius: 4px; overflow: hidden; display: flex; margin-top: 8px; }
    .poss-home { height: 100%; background: var(--p); transition: 0.5s; }
  </style>
</head>

<body>
  <div id="authScreen">
    <div class="container" style="margin-top:20vh; text-align:center;">
      <h1 class="orbitron" style="color:var(--p); font-size:3rem; margin-bottom:10px;">APEX ALPHA</h1>
      <p style="color:var(--txt-muted); font-weight:600; letter-spacing:1px;">SOVEREIGN OMEGA v4700.7 // THE TERMINAL</p>
      <input type="password" id="pinInput" placeholder="••••••" oninput="instantAuth(this)" 
             style="width:280px; padding:20px; text-align:center; font-size:2.5rem; border-radius:16px; border:1px solid var(--border); background:#000; color:var(--p); font-family:'Orbitron'; letter-spacing:10px; outline:none; margin-top: 20px;">
    </div>
  </div>

  <div id="appContent" style="display:none;">
    <div class="ticker-wrap" id="liveTickerWrap" style="display:none;"><div class="ticker-move" id="liveTicker"></div></div>

    <div class="container">
      <header style="text-align:center; padding: 20px 0 30px 0;">
        <h1 class="orbitron" style="color:var(--p); margin:0; font-size:2.2rem; letter-spacing:-1px;">PREDICTOR <span style="color:#fff">PRO</span></h1>
        <small style="color:var(--magenta); font-weight:900; letter-spacing:4px; font-size:0.7rem;">QUANTITATIVE ANALYSIS ENGINE</small>
      </header>

      <div class="btn-wrap">
        <button class="btn-apex" id="scanBtn" onclick="runApexScan()">🚀 PRE-MATCH SCAN</button>
        <button class="btn-live" id="liveBtn" onclick="runLiveRadar()">🔴 LIVE RADAR</button>
        <button class="btn-export" onclick="exportToPDF()">📄 PDF REPORT</button>
        <button class="btn-export" onclick="exportToXML()">📋 COPY XML</button>
      </div>

      <div id="syncCont" style="display:none; margin-bottom:30px;">
        <div style="background:#000; height:8px; border-radius:4px; overflow:hidden;">
          <div id="syncFill" style="background:var(--grad); height:100%; width:0%; transition:0.3s;"></div>
        </div>
        <p id="syncStep" class="orbitron" style="text-align:center; color:var(--p); font-size:0.75rem; font-weight:900; margin-top:12px;"></p>
      </div>

      <div id="resultsDashboard">
        <div id="labSection"></div>
        <div id="upcomingList"></div>
      </div>
    </div>
  </div>

  <script>
    const KEY = "956cbd05f9e9bf934df78d9b72d9a3a0";
    const API_BASE = "https://v3.football.api-sports.io";
    let masterData = [];
    let liveData = [];

    // Χρυσή Λίστα με Ισπανία 2 (141) & Τουρκία 1 (203)
    const targetLeagues = [39, 40, 140, 141, 135, 78, 79, 61, 253, 262, 128, 197, 318, 94, 88, 144, 2, 3, 84, 203];

    function instantAuth(el) {
      if (el.value === "106014") {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('appContent').style.display = 'block';
        fetchLiveScores(); setInterval(fetchLiveScores, 60000); 
      }
    }

    function toggleIntel(id) {
      const el = document.getElementById(`intel-${id}`);
      el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    async function apiFetch(path) {
      try {
        const r = await fetch(`${API_BASE}/${path}`, { headers: {"x-apisports-key": KEY} });
        return await r.json();
      } catch(e) { return { response: [] }; }
    }

    // --- LIVE TICKER ---
    async function fetchLiveScores() {
      try {
        const res = await apiFetch(`fixtures?live=${targetLeagues.join('-')}`);
        const matches = res.response || [];
        const tickerEl = document.getElementById('liveTicker');
        const wrapEl = document.getElementById('liveTickerWrap');

        if (matches.length > 0) {
          wrapEl.style.display = 'block';
          let html = matches.map(m => `<div class="ticker-item"><span class="ticker-live">⏱ ${m.fixture.status.elapsed || 'HT'}'</span> ${m.teams.home.name} <span class="ticker-score">${m.goals.home}-${m.goals.away}</span> ${m.teams.away.name}</div>`).join('');
          tickerEl.innerHTML = html + html; 
        } else wrapEl.style.display = 'none';
      } catch(e) {}
    }

    // --- EXPORT FUNCTIONS ---
    function exportToPDF() {
      const element = document.getElementById('resultsDashboard');
      const opt = {
        margin:       0.5,
        filename:     `Apex_Report_${new Date().toISOString().split('T')[0]}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true, backgroundColor: '#010409' },
        jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
      };
      html2pdf().set(opt).from(element).save();
    }

    function exportToXML() {
      if(masterData.length === 0) return alert("Κάνε πρώτα Pre-Match Scan για να μαζέψεις δεδομένα!");
      let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<ApexPredictions date="${new Date().toISOString().split('T')[0]}">\n`;
      masterData.forEach(d => {
        xml += `  <Match id="${d.fixture.id}">\n    <HomeTeam>${d.fixture.teams.home.name}</HomeTeam>\n    <AwayTeam>${d.fixture.teams.away.name}</AwayTeam>\n    <League>${d.fixture.league.name}</League>\n    <Pick>${d.calc.mainPick}</Pick>\n    <Confidence>${d.calc.confidence}</Confidence>\n    <ShockScore>${d.calc.shockScore}</ShockScore>\n    <xG_Home>${d.calc.adjHXG}</xG_Home>\n    <xG_Away>${d.calc.adjAXG}</xG_Away>\n  </Match>\n`;
      });
      xml += `</ApexPredictions>`;
      navigator.clipboard.writeText(xml).then(() => alert("✅ XML Copied to Clipboard!"));
    }

    // --- 🔴 LIVE RADAR ENGINE ---
    async function runLiveRadar() {
      const btn = document.getElementById('liveBtn');
      btn.disabled = true; btn.innerText = "SCANNING LIVE...";
      document.getElementById('upcomingList').innerHTML = ""; document.getElementById('labSection').innerHTML = "";
      document.getElementById('syncCont').style.display = 'block'; liveData = [];

      const res = await apiFetch(`fixtures?live=${targetLeagues.join('-')}`);
      const matches = res.response || [];

      if(matches.length === 0) {
          document.getElementById('syncStep').innerText = "ΚΑΝΕΝΑ ΕΝΕΡΓΟ ΜΑΤΣ ΣΤΙΣ ΛΙΓΚΕΣ ΜΑΣ.";
          document.getElementById('syncFill').style.width = '100%';
          setTimeout(() => { document.getElementById('syncCont').style.display = 'none'; btn.disabled = false; btn.innerText = "🔴 LIVE RADAR"; }, 3000);
          return;
      }

      for (let i = 0; i < matches.length; i++) {
        const m = matches[i];
        document.getElementById('syncFill').style.width = Math.round(((i) / matches.length) * 100) + '%';
        document.getElementById('syncStep').innerText = `LIVE STATS: ${m.teams.home.name}`;

        let statsRes = await apiFetch(`fixtures/statistics?fixture=${m.fixture.id}`);
        let statsArr = statsRes.response || [];
        
        let hStats = { poss: 50, corners: 0, cards: 0, shotsOn: 0, dangerAtk: 0, pressure: 0 };
        let aStats = { poss: 50, corners: 0, cards: 0, shotsOn: 0, dangerAtk: 0, pressure: 0 };

        if(statsArr.length === 2) {
          let hRaw = statsArr.find(s => s.team.id === m.teams.home.id)?.statistics || [];
          let aRaw = statsArr.find(s => s.team.id === m.teams.away.id)?.statistics || [];
          let getS = (arr, t) => { let o = arr.find(x => x.type === t); if(!o || !o.value) return 0; if(typeof o.value === 'string' && o.value.includes('%')) return parseInt(o.value); return parseInt(o.value); };

          hStats = { poss: getS(hRaw, "Ball Possession") || 50, corners: getS(hRaw, "Corner Kicks"), cards: getS(hRaw, "Yellow Cards") + getS(hRaw, "Red Cards"), shotsOn: getS(hRaw, "Shots on Goal"), dangerAtk: getS(hRaw, "Dangerous Attacks") };
          aStats = { poss: getS(aRaw, "Ball Possession") || 50, corners: getS(aRaw, "Corner Kicks"), cards: getS(aRaw, "Yellow Cards") + getS(aRaw, "Red Cards"), shotsOn: getS(aRaw, "Shots on Goal"), dangerAtk: getS(aRaw, "Dangerous Attacks") };
          hStats.pressure = Math.round((hStats.dangerAtk * 0.5) + (hStats.shotsOn * 3) + (hStats.corners * 2));
          aStats.pressure = Math.round((aStats.dangerAtk * 0.5) + (aStats.shotsOn * 3) + (aStats.corners * 2));
        }
        liveData.push({ fixture: m, hStats, aStats });
        await new Promise(r => setTimeout(r, 120)); 
      }
      document.getElementById('syncFill').style.width = '100%'; document.getElementById('syncCont').style.display = 'none';
      btn.disabled = false; btn.innerText = "🔴 REFRESH LIVE RADAR"; 
      renderLiveDashboard();
    }

    // --- PRE-MATCH ENGINE ---
    async function getRealFormStats(teamId) {
      let res = await apiFetch(`fixtures?team=${teamId}&last=6&status=FT`);
      let pastFixs = res.response || [];
      let totalXG = 0, totalXGA = 0, totalCorners = 0, totalCards = 0, count = 0, formArr = [];

      for(let pf of pastFixs) {
        let isHome = pf.teams.home.id === teamId;
        let goalsFor = isHome ? pf.goals.home : pf.goals.away;
        let goalsAgainst = isHome ? pf.goals.away : pf.goals.home;
        
        if (goalsFor > goalsAgainst) formArr.push('W'); else if (goalsFor < goalsAgainst) formArr.push('L'); else formArr.push('D');

        let statsRes = await apiFetch(`fixtures/statistics?fixture=${pf.fixture.id}`);
        let statsArr = statsRes.response || [];
        if(statsArr.length === 2) {
          let myStats = statsArr.find(s => s.team.id === teamId)?.statistics || []; let oppStats = statsArr.find(s => s.team.id !== teamId)?.statistics || [];
          let getStat = (arr, t) => { let obj = arr.find(x => x.type === t); let val = obj && obj.value ? parseFloat(obj.value) : 0; return isNaN(val) ? 0 : val; };
          let matchXG = getStat(myStats, "Expected Goals"); let matchXGA = getStat(oppStats, "Expected Goals");
          if (matchXG === 0) matchXG = goalsFor > 0 ? goalsFor : 0.1; if (matchXGA === 0) matchXGA = goalsAgainst > 0 ? goalsAgainst : 0.1;
          totalXG += matchXG; totalXGA += matchXGA; totalCorners += getStat(myStats, "Corner Kicks"); totalCards += getStat(myStats, "Yellow Cards") + getStat(myStats, "Red Cards"); count++;
        }
        await new Promise(r => setTimeout(r, 120)); 
      }
      let avg = (val) => count > 0 ? (val/count).toFixed(2) : "0.00";
      return { xG: avg(totalXG), xGA: avg(totalXGA), corners: avg(totalCorners), cards: avg(totalCards), formStr: formArr.reverse() };
    }

    function calculateApex(hStats, aStats, pD, fixture) {
      let rulesLog = [];
      let rawHXG = parseFloat(hStats.xG) || 0.5; let rawAXG = parseFloat(aStats.xG) || 0.5;
      let hXG = rawHXG; let aXG = rawAXG;

      let h2hList = [];
      if (pD.h2h && pD.h2h.length > 0) {
        for(let i=0; i<Math.min(3, pD.h2h.length); i++) {
          if(pD.h2h[i].goals.home !== null) h2hList.push(`${pD.h2h[i].teams.home.name} <span style="color:var(--p); font-weight:900;">${pD.h2h[i].goals.home} - ${pD.h2h[i].goals.away}</span> ${pD.h2h[i].teams.away.name}`);
        }
      }
      if(h2hList.length === 0) h2hList.push("No H2H History");

      let isFatigued = [39, 140, 135, 78, 61, 2, 3, 84].includes(fixture.league.id);
      if (isFatigued) { hXG *= 0.88; rulesLog.push("⚠️ Fatigue Penalty (-12% xG)"); }

      let shockScore = Math.min(((Math.min(hXG, aXG) / Math.max(hXG, aXG)) * 100) + (isFatigued ? 15 : 0), 100).toFixed(0);
      let total = hXG + aXG + 0.6; 
      let hP = Math.round((hXG / total) * 100), aP = Math.round((aXG / total) * 100), dP = 100 - hP - aP;

      let mainPick = hP > aP ? '1' : '2'; let pickColor = 'var(--p)'; let isDC = false;
      if (Math.max(hP, aP) >= 60 && Math.max(hP, aP) <= 72) { mainPick = hP > aP ? '1X' : 'X2'; pickColor = 'var(--gold)'; isDC = true; rulesLog.push("⚖️ Derby Guard: Applied Double Chance."); }

      return { rawHXG: rawHXG.toFixed(2), rawAXG: rawAXG.toFixed(2), rawHXGA: hStats.xGA, rawAXGA: aStats.xGA, hXCorner: hStats.corners, aXCorner: aStats.corners, hXCards: hStats.cards, aXCards: aStats.cards, hFormStr: hStats.formStr, aFormStr: aStats.formStr, h2hList, adjHXG: hXG.toFixed(2), adjAXG: aXG.toFixed(2), hP, dP, aP, shockScore, isFatigued, rulesLog, mainPick, pickColor, marketText: (!isDC && shockScore < 50) ? "OVER 1.5 TEAM GOALS" : "2-3 GOALS", confidence: Math.max(hP, aP) };
    }

    async function runApexScan() {
      const btn = document.getElementById('scanBtn');
      btn.disabled = true; btn.innerText = "EXTRACTING DEEP STATS...";
      const tzOffset = (new Date()).getTimezoneOffset() * 60000;
      const day = (new Date(Date.now() - tzOffset)).toISOString().split('T')[0];
      
      document.getElementById('syncCont').style.display = 'block';
      masterData = []; document.getElementById('upcomingList').innerHTML = ""; document.getElementById('labSection').innerHTML = "";

      const fD = await apiFetch(`fixtures?date=${day}`);
      const fixtures = (fD.response || []).filter(m => targetLeagues.includes(m.league.id)).slice(0, 15); 

      if(fixtures.length === 0) {
          document.getElementById('syncStep').innerText = "ΚΑΝΕΝΑ ΜΑΤΣ ΣΗΜΕΡΑ";
          document.getElementById('syncFill').style.width = '100%';
          setTimeout(() => { document.getElementById('syncCont').style.display = 'none'; btn.disabled = false; btn.innerText = "🚀 PRE-MATCH SCAN"; }, 3000);
          return;
      }

      for (let i = 0; i < fixtures.length; i++) {
        const m = fixtures[i];
        document.getElementById('syncFill').style.width = Math.round(((i) / fixtures.length) * 100) + '%';
        document.getElementById('syncStep').innerText = `ANALYZING: ${m.teams.home.name}`;

        const hStats = await getRealFormStats(m.teams.home.id); const aStats = await getRealFormStats(m.teams.away.id);
        const pData = await apiFetch(`predictions?fixture=${m.fixture.id}`);
        if (pData.response?.[0]) masterData.push({ id: m.fixture.id, fixture: m, calc: calculateApex(hStats, aStats, pData.response[0], m) });
      }

      document.getElementById('syncFill').style.width = '100%'; document.getElementById('syncCont').style.display = 'none';
      btn.disabled = false; btn.innerText = "🚀 PRE-MATCH SCAN"; 
      renderLabAndAccas();
      renderApexDashboard();
    }

    function buildFormHtml(formArray) {
      if(!formArray || formArray.length === 0) return `<span class="form-circle form-D">-</span>`;
      return formArray.map(f => `<span class="form-circle form-${f}">${f}</span>`).join('');
    }

    // --- RENDER ENGINES ---
    function renderLabAndAccas() {
      const labContainer = document.getElementById('labSection');
      
      let sortedMOTD = [...masterData].sort((a, b) => { if(b.calc.confidence !== a.calc.confidence) return b.calc.confidence - a.calc.confidence; return a.calc.shockScore - b.calc.shockScore; });
      let motd = sortedMOTD[0];

      // Logic για Παρολί
      let safeMatches = masterData.filter(d => d.calc.confidence > 70).sort((a, b) => b.calc.confidence - a.calc.confidence);
      let bombMatches = masterData.filter(d => d.calc.shockScore > 68);
      let over25Matches = masterData.filter(d => (parseFloat(d.calc.rawHXG) + parseFloat(d.calc.rawAXG)) >= 2.6);
      let over35Matches = masterData.filter(d => (parseFloat(d.calc.rawHXG) + parseFloat(d.calc.rawAXG)) >= 3.4);

      let genAccaRow = (m, text, color) => `<div class="acca-row"><span>${m.fixture.teams.home.name} - ${m.fixture.teams.away.name}</span> <strong style="color:${color}">${text}</strong></div>`;
      
      let safeHtml = safeMatches.slice(0, 6).map(m => genAccaRow(m, m.calc.mainPick, 'var(--p)')).join('');
      let bombHtml = bombMatches.slice(0, 3).map(m => {
        let pick = m.calc.hP < m.calc.aP ? '1X (Κόντρα)' : 'X2 (Κόντρα)';
        return genAccaRow(m, pick, 'var(--alert)');
      }).join('');
      let over25Html = over25Matches.slice(0, 4).map(m => genAccaRow(m, "OVER 2.5", 'var(--gold)')).join('');
      let over35Html = over35Matches.slice(0, 2).map(m => genAccaRow(m, "OVER 3.5", 'var(--magenta)')).join('');

      labContainer.innerHTML = `
        <h3 class="orbitron" style="color:var(--gold); text-align:center; margin-bottom:10px;">🏆 MATCH OF THE DAY</h3>
        <div class="motd-card">
          <div class="motd-inner">
            <span class="status-badge" style="background:var(--gold); color:#000;">⭐ OMEGA CONFIDENCE: ${motd.calc.confidence}%</span>
            <h2 style="margin:10px 0;">${motd.fixture.teams.home.name} vs ${motd.fixture.teams.away.name}</h2>
            <div style="font-size:1.5rem; color:var(--p); font-weight:900; font-family:'Orbitron';">ΠΡΟΤΑΣΗ: ${motd.calc.mainPick}</div>
            <p style="color:var(--txt-muted); font-size:0.85rem;">Με βάση τα Real Stats, αυτό το ματς παρουσιάζει την υψηλότερη στατιστική επαλήθευση (Shock Potential: ${motd.calc.shockScore}%).</p>
          </div>
        </div>

        <div class="lab-panel">
          <h4 class="orbitron" style="color:var(--p); text-align:center; margin-top:0;">📋 ACCA GENERATOR (ΠΑΡΟΛΙ)</h4>
          <div class="acca-grid">
            <div class="acca-box">
              <div style="color:var(--p); font-size:0.8rem; font-weight:900; margin-bottom:8px;">🛡️ SAFE PICKS (>70%)</div>
              <div style="color:var(--txt-muted); font-size:0.7rem; margin-bottom:8px;">Επίλεξε 3 έως 6 ματς για Παρολί.</div>
              ${safeHtml || "<div style='color:var(--txt-muted); font-size:0.8rem;'>Δεν βρέθηκαν Safe Picks.</div>"}
            </div>
            <div class="acca-box">
              <div style="color:var(--gold); font-size:0.8rem; font-weight:900; margin-bottom:8px;">⚽ OVER 2.5 / 3.5 GOALS</div>
              ${over25Html} ${over35Html}
              ${(!over25Html && !over35Html) ? "<div style='color:var(--txt-muted); font-size:0.8rem;'>Δεν βρέθηκαν δυνατά Overs.</div>" : ""}
            </div>
          </div>
          <div class="acca-box" style="margin-top:10px; border-color:var(--alert);">
            <div style="color:var(--alert); font-size:0.8rem; font-weight:900; margin-bottom:8px;">💣 BOMBS (ΚΟΝΤΡΑ ΣΤΑ ΦΑΒΟΡΙ)</div>
            ${bombHtml || "<div style='color:var(--txt-muted); font-size:0.8rem;'>Δεν βρέθηκαν σημεία υψηλού κινδύνου.</div>"}
          </div>
        </div>
      `;
    }

    function renderApexDashboard() {
      const container = document.getElementById('upcomingList');
      container.innerHTML = "<h2 class='orbitron' style='text-align:center; color:var(--txt-muted); margin: 30px 0;'>📊 ΑΝΑΛΥΤΙΚΗ ΛΙΣΤΑ ΑΓΩΝΩΝ</h2>";

      masterData.forEach(d => {
        const c = d.calc; const fix = d.fixture;
        const shockClass = c.shockScore > 70 ? 'shock-high' : (c.shockScore > 45 ? 'shock-med' : 'shock-low');
        const cardGlow = Math.max(c.hP, c.aP) >= 75 ? 'gold-glow' : 'standard-glow';

        container.innerHTML += `
          <div class="cyber-card ${cardGlow}">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <div style="flex: 1;">
                <span class="status-badge ${c.isFatigued ? 'badge-fatigue' : 'badge-stable'}">${c.isFatigued ? '⚠️ HIGH FATIGUE' : '✅ STABLE'}</span>
                <span style="color:var(--txt-muted); font-size:0.7rem; margin-left:8px;">${fix.league.name}</span>
                <div class="team-name">${fix.teams.home.name}</div>
                <div class="team-name">${fix.teams.away.name}</div>
                <div style="margin-top:12px; max-width: 200px;">
                  <small style="color:var(--txt-muted); font-size:0.65rem; font-weight:900;">SHOCK POTENTIAL: ${c.shockScore}%</small>
                  <div class="shock-bar-bg"><div class="shock-bar-fill ${shockClass}" style="width:${c.shockScore}%"></div></div>
                </div>
              </div>
              <div style="text-align:right; min-width: 120px;">
                <div style="color:var(--gold); font-family:'Orbitron'; font-weight:900; font-size:0.65rem;">${c.marketText}</div>
                <div style="background:#000; padding:15px; border-radius:12px; margin-top:5px; border:1px solid var(--border); display:inline-block;">
                  <span style="color:${c.pickColor}; font-weight:900; font-size:1.3rem; font-family:'Orbitron';">${c.mainPick}</span>
                </div>
              </div>
            </div>
            <button class="btn-toggle" onclick="toggleIntel(${d.id})">🔍 ΠΛΗΡΗΣ ΑΝΑΛΥΣΗ OMEGA</button>
            <div id="intel-${d.id}" class="deep-intel-box">
              <div class="stats-grid">
                <div class="stat-box"><div class="stat-title">🏠 ΓΗΠΕΔΟΥΧΟΣ (Τελ. 6)</div><div style="margin-bottom: 5px;">${buildFormHtml(c.hFormStr)}</div><div style="display:flex; justify-content:space-between; margin-top:8px;"><div><span style="color:var(--txt-muted); font-size:0.7rem;">xG:</span> <span class="stat-value" style="color:var(--p);">${c.rawHXG}</span></div><div><span style="color:var(--txt-muted); font-size:0.7rem;">xGA:</span> <span class="stat-value" style="color:var(--alert);">${c.rawHXGA}</span></div></div></div>
                <div class="stat-box"><div class="stat-title">✈️ ΦΙΛΟΞΕΝΟΥΜΕΝΟΣ (Τελ. 6)</div><div style="margin-bottom: 5px;">${buildFormHtml(c.aFormStr)}</div><div style="display:flex; justify-content:space-between; margin-top:8px;"><div><span style="color:var(--txt-muted); font-size:0.7rem;">xG:</span> <span class="stat-value" style="color:var(--p);">${c.rawAXG}</span></div><div><span style="color:var(--txt-muted); font-size:0.7rem;">xGA:</span> <span class="stat-value" style="color:var(--alert);">${c.rawAXGA}</span></div></div></div>
              </div>
              <div class="stats-grid" style="grid-template-columns: 1fr 1fr 1fr 1fr; text-align:center;">
                <div class="stat-box"><div class="stat-title">🚩 xC (HOME)</div><div class="stat-value">${c.hXCorner}</div></div>
                <div class="stat-box"><div class="stat-title">🚩 xC (AWAY)</div><div class="stat-value">${c.aXCorner}</div></div>
                <div class="stat-box"><div class="stat-title">🟨 xCard (H)</div><div class="stat-value" style="color:#f1c40f;">${c.hXCards}</div></div>
                <div class="stat-box"><div class="stat-title">🟨 xCard (A)</div><div class="stat-value" style="color:#f1c40f;">${c.aXCards}</div></div>
              </div>
              <div style="margin-bottom: 15px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px solid #222;"><div class="stat-title" style="margin-bottom:8px;">⚔️ ΤΕΛΕΥΤΑΙΑ Η2Η</div>${c.h2hList.map(h => `<div style="padding: 4px 0; border-bottom: 1px dashed #333;">${h}</div>`).join('')}</div>
              <div style="color:var(--txt-muted); font-size:0.7rem; margin-bottom:5px; font-weight:800; text-transform:uppercase;">Εφαρμοσμενα Νευρωνικα Φιλτρα:</div>${c.rulesLog.map(r => `<div class="rule-item">${r}</div>`).join('')}
            </div>
          </div>
        `;
      });
    }

    function renderLiveDashboard() {
      const container = document.getElementById('upcomingList');
      container.innerHTML = "<h2 class='orbitron' style='text-align:center; color:var(--alert); margin-bottom: 30px;'>🔴 IN-PLAY RADAR</h2>";

      liveData.forEach(d => {
        const f = d.fixture; const h = d.hStats; const a = d.aStats;
        let time = f.fixture.status.elapsed ? f.fixture.status.elapsed + "'" : "HT";
        let pressureWinner = "ΙΣΟΡΡΟΠΙΑ"; let pColor = "#fff";
        if(h.pressure > a.pressure + 10) { pressureWinner = f.teams.home.name; pColor = "var(--p)"; }
        else if(a.pressure > h.pressure + 10) { pressureWinner = f.teams.away.name; pColor = "var(--alert)"; }

        container.innerHTML += `
          <div class="cyber-card live-glow">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <div style="flex: 1;">
                <span class="status-badge badge-live">⏱ ${time}</span>
                <span style="color:var(--txt-muted); font-size:0.7rem; margin-left:8px;">${f.league.name}</span>
                <div class="team-name">${f.teams.home.name} <span style="color:var(--gold); margin-left:10px;">${f.goals.home}</span></div>
                <div class="team-name">${f.teams.away.name} <span style="color:var(--gold); margin-left:10px;">${f.goals.away}</span></div>
                <div style="margin-top:12px; font-size:0.75rem;">
                  <span style="color:var(--txt-muted);">ΚΑΤΟΧΗ:</span> <span style="color:var(--p); font-weight:900;">${h.poss}%</span> - <span style="color:var(--alert); font-weight:900;">${a.poss}%</span>
                  <div class="poss-wrap"><div class="poss-home" style="width:${h.poss}%"></div></div>
                </div>
              </div>
              <div style="text-align:right; min-width: 140px;">
                <div style="color:var(--txt-muted); font-family:'Orbitron'; font-weight:900; font-size:0.65rem; text-transform:uppercase;">Live Pressure Index</div>
                <div style="background:#000; padding:10px; border-radius:12px; margin-top:5px; border:1px solid var(--border);">
                  <div class="orbitron" style="font-size:1.1rem; color:var(--p); font-weight:900;">${h.pressure} <span style="color:#555;">-</span> <span style="color:var(--alert);">${a.pressure}</span></div>
                  <div style="font-size:0.6rem; color:${pColor}; margin-top:4px;">ΠΙΕΖΕΙ: ${pressureWinner}</div>
                </div>
              </div>
            </div>
            <button class="btn-toggle" onclick="toggleIntel('live-${f.fixture.id}')">📊 ΑΝΑΛΥΤΙΚΑ ΣΤΑΤΙΣΤΙΚΑ ΑΓΩΝΑ</button>
            <div id="intel-live-${f.fixture.id}" class="deep-intel-box">
              <div class="stats-grid" style="grid-template-columns: 1fr 1fr 1fr 1fr; text-align:center;">
                <div class="stat-box"><div class="stat-title">ΣΟΥΤ ΣΤΟΧΟ</div><div class="stat-value"><span style="color:var(--p)">${h.shotsOn}</span> - <span style="color:var(--alert)">${a.shotsOn}</span></div></div>
                <div class="stat-box"><div class="stat-title">ΕΠΙΚ. ΕΠΙΘΕΣΕΙΣ</div><div class="stat-value"><span style="color:var(--p)">${h.dangerAtk}</span> - <span style="color:var(--alert)">${a.dangerAtk}</span></div></div>
                <div class="stat-box"><div class="stat-title">ΚΟΡΝΕΡ</div><div class="stat-value"><span style="color:var(--p)">${h.corners}</span> - <span style="color:var(--alert)">${a.corners}</span></div></div>
                <div class="stat-box"><div class="stat-title">ΚΑΡΤΕΣ</div><div class="stat-value" style="color:#f1c40f;">${h.cards} - ${a.cards}</div></div>
              </div>
            </div>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
