<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Predictor Pro v4700.14 - Neural Feedback</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root {
      --bg: #010409; --card: #0d1117; --border: #30363d;
      --p: #00f2ff; --magenta: #ff00ff; --gold: #f59e0b;
      --neon-live: #39ff14; --alert: #da3633;
      --grad: linear-gradient(135deg, #00f2ff, #8b5cf6);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f0f6fc; margin: 0; padding: 0; }
    .orbitron { font-family: 'Orbitron', sans-serif; }
    .container { max-width: 1000px; margin: 0 auto; padding: 15px; }

    /* DATA LAB AUDIT PANEL */
    .lab-audit-panel { background: #000; border: 2px solid var(--gold); border-radius: 16px; padding: 20px; margin-bottom: 30px; box-shadow: 0 0 30px rgba(245, 158, 11, 0.1); }
    .audit-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px; }
    .audit-box { background: #161b22; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #333; }
    .audit-label { font-size: 0.65rem; color: var(--txt-muted); text-transform: uppercase; letter-spacing: 1px; }
    .audit-value { font-family: 'Orbitron'; font-size: 1.5rem; color: var(--gold); font-weight: 900; margin: 5px 0; }

    .cyber-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 5px solid var(--p); }
    .btn-main { padding: 15px 25px; background: var(--grad); color: #fff; border: none; border-radius: 8px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; text-transform: uppercase; margin: 5px; }
    
    .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.85rem; border-bottom: 1px solid #1a1d23; padding-bottom: 4px; }
    .val-xg { color: var(--p); font-weight: 800; font-family: 'Orbitron'; }
    .val-actual { color: var(--neon-live); font-weight: 900; }
  </style>
</head>

<body>
  <div id="auth" style="text-align:center; margin-top:20vh;">
    <h1 class="orbitron" style="color:var(--p);">APEX ALPHA OMEGA v4700.14</h1>
    <input type="password" id="pin" placeholder="PIN" oninput="if(this.value==='106014'){this.parentElement.style.display='none';document.getElementById('app').style.display='block';}" 
           style="background:#000; color:var(--p); border:1px solid var(--p); padding:15px; font-size:2rem; text-align:center; border-radius:12px; font-family:'Orbitron'; outline:none;">
  </div>

  <div id="app" style="display:none;">
    <div class="container">
      <header style="text-align:center; padding: 20px 0;">
        <h1 class="orbitron" style="color:var(--p); margin:0;">QUANT TERMINAL <span style="color:#fff">FEEDBACK</span></h1>
      </header>

      <div style="display:flex; justify-content:center; flex-wrap: wrap; margin-bottom:20px;">
        <button class="btn-main" onclick="runScan('audit')">🔍 RUN DATA AUDIT (RESULTS)</button>
        <button class="btn-main" style="background:#222;" onclick="exportPDF()">📄 SAVE PDF</button>
      </div>

      <div id="loader" style="display:none; text-align:center; margin-bottom:20px;">
        <div style="width:100%; background:#222; height:8px; border-radius:4px; overflow:hidden;"><div id="bar" style="width:0%; height:100%; background:var(--grad); transition:0.3s;"></div></div>
        <p id="status" class="orbitron" style="font-size:0.7rem; color:var(--p); margin-top:8px;"></p>
      </div>

      <div id="labSection"></div>
      <div id="display"></div>
    </div>
  </div>

  <script>
    const KEY = "956cbd05f9e9bf934df78d9b72d9a3a0";
    const API = "https://v3.football.api-sports.io";
    const LEAGUES = [39, 40, 41, 140, 141, 135, 78, 79, 61, 62, 253, 262, 128, 197, 318, 94, 88, 144, 2, 3, 84, 203, 357];
    let auditLog = [];

    async function apiReq(path) {
      const r = await fetch(`${API}/${path}`, { headers: {"x-apisports-key": KEY} });
      return await r.json();
    }

    async function runScan() {
      document.getElementById('loader').style.display = 'block';
      const disp = document.getElementById('display'); disp.innerHTML = "";
      const lab = document.getElementById('labSection'); lab.innerHTML = "";
      const date = new Date().toISOString().split('T')[0];
      const res = await apiReq(`fixtures?date=${date}`);
      const matches = (res.response || []).filter(m => LEAGUES.includes(m.league.id));
      
      auditLog = [];

      for(let i=0; i<matches.length; i++) {
        let m = matches[i];
        document.getElementById('bar').style.width = ((i+1)/matches.length * 100) + "%";
        document.getElementById('status').innerText = `AUDITING: ${m.teams.home.name}...`;

        // Τραβάμε τα πραγματικά στατιστικά του αγώνα
        const sR = await apiReq(`fixtures/statistics?fixture=${m.fixture.id}`);
        let actual = null;
        if(sR.response && sR.response.length === 2) {
          let hS = sR.response[0].statistics; let aS = sR.response[1].statistics;
          let gV = (a, t) => { let o = a.find(x => x.type === t); return o && o.value ? parseInt(o.value) : 0; };
          actual = {
            hScore: m.goals.home, aScore: m.goals.away,
            hCor: gV(hS, "Corner Kicks"), aCor: gV(aS, "Corner Kicks"),
            hCrd: gV(hS, "Yellow Cards") + gV(hS, "Red Cards"),
            aCrd: gV(aS, "Yellow Cards") + gV(aS, "Red Cards")
          };
          auditLog.push({ m, actual });
        }
        renderAuditMatch(m, actual);
        await new Promise(r => setTimeout(r, 150));
      }
      renderLabFeedback();
      document.getElementById('loader').style.display = 'none';
    }

    function renderLabFeedback() {
      if(auditLog.length === 0) return;
      
      let totalGoals = auditLog.reduce((acc, curr) => acc + curr.actual.hScore + curr.actual.aScore, 0);
      let totalCorners = auditLog.reduce((acc, curr) => acc + curr.actual.hCor + curr.actual.aCor, 0);
      let totalCards = auditLog.reduce((acc, curr) => acc + curr.actual.hCrd + curr.actual.aCrd, 0);
      let avgGoals = (totalGoals / auditLog.length).toFixed(2);

      document.getElementById('labSection').innerHTML = `
        <div class="lab-audit-panel">
          <h2 class="orbitron" style="color:var(--gold); text-align:center; margin-top:0;">🔬 NEURAL FEEDBACK LAB</h2>
          <div class="audit-grid">
            <div class="audit-box"><div class="audit-label">AVG GOALS/MATCH</div><div class="audit-value">${avgGoals}</div></div>
            <div class="audit-box"><div class="audit-label">TOTAL CORNERS</div><div class="audit-value">${totalCorners}</div></div>
            <div class="audit-box"><div class="audit-label">TOTAL CARDS</div><div class="audit-value">${totalCards}</div></div>
          </div>
          <div style="margin-top:20px; padding:15px; background:rgba(255,255,255,0.05); border-radius:10px; font-size:0.8rem;">
            <strong style="color:var(--p);">ALGORITHM REVIEW:</strong> <br>
            Σήμερα η παραγωγή κόρνερ είναι ${totalCorners > 120 ? 'ΥΨΗΛΗ' : 'ΚΑΝΟΝΙΚΗ'}. 
            ${avgGoals > 2.8 ? '⚠️ Το μοντέλο xG πρέπει να προσαρμοστεί για High Scoring τάση.' : '✅ Το μοντέλο xG παραμένει σταθερό.'}
          </div>
        </div>
      `;
    }

    function renderAuditMatch(m, s) {
      if(!s) return;
      let html = `
        <div class="cyber-card" style="border-left-color:${m.fixture.status.short === 'FT' ? '#555' : 'var(--neon-live)'}">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
              <span style="font-size:0.7rem; color:var(--gold); font-weight:900;">${m.league.name} [${m.fixture.status.short}]</span>
              <h2 class="orbitron" style="margin:5px 0;">${m.teams.home.name} vs ${m.teams.away.name}</h2>
            </div>
            <div style="text-align:right;">
              <div class="val-actual" style="font-size:2rem;">${s.hScore} - ${s.aScore}</div>
            </div>
          </div>
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px; border-top:1px solid #222; padding-top:10px;">
            <div style="font-size:0.8rem;">
              ACTUAL CORNERS: <span class="val-actual">🚩 ${s.hCor + s.aCor}</span> <br>
              ACTUAL CARDS: <span class="val-actual">🟨 ${s.hCrd + s.aCrd}</span>
            </div>
            <div style="font-size:0.8rem; text-align:right; color:var(--txt-muted);">
              Match ID: ${m.fixture.id} <br>
              Status: ${m.fixture.status.long}
            </div>
          </div>
        </div>`;
      document.getElementById('display').innerHTML += html;
    }

    function exportPDF() { html2pdf().from(document.getElementById('app')).save('Audit_Report.pdf'); }
  </script>
</body>
</html>
